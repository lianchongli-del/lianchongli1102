
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核计划签字记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 弹窗容器 - 固定宽高 */
        .modal {
            width: 480px;
            height: 600px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            letter-spacing: 0.5px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            color: #595959;
        }

        /* 内容区 - 可滚动 */
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* 时间线容器 */
        .timeline {
            position: relative;
            padding-left: 28px;
        }

        /* 时间线竖线 */
        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #f0f0f0;
        }

        /* 时间线节点 */
        .timeline-item {
            position: relative;
            padding-bottom: 28px;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        /* 节点状态图标 */
        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* 已完成状态 - 绿色 */
        .timeline-item.completed .timeline-dot {
            background: #52c41a;
        }

        .timeline-item.completed .timeline-dot::after {
            content: '✓';
            color: white;
            font-size: 10px;
            font-weight: bold;
        }

        /* 进行中状态 - 蓝色 */
        .timeline-item.pending .timeline-dot {
            background: #1890ff;
            box-shadow: 0 0 0 4px rgba(24, 144, 255, 0.1);
        }

        /* 节点内容 */
        .timeline-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            line-height: 1.4;
        }

        .timeline-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #8c8c8c;
        }

        .timeline-meta .operator {
            color: #595959;
            font-weight: 500;
        }

        .timeline-desc {
            font-size: 13px;
            color: #595959;
            line-height: 1.5;
            margin-top: 2px;
        }

        /* 状态标签 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
            width: fit-content;
        }

        .status-tag.completed {
            background: #f6ffed;
            color: #389e0d;
            border: 1px solid #b7eb8f;
        }

        .status-tag.pending {
            background: #e6f7ff;
            color: #096dd9;
            border: 1px solid #91d5ff;
        }

        /* 底部关闭按钮区域 */
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
            background: #fafafa;
        }

        .btn-close {
            padding: 8px 24px;
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            color: #595959;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close:hover {
            color: #262626;
            border-color: #262626;
        }

        /* 滚动条样式 */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: #d9d9d9;
            border-radius: 3px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: #bfbfbf;
        }
    </style>
</head>
<body>

    <!-- 弹窗 -->
    <div class="modal">
        <!-- 头部 -->
        <div class="modal-header">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            <h2>审核计划签字记录</h2>
        </div>

        <!-- 内容区 -->
        <div class="modal-body">
            <div class="timeline">
                <!-- 节点1 -->
                <div class="timeline-item completed">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">编制审核计划</div>
                        <div class="timeline-meta">
                            <span class="operator">武荣刚</span>
                            <span>·</span>
                            <span>2024-03-30 14:30:25</span>
                        </div>
                        <div class="timeline-desc">已完成审核计划编制并签署</div>
                        <span class="status-tag completed">已完成</span>
                    </div>
                </div>

                <!-- 节点2 -->
                <div class="timeline-item completed">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">项目管理人员签字</div>
                        <div class="timeline-meta">
                            <span class="operator">李经理</span>
                            <span>·</span>
                            <span>2024-04-01 10:00:00</span>
                        </div>
                        <div class="timeline-desc">已完成审核计划最终确认</div>
                        <span class="status-tag completed">已完成</span>
                    </div>
                </div>

                <!-- 节点3 -->
                <div class="timeline-item pending">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">客户待确认</div>
                        <div class="timeline-meta">
                            <span class="operator">北京市地铁运营有限公司</span>
                            <span>·</span>
                            <span>进行中</span>
                        </div>
                        <div class="timeline-desc">等待客户对审核计划进行最终确认</div>
                        <span class="status-tag pending">待确认</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="modal-footer">
            <button class="btn-close">关闭</button>
        </div>
    </div>

</body>
</html>
