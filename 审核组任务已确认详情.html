        const pageUrls = pageData.map((b64) => {
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const html = new TextDecoder('utf-8').decode(bytes);
            return URL.createObjectURL(new Blob([html], { type: 'text/html;charset=utf-8' }));
        });
        const tabs = Array.from(document.querySelectorAll('.main-tab'));
        const frames = Array.from(document.querySelectorAll('.page-frame'));
        frames.forEach((frame) => { frame.src = pageUrls[Number(frame.dataset.pageIndex)]; });
        tabs.forEach((tab) => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.target;
                tabs.forEach((item) => item.classList.toggle('active', item === tab));
                frames.forEach((frame) => frame.classList.toggle('active', frame.id === 'frame-' + target));
            });
        });
