
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核计划确认</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f3f6fb;
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-shell {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .top-titlebar {
            min-height: 72px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 28px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            z-index: 20;
        }
        .title-left {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
            flex: 1 1 auto;
        }
        .back-btn,
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #334155;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-btn {
            padding: 0;
            border: 0;
            color: #64748b;
            background: transparent;
        }
        .back-btn:hover { color: #1e293b; }
        .title-divider {
            width: 1px;
            height: 28px;
            background: #cbd5e1;
        }
        .title-text {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            white-space: nowrap;
            min-width: 0;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            height: 26px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        .badge-green {
            border-color: #a7f3d0;
            background: #ecfdf5;
            color: #047857;
        }
        .title-tags {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex: 0 1 auto;
            min-width: 0;
        }
        .action-btn {
            height: 38px;
            padding: 0 16px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
        }
        .action-btn:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        .action-btn.primary {
            border-color: #2563eb;
            background: #2563eb;
            color: #fff;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.2);
        }
        .action-btn.primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
        .action-btn.danger {
            border-color: #fecaca;
            color: #dc2626;
        }
        .action-btn.danger:hover {
            background: #fef2f2;
            border-color: #fca5a5;
        }
        .frame-stage {
            flex: 1 1 auto;
            min-height: 0;
            min-width: 0;
            background: #f5f7fa;
        }
        .plan-frame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #fff;
        }
        @media (max-width: 760px) {
            .top-titlebar {
                min-height: auto;
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 16px;
            }
            .title-left { align-items: flex-start; flex-direction: column; gap: 10px; }
            .title-divider { display: none; }
            .actions { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
        }
        @media (max-width: 520px) {
            .title-tags { width: 100%; }
            .action-btn {
                flex: 1 1 0;
                min-width: 0;
            }
        }


        /* 线上签章流程 / PDF预览弹窗 */
        .sign-modal-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.48);
            backdrop-filter: blur(3px);
            z-index: 9999;
        }
        .sign-modal-mask.show { display: flex; }
        .sign-modal-card {
            width: min(680px, calc(100% - 32px));
            max-height: calc(100vh - 48px);
            overflow: hidden;
            border-radius: 14px;
            background: #fff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
            display: flex;
            flex-direction: column;
            animation: signModalIn .22s ease-out;
        }
        @keyframes signModalIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sign-modal-card.pdf {
            width: 100vw;
            height: 100vh;
            max-height: 100vh;
            border-radius: 0;
            border: 0;
        }
        .sign-modal-header {
            flex: 0 0 auto;
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 20px 28px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .sign-modal-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0f172a;
            font-size: 17px;
            font-weight: 800;
        }
        .sign-modal-subtitle {
            margin-top: 4px;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
        }
        .sign-modal-close {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all .18s;
        }
        .sign-modal-close:hover { background: #e2e8f0; color: #0f172a; }
        .sign-modal-body {
            padding: 28px;
            overflow: auto;
        }
        .sign-modal-footer {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            padding: 20px 28px;
            border-top: 1px solid #e2e8f0;
            background: #fff;
        }
        .sign-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        .sign-status-pending { background: #dbeafe; color: #1d4ed8; }
        .sign-status-signing { background: #fef3c7; color: #92400e; }
        .sign-status-signed { background: #dcfce7; color: #166534; }
        .sign-status-waiting { background: #f1f5f9; color: #64748b; }
        .sign-platform-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f8fafc;
            padding: 24px;
        }
        .sign-platform-info {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }
        .sign-platform-info small {
            display: block;
            color: #64748b;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .sign-platform-info strong {
            color: #0f172a;
            font-size: 17px;
        }
        .sign-process-list {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
        .sign-process-line {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 50px;
            padding: 13px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
        }
        .sign-process-line.running {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: #1d4ed8;
        }
        .sign-process-line.done {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }
        .return-reason-label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 13px;
            font-weight: 700;
        }
        .return-reason-textarea {
            width: 100%;
            min-height: 118px;
            resize: vertical;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            color: #0f172a;
            font: inherit;
            font-size: 13px;
            line-height: 1.6;
            outline: none;
        }
        .return-reason-textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        .return-tip {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            line-height: 1.5;
        }
        .pdf-viewer {
            flex: 1 1 auto;
            overflow: auto;
            background: #dbe2ea;
            padding: 18px;
        }
        .pdf-sheet {
            width: min(1040px, 100%);
            min-height: 1320px;
            margin: 0 auto;
            padding: 42px 48px;
            background: #fff;
            border: 1px solid #cbd5e1;
            box-shadow: 0 18px 45px rgba(15, 23, 42, .18);
            color: #111827;
            position: relative;
            overflow: hidden;
        }
        .pdf-watermark {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 8px;
            color: rgba(37, 99, 235, .045);
            transform: rotate(-28deg);
            pointer-events: none;
            user-select: none;
        }
        .pdf-inner { position: relative; z-index: 1; }
        .pdf-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #111827;
            margin-bottom: 24px;
        }
        .pdf-org { font-size: 25px; font-weight: 900; letter-spacing: .5px; }
        .pdf-en { margin-top: 4px; color: #64748b; font-size: 11px; letter-spacing: 1px; }
        .pdf-meta { color: #374151; font-size: 12px; line-height: 1.8; text-align: right; }
        .pdf-title {
            margin: 0 0 20px;
            text-align: center;
            color: #111827;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 4px;
        }
        .pdf-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 18px 0 8px;
            color: #111827;
            font-size: 14px;
            font-weight: 900;
        }
        .pdf-section-title::before {
            content: '';
            width: 4px;
            height: 14px;
            background: #111827;
            border-radius: 999px;
        }
        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 12px;
            line-height: 1.65;
            background: rgba(255,255,255,.92);
        }
        .pdf-table th,
        .pdf-table td {
            border: 1px solid #111827;
            padding: 7px 9px;
            vertical-align: top;
            word-break: break-word;
        }
        .pdf-table th {
            width: 16%;
            background: #f3f4f6;
            text-align: center;
            font-weight: 900;
        }
        .pdf-table.small th,
        .pdf-table.small td { padding: 6px 7px; }
        .pdf-seal-area {
            min-height: 168px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-top: 18px;
            padding: 16px 18px;
            border: 1px dashed #94a3b8;
            background: rgba(248,250,252,.8);
        }
        .pdf-seals {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 28px;
            flex-wrap: wrap;
        }
        .personal-seal-wrap { text-align: center; }
        .personal-seal {
            width: 92px;
            height: 92px;
            border: 3px solid #dc2626;
            border-radius: 999px;
            color: #dc2626;
            background: rgba(255,255,255,.78);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transform: rotate(-12deg);
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(220, 38, 38, .12);
            position: relative;
            animation: sealStamp .35s cubic-bezier(.2, .85, .24, 1.25);
        }
        .personal-seal::before {
            content: '';
            position: absolute;
            inset: 7px;
            border: 1.5px solid #dc2626;
            border-radius: inherit;
        }
        .personal-seal .role { font-size: 12px; line-height: 1; }
        .personal-seal .name { font-size: 16px; letter-spacing: 2px; line-height: 1.1; }
        .personal-seal-time { margin-top: 8px; color: #334155; font-size: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        @keyframes sealStamp {
            0% { opacity: 0; transform: scale(1.85) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }
        .empty-seal-tip { color: #94a3b8; font-size: 13px; font-weight: 700; }
        .pdf-footer {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 26px;
            padding-top: 12px;
            border-top: 1px solid #94a3b8;
            color: #64748b;
            font-size: 11px;
        }
        .sign-toast {
            position: fixed;
            left: 50%;
            bottom: 32px;
            transform: translateX(-50%) translateY(18px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: calc(100vw - 32px);
            padding: 10px 14px;
            border-radius: 999px;
            background: #0f172a;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all .2s;
            z-index: 10001;
            box-shadow: 0 14px 30px rgba(15, 23, 42, .22);
        }
        .sign-toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 780px) {
            .pdf-sheet { padding: 28px 22px; min-height: 1000px; }
            .pdf-top { flex-direction: column; }
            .pdf-meta { text-align: left; }
            .pdf-seal-area { align-items: flex-start; flex-direction: column; }
            .pdf-seals { justify-content: flex-start; }
        }

    
        .pdf-preview-frame {
            width: 100%;
            height: calc(100vh - 86px);
            border: 0;
            background: #e2e8f0;
            display: block;
        }

    </style>
</head>
<body>
    <div class="page-shell">
        <header class="top-titlebar">
            <div class="title-left">
                <button type="button" class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i>返回列表</button>
                <div class="title-divider"></div>
                <div class="title-text">审核计划确认</div>
                <div class="title-tags">
                    <span class="badge">一阶段</span>
                    <span class="badge badge-green">QMS+EMS</span>
                </div>
            </div>
            <div class="actions">
                <button type="button" id="topSignBtn" class="action-btn primary" onclick="openSignModal()"><i class="fas fa-stamp"></i><span id="topSignBtnText">签章</span></button>
                <button type="button" class="action-btn danger" onclick="openReturnReasonModal()"><i class="fas fa-reply"></i>退回</button>
            </div>
        </header>
        <main class="frame-stage">
            <iframe id="planFrame" class="plan-frame" title="审核计划"></iframe>
        </main>
    </div>

    <!-- 退回原因弹窗 -->
    <div class="sign-modal-mask" id="returnReasonModal" role="dialog" aria-modal="true" aria-labelledby="returnReasonTitle">
        <div class="sign-modal-card">
            <div class="sign-modal-header">
                <div>
                    <div class="sign-modal-title" id="returnReasonTitle"><i class="fas fa-reply text-red-500"></i>退回原因</div>
                    <div class="sign-modal-subtitle">退回后系统保留当前审核计划内容，等待重新调整后再次提交。</div>
                </div>
                <button type="button" class="sign-modal-close" onclick="closeSignModalById('returnReasonModal')" aria-label="关闭"><i class="fas fa-times"></i></button>
            </div>
            <div class="sign-modal-body">
                <label class="return-reason-label" for="returnReasonText">请填写或查看本次退回原因</label>
                <textarea id="returnReasonText" class="return-reason-textarea" placeholder="请输入退回原因">审核计划中的审核时间与项目实际安排不一致，请调整后重新提交确认。</textarea>
                <div class="return-tip"><i class="fas fa-circle-info"></i><span>点击“确认退回”后，系统将记录退回原因并停留在当前页面。</span></div>
            </div>
            <div class="sign-modal-footer">
                <button type="button" class="action-btn" onclick="closeSignModalById('returnReasonModal')">取消</button>
                <button type="button" class="action-btn danger" onclick="confirmReturnReason()">确认退回</button>
            </div>
        </div>
    </div>

    <!-- 线上签章平台处理弹窗 -->
    <div class="sign-modal-mask" id="onlineSignModal" role="dialog" aria-modal="true" aria-labelledby="onlineSignTitle">
        <div class="sign-modal-card">
            <div class="sign-modal-header">
                <div>
                    <div class="sign-modal-title" id="onlineSignTitle"><i class="fas fa-stamp text-blue-600"></i>线上签章平台处理</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <span class="sign-status-pill sign-status-pending" id="modalSignStatus"><i class="fas fa-clock"></i>待签章</span>
                    <button type="button" class="sign-modal-close" onclick="closeSignModalById('onlineSignModal')" aria-label="关闭"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="sign-modal-body">
                <div class="sign-platform-card">
                    <div class="sign-platform-info">
                        <div>
                            <small>当前签章节点</small>
                            <strong id="modalNodeName">项目管理</strong>
                        </div>
                        <div style="text-align:right;">
                            <small>签章人</small>
                            <strong id="modalSigner">周静</strong>
                        </div>
                    </div>
                    <div style="color:#475569;font-size:13px;line-height:1.65;">当前文件将以审核计划 PDF 样式提交线上签章，完成后在 PDF 预览中展示个人签章印。</div>
                    <div class="sign-process-list" id="platformProgress">
                        <div class="sign-process-line" data-progress="0"><i class="fas fa-stamp"></i><span>线上签章平台执行盖章</span></div>
                        <div class="sign-process-line" data-progress="1"><i class="fas fa-route"></i><span>更新签章进度并流转下一节点</span></div>
                    </div>
                </div>
            </div>
            <div class="sign-modal-footer">
                <button type="button" class="action-btn" onclick="openPdfPreview()"><i class="fas fa-eye"></i>预览当前文件</button>
                <button type="button" class="action-btn primary" id="confirmSignBtn" onclick="simulatePlatformSign()"><i class="fas fa-paper-plane"></i>签章</button>
            </div>
        </div>
    </div>

    <!-- PDF样式预览弹窗 -->
    <div class="sign-modal-mask" id="pdfPreviewModal" role="dialog" aria-modal="true" aria-labelledby="pdfPreviewTitle">
        <div class="sign-modal-card pdf">
            <div class="sign-modal-header">
                <div>
                    <div class="sign-modal-title" id="pdfPreviewTitle"><i class="fas fa-file-pdf text-red-500"></i>审核计划 PDF 预览</div>
                    <div class="sign-modal-subtitle" id="pdfPreviewSubtitle">根据当前审核计划表单生成的 PDF 样式预览</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button type="button" class="action-btn" onclick="downloadPdfDemo()"><i class="fas fa-download"></i>下载</button>
                    <button type="button" class="sign-modal-close" onclick="closeSignModalById('pdfPreviewModal')" aria-label="关闭"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="pdf-viewer">
                <iframe id="pdfPreviewFrame" class="pdf-preview-frame" title="审核计划PDF预览"></iframe>
            </div>
        </div>
    </div>

    <div class="sign-toast" id="signToast"><i class="fas fa-check-circle"></i><span id="signToastText"></span></div>

    <script>
        const signNodes = [
            { key: 'leader', title: '组长', role: '审核组长', signer: '武荣刚', status: 'signed', signedAt: '2024-04-12 09:18:26' },
            { key: 'pm', title: '项目管理', role: '项目管理', signer: '周静', status: 'pending', signedAt: '' },
            { key: 'customer', title: '客户', role: '客户代表', signer: '刘海峰', status: 'waiting', signedAt: '' }
        ];
        let signingIndex = -1;

        function statusMeta(status) {
            if (status === 'signed') return { text: '已签章', icon: 'fa-circle-check', cls: 'sign-status-signed' };
            if (status === 'signing') return { text: '签章中', icon: 'fa-spinner fa-spin', cls: 'sign-status-signing' };
            if (status === 'pending') return { text: '待签章', icon: 'fa-clock', cls: 'sign-status-pending' };
            return { text: '未开始', icon: 'fa-lock', cls: 'sign-status-waiting' };
        }

        function currentSignIndex() {
            return signNodes.findIndex(function (node) { return node.status === 'pending' || node.status === 'signing'; });
        }

        function nowText() {
            const d = new Date();
            const p = function (n) { return String(n).padStart(2, '0'); };
            return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
        }

        function openReturnReasonModal() {
            openSignModalById('returnReasonModal');
            setTimeout(function () {
                const reason = document.getElementById('returnReasonText');
                if (reason) reason.focus();
            }, 80);
        }

        function openSignModal() {
            const idx = currentSignIndex();
            if (idx === -1) {
                showSignToast('全部节点已完成签章，可预览最终文件');
                openPdfPreview();
                return;
            }
            signingIndex = idx;
            const node = signNodes[idx];
            document.getElementById('modalNodeName').textContent = node.title;
            document.getElementById('modalSigner').textContent = node.signer;
            setModalStatus(node.status);
            const btn = document.getElementById('confirmSignBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i>签章';
            document.querySelectorAll('.sign-process-line').forEach(function (line) { line.classList.remove('running', 'done'); });
            openSignModalById('onlineSignModal');
        }

        function openSignModalById(id) {
            const modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeSignModalById(id) {
            const modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.remove('show');
            if (!document.querySelector('.sign-modal-mask.show')) document.body.style.overflow = '';
        }

        function setModalStatus(status) {
            const meta = statusMeta(status);
            const badge = document.getElementById('modalSignStatus');
            if (!badge) return;
            badge.className = 'sign-status-pill ' + meta.cls;
            badge.innerHTML = '<i class="fas ' + meta.icon + '"></i>' + meta.text;
        }

        function simulatePlatformSign() {
            if (signingIndex < 0) return;
            const node = signNodes[signingIndex];
            node.status = 'signing';
            setModalStatus('signing');
            renderAllSignatureUI();
            const btn = document.getElementById('confirmSignBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>处理中';
            const lines = Array.from(document.querySelectorAll('.sign-process-line'));
            lines.forEach(function (line) { line.classList.remove('running', 'done'); });
            lines.forEach(function (line, index) {
                setTimeout(function () {
                    if (index > 0) {
                        lines[index - 1].classList.remove('running');
                        lines[index - 1].classList.add('done');
                    }
                    line.classList.add('running');
                }, index * 520);
            });
            setTimeout(function () {
                lines[lines.length - 1].classList.remove('running');
                lines[lines.length - 1].classList.add('done');
                finishCurrentSign();
            }, lines.length * 520 + 360);
        }

        function finishCurrentSign() {
            const signedIndex = signingIndex;
            const node = signNodes[signedIndex];
            node.status = 'signed';
            node.signedAt = nowText();
            const next = signNodes[signedIndex + 1];
            if (next && next.status === 'waiting') next.status = 'pending';
            renderAllSignatureUI();
            setModalStatus('signed');
            const btn = document.getElementById('confirmSignBtn');
            btn.innerHTML = '<i class="fas fa-circle-check"></i>签章完成';
            showSignToast(node.title + '节点已完成签章，已流转至' + (next ? next.title : '完成状态'));
            setTimeout(function () {
                closeSignModalById('onlineSignModal');
                openPdfPreview(signedIndex);
            }, 520);
        }

        function confirmReturnReason() {
            const reason = document.getElementById('returnReasonText');
            const value = reason ? reason.value.trim() : '';
            if (!value) {
                showSignToast('请先填写退回原因');
                if (reason) reason.focus();
                return;
            }
            closeSignModalById('returnReasonModal');
            showSignToast('已记录退回原因：' + value);
        }

        function showSignToast(text) {
            const toast = document.getElementById('signToast');
            const textEl = document.getElementById('signToastText');
            if (!toast || !textEl) return;
            textEl.textContent = text;
            toast.classList.add('show');
            clearTimeout(window.__signToastTimer);
            window.__signToastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2600);
        }

        function renderAllSignatureUI() {
            renderTopSignButton();
            injectSignatureProgressToFrame();
        }

        function renderTopSignButton() {
            const idx = currentSignIndex();
            const btn = document.getElementById('topSignBtn');
            const btnText = document.getElementById('topSignBtnText');
            if (!btn || !btnText) return;
            if (idx === -1) {
                btn.disabled = false;
                btn.style.opacity = '1';
                btnText.textContent = '已完成';
                return;
            }
            const node = signNodes[idx];
            btn.disabled = node.status === 'signing';
            btn.style.opacity = btn.disabled ? '.65' : '1';
            btnText.textContent = node.status === 'signing' ? '签章中' : '签章';
        }

        function frameStatusClass(status) {
            if (status === 'signed') return 'completed';
            if (status === 'pending' || status === 'signing') return 'active';
            return 'waiting';
        }

                panel.id = 'frameSignProgressPanel';

            }
            const current = currentSignIndex();
            panel.innerHTML = `
                <div class="frame-sign-progress-head">
                    <div>
                        <div class="frame-sign-progress-title"><i class="fas fa-route"></i><span>签章进度</span></div>
                    </div>
                    <button type="button" class="frame-preview-btn" id="framePreviewBtn"><i class="fas fa-file-pdf"></i>预览当前文件</button>
                </div>
                <div class="frame-sign-progress-body">
                    <div class="frame-sign-flow">
                        ${signNodes.map(function (node, index) {
                            const isCurrent = index === current;
                            const nodeCls = frameStatusClass(node.status);
                            const marker = node.status === 'signed' ? '<i class="fas fa-check"></i>' : String(index + 1);
                            const stateText = node.status === 'signed' ? '已签章' : (node.status === 'pending' || node.status === 'signing' ? '待处理' : '未开始');
                            const subText = node.status === 'signed' && node.signedAt ? ('签章人：' + node.signer + ' · ' + node.signedAt) : (node.status === 'pending' || node.status === 'signing' ? ('当前处理人：' + node.signer) : ('等待 ' + node.signer + ' 处理'));
                            const nodeHtml = '<div class="frame-sign-node ' + nodeCls + '"><span class="frame-node-marker">' + marker + '</span><div class="frame-node-main"><span class="frame-node-title">' + node.title + '</span><span class="frame-node-sub">' + subText + '</span></div><span class="frame-node-status ' + nodeCls + '">' + stateText + '</span></div>';
                            const arrowCls = index < current ? 'done' : (isCurrent ? 'active' : '');
                            return index < signNodes.length - 1 ? nodeHtml + '<span class="frame-flow-arrow ' + arrowCls + '"><i class="fas fa-arrow-right"></i></span>' : nodeHtml;
                        }).join('')}
                    </div>
                </div>
            `;
            const previewBtn = doc.getElementById('framePreviewBtn');
            if (previewBtn) previewBtn.onclick = function () { window.openPdfPreview(); };
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildSignaturePageHtml() {
            const rows = signNodes.map(function (item, index) {
                const meta = statusMeta(item.status);
                return '<tr><td>' + (index + 1) + '</td><td>' + escapeHtml(item.title) + '</td><td>' + escapeHtml(item.signer) + '</td><td>' + escapeHtml(item.role) + '</td><td>' + escapeHtml(item.signedAt || '-') + '</td><td>' + escapeHtml(meta.text) + '</td></tr>';
            }).join('');
            const sealBlocks = signNodes.filter(function (item) { return item.status === 'signed'; }).map(function (item) {
                return '<div class="pdf-personal-seal-wrap"><div class="pdf-personal-seal"><div class="seal-role">' + escapeHtml(item.role) + '</div><div class="seal-name">' + escapeHtml(item.signer) + '</div><div class="seal-mark">电子签章</div></div><div class="pdf-personal-seal-time">' + escapeHtml(item.signedAt) + '</div></div>';
            }).join('');
            const current = currentSignIndex();
            return `
                <div class="signature-page-inner">
                    <div class="signature-page-header">
                        <div>
                            <div class="signature-org">CQC 中国质量认证中心</div>
                            <div class="signature-en">CHINA QUALITY CERTIFICATION CENTRE</div>
                        </div>
                        <div class="signature-meta">
                            <div>文件名称：审核计划</div>
                            <div>签署方式：线上电子签章</div>
                            <div>当前流转：${current === -1 ? '全部已完成' : escapeHtml(signNodes[current].title)}</div>
                        </div>
                    </div>
                    <h2 class="signature-title">审核计划线上签章记录</h2>
                    <div class="signature-summary">
                        <div><strong>说明：</strong>本页汇总当前审核计划的电子签章记录。每个节点签章成功后，系统自动流转至下一节点，并在本页追加个人签章印。</div>
                    </div>
                    <table class="signature-table">
                        <thead>
                            <tr><th>序号</th><th>节点</th><th>签章人</th><th>角色</th><th>签章时间</th><th>状态</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="signature-seal-title">个人签章印</div>
                    <div class="signature-seal-area">${sealBlocks || '<div class="signature-empty">待完成线上签章后，本页展示个人签章印。</div>'}</div>
                </div>
            `;
        }

        function normalizePdfText(value) {
            return String(value == null ? '' : value)
                .replace(/\u00a0/g, ' ')
                .replace(/\s+/g, ' ')
                .replace(/^\s+|\s+$/g, '');
        }

        function controlValue(control) {
            if (!control) return '';
            const tag = control.tagName ? control.tagName.toLowerCase() : '';
            const type = (control.type || '').toLowerCase();
            if (type === 'checkbox' || type === 'radio') return control.checked ? '是' : '否';
            if (tag === 'select') {
                const option = control.options && control.selectedIndex >= 0 ? control.options[control.selectedIndex] : null;
                return normalizePdfText(option ? option.textContent : control.value);
            }
            if (tag === 'textarea') return normalizePdfText(control.value || control.textContent);
            return normalizePdfText(control.value || control.getAttribute('value') || control.textContent);
        }

        function textFromNode(el) {
            if (!el) return '';
            const clone = el.cloneNode(true);
            const originalControls = Array.from(el.querySelectorAll('input, textarea, select'));
            const cloneControls = Array.from(clone.querySelectorAll('input, textarea, select'));
            cloneControls.forEach(function (control, index) {
                const span = clone.ownerDocument.createElement('span');
                span.textContent = controlValue(originalControls[index]);
                control.replaceWith(span);
            });
            clone.querySelectorAll('script, style, button, .node-popover, .auditor-dropdown, .criteria-expand-icon, #framePreviewBtn').forEach(function (item) {
                item.remove();
            });
            return normalizePdfText(clone.textContent);
        }

        function pdfRows(rows) {
            return rows.map(function (row) {
                const label = escapeHtml(row[0] || '');
                const value = escapeHtml(row[1] || '-');
                return '<tr><th>' + label + '</th><td>' + value + '</td></tr>';
            }).join('');
        }

        function makePdfTable(title, rows, extraClass) {
            if (!rows || !rows.length) return '';
            return '<div class="pdf-table-section"><div class="pdf-section-title">' + escapeHtml(title) + '</div><table class="plan-pdf-table ' + (extraClass || '') + '"><tbody>' + pdfRows(rows) + '</tbody></table></div>';
        }

        function domTableToPdf(table, title) {
            if (!table) return '';
            const rows = Array.from(table.querySelectorAll('tr')).map(function (tr) {
                const cells = Array.from(tr.children).map(function (cell) { return textFromNode(cell); });
                return cells;
            }).filter(function (cells) { return cells.some(Boolean); });
            if (!rows.length) return '';
            return '<div class="pdf-table-section"><div class="pdf-section-title">' + escapeHtml(title) + '</div><table class="plan-pdf-table matrix">' + rows.map(function (cells, rowIndex) {
                const cellTag = rowIndex === 0 ? 'th' : 'td';
                return '<tr>' + cells.map(function (cell) { return '<' + cellTag + '>' + escapeHtml(cell || '-') + '</' + cellTag + '>'; }).join('') + '</tr>';
            }).join('') + '</table></div>';
        }

        function buildTypeTable(doc) {
            const sec = doc.querySelector('#section-type');
            if (!sec) return '';
            const value = textFromNode(sec.querySelector('.tip-box')) || textFromNode(sec);
            return makePdfTable('一、审核类型', [['审核类型及认证体系', value]]);
        }

        function buildPurposeTable(doc) {
            const sec = doc.querySelector('#section-purpose');
            if (!sec) return '';
            const rows = Array.from(sec.querySelectorAll('.form-field')).map(function (field) {
                const label = textFromNode(field.querySelector('.form-label'));
                const textarea = field.querySelector('textarea, input, select');
                const value = controlValue(textarea) || textFromNode(field);
                return [label, value];
            }).filter(function (row) { return row[0] || row[1]; });
            return makePdfTable('二、审核目的', rows);
        }

        function buildScopeTable(doc) {
            const sec = doc.querySelector('#section-scope');
            if (!sec) return '';
            const cards = Array.from(sec.querySelectorAll('.scope-site-card'));
            if (!cards.length) return makePdfTable('三、审核范围', [['审核范围', textFromNode(sec)]]);
            return '<div class="pdf-table-section"><div class="pdf-section-title">三、审核范围</div>' + cards.map(function (card, index) {
                const rows = Array.from(card.querySelectorAll('.scope-line')).map(function (line) {
                    return [textFromNode(line.querySelector('.scope-label')), textFromNode(line.querySelector('.scope-value'))];
                }).filter(function (row) { return row[0] || row[1]; });
                return '<table class="plan-pdf-table scope-table"><tbody><tr><th colspan="2">场所 ' + (index + 1) + '</th></tr>' + pdfRows(rows) + '</tbody></table>';
            }).join('') + '</div>';
        }

        function buildCriteriaTable(doc) {
            const sec = doc.querySelector('#section-criteria');
            if (!sec) return '';
            const rows = [];
            const standardTags = Array.from(sec.querySelectorAll('.criteria-standards-grid .standard-tag')).map(function (tag) { return textFromNode(tag); }).filter(Boolean);
            if (standardTags.length) rows.push(['管理体系标准', standardTags.join('；')]);
            Array.from(sec.querySelectorAll('.criteria-item')).forEach(function (item) {
                const title = textFromNode(item.querySelector('.criteria-label-text'));
                if (!title || title === '管理体系标准') return;
                const checkbox = item.querySelector('input[type="checkbox"]');
                const checkedText = checkbox ? (checkbox.checked ? '适用' : '不适用') : '适用';
                const input = item.querySelector('.criteria-content-area input, .criteria-content-area textarea');
                const detail = input ? controlValue(input) : '';
                rows.push([title, detail ? checkedText + '；' + detail : checkedText]);
            });
            return makePdfTable('四、审核准则', rows);
        }

        function buildTeamTable(doc) {
            const sec = doc.querySelector('#section-team');
            if (!sec) return '';
            const table = sec.querySelector('table');
            return domTableToPdf(table, '五、审核组') || makePdfTable('五、审核组', [['审核组', textFromNode(sec)]]);
        }

        function buildActivityTable(doc) {
            const sec = doc.querySelector('#section-activity');
            if (!sec) return '';
            let html = '<div class="pdf-table-section"><div class="pdf-section-title">六、审核活动安排</div>';
            const stats = Array.from(sec.querySelectorAll('.stats-bar .stat-item')).map(function (item) { return textFromNode(item); }).filter(Boolean);
            if (stats.length) {
                html += '<table class="plan-pdf-table"><tbody><tr><th>审核组已安排时长统计</th><td>' + escapeHtml(stats.join('；')) + '</td></tr></tbody></table>';
            }

            const cards = Array.from(sec.querySelectorAll('.site-card'));
            if (!cards.length) {
                html += '<table class="plan-pdf-table"><tbody><tr><th>审核活动</th><td>' + escapeHtml(textFromNode(sec)) + '</td></tr></tbody></table>';
                return html + '</div>';
            }

            cards.forEach(function (card, index) {
                const siteTitle = textFromNode(card.querySelector('.site-title')) || ('场所 ' + (index + 1));
                const infoRows = [];
                const typeTag = Array.from(card.querySelectorAll('.site-type-tag')).map(function (tag) { return textFromNode(tag); }).filter(Boolean).join('、');
                const scopes = Array.from(card.querySelectorAll('.scope-badge')).map(function (tag) { return textFromNode(tag); }).filter(Boolean).join('、');
                if (siteTitle) infoRows.push(['场所名称', siteTitle]);
                if (typeTag) infoRows.push(['场所类型', typeTag]);
                if (scopes) infoRows.push(['认证体系', scopes]);
                Array.from(card.querySelectorAll('.site-info-item')).forEach(function (info) {
                    const label = textFromNode(info.querySelector('.site-info-label'));
                    const value = textFromNode(info.querySelector('.site-info-value'));
                    if (label || value) infoRows.push([label, value]);
                });

                    }
                    html += '</tbody></table>';
                }
            });

            return html + '</div>';

\n<!-- PLAN_ANCHOR_NAV -->\n        <nav class=\"plan-anchor-nav\" aria-label=\"审核计划导航\">\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill active\" data-target=\"section-type\">审核类型</span>\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill\" data-target=\"section-purpose\">审核目的</span>\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill\" data-target=\"section-scope\">审核范围</span>\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill\" data-target=\"section-criteria\">审核准则</span>\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill\" data-target=\"section-team\">审核组</span>\n            <span role=\"button\" tabindex=\"0\" class=\"plan-anchor-pill\" data-target=\"section-activity\">审核活动</span>\n        </nav>\n        <!-- PLAN_ANCHOR_NAV_END -->\n\r\n\r\n        <!-- 1. 审核类型 -->\n        <div id=\"section-type\" class=\"form-section\">\n            <div class=\"section-header\">\n                <div class=\"section-title\">\n                    <div class=\"section-icon bg-blue-100 text-blue-600\">\n                        <i class=\"fas fa-tasks\"></i>\n                    </div>\n                    审核类型\n                </div>\n            </div>\n            <div class=\"p-5\">\n                <div class=\"tip-box\">\n                    <i class=\"fas fa-info-circle\"></i>\n                    <span class=\"font-medium\">初次认证（二阶段）</span>\n                    <span class=\"text-slate-300\">|</span>\n                    <span class=\"font-medium text-blue-700\">QMS</span>\n                    <span class=\"font-medium text-green-700\">EMS</span>\n                    <span class=\"text-slate-300\">|</span>\n                    <span class=\"font-medium\">监督审核</span>\n                    <span class=\"font-medium text-amber-700\">OHSMS</span>\n                    <span class=\"text-slate-300\">|</span>\n                    <span class=\"font-medium\">
