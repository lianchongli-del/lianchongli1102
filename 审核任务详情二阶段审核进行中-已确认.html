                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"recordContent\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" placeholder=\"如：组织环境 4.1-4.4 GB/T 19001-2016\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">涉及部门/场所</label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"recordDept\" value=\"${record.dept}\" style=\"width: 100%;\" placeholder=\"涉及部门/场所\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">审核记录 <span class=\"text-red-500\">*</span></label>\r\n                    <div class=\"rich-editor\">\r\n                        <div class=\"rich-editor-toolbar\">\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('bold')\" title=\"加粗\"><i class=\"fas fa-bold\"></i></button>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('italic')\" title=\"斜体\"><i class=\"fas fa-italic\"></i></button>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('underline')\" title=\"下划线\"><i class=\"fas fa-underline\"></i></button>\r\n                            <div style=\"width: 1px; height: 20px; background: #e2e8f0; margin: 0 4px;\"></div>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"insertImage()\" title=\"插入图片\"><i class=\"fas fa-image\"></i></button>\r\n                        </div>\r\n                        <div class=\"rich-editor-content\" contenteditable=\"true\" id=\"richEditor\">\r\n                            ${record.record}\r\n                        </div>\r\n                    </div>\r\n                </div>\r\n            `;\r\n            \r\n            if (record.decision === '轻微不符合' || record.decision === '严重不符合') {\r\n                renderNonConformityFields();\r\n            }\r\n        }\r\n\r\n        function renderVerificationFormsReadOnly(data) {\r\n            const container = document.getElementById('verificationForms');\r\n            \r\n            if (!data.records || data.records.length === 0) {\r\n                container.innerHTML = '<div class=\"empty-state\"><i class=\"fas fa-inbox\"></i><p>暂无核查记录</p></div>';\r\n                return;\r\n            }\r\n            \r\n            const record = data.records[currentActivityIndex];\r\n            const isNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\r\n            \r\n            let ncHtml = '';\r\n            if (isNC) {\r\n                ncHtml = `\r\n                    <div class=\"nonconformity-section\" style=\"margin-top: 16px;\">\r\n                        <div class=\"nonconformity-title\">\r\n                            <i class=\"fas fa-exclamation-triangle\"></i>\r\n                            不符合项信息\r\n                        </div>\r\n                        <div style=\"margin-bottom: 12px;\">\r\n                            <label class=\"form-label\">不符合事实</label>\r\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6;\">\r\n                                ${record.nonConformityFact || '<span style=\"color: #94a3b8;\">无</span>'}\r\n                            </div>\r\n                        </div>\r\n                        <div>\r\n                            <label class=\"form-label\">不符合条款</label>\r\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px;\">\r\n                                ${record.nonConformityClause || '<span style=\"color: #94a3b8;\">无</span>'}\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                `;\r\n            }\r\n            \r\n            container.innerHTML = `\r\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;\">\r\n                    <div>\r\n                        <label class=\"form-label\">日期/时间</label>\r\n                        <input type=\"text\" class=\"form-input\" value=\"${record.date} ${record.time}\" readonly style=\"background: #f8fafc;\">\r\n                    </div>\r\n                    <div>\r\n                        <label class=\"form-label\">判定</label>\r\n                        <input type=\"text\" class=\"form-input\" value=\"${record.decision}\" readonly style=\"background: #f8fafc; ${isNC ? 'color: #dc2626; font-weight: 600;' : ''}\">\r\n                    </div>\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\r\n                    <input type=\"text\" class=\"form-input\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">涉及部门/场所</label>\r\n                    <input type=\"text\" class=\"form-input\" value=\"${record.dept}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">审核记录</label>\r\n                    <div style=\"min-height: 200px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.7; color: #334155;\">\r\n                        ${record.record || '<span style=\"color: #94a3b8;\">无记录内容</span>'}\r\n                    </div>\r\n                </div>\r\n                ${ncHtml}\r\n            `;\r\n        }\r\n\r\n        function execCmd(command) {\r\n            document.execCommand(command, false, null);\r\n            document.getElementById('richEditor').focus();\r\n        }\r\n\r\n        function insertImage() {\r\n            const url = prompt('请输入图片URL:');\r\n            if (url) {\r\n                document.execCommand('insertImage', false, url);\r\n            }\r\n        }\r\n\r\n        function renderAttachments() {\r\n            const container = document.getElementById('attachmentList');\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            container.innerHTML = '';\r\n            \r\n            data.attachments.forEach((att, index) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'attachment-item';\r\n                \r\n                let icon = 'fa-file';\r\n                if (att.type === 'word') icon = 'fa-file-word';\r\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\r\n                if (att.type === 'image') icon = 'fa-file-image';\r\n                \r\n                item.innerHTML = `\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span>${att.name}</span>\r\n                    <span class=\"remove\" onclick=\"removeAttachment(${index})\"><i class=\"fas fa-times\"></i></span>\r\n                `;\r\n                \r\n                container.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function renderAttachmentsReadOnly(data) {\r\n            const container = document.getElementById('attachmentList');\r\n            container.innerHTML = '';\r\n            \r\n            if (!data.attachments || data.attachments.length === 0) {\r\n                container.innerHTML = '<span style=\"color: #94a3b8; font-size: 13px;\">无附件</span>';\r\n                return;\r\n            }\r\n            \r\n            data.attachments.forEach((att) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'attachment-item';\r\n                item.style.cursor = 'default';\r\n                \r\n                let icon = 'fa-file';\r\n                if (att.type === 'word') icon = 'fa-file-word';\r\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\r\n                if (att.type === 'image') icon = 'fa-file-image';\r\n                \r\n                item.innerHTML = `\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span>${att.name}</span>\r\n                `;\r\n                \r\n                container.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function uploadAttachment() {\r\n            document.getElementById('fileInputModal').click();\r\n        }\r\n\r\n        function handleFileSelectModal(event) {\r\n            const files = event.target.files;\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            for (let file of files) {\r\n                let type = 'file';\r\n                if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) type = 'word';\r\n                else if (file.name.endsWith('.pdf')) type = 'pdf';\r\n                else if (file.name.match(/\\.(jpg|jpeg|png|gif)$/)) type = 'image';\r\n                \r\n                data.attachments.push({ name: file.name, type: type });\r\n            }\r\n            \r\n            renderAttachments();\r\n            event.target.value = '';\r\n        }\r\n\r\n        function removeAttachment(index) {\r\n            if (confirm('确定删除该附件吗？')) {\r\n                verificationData[currentVerificationIndex].attachments.splice(index, 1);\r\n                renderAttachments();\r\n            }\r\n        }\r\n\r\n        function saveVerificationRecords() {\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            if (!isReadOnlyMode && data.records && data.records.length > 0) {\r\n                const record = data.records[currentActivityIndex];\r\n                const dateTime = document.getElementById('recordDateTime').value.split(' ');\r\n                \r\n                if (dateTime.length >= 2) {\r\n                    record.date = dateTime[0];\r\n                    record.time = dateTime.slice(1).join(' ');\r\n                }\r\n                \r\n                record.decision = document.getElementById('recordDecision').value;\r\n                record.content = document.getElementById('recordContent').value;\r\n                record.dept = document.getElementById('recordDept').value;\r\n                record.record = document.getElementById('richEditor').innerHTML;\r\n                \r\n                const ncFactEl = document.getElementById('nonConformityFact');\r\n                const ncClauseEl = document.getElementById('nonConformityClause');\r\n                if (ncFactEl) record.nonConformityFact = ncFactEl.value;\r\n                if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\r\n            }\r\n            \r\n            const hasEmptyRecord = data.records.some(r => !r.record || r.record.trim() === '');\r\n            if (hasEmptyRecord) {\r\n                alert('请填写所有审核记录的内容');\r\n                return;\r\n            }\r\n            \r\n            const hasEmptyNC = data.records.some(r => {\r\n                if (r.decision === '轻微不符合' || r.decision === '严重不符合') {\r\n                    return !r.nonConformityFact || !r.nonConformityClause;\r\n                }\r\n                return false;\r\n            });\r\n            if (hasEmptyNC) {\r\n                alert('请填写所有不符合项的事实和条款');\r\n                return;\r\n            }\r\n            \r\n            if (isLeaderEditMode) {\r\n                if (!confirm('确定提交组长核查记录吗？')) return;\r\n                data.status = 'submitted';\r\n                data.submitTime = new Date().toLocaleString('zh-CN');\r\n                showToast('组长核查记录已提交', 'success');\r\n            } else {\r\n                if (!confirm('确定确认该核查记录吗？确认后将不可再次修改。')) return;\r\n                data.status = 'confirmed';\r\n                showToast('核查记录已确认', 'success');\r\n            }\r\n            \r\n            renderVerificationTable();\r\n            closeVerificationModal();\r\n        }\r\n\r\n        function closeVerificationModal() {\r\n            document.getElementById('verificationModal').classList.remove('show');\r\n            document.body.style.overflow = '';\r\n            currentVerificationIndex = null;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = false;\r\n        }\r\n\r\n        // ========== 通用功能 ==========\r\n        \r\n        function switchNode(index) {\r\n            if (index !== 2) {\r\n                alert('当前示例仅展示\"审核任务中\"节点内容');\r\n                return;\r\n            }\r\n        }\r\n\r\n        function goBack() {\r\n            if (confirm('确定返回列表页？未保存的数据将丢失。')) {\r\n                console.log('返回列表页');\r\n            }\r\n        }\r\n\r\n        function saveAll() {\r\n            showToast('保存成功', 'success');\r\n        }\r\n\r\n        function showToast(message, type) {\r\n            const toast = document.createElement('div');\r\n            const bgColor = type === 'success' ? '#10b981' : '#3b82f6';\r\n            const icon = type === 'success' ? 'fa-check-circle' : 'fa-info-circle';\r\n            \r\n            toast.style.cssText = `position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: ${bgColor}; color: white; padding: 12px 24px; border-radius: 10px; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px;`;\r\n            toast.innerHTML = `<i class=\"fas ${icon}\"></i><span>${message}</span>`;\r\n            \r\n            document.body.appendChild(toast);\r\n            setTimeout(() => {\r\n                toast.style.opacity = '0';\r\n                toast.style.transition = 'opacity 0.3s';\r\n                setTimeout(() => toast.remove(), 300);\r\n            }, 3000);\r\n        }\r\n\r\n        // ========== 初始化 ==========\r\n        \r\n        document.addEventListener('DOMContentLoaded', function() {\r\n            renderVerificationTable();\r\n            \r\n            // 点击弹窗外部关闭\r\n            document.getElementById('verificationModal').addEventListener('click', function(e) {\r\n                if (e.target === this) {\r\n                    closeVerificationModal();\r\n                }\r\n            });\r\n        });\r\n    __COMBINED_SCRIPT_CLOSE__\r\n<script>\n(function () {\n  function wrapTables() {\n    document.querySelectorAll('table.data-table').forEach(function (table) {\n      if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;\n      var wrapper = document.createElement('div');\n      wrapper.className = 'table-scroll';\n      table.parentNode.insertBefore(wrapper, table);\n      wrapper.appendChild(table);\n    });\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', wrapTables);\n  } else {\n    wrapTables();\n  }\n})();\n__COMBINED_SCRIPT_CLOSE__\n\n<script id=\"FIELD_AUDIT_RECORD_PATCH\">\n(function () {\n  function escapeHtml(value) {\n    return String(value || '').replace(/[&<>\"']/g, function (ch) {\n      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', \"'\": '&#39;' })[ch];\n    });\n  }\n\n  function normalizeAuditRecord(record) {\n    if (!record) return record;\n    if (!Array.isArray(record.issues)) {\n      const issues = [];\n      if (record.decision === '观察项') {\n        issues.push({ type: '轻微不符合', description: record.nonConformityFact || '建议持 >\n      <section class=\"nc-list\" id=\"ncList\"></section>\n    </main>\n  </div>\n\n  <div class=\"modal-mask\" id=\"rejectModal\" onclick=\"maskClose(event, 'rejectModal')\">\n    <div class=\"modal return-modal\" onclick=\"event.stopPropagation()\">\n      <div class=\"modal-head\">\n        <div>\n          <div class=\"return-modal-title\"><i class=\"fas fa-reply\"></i> 退回原因</div>\n          <div class=\"return-modal-subtitle\">退回后系统保留当前不符合项报告内容，等待重新调整后再次提交。</div>\n        </div>\n        <button type=\"button\" class=\"return-modal-close\" onclick=\"closeRejectModal()\" aria-label=\"关闭\">×</button>\n      </div>\n      <div class=\"modal-body\">\n        <label class=\"form-label\" for=\"rejectReasonInput\">请填写或者查看本次退回原因</label>\n        <textarea class=\"return-reason-textarea\" id=\"rejectReasonInput\" placeholder=\"请输入退回原因\"></textarea>\n        <div class=\"return-tip\"><i class=\"fas fa-circle-info\"></i><span>点击“确认退回”后，系统将记录退回原因并停留在当前页面。</span></div>\n      </div>\n      <div class=\"modal-foot\">\n        <button class=\"btn\" onclick=\"closeRejectModal()\">取消</button>\n        <button class=\"btn btn-danger\" onclick=\"confirmReject()\">确认退回</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"modal-mask\" id=\"attachmentPreviewModal\" onclick=\"maskClose(event, 'attachmentPreviewModal')\">\n    <div class=\"modal\" onclick=\"event.stopPropagation()\">\n      <div class=\"modal-head\">\n        <span><i class=\"fas fa-eye\"></i> 附件预览</span>\n        <button class=\"btn btn-link danger\" onclick=\"closeAttachmentPreviewModal()\"><i class=\"fas fa-times\"></i></button>\n      </div>\n      <div class=\"modal-body\">\n        <div class=\"preview-box\" id=\"attachmentPreviewBox\"></div>\n      </div>\n      <div class=\"modal-foot\">\n        <button class=\"btn\" onclick=\"closeAttachmentPreviewModal()\">关闭</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"modal-mask\" id=\"onlineSignModal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"onlineSignTitle\">\n    <div class=\"sign-modal-card\" onclick=\"event.stopPropagation()\">\n      <div class=\"sign-modal-header\">\n        <div>\n          <div class=\"sign-modal-title\" id=\"onlineSignTitle\"><i class=\"fas fa-stamp\" style=\"color:#2563eb;\"></i>线上签字确认</div>\n          <div class=\"sign-modal-subtitle\">以不符合项报告 PDF 内容发起个人签章，签章完成后自动流转至下一节点。</div>\n        </div>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span class=\"sign-status-pill sign-status-pending\" id=\"modalSignStatus\"><i class=\"fas fa-clock\"></i>待签字</span>\n          <button type=\"button\" class=\"sign-modal-close\" onclick=\"closeSignModal()\" aria-label=\"关闭\"><i class=\"fas fa-times\"></i></button>\n        </div>\n      </div>\n      <div class=\"sign-modal-body\">\n        <div class=\"sign-platform-card\">\n          <div class=\"sign-platform-info\">\n            <div>\n              <small>当前不符合项报告</small>\n              <strong id=\"modalReportNo\">NC-20260623-001</strong>\n            </div>\n            <div>\n              <small>当前签字节点</small>\n              <strong id=\"modalNodeName\">审核员签字</strong>\n            </div>\n            <div style=\"text-align:right;\">\n              <small>签字人</small>\n              <strong id=\"modalSigner\">王审核</strong>\n            </div>\n          </div>\n          <div style=\"color:#475569;font-size:13px;line-height:1.65;\">当前文件将以不符合项报告 PDF 样式提交线上签章，完成后在 PDF 预览中展示个人签章信息。</div>\n          <div class=\"sign-process-list\" id=\"platformProgress\">\n            <div class=\"sign-process-line\" data-progress=\"0\"><i class=\"fas fa-file-pdf\"></i><span>生成不符合项报告 PDF 签章文件</span></div>\n            <div class=\"sign-process-line\" data-progress=\"1\"><i class=\"fas fa-stamp\"></i><span>线上签章平台执行个人签章</span></div>\n            <div class=\"sign-process-line\" data-progress=\"2\"><i class=\"fas fa-route\"></i><span>更新签字进度并自动流转下一节点</span></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"sign-modal-footer\">\n        <button type=\"button\" class=\"btn\" onclick=\"previewPdf(signTarget ? signTarget.idx : 0)\"><i class=\"fas fa-eye\"></i>预览当前文件</button>\n        <button type=\"button\" class=\"btn\" onclick=\"closeSignModal()\">取消</button>\n        <button type=\"button\" class=\"btn btn-primary\" id=\"confirmSignBtn\" onclick=\"startSignConfirm()\"><i class=\"fas fa-stamp\"></i>确认签字</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"pdf-modal-mask\" id=\"pdfModal\">\n    <div class=\"pdf-modal-card\">\n      <div class=\"pdf-modal-head\">\n        <div class=\"pdf-modal-title\"><i class=\"fas fa-file-pdf\" style=\"color:#dc2626;\"></i><span id=\"pdfModalTitle\">不符合项报告 PDF 预览</span></div>\n        <button class=\"btn\" onclick=\"closePdfModal()\"><i class=\"fas fa-times\"></i>关闭</button>\n      </div>\n      <div class=\"pdf-viewer\" id=\"pdfViewer\"></div>\n    </div>\n  </div>\n\n  \n  <script>\n    const flowNodes = [\n      { id: 'auditorSign', name: '审核员签字', owner: '审核员', desc: '确认不符合项报告内容' },\n      { id: 'leaderSign', name: '审核组长签字', owner: '审核组长', desc: '审核组长签字确认' },\n      { id: 'customerSign', name: '客户签字', owner: '客户', desc: '客户签字确认' },\n      { id: 'customerFill', name: '客户填写原因分析、纠正和纠正措施', owner: '客户', desc: '填写原因分析与整改措施' },\n      { id: 'auditorConclusion', name: '审核员确认跟踪结论', owner: '审核员', desc: '填写跟踪结论' }\n    ];\n\n    const conclusionOptions = [\n      '纠正和纠正措施可以接受且证实有效。',\n      '纠正和纠正措施计划可以接受，将在下次审核中验证有效性。（仅针对轻微不符合）',\n      '纠正和纠正措施不能接受，或纠正措施未有效实施。'\n    ];\n\n    const signMeta = {\n      auditorSign: { role: '审核员', signerField: 'auditor', defaultName: '王审核' },\n      leaderSign: { role: '审核组长', signerField: null, defaultName: '武荣刚' },\n      customerSign: { role: '客户代表', signerField: null, defaultName: '刘海峰' }\n    };\n\n    let currentStage = 'auditorSign';\n    let rejectTarget = null;\n    let signTarget = null;\n\n    const ncReports = [\n      {\n        id: 'nc1',\n        no: 'NC-20260623-001',\n        nature: '轻微不符合',\n        standard: 'GB/T 19001-2016 / ISO 9001:2015',\n        clause: '8.5.1、8.5.2',\n        relatedDept: '生产部、质量管理部',\n        customerName: '北京华信智能制造有限公司',\n        auditDateCn: '2026 年 06 月 23 日',\n        dueDateCn: '2026 年 07 月 23 日',\n        dueDate: '2026-07-23',\n        auditor: '王审核',\n        auditDate: '2026-06-23',\n        description: '现场抽查生产过程控制记录时发现，M-202606-015批次的首件确认记录中缺少设备参数复核结果，且该记录未体现质量检验人员签字确认。上述情况与程序文件《生产过程控制程序》中关于关键工序记录完整性的要求不一致。',\n        cause: '',\n        correctionPlan: '',\n        conclusion: '',\n        templates: {\n          cause: '初步分析为生产班组对新版首件确认记录填写要求理解不充分，班组长复核时仅关注检验结论，未对设备参数复核栏和签字栏进行完整性检查。',\n          correctionPlan: '纠正：已补充M-202606-015批次首件确认记录中的设备参数复核结果，并由质量检验人员补签确认。\\n纠正措施或纠正措施计划：1）对生产班组和质量检验人员开展新版记录填写培训；2）在班组长日常点检清单中增加关键工序记录完整性检查项；3）质量管理部在下月内抽查不少于10份首件确认记录，验证措施有效性。',\n          conclusion: '纠正和纠正措施可以接受且证实有效。'\n        },\n        stageStatus: { auditorSign: 'current', leaderSign: 'waiting', customerSign: 'waiting', customerFill: 'waiting', auditorConclusion: 'waiting' },\n        rejectHistory: [],\n        signRecords: {},\n        attachments: { cause: [], plan: [] },\n        attachmentTemplates: {\n          cause: [{ name: 'NC-20260623-001_原因分析说明.pdf', size: '286KB', source: 'default' }],\n          plan: [\n            { name: 'NC-20260623-001_首件确认记录补充件.pdf', size: '512KB', source: 'default' },\n            { name: 'NC-20260623-001_培训计划.xlsx', size: '96KB', source: 'default' }\n          ]\n        },\n        autoFillState: { customerFill: false, auditorConclusion: false }\n      },\n      {\n        id: 'nc2',\n        no: 'NC-20260623-002',\n        nature: '轻微不符合',\n        standard: 'GB/T 24001-2016 / ISO 14001:2015',\n        clause: '8.1、9.1.1',\n        relatedDept: '综合管理部、仓储部',\n        customerName: '北京华信智能制造有限公司',\n        auditDateCn: '2026 年 06 月 23 日',\n        dueDateCn: '2026 年 07 月 23 日',\n        dueDate: '2026-07-23',\n        auditor: '李审核',\n        auditDate: '2026-06-23',\n        description: '现场查看危险废物暂存区时发现，6月12日产生的一批废过滤棉已入库，但《危险废物暂存台账》中未记录对应重量和责任人，暂存标签信息填写不完整，不利于后续追溯和合规性评价。',\n        cause: '',\n        correctionPlan: '',\n        conclusion: '',\n        templates: {\n          cause: '仓储人员在交接期间只完成实物入库，未同步完成台账登记；综合管理部对危废台账的日常监督频次不足，未能及时发现记录缺失。',\n          correctionPlan: '纠正：已补录6月12日废过滤棉的重量、责任人和暂存标签信息。\\n纠正措施或纠正措施计划：1）修订危废入库交接清单，明确实物、标签、台账三项同步确认；2）综合管理部每周对危废暂存区台账与实物进行一次核对；3）一个月后对台账完整性进行复查。',\n          conclusion: '纠正和纠正措施计划可以接受，将在下次审核中验证有效性。（仅针对轻微不符合）'\n        },\n        stageStatus: { auditorSign: 'current', leaderSign: 'waiting', customerSign: 'waiting', customerFill: 'waiting', auditorConclusion: 'waiting' },\n        rejectHistory: [],\n        signRecords: {},\n        attachments: { cause: [], plan: [] },\n        attachmentTemplates: {\n          cause: [{ name: 'NC-20260623-002_原因分析记录.docx', size: '188KB', source: 'default' }],\n          plan: [\n            { name: 'NC-20260623-002_危废台账补录截图.png', size: '742KB', source: 'default' },\n            { name: 'NC-20260623-002_危废交接清单修订稿.pdf', size: '354KB', source: 'default' }\n          ]\n        },\n        autoFillState: { customerFill: false, auditorConclusion: false }\n      }\n    ];\n\n    function escapeHtml(str) {\n      return String(str || '').replace(/[&<>\"']/g, function (s) {\n        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', \"'\": '&#39;' })[s];\n      });\n    }\n\n    function reportStage(report) { return report.currentStage || currentStage; }\n    function currentStageIndex(stage) { return flowNodes.findIndex(n => n.id === (stage || currentStage)); }\n    function getStageMeta(id) { return flowNodes.find(n => n.id === id) || flowNodes[0]; }\n    function isSignStage(stage) { return ['auditorSign', 'leaderSign', 'customerSign'].includes(stage || currentStage); }\n    function isCustomerFillOpen(report) { return reportStage(report) === 'customerFill'; }\n    function isConclusionOpen(report) { return reportStage(report) === 'auditorConclusion'; }\n    function signStageIds() { return ['auditorSign', 'leaderSign', 'customerSign']; }\n    function getPreviousStage(stage) {\n      const idx = currentStageIndex(stage);\n      return flowNodes[Math.max(0, idx - 1)].id;\n    }\n    function resetReportToStage(report, stageId) {\n      const targetIdx = currentStageIndex(stageId);\n      report.currentStage = stageId;\n      report.finished = false;\n      flowNodes.forEach((node, idx) => {\n        if (idx < targetIdx) report.stageStatus[node.id] = 'completed';\n        else if (idx === targetIdx) report.stageStatus[node.id] = 'current';\n        else report.stageStatus[node.id] = 'waiting';\n        if (idx >= targetIdx && signStageIds().includes(node.id)) delete report.signRecords[node.id];\n      });\n      if (currentStageIndex(stageId) <= currentStageIndex('customerFill')) {\n        report.stageStatus.customerFill = currentStageIndex(stageId) === currentStageIndex('customerFill') ? 'current' : 'waiting';\n      }\n      if (currentStageIndex(stageId) <= currentStageIndex('auditorConclusion')) {\n        report.stageStatus.auditorConclusion = currentStageIndex(stageId) === currentStageIndex('auditorConclusion') ? 'current' : 'waiting';\n      }\n    }\n\n    function ensureStageAutoData(report) {\n      const stage = reportStage(report);\n      if ((stage === 'customerFill' || stage === 'auditorConclusion' || report.finished) && !report.autoFillState.customerFill) {\n        report.cause = report.templates.cause;\n        report.correctionPlan = report.templates.correctionPlan;\n        report.attachments.cause = report.attachmentTemplates.cause.map(item => ({ ...item }));\n        report.attachments.plan = report.attachmentTemplates.plan.map(item => ({ ...item }));\n        report.autoFillState.customerFill = true;\n      }\n      if ((stage === 'auditorConclusion' || report.finished) && !report.autoFillState.auditorConclusion) {\n        report.conclusion = report.templates.conclusion;\n        report.autoFillState.auditorConclusion = true;\n      }\n    }\n\n    function syncStageStatus(report) {\n      ensureStageAutoData(report);\n      if (report.finished) {\n        flowNodes.forEach((node) => {\n          if (report.stageStatus[node.id] !== 'rejected') report.stageStatus[node.id] = 'completed';\n        });\n        return;\n      }\n      const idx = currentStageIndex(reportStage(report));\n      flowNodes.forEach((node, nodeIdx) => {\n        const existing = report.stageStatus[node.id];\n        if (existing === 'rejected') return;\n        if (nodeIdx < idx) report.stageStatus[node.id] = 'completed';\n        else if (nodeIdx === idx) report.stageStatus[node.id] = existing === 'completed' ? 'completed' : 'current';\n        else report.stageStatus[node.id] = 'waiting';\n      });\n    }\n\n    function render() {\n      ncReports.forEach(syncStageStatus);\n      document.getElementById('ncList').innerHTML = ncReports.map((report, idx) => renderCard(report, idx)).join('');\n    }\n\n    function formatDateCn(dateValue) {\n      if (!dateValue) return '';\n      const parts = String(dateValue).split('-');\n      if (parts.length !== 3) return dateValue;\n      return parts[0] + ' 年 ' + parts[1] + ' 月 ' + parts[2] + ' 日';\n    }\n\n    function displayDueDate(report) {\n      return report.dueDate ? formatDateCn(report.dueDate) : (report.dueDateCn || '');\n    }\n\n    function isDueDateEditable(report) {\n      return reportStage(report) === 'auditorSign';\n    }\n\n    function getCardButtonText(report) {\n      const stage = reportStage(report);\n      if (stage === 'customerFill') return '<i class=\"fas fa-paper-plane\"></i> 提交填写内容';\n      if (stage === 'auditorConclusion') return '<i class=\"fas fa-check-double\"></i> 提交跟踪结论';\n      if (report.finished) return '<i class=\"fas fa-check\"></i> 已完成';\n      return '<i class=\"fas fa-signature\"></i> 签字确认';\n    }\n\n    function renderCard(report, idx) {\n      const stage = reportStage(report);\n      const fillOpen = isCustomerFillOpen(report);\n      const conclusionOpen = isConclusionOpen(report);\n      const showReject = stage === 'leaderSign' || stage === 'customerSign';\n      const actionDisabled = report.finished ? 'disabled' : '';\n      const dueDateEditable = isDueDateEditable(report);\n      return `\n        <article class=\"nc-card\">\n          <div class=\"nc-main\">\n            <div class=\"nc-header\">\n              <div class=\"nc-title\">\n                <span class=\"nc-no\"><i class=\"fas fa-file-lines\"></i>${escapeHtml(report.no)}</span>\n                <span class=\"nc-title-text\">不符合项报告 ${idx + 1}</span>\n              </div>\n              <div class=\"nc-card-toolbar\">\n                <button class=\"btn\" onclick=\"previewPdf(${idx})\"><i class=\"fas fa-file-pdf\"></i> 预览PDF</button>\n                ${showReject ? `<button class=\"btn btn-danger\" onclick=\"openRejectModal(${idx}, '${stage}')\"><i class=\"fas fa-reply\"></i> 退回</button>` : ''}\n                <button class=\"btn btn-primary\" onclick=\"submitCurrentStageForReport(${idx})\" ${actionDisabled}>${getCardButtonText(report)}</button>\n              </div>\n            </div>\n            <div class=\"nc-body\">\n              <div class=\"meta-grid\">\n                <div class=\"meta-item\"><div class=\"meta-label\">涉及标准</div><div class=\"meta-value\">${escapeHtml(report.standard)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">涉及条款</div><div class=\"meta-value\">${escapeHtml(report.clause)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">审核人员</div><div class=\"meta-value\">${escapeHtml(report.auditor)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">审核日期</div><div class=\"meta-value\">${escapeHtml(report.auditDate)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">整改完成期限</div><div class=\"meta-value\">${dueDateEditable ? `<input type=\"date\" class=\"form-input due-date-input\" value=\"${escapeHtml(report.dueDate || '')}\" onchange=\"updateField(${idx}, 'dueDate', this.value)\">` : escapeHtml(displayDueDate(report))}</div></div>\n              </div>\n\n              <section class=\"form-section\">\n                <div class=\"section-head\">\n                  <div class=\"section-title\"><i class=\"fas fa-clipboard-list\"></i>不符合项描述</div>\n                </div>\n                <div class=\"section-body\">\n                  <textarea class=\"form-textarea\" rows=\"4\" onchange=\"updateField(${idx}, 'description', this.value)\">${escapeHtml(report.description)}</textarea>\n                </div>\n              </section>\n\n              <div class=\"two-col\">\n                <section class=\"form-section\">\n                  <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-magnifying-glass-chart\"></i>原因分析</div></div>\n                  <div class=\"section-body\">\n                    <textarea class=\"form-textarea\" rows=\"5\" ${fillOpen ? '' : 'readonly'} onchange=\"updateField(${idx}, 'cause', this.value)\" placeholder=\"${fillOpen ? '请输入原因分析' : ''}\">${escapeHtml(report.cause)}</textarea>\n                    ${renderAttachmentPanel(idx, 'cause', '原因分析附件', report.attachments.cause, fillOpen)}\n                  </div>\n                </section>\n\n                <section class=\"form-section\">\n                  <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-screwdriver-wrench\"></i>纠正、纠正措施或纠正措施计划</div></div>\n                  <div class=\"section-body\">\n                    <textarea class=\"form-textarea\" rows=\"5\" ${fillOpen ? '' : 'readonly'} onchange=\"updateField(${idx}, 'correctionPlan', this.value)\" placeholder=\"${fillOpen ? '请输入纠正、纠正措施或纠正措施计划' : ''}\">${escapeHtml(report.correctionPlan)}</textarea>\n                    ${renderAttachmentPanel(idx, 'plan', '纠正及措施附件', report.attachments.plan, fillOpen)}\n                  </div>\n                </section>\n              </div>\n\n              <section class=\"form-section\">\n                <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-clipboard-check\"></i>跟踪结论</div></div>\n                <div class=\"section-body\">\n                  <div class=\"conclusion-options\">\n                    ${conclusionOptions.map((option, optIdx) => `\n                      <label class=\"radio-card ${conclusionOpen ? '' : 'locked'}\">\n                        <input type=\"radio\" name=\"conclusion-${idx}\" value=\"${optIdx}\" ${report.conclusion === option ? 'checked' : ''} ${conclusionOpen ? '' : 'disabled'} onchange=\"setConclusion(${idx}, ${optIdx})\">\n                        <span>${escapeHtml(option)}</span>\n                      </label>\n                    `).join('')}\n                  </div>\n                </div>\n              </section>\n            </div>\n          </div>\n\n          <aside class=\"flow-panel\">\n            <div class=\"flow-panel-head\">\n              <div class=\"flow-panel-title\"><i class=\"fas fa-diagram-project\"></i>流程节点</div>\n              <span class=\"badge current\">${escapeHtml(getStageMeta(stage).owner)}</span>\n            </div>\n            <div class=\"flow-list\">${renderFlow(report)}</div>\n          </aside>\n        </article>\n      `;\n    }\n\n    function renderAttachmentPanel(idx, type, title, list, editable) {\n      return `\n        <div class=\"attachment-panel\">\n          <div class=\"attachment-head\">\n            <div class=\"attachment-title\"><i class=\"fas fa-paperclip\"></i>${escapeHtml(title)}</div>\n            <div>\n              <input type=\"file\" id=\"file-${idx}-${type}\" style=\"display:none\" multiple onchange=\"handleUpload(${idx}, '${type}', this.files)\">\n              <button class=\"btn\" ${editable ? '' : 'disabled'} onclick=\"document.getElementById('file-${idx}-${type}').click()\"><i class=\"fas fa-upload\"></i> 上传附件</button>\n            </div>\n          </div>\n          <div class=\"attachment-list\">\n            ${list.map((att, attIdx) => `\n              <div class=\"attachment-item\">\n                <div class=\"attachment-name\"><i class=\"fas ${fileIcon(att.name)}\"></i><span title=\"${escapeHtml(att.name)}\">${escapeHtml(att.name)}</span><span style=\"color:#94a3b8;\">${escapeHtml(att.size || '')}</span></div>\n                <div class=\"attachment-actions\">\n                  <button class=\"btn btn-link\" onclick=\"previewAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-eye\"></i>预览</button>\n                  <button class=\"btn btn-link\" onclick=\"downloadAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-download\"></i>下载</button>\n                  <button class=\"btn btn-link danger\" ${editable ? '' : 'disabled'} onclick=\"deleteAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-trash\"></i>删除</button>\n                </div>\n              </div>\n            `).join('') || '<div style=\"color:#94a3b8;font-size:12px;\">暂无附件</div>'}\n          </div>\n        </div>\n      `;\n    }\n\n    function fileIcon(name) {\n      const lower = String(name || '').toLowerCase();\n      if (lower.endsWith('.pdf')) return 'fa-file-pdf';\n      if (lower.endsWith('.doc') || lower.endsWith('.docx')) return 'fa-file-word';\n      if (lower.endsWith('.xls') || lower.endsWith('.xlsx')) return 'fa-file-excel';\n      if (lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg')) return 'fa-file-image';\n      return 'fa-file-lines';\n    }\n\n    function renderFlow(report) {\n      return flowNodes.map((node, idx) => {\n        const status = report.stageStatus[node.id] || 'waiting';\n        const reject = report.rejectHistory.filter(item => item.stage === node.id).slice(-1)[0];\n        const icon = status === 'completed' ? 'fa-check' : status === 'rejected' ? 'fa-xmark' : status === 'current' ? 'fa-location-dot' : 'fa-circle';\n        const statusText = status === 'completed' ? '已完成' : status === 'rejected' ? '已退回' : status === 'current' ? '当前节点' : '待处理';\n        return `\n          <div class=\"flow-node ${status}\">\n            <div class=\"node-dot\"><i class=\"fas ${icon}\"></i></div>\n            <div>\n              <div class=\"node-name\">${idx + 1}. ${escapeHtml(node.name)}</div>\n              <div class=\"node-desc\">${escapeHtml(node.desc)}</div>\n              <span class=\"node-status\">${statusText}</span>\n              ${reject ? `<div class=\"reject-reason\"><strong>退回原因：</strong>${escapeHtml(reject.reason)}${reject.returnToStage ? `<br><strong>返回节点：</strong>${escapeHtml(getStageMeta(reject.returnToStage).name)}` : ''}</div>` : ''}\n            </div>\n          </div>\n        `;\n      }).join('');\n    }\n\n    function updateField(idx, field, value) {\n      const report = ncReports[idx];\n      if (field === 'dueDate') {\n        if (!isDueDateEditable(report)) return;\n        report.dueDate = value;\n        report.dueDateCn = formatDateCn(value);\n        render();\n        return;\n      }\n      if (field === 'cause' || field === 'correctionPlan') {\n        if (!isCustomerFillOpen(report)) return;\n      }\n      report[field] = value;\n    }\n\n    function setConclusion(idx, optionIdx) {\n      const report = ncReports[idx];\n      if (!isConclusionOpen(report)) return;\n      report.conclusion = conclusionOptions[optionIdx];\n    }\n\n    function handleUpload(idx, type, files) {\n      const report = ncReports[idx];\n      if (!isCustomerFillOpen(report)) return;\n      Array.from(files || []).forEach(file => {\n        report.attachments[type].push({ name: file.name, size: prettySize(file.size), source: 'local' });\n      });\n      render();\n    }\n\n    function prettySize(size) {\n      if (!size && size !== 0) return '';\n      if (size < 1024) return size + 'B';\n      if (size < 1024 * 1024) return Math.round(size / 1024) + 'KB';\n      return (size / 1024 / 1024).toFixed(1) + 'MB';\n    }\n\n    function previewAttachment(idx, type, attIdx) {\n      const att = ncReports[idx].attachments[type][attIdx];\n      document.getElementById('attachmentPreviewBox').innerHTML = `\n        <div>\n          <div style=\"font-size:38px;color:#2563eb;margin-bottom:10px;\"><i class=\"fas ${fileIcon(att.name)}\"></i></div>\n          <div style=\"font-weight:800;color:#1e293b;margin-bottom:4px;\">${escapeHtml(att.name)}</div>\n          <div style=\"color:#64748b;\">原型预览：此处展示附件预览区域，实际系统可根据文件类型调用 PDF、图片或 Office 预览服务。</div>\n        </div>\n      `;\n      document.getElementById('attachmentPreviewModal').classList.add('show');\n    }\n\n    function downloadAttachment(idx, type, attIdx) {\n      const att = ncReports[idx].attachments[type][attIdx];\n      const blob = new Blob(['附件下载示例：' + att.name + '\\n该文件为原型演示生成的占位下载内容。'], { type: 'text/plain;charset=utf-8' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = att.name;\n      document.body.appendChild(a);\n      a.click();\n      a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 500);\n    }\n\n    function deleteAttachment(idx, type, attIdx) {\n      const report = ncReports[idx];\n      if (!isCustomerFillOpen(report)) return;\n      if (!confirm('确定删除该附件？')) return;\n      report.attachments[type].splice(attIdx, 1);\n      render();\n    }\n\n    function openRejectModal(idx, stage) {\n      if (!(stage === 'leaderSign' || stage === 'customerSign')) return;\n      rejectTarget = { idx, stage };\n      const report = ncReports[idx];\n      const prev = getPreviousStage(stage);\n      document.getElementById('rejectReasonInput').value = `审核计划中的审核时间与项目实际安排不一致，请调整后重新提交。`;\n      document.getElementById('rejectModal').classList.add('show');\n    }\n\n    function closeRejectModal() {\n      document.getElementById('rejectModal').classList.remove('show');\n      rejectTarget = null;\n    }\n\n    function confirmReject() {\n      const reason = document.getElementById('rejectReasonInput').value.trim();\n      if (!reason) { alert('请填写退回原因'); return; }\n      if (!rejectTarget) return;\n      const report = ncReports[rejectTarget.idx];\n      const fromStage = rejectTarget.stage;\n      const prevStage = getPreviousStage(fromStage);\n      report.rejectHistory.push({ stage: fromStage, fromStage, returnToStage: prevStage, reason, time: new Date().toLocaleString('zh-CN') });\n      resetReportToStage(report, prevStage);\n      closeRejectModal();\n      render();\n      alert('已退回：' + report.no + '，流程已返回至“' + getStageMeta(prevStage).name + '”。');\n    }\n\n    function submitCurrentStageForReport(idx) {\n      const report = ncReports[idx];\n      const stage = reportStage(report);\n      if (report.finished) return;\n      if (stage === 'customerFill') {\n        submitCustomerFill(idx);\n        return;\n      }\n      if (stage === 'auditorConclusion') {\n        submitConclusion(idx);\n        return;\n      }\n      openSignModal(idx);\n    }\n\n    function openSignModal(idx) {\n      const report = ncReports[idx];\n      const stage = reportStage(report);\n      if (!isSignStage(stage)) return;\n      signTarget = { idx, stage };\n      const meta = getSignerInfo(report, stage);\n      document.getElementById('modalReportNo').textContent = report.no;\n      document.getElementById('modalNodeName').textContent = getStageMeta(stage).name;\n      document.getElementById('modalSigner').textContent = meta.signer;\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-pending';\n      status.innerHTML = '<i class=\"fas fa-clock\"></i>待签字';\n      document.querySelectorAll('#platformProgress .sign-process-line').forEach(line => {\n        line.classList.remove('running', 'done', 'failed');\n        line.querySelector('i').className = line.dataset.progress === '0' ? 'fas fa-file-pdf' : line.dataset.progress === '1' ? 'fas fa-stamp' : 'fas fa-route';\n      });\n      document.getElementById('confirmSignBtn').disabled = false;\n      document.getElementById('confirmSignBtn').innerHTML = '<i class=\"fas fa-stamp\"></i>确认签字';\n      document.getElementById('onlineSignModal').classList.add('show');\n    }\n\n    function closeSignModal() {\n      document.getElementById('onlineSignModal').classList.remove('show');\n      signTarget = null;\n    }\n\n    function startSignConfirm() {\n      if (!signTarget) return;\n      const btn = document.getElementById('confirmSignBtn');\n      btn.disabled = true;\n      btn.innerHTML = '<i class=\"fas fa-spinner fa-spin\"></i>签字中';\n      const status = document.getElementById('modalSignStatus');\n      const lines = Array.from(document.querySelectorAll('#platformProgress .sign-process-line'));\n      status.className = 'sign-status-pill sign-status-signing';\n      status.innerHTML = '<i class=\"fas fa-spinner fa-spin\"></i>签字中';\n      runSignStep(lines, 0, () => runSignStep(lines, 1, () => runSignStep(lines, 2, finishSignConfirm)));\n    }\n\n    function runSignStep(lines, index, done) {\n      const line = lines[index];\n      line.classList.add('running');\n      setTimeout(() => {\n        line.classList.remove('running');\n        line.classList.add('done');\n        const icon = line.querySelector('i');\n        icon.className = 'fas fa-check';\n        done();\n      }, 420);\n    }\n\n    function finishSignConfirm() {\n      const target = signTarget;\n      if (!target) return;\n      const report = ncReports[target.idx];\n      const meta = getSignerInfo(report, target.stage);\n      report.stageStatus[target.stage] = 'completed';\n      report.signRecords[target.stage] = { role: meta.role, signer: meta.signer, time: new Date().toLocaleString('zh-CN') };\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-signed';\n      status.innerHTML = '<i class=\"fas fa-check-circle\"></i>签字完成';\n      document.getElementById('confirmSignBtn').innerHTML = '<i class=\"fas fa-check\"></i>已完成';\n      advanceToNextStage(report);\n      render();\n      setTimeout(() => {\n        closeSignModal();\n        previewPdf(target.idx);\n      }, 280);\n    }\n\n    function getSignerInfo(report, stage) {\n      const meta = signMeta[stage] || signMeta.auditorSign;\n      return { role: meta.role, signer: meta.signerField ? (report[meta.signerField] || meta.defaultName) : meta.defaultName };\n    }\n\n    function advanceToNextStage(report) {\n      const next = flowNodes[currentStageIndex(reportStage(report)) + 1];\n      if (next) report.currentStage = next.id;\n      else report.finished = true;\n      ensureStageAutoData(report);\n    }\n\n    function submitCustomerFill(idx) {\n      const report = ncReports[idx];\n      if (!report.cause.trim()) { alert('请填写原因分析'); return; }\n      if (!report.correctionPlan.trim()) { alert('请填写纠正、纠正措施或纠正措施计划'); return; }\n      report.stageStatus.customerFill = 'completed';\n      report.currentStage = 'auditorConclusion';\n      ensureStageAutoData(report);\n      render();\n      alert(report.no + ' 已提交填写内容');\n    }\n\n    function submitConclusion(idx) {\n      const report = ncReports[idx];\n      if (!report.conclusion) { alert('请选择跟踪结论'); return; }\n      report.stageStatus.auditorConclusion = 'completed';\n      report.finished = true;\n      render();\n      alert(report.no + ' 跟踪结论已提交');\n    }\n\n    function previewPdf(idx) {\n\n      const reports = typeof idx === 'number' ? [ncReports[idx]] : ncReports;\n      document.getElementById('pdfModalTitle').textContent = reports.length === 1 ? reports[0].no + ' PDF 预览' : '不符合项报告 PDF 预览';\n      document.getElementById('pdfViewer').innerHTML = reports.map((report, i) => buildPdfSheet(report, (typeof idx === 'number' ? idx : i))).join('');\n      document.getElementById('pdfModal').classList.add('show');\n    }\n\n    function signStageStatusLabel(report, stage) {\n      const record = report.signRecords[stage];\n      if (record) return '已签章';\n      const signIds = signStageIds();\n      const stageIdx = signIds.indexOf(stage);\n      const curIdx = signIds.indexOf(reportStage(report));\n      if (report.finished || reportStage(report) === 'customerFill' || reportStage(report) === 'auditorConclusion') {\n        return record ? '已签章' : '未开始';\n      }\n      if (stage === reportStage(report)) return '待签章';\n      if (stageIdx > curIdx) return '未开始';\n      return record ? '已签章' : '待签章';\n    }\n\n    function buildSignRecordRows(report) {\n\n      return signStageIds().map((stage, index) => {\n        const info = getSignerInfo(report, stage);\n        const record = report.signRecords[stage];\n        return `\n          <tr>\n            <td class=\"center\">${index + 1}</td>\n            <td>${escapeHtml(getStageMeta(stage).name)}</td>\n            <td>${escapeHtml(record ? record.signer : info.signer)}</td>\n            <td>${escapeHtml(info.role)}</td>\n            <td>${escapeHtml(record ? record.time : '-')}</td>\n            <td>${escapeHtml(signStageStatusLabel(report, stage))}</td>\n          </tr>\n        `;\n      }).join('');\n    }\n\n    function buildPdfSheet(report, idx) {\n      // NC_PDF_SINGLE_PAGE_CLEAN\n      const isSevere = report.nature.indexOf('严重') > -1;\n      return `\n        <section class=\"pdf-sheet\">\n          <div class=\"pdf-watermark\">CQC</div>\n          <div class=\"pdf-inner\">\n            <div class=\"pdf-top\">\n              <div class=\"pdf-brand\">\n                <div class=\"pdf-logo-mark\">CQC</div>\n                <div>\n                  <div class=\"pdf-cn\">中国质量认证中心</div>\n                  <div class=\"pdf-en\">CHINA QUALITY CERTIFICATION CENTRE</div>\n                </div>\n              </div>\n            </div>\n            <h1 class=\"pdf-title\">不符合项报告</h1>\n            <table class=\"pdf-report-table\">\n              <tr><td class=\"pdf-label\" colspan=\"1\">客户名称：</td><td class=\"pdf-value\" colspan=\"3\">${escapeHtml(report.customerName)}</td></tr>\n              <tr>\n                <td class=\"pdf-label\">审核日期：</td><td class=\"pdf-value\">${escapeHtml(report.auditDateCn)}</td>\n                <td class=\"pdf-label pdf-red\">整改完成期限：</td><td class=\"pdf-value pdf-red\">${escapeHtml(displayDueDate(report))}</td>\n              </tr>\n              <tr>\n                <td class=\"pdf-label\" colspan=\"2\">受审核部门/过程：</td><td class=\"pdf-value\" colspan=\"1\">${escapeHtml(report.relatedDept)}</td>\n                <td class=\"pdf-value\">性质：<span class=\"pdf-box ${isSevere ? 'checked' : ''}\"></span>严重&nbsp;&nbsp;&nbsp;<span class=\"pdf-box ${!isSevere ? 'checked' : ''}\"></span>轻微</td>\n              </tr>\n              <tr><td class=\"pdf-label\" colspan=\"4\">不符合项描述：</td></tr>\n              <tr><td class=\"pdf-value pdf-large-cell\" colspan=\"4\">${escapeHtml(report.description)}</td></tr>\n            </table>\n          </div>\n        </section>\n      `;\n    }\n\n    function renderPdfSignSlot(report, stage) {\n      const info = getSignerInfo(report, stage);\n      const record = report.signRecords[stage];\n      const completed = !!record;\n      const signer = record ? record.signer : info.signer;\n      const time = record ? record.time : '-';\n      if (completed) {\n        return `\n          <div class=\"pdf-sign-card\">\n            <div class=\"personal-seal\"><span class=\"role\">${escapeHtml(info.role)}</span><span class=\"name\">${escapeHtml(signer)}</span></div>\n            <div class=\"personal-seal-time\">${escapeHtml(time)}</div>\n          </div>\n        `;\n      }\n      return `\n        <div class=\"pdf-sign-card\">\n          <div class=\"pending-seal\"><i class=\"fas fa-clock\"></i><br>${escapeHtml(info.role)}待签章<br><span style=\"font-weight:600;\">${escapeHtml(signer)}</span></div>\n        </div>\n      `;\n    }\n\n    function closePdfModal() { document.getElementById('pdfModal').classList.remove('show'); }\n    function closeAttachmentPreviewModal() { document.getElementById('attachmentPreviewModal').classList.remove('show'); }\n\n    function maskClose(event, id) {\n      if (event.target && event.target.id === id) {\n        document.getElementById(id).classList.remove('show');\n      }\n    }\n\n    document.addEventListener('DOMContentLoaded', render);\n  __COMBINED_SCRIPT_CLOSE__\n</body>\n</html>\n"];
        const tabs = Array.from(document.querySelectorAll('.main-tab'));
        const frames = Array.from(document.querySelectorAll('.page-frame'));
        const pageUrls = pageHtml.map((html) => {
            const restored = html.replaceAll('__COMBINED_SCRIPT_CLOSE__', '</' + 'script>');
            return URL.createObjectURL(new Blob([restored], { type: 'text/html;charset=utf-8' }));
        });

        frames.forEach((frame) => {
            frame.src = pageUrls[Number(frame.dataset.pageIndex)];
        });

        tabs.forEach((tab) => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.target;
                tabs.forEach((item) => item.classList.toggle('active', item === tab));
                frames.forEach((frame) => frame.classList.toggle('active', frame.id === 'frame-' + target));
            });
        });
    </script>

<script>
(function() {
