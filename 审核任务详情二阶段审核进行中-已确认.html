\", \"19.07.00\"], EMS: [\"19.03.00\"] }, \n                isBusy: false, busyPeriod: null, remainingDays: 96 \n            },\n            { \n                name: \"沈书华\", phone: \"13683124756\", cqc: \"CQC08017\", \n                qualification: \"Q审核员(2024-N1QMS-7012900)\", defaultRole: \"组员\", \n                workUnit: \"吉林公司\", region: \"东北区域\", type: \"专职\", \n                codes: { QMS: [\"19.08.00\"], EMS: [\"19.12.00\"] }, \n                isBusy: true, busyPeriod: \"2026-04-05 至 2026-04-12\", remainingDays: 78 \n            },\n            { \n                name: \"黄起超\", phone: \"13501320752\", cqc: \"CQC10634\", \n                qualification: \"Q审核员(2024-N1QMS-6015922)\", defaultRole: \"组员\", \n                workUnit: \"辽宁公司\", region: \"东北区域\", type: \"专职\", \n                codes: { QMS: [\"19.01.01\", \"19.07.00\"], EMS: [\"19.03.00\", \"19.12.00\"] }, \n                isBusy: false, busyPeriod: null, remainingDays: 134 \n            },\n            { \n                name: \"娄杰\", phone: \"13910311490\", cqc: \"CQC10601\", \n                qualification: \"Q审核员(2024-N1QMS-4014327)\", defaultRole: \"组员\", \n                workUnit: \"吉林公司\", region: \"东北区域\", type: \"专职\", \n                codes: { QMS: [\"19.01.01\", \"19.07.00\", \"19.08.00\"], EMS: [\"19.12.00\"] }, \n                isBusy: false, busyPeriod: null, remainingDays: 167 \n            }\n        ];\n        \n        function getPersonnelCredentialInfo(person) {\n            const raw = person.qualification || '';\n            let qualification = raw.replace(/（[^）]*）|\\([^)]*\\)/g, '').trim();\n            qualification = qualification\n                .replace(/Q\\/EMS审核员/g, 'QMS正式，EMS正式')\n                .replace(/Q实习审核员/g, 'QMS实习')\n                .replace(/EMS实习审核员/g, 'EMS实习')\n                .replace(/OHSMS实习审核员/g, 'OHSMS实习')\n                .replace(/Q高级审核员/g, 'QMS高级')\n                .replace(/Q审核员/g, 'QMS正式')\n                .replace(/EMS审核员/g, 'EMS正式')\n                .replace(/OHSMS审核员/g, 'OHSMS正式');\n            if (!qualification) qualification = '-';\n\n            const explicitRegs = person.registrationNumbers || person.registrationNo || person.registration || '';\n            let regs = Array.isArray(explicitRegs) ? explicitRegs : String(explicitRegs).split(/[，,]/).filter(Boolean);\n            const rawRegs = [...raw.matchAll(/\\(([^)]*)\\)/g)].map(match => match[1]).filter(Boolean);\n            regs = regs.length ? regs : rawRegs;\n            const registrationNumbers = regs.map(reg => String(reg).trim()).filter(Boolean).join('，') || '-';\n            return { qualification, registrationNumbers };\n        }\n\n        function formatQualification(person) {\n            return getPersonnelCredentialInfo(person).qualification;\n        }\n\n        function formatRegistration(person) {\n            return getPersonnelCredentialInfo(person).registrationNumbers;\n        }\n\n        function isTechnicalExpert(person) {\n            return person.role === '技术专家' || person.defaultRole === '技术专家' || formatQualification(person).includes('技术专家');\n        }\n\n        function normalizeSingleLeader(list = []) {\n            let hasLeader = false;\n            list.forEach(person => {\n                if (isTechnicalExpert(person)) {\n                    person.role = '技术专家';\n                    return;\n                }\n                if (person.role === '组长') {\n                    if (hasLeader) person.role = '组员';\n                    else hasLeader = true;\n                }\n            });\n        }\n\n        function hasOtherLeader(peers = [], person) {\n            return peers.some(item => item.cqc !== person.cqc && item.role === '组长');\n        }\n\n        function renderRoleSelect(person, onchange, minWidth = '80px', peers = []) {\n            if (isTechnicalExpert(person)) {\n                person.role = '技术专家';\n                return `<select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" disabled><option value=\"技术专家\" selected>技术专家</option></select>`;\n            }\n            const leaderDisabled = person.role !== '组长' && hasOtherLeader(peers, person) ? 'disabled' : '';\n            return `\n                        <select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" onchange=\"${onchange}\">\n                            <option value=\"组长\" ${person.role === '组长' ? 'selected' : ''} ${leaderDisabled}>组长</option>\n                            <option value=\"分组长\" ${person.role === '分组长' ? 'selected' : ''}>分组长</option>\n                            <option value=\"组员\" ${person.role === '组员' || !person.role || person.role === '技术专家' ? 'selected' : ''}>组员</option>\n                        </select>`;\n        }\n\n        function getLeadAuditorCqc() {\n            return document.getElementById('leadAuditorSelect')?.value || '';\n        }\n\n        function renderSiteRoleSelect(person, onchange, minWidth = '80px') {\n            if (isTechnicalExpert(person)) {\n                person.role = '技术专家';\n                return `<select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" disabled><option value=\"技术专家\" selected>技术专家</option></select>`;\n            }\n            if (person.cqc === getLeadAuditorCqc()) {\n                person.role = '组长';\n                return `<select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" disabled><option value=\"组长\" selected>组长</option></select>`;\n            }\n            if (!['分组长', '组员'].includes(person.role)) person.role = '组员';\n            return `\n                        <select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" onchange=\"${onchange}\">\n                            <option value=\"分组长\" ${person.role === '分组长' ? 'selected' : ''}>分组长</option>\n                            <option value=\"组员\" ${person.role === '组员' || !person.role ? 'selected' : ''}>组员</option>\n                        </select>`;\n        }\n\n        function renderNonVenueRoleSelect(person, onchange, minWidth = '80px', peers = []) {\n            if (isTechnicalExpert(person)) {\n                person.role = '技术专家';\n                return `<select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" disabled><option value=\"技术专家\" selected>技术专家</option></select>`;\n            }\n            if (!['组长', '组员'].includes(person.role)) person.role = '组员';\n            const leaderDisabled = person.role !== '组长' && hasOtherLeader(peers, person) ? 'disabled' : '';\n            return `\n                        <select class=\"editable-field py-1\" style=\"min-width: ${minWidth};\" onchange=\"${onchange}\">\n                            <option value=\"组长\" ${person.role === '组长' ? 'selected' : ''} ${leaderDisabled}>组长</option>\n                            <option value=\"组员\" ${person.role === '组员' || !person.role ? 'selected' : ''}>组员</option>\n                        </select>`;\n        }\n\n        function refreshAllSiteCards() {\n            sitePersonnelMap.forEach((_, siteId) => refreshSiteCard(siteId));\n            updateLeadAuditorOptions();\n        }\n        // 初始化\n        document.addEventListener('DOMContentLoaded', function() {\n            updateSiteTimeTable();\n            initSiteCards();\n            updateLeadAuditorOptions();\n            updateSelectedPersonnelDisplay();\n            updateAuditGroupCombination();\n            updateNonVenueStats();\n            initTimeSelects();\n        });\n        \n        // 生成15分钟间隔时间选项\n        function generateTimeOptions(selectedValue, isStart) {\n            const defaultVal = isStart ? '08:00' : '17:00';\n            const val = selectedValue || defaultVal;\n            let options = '';\n            for (let h = 8; h <= 17; h++) {\n                for (let m = 0; m < 60; m += 15) {\n                    const time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;\n                    const selected = time === val ? 'selected' : '';\n                    options += `<option value=\"${time}\" ${selected}>${time}</option>`;\n                }\n            }\n            return options;\n        }\n                // 初始化静态时间选择器\n        function initTimeSelects() {\n            const startIds = ['auditStartPeriod', 'nonVenueStartPeriod', 'stageTwoStartPeriod'];\n            const endIds = ['auditEndPeriod', 'nonVenueEndPeriod', 'stageTwoEndPeriod'];\n            \n            startIds.forEach(id => {\n                const el = document.getElementById(id);\n                if (el) el.innerHTML = generateTimeOptions(el.value, true);\n            });\n            \n            endIds.forEach(id => {\n                const el = document.getElementById(id);\n                if (el) el.innerHTML = generateTimeOptions(el.value, false);\n            });\n        }\n        \n        // 将时间字符串解析为分钟数\n        function parseTimeToMinutes(timeStr) {\n            if (!timeStr || timeStr === '0.5') return 8 * 60; // 兼容旧值，默认08:00\n            const [h, m] = timeStr.split(':').map(Number);\n            return h * 60 + m;\n        }\n        \n        // 计算人员在各体系下的覆盖情况\n        function getSystemCoverage(personCodes) {\n            const result = {};\n            let totalMatched = 0;\n            let totalRequired = 0;\n            \n            for (const [system, codes] of Object.entries(requiredProfessionalCodes)) {\n                const requiredSet = new Set(codes.map(c => c.code));\n                const personSet = new Set(personCodes[system] || []);\n                const matched = [];\n                const missing = [];\n                \n                requiredSet.forEach(code => {\n                    if (personSet.has(code)) matched.push(code);\n                    else missing.push(code);\n                });\n                \n                totalMatched += matched.length;\n                totalRequired += requiredSet.size;\n                \n                if (matched.length === 0) {\n                    result[system] = { status: 'none', matched: 0, total: requiredSet.size, matchedCodes: matched, missingCodes: missing };\n                } else if (missing.length === 0) {\n                    result[system] = { status: 'full', matched: matched.length, total: requiredSet.size, matchedCodes: matched, missingCodes: missing };\n                } else {\n                    result[system] = { status: 'partial', matched: matched.length, total: requiredSet.size, matchedCodes: matched, missingCodes: missing };\n                }\n            }\n            \n            result.totalMatched = totalMatched;\n            result.totalRequired = totalRequired;\n            result.isFullCoverage = totalMatched === totalRequired && totalRequired > 0;\n            \n            return result;\n        }\n        \n        // 根据人员列表计算体系覆盖情况\n        function getCoverageSummaryForPeople(people = []) {\n            const summary = {};\n            const selectedPeople = (people || []).filter(Boolean);\n            \n            for (const [system, codes] of Object.entries(requiredProfessionalCodes)) {\n                const requiredSet = new Set(codes.map(c => c.code));\n                const requiredList = codes;\n                const unionCodes = new Set();\n                \n                selectedPeople.forEach(person => {\n                    ((person.codes && person.codes[system]) || []).forEach(code => unionCodes.add(code));\n                });\n                \n                const matched = [];\n                const missing = [];\n                requiredSet.forEach(code => {\n                    if (unionCodes.has(code)) matched.push(code);\n                    else missing.push(code);\n                });\n                \n                const percentage = requiredSet.size > 0 ? Math.round((matched.length / requiredSet.size) * 100) : 0;\n                \n                summary[system] = {\n                    status: matched.length === 0 ? 'none' : (missing.length === 0 ? 'full' : 'partial'),\n                    percentage,\n                    matched: matched.length,\n                    total: requiredSet.size,\n                    matchedCodes: matched,\n                    missingCodes: missing,\n                    allCodes: requiredList\n                };\n            }\n            return summary;\n        }\n\n        // 计算人员选择弹窗中已选人员的汇总覆盖情况\n        function getSelectedCoverageSummary() {\n            const selectedPeople = Array.from(selectedPersonnel).map(cqc => personnelDB.find(p => p.cqc === cqc)).filter(p => p);\n            return getCoverageSummaryForPeople(selectedPeople);\n        }\n        \n        // 渲染覆盖情况汇总面板\n        function renderCoverageSummary() {\n            const container = document.getElementById('systemCoverageContent');\n            const summary = getSelectedCoverageSummary();\n            \n            let html = '';\n            \n            for (const [system, data] of Object.entries(summary)) {\n                if (data.total === 0) continue;\n                \n                const statusClass = data.status === 'full' ? 'status-full' : data.status === 'partial' ? 'status-partial' : 'status-none';\n                const statusText = data.status === 'full' ? '全覆盖' : data.status === 'partial' ? `部分覆盖(${data.matched}/${data.total})` : '未覆盖';\n                const barColor = data.status === 'full' ? 'bg-green-500' : data.status === 'partial' ? 'bg-amber-400' : 'bg-slate-300';\n                \n                const codesHtml = data.allCodes.map(item => {\n                    const isMatched = data.matchedCodes.includes(item.code);\n                    const chipClass = isMatched ? 'matched' : 'missing';\n                    return `<span class=\"code-chip ${chipClass}\" title=\"${item.desc}\">${item.code}</span>`;\n                }).join('');\n                \n                html += `\n                    <div class=\"system-coverage-item\">\n                        <div class=\"system-coverage-header\">\n                            <div class=\"flex items-center gap-2\">\n                                <span class=\"system-coverage-title\">${system} 体系</span>\n                                <span class=\"text-xs text-slate-500\">需覆盖 ${data.total} 个代码</span>\n                            </div>\n                            <span class=\"system-coverage-status ${statusClass}\">${statusText}</span>\n                        </div>\n                        <div class=\"coverage-progress\">\n                            <div class=\"coverage-progress-fill ${barColor}\" style=\"width: ${data.percentage}%\"></div>\n                        </div>\n                        <div class=\"required-codes-list\">\n                            ${codesHtml}\n                        </div>\n                    </div>\n                `;\n            }\n            \n            container.innerHTML = html;\n        }\n        \n\n        function renderLeaderBadge(person) {\n            if (!person) return '';\n            const isLeader = person.defaultRole === '组长' || person.role === '组长';\n            return isLeader ? '<span class=\"leader-badge\"><i class=\"fas fa-user-tie\"></i>组长</span>' : '';\n        }\n\n        function renderCoverageSummaryHtml(summary, compact = false) {\n            let html = '<div class=\"system-coverage-bar\">';\n            let hasContent = false;\n            for (const [system, data] of Object.entries(summary || {})) {\n                if (!data || data.total === 0) continue;\n                hasContent = true;\n                const statusClass = data.status === 'full' ? 'status-full' : data.status === 'partial' ? 'status-partial' : 'status-none';\n                const statusText = data.status === 'full' ? '全覆盖' : data.status === 'partial' ? `部分覆盖(${data.matched}/${data.total})` : '未覆盖';\n                const barColor = data.status === 'full' ? 'bg-green-500' : data.status === 'partial' ? 'bg-amber-400' : 'bg-slate-300';\n                const codesHtml = data.allCodes.map(item => {\n                    const isMatched = data.matchedCodes.includes(item.code);\n                    const chipClass = isMatched ? 'matched' : 'missing';\n                    return `<span class=\"code-chip ${chipClass}\" title=\"${item.desc}\">${item.code}</span>`;\n                }).join('');\n                html += `\n                    <div class=\"system-coverage-item\">\n                        <div class=\"system-coverage-header\">\n                            <div class=\"flex items-center gap-2\">\n                                <span class=\"system-coverage-title\">${system} 体系</span>\n                                <span class=\"text-xs text-slate-500\">需覆盖 ${data.total} 个代码</span>\n                            </div>\n                            <span class=\"system-coverage-status ${statusClass}\">${statusText}</span>\n                        </div>\n                        <div class=\"coverage-progress\">\n                            <div class=\"coverage-progress-fill ${barColor}\" style=\"width: ${data.percentage}%\"></div>\n                        </div>\n                        <div class=\"required-codes-list\">${codesHtml}</div>\n                    </div>\n                `;\n            }\n            html += '</div>';\n            return hasContent ? html : '<div class=\"selected-coverage-empty\">暂无体系覆盖要求</div>';\n        }\n\n        function renderSelectedPersonnelCoverage(personnelList = null) {\n            const container = document.getElementById('selectedPersonnelCoverage');\n            if (!container) return;\n            const people = personnelList || (isVenueMode ? globalSelectedPersonnel : assignedPersonnel);\n            if (!people || people.length === 0) {\n                container.innerHTML = '<div class=\"selected-coverage-empty\"><i class=\"fas fa-shield-alt mr-1\"></i>暂无已选择人员，选择后可查看领域和专业代码覆盖情况</div>';\n                return;\n            }\n            const summary = getCoverageSummaryForPeople(people);\n            container.innerHTML = `\n                <div class=\"flex items-center gap-2 mb-3 text-sm font-semibold text-slate-900\">\n                    <i class=\"fas fa-shield-alt text-green-600\"></i>已选人员体系覆盖情况\n                    <span class=\"text-xs text-slate-500 font-normal\">根据当前已配置人员展示覆盖情况</span>\n                </div>\n                ${renderCoverageSummaryHtml(summary, true)}\n            `;\n        }\n\n        // 渲染人员体系覆盖标签 - 排除totalMatched等非体系属性\n        function renderPersonSystemCoverage(personCodes) {\n            const coverage = getSystemCoverage(personCodes);\n            let html = '<div class=\"person-system-coverage\">';\n            \n            const systemKeys = Object.keys(requiredProfessionalCodes);\n                \n            for (const system of systemKeys) {\n                const data = coverage[system];\n                if (!data || data.total === 0) continue;\n                \n                const tagClass = data.status === 'full' ? 'system-tag-full' : data.status === 'partial' ? 'system-tag-partial' : 'system-tag-none';\n                const icon = data.status === 'full' ? 'fa-check-circle' : data.status === 'partial' ? 'fa-adjust' : 'fa-times-circle';\n                html += `\n                    <span class=\"person-system-tag ${tagClass}\" title=\"${system}体系：覆盖${data.matched}/${data.total}\">\n                        <i class=\"fas ${icon}\"></i> ${system} ${data.matched}/${data.total}\n                    </span>\n                `;\n            }\n            \n            html += '</div>';\n            return html;\n        }\n        \n        // 人天修约函数\n        function roundManDays(value) {\n            const decimal = value % 1;\n            if (decimal < 0.25) return Math.floor(value);\n            else if (decimal < 0.75) return Math.floor(value) + 0.5;\n            else return Math.ceil(value);\n        }\n        \n        // 计算人天 - 15分钟颗粒度版本（基于8小时工作制 08:00-17:00）\n        function calculateManDaysWithPeriod(startDate, endDate, startTime, endTime) {\n            if (!startDate || !endDate) return 0;\n            const start = new Date(startDate);\n            const end = new Date(endDate);\n            if (start > end) return 0;\n            \n            const startMinutes = parseTimeToMinutes(startTime);\n            const endMinutes = parseTimeToMinutes(endTime);\n            \n            const diffTime = end - start;\n            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));\n            \n            const WORK_START = 8 * 60; // 08:00\n            const WORK_END = 17 * 60; // 17:00\n            const WORK_MINUTES_PER_DAY = 8 * 60; // 8小时为1天\n            \n            if (diffDays === 0) {\n                // 同一天：计算实际工作时长\n                const workedMinutes = Math.max(0, Math.min(WORK_END, endMinutes) - Math.max(WORK_START, startMinutes));\n                return Math.max(0.5, workedMinutes / WORK_MINUTES_PER_DAY);\n            }\n            \n            // 跨天\n            const middleDays = diffDays - 1;\n            const firstDayMinutes = Math.max(0, WORK_END - Math.max(WORK_START, startMinutes));\n            const lastDayMinutes = Math.max(0, Math.min(WORK_END, endMinutes) - WORK_START);\n            \n            return middleDays + (firstDayMinutes / WORK_MINUTES_PER_DAY) + (lastDayMinutes / WORK_MINUTES_PER_DAY);\n        }\n        \n        // 检查时间冲突\n        function checkTimeConflict(person, startDate, endDate) {\n            if (!person.isBusy || !person.busyPeriod || !startDate || !endDate) return null;\n            \n            const busyMatch = person.busyPeriod.match(/(\\d{4}-\\d{2}-\\d{2})\\s*至\\s*(\\d{4}-\\d{2}-\\d{2})/);\n            if (!busyMatch) return null;\n            \n            const busyStart = new Date(busyMatch[1]);\n            const busyEnd = new Date(busyMatch[2]);\n            const planStart = new Date(startDate);\n            const planEnd = new Date(endDate);\n            \n            if (planStart <= busyEnd && planEnd >= busyStart) {\n                return person.busyPeriod;\n            }\n            return null;\n        }\n        \n        // 检查人员是否已分配在其他场所\n        function getPersonAssignedInfo(cqc) {\n            if (!isVenueMode || !currentSiteId) return null;\n            \n            for (const [siteId, list] of sitePersonnelMap) {\n                if (siteId === currentSiteId) continue;\n                const person = list.find(p => p.cqc === cqc);\n                if (person) {\n                    const site = venues.find(v => v.id === siteId);\n                    return {\n                        siteName: site ? site.name : '其他场所',\n                        dateRange: person.dateStart && person.dateEnd ? \n                            `${person.dateStart} 至 ${person.dateEnd}` : '未设置时间'\n                    };\n                }\n            }\n            return null;\n        }\n        \n        // 更新审核组结合度显示\n        function updateAuditGroupCombination() {\n            const container = document.getElementById('auditGroupCombination');\n            const personnelToShow = isVenueMode ? globalSelectedPersonnel : assignedPersonnel;\n            if (personnelToShow.length === 0) { container.innerHTML = ''; return; }\n            \n            const totalPeople = personnelToShow.length;\n            const fullTimeCount = personnelToShow.filter(p => p.type === '专职').length;\n            const partTimeCount = totalPeople - fullTimeCount;\n            \n            if (totalPeople > 0) {\n                const baseNum = totalPeople >= 3 ? totalPeople : 3;\n                const calc1 = (baseNum - 1) * 2;\n                const calc2 = fullTimeCount > 0 ? (fullTimeCount - 1) * 5 : 0;\n                const calc3 = partTimeCount > 0 ? (partTimeCount - 1) * 3 : 0;\n                const denominator = 10 * (baseNum - 1);\n                if (denominator > 0) {\n                    const sum = calc1 + calc2 + calc3;\n                    const result = Math.round((sum / denominator) * 100);\n                    container.innerHTML = `(${baseNum}-1)×2+(${fullTimeCount}-1)×5+(${partTimeCount}-1)×3÷10×(${baseNum}-1)×100% = <strong style=\"color: #d97706; font-size: 16px;\">${result}%</strong>`;\n                }\n            }\n        }\n        \n        function editIntegrationDegree() {\n            document.getElementById('integrationDisplay').classList.add('hidden');\n            document.getElementById('editIntegrationBtn').classList.add('hidden');\n            const editGroup = document.getElementById('integrationEditGroup');\n            editGroup.classList.remove('hidden');\n            editGroup.style.display = 'flex';\n        }\n        \n        function confirmIntegrationDegree() {\n            const value = document.getElementById('integrationDegreeInput').value;\n            document.getElementById('integrationDisplay').textContent = value + '%';\n            document.getElementById('integrationDisplay').classList.remove('hidden');\n            document.getElementById('editIntegrationBtn').classList.remove('hidden');\n            document.getElementById('integrationEditGroup').classList.add('hidden');\n            document.getElementById('integrationEditGroup').style.display = 'none';\n            updateSiteTimeTable();\n        }\n        \n        function cancelIntegrationEdit() {\n            const originalValue = document.getElementById('integrationDisplay').textContent.replace('%', '');\n            document.getElementById('integrationDegreeInput').value = originalValue;\n            document.getElementById('integrationDisplay').classList.remove('hidden');\n            document.getElementById('editIntegrationBtn').classList.remove('hidden');\n            document.getElementById('integrationEditGroup').classList.add('hidden');\n            document.getElementById('integrationEditGroup').style.display = 'none';\n        }\n        \n        function calculateTotalSiteDays() {\n            return venues.reduce((sum, v) => sum + (v.auditDays || 0), 0);\n        }\n        \n        // 修改：运营一分公司和运营二分公司折扣率改为100%\n        function updateSiteTimeTable() {\n            const tbody = document.getElementById('siteTimeTableBody');\n            let totalFinalDays = 0;\n            \n            const rows = venues.map((venue, index) => {\n                const qmsDays = venue.qmsPeople ? roundManDays(venue.qmsPeople * 0.0116) : 0;\n                const emsDays = venue.emsPeople ? roundManDays(venue.emsPeople * 0.0094) : 0;\n                const subtotal = roundManDays(qmsDays + emsDays);\n                // 运营一分公司(site_1)和运营二分公司(site_2)使用100%折扣率，其余使用85%\n                const discountRate = (venue.id === 'site_1' || venue.id === 'site_2') ? 1.0 : 0.85;\n                \n                const discounted = roundManDays(subtotal * discountRate);\n                const finalDays = roundManDays(discounted);\n                venues[index].auditDays = finalDays;\n                venues[index].calculatedDays = { qms: qmsDays, ems: emsDays, subtotal, discounted, final: finalDays, discountRate };\n                totalFinalDays += finalDays;\n                \n                let tooltipContent = '';\n                if (venue.qmsPeople && venue.emsPeople) tooltipContent = `QMS有效人数：${venue.qmsPeople}，EMS有效人数：${venue.emsPeople}`;\n                else if (venue.qmsPeople) tooltipContent = `QMS有效人数：${venue.qmsPeople}`;\n                else if (venue.emsPeople) tooltipContent = `EMS有效人数：${venue.emsPeople}`;\n                \n                const discountText = discountRate === 1.0 ? '× 100%' : `× ${(discountRate * 100).toFixed(0)}%`;\n                \n                return `\n                    <tr>\n                        <td style=\"text-align: center;\">${index + 1}</td>\n                        <td>\n                            <div class=\"flex items-center gap-1 cursor-help\" title=\"${tooltipContent}\">\n                                <i class=\"fas fa-building text-blue-500 mr-1\"></i>${venue.name}（${venue.qmsPeople || venue.emsPeople}人）\n                            </div>\n                        </td>\n                        <td style=\"text-align: center;\">${qmsDays > 0 ? qmsDays.toFixed(1) : '<span style=\"color: #cbd5e1;\">-</span>'}</td>\n                        <td style=\"text-align: center;\">${emsDays > 0 ? emsDays.toFixed(1) : '<span style=\"color: #cbd5e1;\">-</span>'}</td>\n                        <td style=\"text-align: center;\">${subtotal.toFixed(1)}</td>\n                        <td style=\"text-align: left;\">${discountText}</td>\n                        <td style=\"text-align: center; font-weight: 600; color: #2563eb;\">${finalDays.toFixed(1)}</td>\n                    </tr>\n                `;\n            }).join('');\n            \n            const totalRow = `\n                <tr style=\"background: #f0fdf4; font-weight: 600;\">\n                    <td style=\"text-align: center;\">合计</td>\n                    <td>总计</td>\n                    <td style=\"text-align: center;\">-</td>\n                    <td style=\"text-align: center;\">-</td>\n                    <td style=\"text-align: center;\">-</td>\n                    <td style=\"text-align: left;\">-</td>\n                    <td style=\"text-align: center; color: #16a34a; font-size: 14px;\">${totalFinalDays.toFixed(1)}</td>\n                </tr>\n            `;\n            \n            tbody.innerHTML = rows + totalRow;\n            document.getElementById('totalManDaysDisplay').textContent = totalFinalDays.toFixed(1) + ' 人天';\n        }\n        \n        function updateNonVenueStats() {\n            const totalDays = calculateTotalSiteDays();\n            let assignedDays = 0;\n            assignedPersonnel.forEach(person => {\n                if (person.dateStart && person.dateEnd) {\n                    const days = calculateManDaysWithPeriod(person.dateStart, person.dateEnd, person.startPeriod || '08:00', person.endPeriod || '17:00');\n                    assignedDays += days;\n                }\n            });\n            assignedDays = roundManDays(assignedDays);\n            const unassignedDays = roundManDays(totalDays - assignedDays);\n            \n            document.getElementById('nonVenueTotalDays').textContent = totalDays.toFixed(1);\n            document.getElementById('nonVenueAssignedDays').textContent = assignedDays.toFixed(1);\n            document.getElementById('nonVenueUnassignedDays').textContent = unassignedDays.toFixed(1);\n            \n            const unassignedEl = document.getElementById('nonVenueUnassignedDays');\n            if (unassignedDays <= 0) unassignedEl.className = 'text-sm font-bold text-green-600 font-mono';\n            else if (unassignedDays <= 0.5) unassignedEl.className = 'text-sm font-bold text-amber-600 font-mono';\n            else unassignedEl.className = 'text-sm font-bold text-red-600 font-mono';\n        }\n        \n        function updateSiteStats(siteId) {\n            const card = document.getElementById(siteId);\n            if (!card) return;\n            const startInput = card.querySelector('.site-date-start');\n            const endInput = card.querySelector('.site-date-end');\n            const startPeriod = card.querySelector('.site-start-period');\n            const endPeriod = card.querySelector('.site-end-period');\n            const statsContainer = card.querySelector('.site-stats-row');\n            const venue = venues.find(v => v.id === siteId);\n            const totalDays = venue ? venue.auditDays : 0;\n            const personnelList = sitePersonnelMap.get(siteId) || [];\n            \n            let assignedDays = 0;\n            if (personnelList.length > 0 && startInput && endInput && startInput.value && endInput.value) {\n                assignedDays = calculateManDaysWithPeriod(startInput.value, endInput.value, startPeriod ? startPeriod.value : '08:00', endPeriod ? endPeriod.value : '17:00');\n            }\n            const roundedAssigned = roundManDays(assignedDays);\n            const unassignedDays = roundManDays(totalDays - roundedAssigned);\n            \n            const totalEl = statsContainer.querySelector('.stat-total');\n            const assignedEl = statsContainer.querySelector('.stat-assigned');\n            const unassignedEl = statsContainer.querySelector('.stat-unassigned');\n            \n            if (totalEl) totalEl.textContent = totalDays.toFixed(1);\n            if (assignedEl) assignedEl.textContent = roundedAssigned.toFixed(1);\n            if (unassignedEl) {\n                unassignedEl.textContent = unassignedDays.toFixed(1);\n                if (unassignedDays <= 0) unassignedEl.className = 'site-stat-value stat-unassigned text-green-600';\n                else if (unassignedDays <= 0.5) unassignedEl.className = 'site-stat-value stat-unassigned text-amber-600';\n                else unassignedEl.className = 'site-stat-value stat-unassigned text-red-600';\n            }\n        }\n        \n        function initSiteCards() {\n            const container = document.getElementById('siteCardsContainer');\n            container.innerHTML = '';\n            if (isVenueMode) {\n                venues.forEach((venue, index) => {\n                    const card = createSiteCard(venue, index);\n                    container.appendChild(card);\n                    if (!sitePersonnelMap.has(venue.id)) sitePersonnelMap.set(venue.id, []);\n                    updateSiteStats(venue.id);\n                });\n            }\n            togglePersonnelDisplayMode();\n        }\n        \n        // 修改：场所卡片增加证书份数显示，删除认证体系字段\n        function createSiteCard(venue, index) {\n            const card = document.createElement('div');\n            card.className = 'site-card';\n            card.id = venue.id;\n            card.dataset.siteId = venue.id;\n            \n            const personnelList = sitePersonnelMap.get(venue.id) || [];\n            const hasPersonnel = personnelList.length > 0;\n            const totalDays = venue.auditDays || 0;\n            const assignedDays = 0;\n            const unassignedDays = totalDays;\n            \n            // 证书份数HTML\n            const certCopiesHtml = venue.certCopies ? `<span class=\"sub-cert-tag\">证书${venue.certCopies}份</span>` : '';\n            \n            card.innerHTML = `\n                <div class=\"bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center justify-between rounded-t-xl\">\n                    <div class=\"flex items-center gap-2 flex-wrap flex-1\">\n                        ${venue.isMain ? '<span class=\"inline-flex items-center px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-medium border border-green-200\">总部</span>' : '<span class=\"inline-flex items-center px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-md font-medium border border-blue-200\">场所</span>'}\n                        <span class=\"font-semibold text-slate-800 text-sm\">${venue.name}</span>\n                        <span class=\"cert-system-tag\">${venue.certSystem}</span>\n                        ${certCopiesHtml}\n                    </div>\n                    <div class=\"flex items-center gap-3\">\n                        <div class=\"site-stats-row\">\n                            <div class=\"site-stat-item-inline\">\n                                <span class=\"site-stat-label\">审核人员：</span>\n                                <span class=\"site-stat-value text-blue-600 stat-total\">${totalDays.toFixed(1)}</span>\n                            </div>\n                            <div class=\"h-4 w-px bg-slate-300 mx-2\"></div>\n                            <div class=\"site-stat-item-inline\">\n                                <span class=\"site-stat-label\">已分配：</span>\n                                <span class=\"site-stat-value text-blue-600 stat-assigned\">${assignedDays.toFixed(1)}</span>\n                            </div>\n                            <div class=\"h-4 w-px bg-slate-300 mx-2\"></div>\n                            <div class=\"site-stat-item-inline\">\n                                <span class=\"site-stat-label\">未分配：</span>\n                                <span class=\"site-stat-value stat-unassigned ${unassignedDays > 0 ? 'text-amber-600' : 'text-green-600'}\">${unassignedDays.toFixed(1)}</span>\n                            </div>\n                        </div>\n                        <button onclick=\"openSitePersonnelModal('${venue.id}')\" class=\"px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-xs font-medium shadow-sm shadow-blue-200 transition-all\">\n                            <i class=\"fas fa-user-plus mr-1\"></i>分配人员\n                        </button>\n                    </div>\n                </div>\n                <div class=\"p-4\">\n                    <div class=\"grid grid-cols-3 gap-4 mb-4\">\n                        <div>\n                            <label class=\"block text-xs font-medium text-slate-700 mb-1\">场所地址</label>\n                            <div class=\"readonly-field text-xs\">${venue.address}</div>\n                        </div>\n                        <div>\n                            <label class=\"block text-xs font-medium text-slate-700 mb-1\">有效人数</label>\n                            <div class=\"readonly-field text-xs\">${venue.qmsPeople || venue.emsPeople || 0}</div>\n                        </div>\n                        <div>\n                            <label class=\"block text-xs font-medium text-slate-700 mb-1\">审核日期区间</label>\n                            <div class=\"flex items-center gap-2\">\n                                <div class=\"date-time-group\">\n                                    <input type=\"date\" class=\"editable-field site-date-start\" style=\"width: 130px;\" onchange=\"updateSiteDate('${venue.id}')\">\n                                    <select class=\"time-period-select site-start-period\" style=\"width: 80px;\" onchange=\"updateSiteDate('${venue.id}')\">\n                                        ${generateTimeOptions('', true)}\n                                    </select>\n                                </div>\n                                <span class=\"text-slate-400\">至</span>\n                                <div class=\"date-time-group\">\n                                    <input type=\"date\" class=\"editable-field site-date-end\" style=\"width: 130px;\" onchange=\"updateSiteDate('${venue.id}')\">\n                                    <select class=\"time-period-select site-end-period\" style=\"width: 80px;\" onchange=\"updateSiteDate('${venue.id}')\">\n                                        ${generateTimeOptions('', false)}\n                                    </select>\n                                </div>\n                            </div>\n                        </div>\n                    </div>\n                    \n                    <div id=\"personnelSection_${venue.id}\" class=\"${!hasPersonnel ? 'hidden-section' : ''}\">\n                        <div class=\"overflow-x-auto\">\n                            <table class=\"process-table\">\n                                <thead>\n                                    <tr>\n                                        <th style=\"width: 50px\">序号</th>\n                                        <th>姓名</th>\n                                        <th style=\"width: 100px\">组内身份</th>\n                                        <th>资格</th>\n                                    <th>注册编号</th>\n                                        <th style=\"width: 100px\">CQC编号</th>\n                                        <th>联系电话</th>\n                                        <th style=\"width: 320px\">审核日期区间</th>\n                                        <th style=\"width: 80px\">操作</th>\n                                    </tr>\n                                </thead>\n                                <tbody id=\"personnelBody_${venue.id}\">\n                                    ${renderPersonnelRows(personnelList, venue.id)}\n                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n                    ${!hasPersonnel ? `\n                    <div class=\"text-center py-8 text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-300\" id=\"emptyState_${venue.id}\">\n                        <i class=\"fas fa-users text-3xl mb-2\"></i>\n                        <p class=\"text-sm\">暂无分配人员，请点击右上角\"分配人员\"按钮添加</p>\n                    </div>\n                    ` : ''}\n                </div>\n            `;\n            return card;\n        }\n        \n        function renderPersonnelRows(personnelList, siteId) {\n            if (!personnelList || personnelList.length === 0) return '';\n            normalizeSingleLeader(personnelList);\n            return personnelList.map((person, idx) => `\n                <tr data-person-id=\"${person.cqc}\">\n                    <td>${idx + 1}</td>\n                    <td class=\"font-medium text-slate-900\">${person.name} ${renderLeaderBadge(person)}</td>\n                    <td>\n                        ${renderSiteRoleSelect(person, `updatePersonRole('${siteId}', '${person.cqc}', this.value)`, '80px')}\n                    </td>\n                    <td class=\"text-xs\">${formatQualification(person)}</td>\n                    <td class=\"font-mono text-xs\">${formatRegistration(person)}</td>\n                    <td class=\"font-mono text-xs\">${person.cqc}</td>\n                    <td>${person.phone}</td>\n                    <td>\n                        <div class=\"date-time-group\">\n                            <input type=\"date\" class=\"editable-field py-1 text-xs\" style=\"width: 110px;\" value=\"${person.dateStart || ''}\" onchange=\"updateSitePersonDate('${siteId}', '${person.cqc}', 'start', this.value)\">\n                            <select class=\"time-period-select py-1 text-xs\" style=\"width: 80px; height: 32px;\" onchange=\"updateSitePersonPeriod('${siteId}', '${person.cqc}', 'start', this.value)\">\n                                ${generateTimeOptions(person.startPeriod, true)}\n                            </select>\n                            <span class=\"text-slate-400\">至</span>\n                            <input type=\"date\" class=\"editable-field py-1 text-xs\" style=\"width: 110px;\" value=\"${person.dateEnd || ''}\" onchange=\"updateSitePersonDate('${siteId}', '${person.cqc}', 'end', this.value)\">\n                            <select class=\"time-period-select py-1 text-xs\" style=\"width: 80px; height: 32px;\" onchange=\"updateSitePersonPeriod('${siteId}', '${person.cqc}', 'end', this.value)\">\n                                ${generateTimeOptions(person.endPeriod, false)}\n                            </select>\n                        </div>\n                    </td>\n                    <td>\n                        <button onclick=\"removePersonFromSite('${siteId}', '${person.cqc}')\" class=\"text-red-500 hover:text-red-700\">\n                            <i class=\"fas fa-trash\"></i>\n                        </button>\n                    </td>\n                </tr>\n            `).join('');\n        }\n\n        function uniquePersonnel(list) {\n            const map = new Map();\n            list.filter(Boolean).forEach(person => {\n                if (person.cqc && !map.has(person.cqc)) map.set(person.cqc, person);\n            });\n            return Array.from(map.values());\n        }\n\n        function getCurrentSelectedAuditPersonnel() {\n            const sitePeople = [];\n            sitePersonnelMap.forEach(list => sitePeople.push(...list));\n            return uniquePersonnel([\n                ...assignedPersonnel,\n                ...globalSelectedPersonnel,\n                ...sitePeople\n            ]);\n        }\n\n        function syncStageTwoPersonnelFromCurrent(force) {\n            const currentPeople = getCurrentSelectedAuditPersonnel();\n            if (force || stageTwoPrearrangePersonnel.length === 0) {\n                stageTwoPrearrangePersonnel = currentPeople.map(person => ({ ...person }));\n                syncStageTwoPrearrangeDates();\n                renderStageTwoPrearrangePersonnel();\n            }\n        }\n\n        function toggleStageTwoPrearrange(checked) {\n            const body = document.getElementById('stageTwoPrearrangeBody');\n            if (!body) return;\n            if (checked) {\n                body.classList.remove('hidden-section');\n                syncStageTwoPersonnelFromCurrent(true);\n            } else {\n                body.classList.add('hidden-section');\n            }\n        }\n\n        function openStageTwoPersonnelModal() {\n            personnelSelectionContext = 'stageTwoPrearrange';\n            syncStageTwoPersonnelFromCurrent(false);\n            selectedPersonnel.clear();\n            stageTwoPrearrangePersonnel.forEach(p => selectedPersonnel.add(p.cqc));\n            document.getElementById('coverageSummaryPanel').classList.remove('hidden-section');\n            document.getElementById('filterConditionsSection').classList.remove('hidden-section');\n            document.getElementById('personnelOverlay').classList.add('show');\n            document.getElementById('personnelModal').classList.add('open');\n            renderCoverageSummary();\n            renderPersonnelList();\n        }\n\n        function syncStageTwoPrearrangeDates() {\n            const start = document.getElementById('stageTwoStartDate')?.value || '';\n            const end = document.getElementById('stageTwoEndDate')?.value || '';\n            const startPeriod = document.getElementById('stageTwoStartPeriod')?.value || '08:00';\n            const endPeriod = document.getElementById('stageTwoEndPeriod')?.value || '17:00';\n            stageTwoPrearrangePersonnel.forEach(person => {\n                person.dateStart = start;\n                person.dateEnd = end;\n                person.startPeriod = startPeriod;\n                person.endPeriod = endPeriod;\n            });\n            renderStageTwoPrearrangePersonnel();\n        }\n\n        function renderStageTwoPrearrangePersonnel() {\n            normalizeSingleLeader(stageTwoPrearrangePersonnel);\n            const tbody = document.getElementById('stageTwoPersonnelBody');\n            const table = document.getElementById('stageTwoPrearrangeTable');\n            const emptyState = document.getElementById('stageTwoPrearrangeEmpty');\n            if (!tbody || !table || !emptyState) return;\n            if (stageTwoPrearrangePersonnel.length === 0) {\n                table.classList.add('hidden');\n                emptyState.classList.remove('hidden');\n                return;\n            }\n            table.classList.remove('hidden');\n            emptyState.classList.add('hidden');\n            tbody.innerHTML = stageTwoPrearrangePersonnel.map((person, idx) => `\n                <tr>\n                    <td>${idx + 1}</td>\n                    <td class=\"font-medium text-slate-900\">${person.name} ${renderLeaderBadge(person)}</td>\n                    <td>\n                        ${renderRoleSelect(person, `updateStageTwoRole(${idx}, this.value)`, '92px', stageTwoPrearrangePersonnel)}\n                    </td>\n                    <td class=\"text-xs\">${formatQualification(person)}</td>\n                    <td class=\"font-mono text-xs\">${formatRegistration(person)}</td>\n                    <td class=\"font-mono text-xs\">${person.cqc}</td>\n                    <td>${person.region}/${person.workUnit}</td>\n                    <td>\n                        <span class=\"personnel-tag ${person.type === '专职' ? 'tag-fulltime' : 'tag-parttime'}\">${person.type}</span>\n                    </td>\n                    <td>${person.phone}</td>\n                    <td>\n                        <div class=\"date-time-group\">\n                            <input type=\"date\" class=\"editable-field py-1 text-xs\" style=\"width: 130px;\" value=\"${person.dateStart || ''}\" onchange=\"updateStageTwoDate(${idx}, 'start', this.value)\">\n                            <select class=\"time-period-select py-1 text-xs\" style=\"width: 100px; height: 34px;\" onchange=\"updateStageTwoPeriod(${idx}, 'start', this.value)\">\n                                ${generateTimeOptions(person.startPeriod, true)}\n                            </select>\n                            <span class=\"text-slate-400\">至</span>\n                            <input type=\"date\" class=\"editable-field py-1 text-xs\" style=\"width: 130px;\" value=\"${person.dateEnd || ''}\" onchange=\"updateStageTwoDate(${idx}, 'end', this.value)\">\n                            <select class=\"time-period-select py-1 text-xs\" style=\"width: 100px; height: 34px;\" onchange=\"updateStageTwoPeriod(${idx}, 'end', this.value)\">\n                                ${generateTimeOptions(person.endPeriod, false)}\n                            </select>\n                        </div>\n                    </td>\n                    <td>\n                        <button onclick=\"removeStageTwoPrearrangePerson('${person.cqc}', event)\" class=\"text-red-500 hover:text-red-700\">\n                            <i class=\"fas fa-trash\"></i>\n                        </button>\n                    </td>\n                </tr>\n            `).join('');\n        }\n\n        function removeStageTwoPrearrangePerson(cqc, event) {\n            event.stopPropagation();\n            stageTwoPrearrangePersonnel = stageTwoPrearrangePersonnel.filter(p => p.cqc !== cqc);\n            renderStageTwoPrearrangePersonnel();\n        }\n\n        function updateStageTwoRole(idx, role) {\n            const person = stageTwoPrearrangePersonnel[idx];\n            if (!person) return;\n            role = isTechnicalExpert(person) ? '技术专家' : role;\n            if (role === '组长' && hasOtherLeader(stageTwoPrearrangePersonnel, person)) {\n                alert('组长只能设置 1 人');\n                renderStageTwoPrearrangePersonnel();\n                return;\n            }\n            person.role = role;\n            renderStageTwoPrearrangePersonnel();\n        }\n\n        function updateStageTwoDate(idx, type, value) {\n            if (!stageTwoPrearrangePersonnel[idx]) return;\n            if (type === 'start') stageTwoPrearrangePersonnel[idx].dateStart = value;\n            else stageTwoPrearrangePersonnel[idx].dateEnd = value;\n        }\n\n        function updateStageTwoPeriod(idx, type, value) {\n            if (!stageTwoPrearrangePersonnel[idx]) return;\n            if (type === 'start') stageTwoPrearrangePersonnel[idx].startPeriod = value;\n            else stageTwoPrearrangePersonnel[idx].endPeriod = value;\n        }\n        \n        function toggleVenueMode(toggleElement) {\n            const text = document.getElementById('venueModeText');\n            isVenueMode = !isVenueMode;\n            \n            if (isVenueMode) {\n                text.textContent = '已开启：按场所分配审核人员';\n                toggleElement.classList.add('active');\n            } else {\n                text.textContent = '已关闭：统一分配审核组';\n                toggleElement.classList.remove('active');\n            }\n            \n            if (isVenueMode) {\n                if (globalSelectedPersonnel.length === 0 && assignedPersonnel.length > 0) {\n                    globalSelectedPersonnel = assignedPersonnel.map(person => ({ ...person }));\n                }\n                initSiteCards();\n                updateSelectedPersonnelDisplay();\n                updateAuditGroupCombination();\n                updateNonVenueStats();\n            } else {\n                if (assignedPersonnel.length === 0) {\n                    assignedPersonnel = getCurrentSelectedAuditPersonnel().map(person => ({ ...person }));\n                }\n                renderNonVenuePersonnel();\n                updateSelectedPersonnelDisplay();\n                updateAuditGroupCombination();\n                updateNonVenueStats();\n            }\n            updateLeadAuditorOptions();\n            togglePersonnelDisplayMode();\n            if (document.getElementById('enableStageTwoPrearrange')?.checked) {\n                syncStageTwoPersonnelFromCurrent(false);\n            }\n        }\n        \n        function togglePersonnelDisplayMode() {\n            const venueGlobalSettings = document.getElementById('venueGlobalSettings');\n            const nonVenueList = document.getElementById('nonVenuePersonnelList');\n            const siteContainer = document.getElementById('siteCardsContainer');\n            \n            if (isVenueMode) {\n                venueGlobalSettings.classList.remove('hidden-section');\n                nonVenueList.classList.add('hidden-section');\n                siteContainer.classList.remove('hidden-section');\n            } else {\n                venueGlobalSettings.classList.add('hidden-section');\n                nonVenueList.classList.remove('hidden-section');\n                siteContainer.classList.add('hidden-section');\n            }\n        }\n        \n        function openPersonnelModal() {\n            personnelSelectionContext = 'audit';\n            currentSiteId = null;\n            selectedPersonnel.clear();\n            if (isVenueMode) globalSelectedPersonnel.forEach(p => selectedPersonnel.add(p.cqc));\n            else assignedPersonnel.forEach(p => selectedPersonnel.add(p.cqc));\n            \n            document.getElementById('coverageSummaryPanel').classList.remove('hidden-section');\n            document.getElementById('filterConditionsSection').classList.remove('hidden-section');\n            \n            document.getElementById('personnelOverlay').classList.add('show');\n            document.getElementById('personnelModal').classList.add('open');\n            renderCoverageSummary();\n            renderPersonnelList();\n        }\n        \n        function openSitePersonnelModal(siteId) {\n            personnelSelectionContext = 'audit';\n            currentSiteId = siteId;\n            selectedPersonnel.clear();\n            const siteList = sitePersonnelMap.get(siteId) || [];\n            siteList.forEach(p => selectedPersonnel.add(p.cqc));\n            \n            document.getElementById('coverageSummaryPanel').classList.add('hidden-section');\n            document.getElementById('filterConditionsSection').classList.add('hidden-section');\n            \n            const site = venues.find(v => v.id === siteId);\n            document.querySelector('#personnelModal h3').textContent = site ? `选择审核人员 - ${site.name}` : '选择审核人员';\n            \n            document.getElementById('personnelOverlay').classList.add('show');\n            document.getElementById('personnelModal').classList.add('open');\n            renderSitePersonnelList();\n        }\n        \n        function closePersonnelModal() {\n            document.getElementById('personnelOverlay').classList.remove('show');\n            document.getElementById('personnelModal').classList.remove('open');\n            \n            document.querySelector('#personnelModal h3').textContent = '选择审核人员';\n            \n            personnelSelectionContext = 'audit';\n            currentSiteId = null;\n            selectedPersonnel.clear();\n            document.getElementById('personnelSearch').value = '';\n            document.getElementById('filterCity').value = '';\n            document.getElementById('filterQualification').value = '';\n            document.getElementById('filterType').value = '';\n            document.getElementById('filterStartDate').value = '';\n            document.getElementById('filterEndDate').value = '';\n        }\n        \n        function getSortedPersonnelList(personnelList, planStartDate, planEndDate) {\n            return personnelList.map(p => ({\n                ...p,\n                coverage: getSystemCoverage(p.codes),\n                timeConflict: planStartDate && planEndDate ? checkTimeConflict(p, planStartDate, planEndDate) : null,\n                assignedInfo: getPersonAssignedInfo(p.cqc)\n            })).sort((a, b) => {\n                if (b.coverage.isFullCoverage && !a.coverage.isFullCoverage) return 1;\n                if (!b.coverage.isFullCoverage && a.coverage.isFullCoverage) return -1;\n                return a.name.localeCompare(b.name);\n            });\n        }\n        \n        // 修改：统一标签样式和对齐，确保所有标签水平居中对齐\n        function renderPersonnelList() {\n            const container = document.getElementById('personnelList');\n            const search = document.getElementById('personnelSearch').value.toLowerCase();\n            const cityFilter = document.getElementById('filterCity').value;\n            const qualFilter = document.getElementById('filterQualification').value;\n            const typeFilter = document.getElementById('filterType').value;\n            const startDate = document.getElementById('filterStartDate').value;\n            const endDate = document.getElementById('filterEndDate').value;\n            \n            let filtered = personnelDB.filter(p => {\n                const matchSearch = p.name.toLowerCase().includes(search) || \n                                   p.cqc.toLowerCase().includes(search) ||\n                                   (p.qualification.toLowerCase().includes(search) || formatQualification(p).toLowerCase().includes(search)) ||\n                                   (p.codes.QMS && p.codes.QMS.some(c => c.includes(search))) ||\n                                   (p.codes.EMS && p.codes.EMS.some(c => c.includes(search)));\n                const matchCompany = !cityFilter || p.workUnit === cityFilter;\n                const matchQual = !qualFilter || p.qualification.includes(qualFilter) || formatQualification(p).includes(qualFilter);\n                const matchType = !typeFilter || p.type === typeFilter;\n                return matchSearch && matchCompany && matchQual && matchType;\n            });\n            \n            // 传入筛选的时间进行冲突检测\n            filtered = getSortedPersonnelList(filtered, startDate, endDate);\n            \n            container.innerHTML = filtered.map(person => {\n                const isSelected = selectedPersonnel.has(person.cqc);\n                const isExternal = person.workUnit !== currentUserCompany;\n                let daysClass = '';\n                if (person.remainingDays <= 30) daysClass = 'danger';\n                else if (person.remainingDays <= 60) daysClass = 'warning';\n                \n                // 时间冲突检测\n                let conflictBadge = '';\n                if (person.timeConflict) {\n                    conflictBadge = `<span class=\"conflict-badge\"><i class=\"fas fa-exclamation-triangle mr-1\"></i>时间冲突：${person.timeConflict}</span>`;\n                }\n                \n                let assignedBadge = '';\n                if (!isVenueMode && person.assignedInfo) {\n                    assignedBadge = `<span class=\"site-assigned-info\"><i class=\"fas fa-map-marker-alt mr-1\"></i>已分配：${person.assignedInfo.siteName}</span>`;\n                }\n                \n                // 外部单位标识\n                const externalBadge = isExternal ? \n                    '' : '';\n                \n                \n                const clickAction = `togglePersonSelection('${person.cqc}')`;\n                \n                return `\n                <div class=\"person-card ${isSelected ? 'selected' : ''} ${isExternal ? 'external' : ''}\" \n                     onclick=\"${clickAction}\"\n                     data-cqc=\"${person.cqc}\">\n                    <div class=\"flex justify-between items-start mb-2\">\n                        <div class=\"tag-container\" style=\"flex-wrap: wrap; height: auto; gap: 4px;\">\n                            <span class=\"font-semibold text-slate-900\" style=\"height: 24px; display: inline-flex; align-items: center; margin-right: 4px;\">${person.name}</span>\n                            <span class=\"remaining-days-badge ${daysClass}\">${person.remainingDays}天/180天</span>\n                            <span class=\"personnel-tag ${person.type === '专职' ? 'tag-fulltime' : 'tag-parttime'}\">${person.type}</span>\n                            ${renderLeaderBadge(person)}\n                            ${conflictBadge}\n                            ${assignedBadge}\n                            ${externalBadge}\n                        </div>\n                        ${isSelected ? '<i class=\"fas fa-check-circle text-blue-600 text-xl\"></i>' : '<i class=\"far fa-circle text-slate-300 text-xl\"></i>'}\n                    </div>\n                    <div class=\"text-xs text-slate-500 space-y-1 mb-2\">\n                        <div class=\"flex justify-between\">\n                            <span>CQC编号：${person.cqc}</span>\n                        </div>\n                        <div>资格：${formatQualification(person)}</div>\n                        <div class=\"flex justify-between\">\n                            <span>工作单位：${person.region}/${person.workUnit}</span>\n                            \n                        </div>\n                    </div>\n                    ${renderPersonSystemCoverage(person.codes)}\n                </div>\n                `;\n            }).join('');\n            \n            document.getElementById('selectedCount').textContent = selectedPersonnel.size;\n        }\n        \n\n        \n        // 修改：统一标签样式和对齐\n        function renderSitePersonnelList() {\n            const container = document.getElementById('personnelList');\n            if (globalSelectedPersonnel.length === 0) {\n                container.innerHTML = `\n                    <div class=\"text-center py-8 text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-300\">\n                        <i class=\"fas fa-info-circle text-3xl mb-2\"></i>\n                        <p class=\"text-sm\">暂无已选择的人员，请先在\"指派审核人员\"处添加人员</p>\n                    </div>\n                `;\n                document.getElementById('selectedCount').textContent = '0';\n                return;\n            }\n            \n            const startDate = document.getElementById('filterStartDate').value;\n            const endDate = document.getElementById('filterEndDate').value;\n            \n            const sortedList = getSortedPersonnelList([...globalSelectedPersonnel], startDate, endDate);\n            \n            container.innerHTML = sortedList.map(person => {\n                const isSelected = selectedPersonnel.has(person.cqc);\n                const isExternal = person.workUnit !== currentUserCompany;\n                let daysClass = '';\n                if (person.remainingDays <= 30) daysClass = 'danger';\n                else if (person.remainingDays <= 60) daysClass = 'warning';\n                \n                let conflictBadge = '';\n                if (person.timeConflict) {\n                    conflictBadge = `<span class=\"conflict-badge\"><i class=\"fas fa-exclamation-triangle mr-1\"></i>时间冲突：${person.timeConflict}</span>`;\n                }\n                \n                let assignedBadge = '';\n                if (person.assignedInfo) {\n                    assignedBadge = `<span class=\"site-assigned-info\"><i class=\"fas fa-map-marker-alt mr-1\"></i>已在：${person.assignedInfo.siteName} (${person.assignedInfo.dateRange})</span>`;\n                }\n                \n                const externalBadge = isExternal ? \n                    '' : '';\n                \n                const clickAction = `togglePersonSelection('${person.cqc}')`;\n                \n                return `\n                <div class=\"person-card ${isSelected ? 'selected' : ''} ${isExternal ? 'external' : ''}\" \n                     onclick=\"${clickAction}\"\n                     data-cqc=\"${person.cqc}\">\n                    <div class=\"flex justify-between items-start mb-2\">\n                        <div class=\"tag-container\" style=\"flex-wrap: wrap; height: auto; gap: 4px;\">\n                            <span class=\"font-semibold text-slate-900\" style=\"height: 24px; display: inline-flex; align-items: center; margin-right: 4px;\">${person.name}</span>\n                            <span class=\"remaining-days-badge ${daysClass}\">${person.remainingDays}天/180天</span>\n                            <span class=\"personnel-tag ${person.type === '专职' ? 'tag-fulltime' : 'tag-parttime'}\">${person.type}</span>\n                            ${renderLeaderBadge(person)}\n                            ${conflictBadge}\n                            ${assignedBadge}\n                            ${externalBadge}\n                        </div>\n                        ${isSelected ? '<i class=\"fas fa-check-circle text-blue-600 text-xl\"></i>' : '<i class=\"far fa-circle text-slate-300 text-xl\"></i>'}\n                    </div>\n                    <div class=\"text-xs text-slate-500 space-y-1 mb-2\">\n                        <div class=\"flex justify-between\">\n                            <span>CQC编号：${person.cqc}</span>\n                        </div>\n                        <div>资格：${formatQualification(person)}</div>\n                        <div class=\"flex justify-between\">\n                            <span>工作单位：${person.region}/${person.workUnit}</span>\n                            \n                        </div>\n                    </div>\n                    ${renderPersonSystemCoverage(person.codes)}\n                </div>\n                `;\n            }).join('');\n            \n            document.getElementById('selectedCount').textContent = selectedPersonnel.size;\n        }\n        \n        function filterPersonnel() {\n            if (isVenueMode && currentSiteId) renderSitePersonnelList();\n            else renderPersonnelList();\n        }\n        \n        function togglePersonSelection(cqc) {\n            if (selectedPersonnel.has(cqc)) selectedPersonnel.delete(cqc);\n            else selectedPersonnel.add(cqc);\n            \n            if (!isVenueMode || !currentSiteId) {\n                renderCoverageSummary();\n            }\n            \n            if (isVenueMode && currentSiteId) renderSitePersonnelList();\n            else renderPersonnelList();\n        }\n        \n        function confirmPersonnelSelection() {\n            const isStageTwoSelection = personnelSelectionContext === 'stageTwoPrearrange';\n            const selectedPeople = Array.from(selectedPersonnel).map(cqc => {\n                return personnelDB.find(p => p.cqc === cqc);\n            }).filter(p => p);\n            \n            if (selectedPeople.length === 0) {\n                alert('请至少选择一名人员');\n                return;\n            }\n            \n            if (isStageTwoSelection) {\n                const startDate = document.getElementById('stageTwoStartDate').value;\n                const endDate = document.getElementById('stageTwoEndDate').value;\n                const startPeriod = document.getElementById('stageTwoStartPeriod').value;\n                const endPeriod = document.getElementById('stageTwoEndPeriod').value;\n                stageTwoPrearrangePersonnel = selectedPeople.map(p => ({\n                    ...p, role: p.defaultRole, dateStart: startDate, dateEnd: endDate, startPeriod, endPeriod\n                }));\n                renderStageTwoPrearrangePersonnel();\n            } else if (isVenueMode && currentSiteId) {\n                let siteList = sitePersonnelMap.get(currentSiteId) || [];\n                const existingCqcs = siteList.map(p => p.cqc);\n                const newCqcs = selectedPeople.map(p => p.cqc);\n                siteList = siteList.filter(p => newCqcs.includes(p.cqc));\n                \n                const card = document.getElementById(currentSiteId);\n                const startDate = card.querySelector('.site-date-start').value;\n                const endDate = card.querySelector('.site-date-end').value;\n                const startPeriod = card.querySelector('.site-start-period').value;\n                const endPeriod = card.querySelector('.site-end-period').value;\n                \n                selectedPeople.forEach(person => {\n                    if (!existingCqcs.includes(person.cqc)) {\n                        siteList.push({ ...person, role: person.defaultRole, dateStart: startDate, dateEnd: endDate, startPeriod, endPeriod });\n                    }\n                });\n                sitePersonnelMap.set(currentSiteId, siteList);\n                refreshSiteCard(currentSiteId);\n                updateSiteStats(currentSiteId);\n            } else if (isVenueMode && !currentSiteId) {\n                globalSelectedPersonnel = selectedPeople.map(p => ({ ...p, role: p.defaultRole }));\n                updateSelectedPersonnelDisplay();\n            } else {\n                const startDate = document.getElementById('nonVenueAuditStartDate').value;\n                const endDate = document.getElementById('nonVenueAuditEndDate').value;\n                const startPeriod = document.getElementById('nonVenueStartPeriod').value;\n                const endPeriod = document.getElementById('nonVenueEndPeriod').value;\n                \n                assignedPersonnel = selectedPeople.map(p => ({\n                    ...p, role: p.defaultRole, venue: '', dateStart: startDate, dateEnd: endDate, startPeriod, endPeriod\n                }));\n                renderNonVenuePersonnel();\n                updateNonVenueStats();\n                updateSelectedPersonnelDisplay();\n            }\n            \n            updateLeadAuditorOptions();\n            updateAuditGroupCombination();\n            if (!isStageTwoSelection && document.getElementById('enableStageTwoPrearrange')?.checked) {\n                syncStageTwoPersonnelFromCurrent(false);\n            }\n            closePersonnelModal();\n            if (!isStageTwoSelection) validateFullTimeAuditor();\n        }\n        \n        function updateSelectedPersonnelDisplay() {\n            const container = document.getElementById('selectedPersonnelTags');\n            const titleEl = document.getElementById('selectedPersonnelTitle');\n            if (titleEl) titleEl.textContent = isVenueMode ? \"已选择人员（可分配给各场所）：\" : \"已选择人员：\";\n            \n            const personnelToShow = isVenueMode ? globalSelectedPersonnel : assignedPersonnel;\n            if (personnelToShow.length === 0) {\n                container.innerHTML = '<span class=\"text-slate-400 text-sm\">暂无已选择人员</span>';\n                renderSelectedPersonnelCoverage([]);\n                return;\n            }\n            \n            container.innerHTML = personnelToShow.map(person => {\n                const isExternal = person.workUnit !== currentUserCompany;\n                return `\n                <span class=\"selected-personnel-tag\">\n                    ${person.name}\n                    <span class=\"personnel-tag ${person.type === '专职' ? 'tag-fulltime' : 'tag-parttime'}\" style=\"margin:0 4px\">${person.type}</span>\n                    ${renderLeaderBadge(person)}\n                    \n                </span>\n            `}).join('');\n            renderSelectedPersonnelCoverage(personnelToShow);\n        }\n        \n        function removeFromGlobalSelection(cqc, event) {\n            if (event) event.stopPropagation();\n            return false;\n        }\n        \n        function refreshSiteCard(siteId) {\n            const card = document.getElementById(siteId);\n            const personnelList = sitePersonnelM
