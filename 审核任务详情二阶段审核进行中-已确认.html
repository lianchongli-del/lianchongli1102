


<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核任务详情整合</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
        }

        .combined-shell {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            min-width: 0;
        }

        .combined-tabs {
            height: 52px;
            flex: 0 0 52px;
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            padding: 0 24px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
            z-index: 20;
            min-width: 0;
            overflow-x: auto;
        }

        .tab-left,
        .tab-right {
            display: flex;
            align-items: stretch;
            gap: 24px;
            min-width: 0;
        }

        .tab-right {
            gap: 28px;
            flex: 0 0 auto;
        }

        .main-tab,
        .aux-tab {
            border: 0;
            background: transparent;
            padding: 0 4px;
            height: 52px;
            color: #7b8494;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            font-family: inherit;
            transition: all 0.2s;
        }

        .main-tab:hover,
        .aux-tab:hover {
            color: #2563eb;
        }

        .main-tab.active {
            color: #2563eb;
        }

        .main-tab.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: #2563eb;
        }

        .frame-stage {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }

        .page-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .page-frame.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="combined-shell">
        <header class="combined-tabs">
            <nav class="tab-left" aria-label="任务详情模块">
                <button class="main-tab" type="button" data-target="scheme">审核方案</button>
                <button class="main-tab" type="button" data-target="task">任务信息</button>
                <button class="main-tab" type="button" data-target="confirm">确认进度</button>
                <button class="main-tab" type="button" data-target="plan">审核计划</button>
                <button class="main-tab" type="button" data-target="record">实施记录</button>
                <button class="main-tab active" type="button" data-target="rectify">不符合项报告</button>
            </nav>
            <div class="tab-right" aria-label="辅助入口">
                <button class="aux-tab" type="button" onclick="alert('历史审核数据')">历史审核数据</button>
            </div>
        </header>
        <main class="frame-stage">
            <iframe class="page-frame" id="frame-scheme" title="审核方案" data-page-index="0"></iframe>
            <iframe class="page-frame" id="frame-task" title="任务信息" data-page-index="1"></iframe>
            <iframe class="page-frame" id="frame-confirm" title="确认进度" data-page-index="2"></iframe>
            <iframe class="page-frame" id="frame-plan" title="审核计划" data-page-index="3"></iframe>
            <iframe class="page-frame" id="frame-record" title="实施记录" data-page-index="4"></iframe>
            <iframe class="page-frame active" id="frame-rectify" title="不符合项报告" data-page-index="5"></iframe>
        </main>
    </div>

600\"></i>\n<h3 class=\"font-semibold text-slate-900\">审核组分配设置</h3>\n</div>\n\n<div class=\"toggle-wrapper\">\n<span class=\"text-sm font-medium text-slate-700\">按场所安排审核组</span>\n<div class=\"toggle-switch\" id=\"venueToggle\" onclick=\"toggleVenueMode(this)\">\n<div class=\"toggle-slider\"></div>\n</div>\n<span class=\"text-xs text-slate-500 ml-2\" id=\"venueModeText\">已关闭：统一分配审核组</span>\n</div>\n</div>\n<div class=\"p-6\">\n\n<div class=\"mb-6\" id=\"assignPersonnelSection\">\n<div class=\"flex justify-between items-center mb-4\">\n<h3 class=\"text-sm font-semibold text-slate-800 flex items-center gap-2\">\n                            指派审核人员\n                            <span class=\"info-tooltip\">\n<i class=\"fas fa-exclamation-circle text-blue-500\"></i>\n<div class=\"tooltip-content\">\n                                    当前为\"统一分配\"模式，所有场所共用同一审核组。审核组需至少包含1名<strong>专职审核员</strong>。\n                                </div>\n</span>\n</h3>\n<button class=\"px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-xs font-medium shadow-sm shadow-blue-200 transition-all\" id=\"addPersonnelBtn\" onclick=\"openPersonnelModal()\">\n<i class=\"fas fa-user-plus mr-1\"></i>添加人员\n                        </button>\n</div>\n\n<div class=\"flex items-center gap-3 mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg\">\n<input class=\"w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer\" id=\"needPrepMeeting\" type=\"checkbox\"/>\n<label class=\"text-sm font-medium text-slate-700 cursor-pointer select-none\" for=\"needPrepMeeting\">是否需要召开审核准备会</label>\n</div>\n\n<div class=\"selected-personnel-bar\" id=\"selectedPersonnelDisplay\">\n<div class=\"flex items-center justify-between gap-3 mb-2\">\n<div class=\"text-sm font-medium text-slate-700\" id=\"selectedPersonnelTitle\">已选择人员：</div>\n</div>\n<div id=\"selectedPersonnelTags\"></div>\n<div class=\"selected-coverage-panel mt-3\" id=\"selectedPersonnelCoverage\"></div>\n</div>\n\n<div class=\"field-group\" style=\"margin-bottom: 16px;\">\n<div class=\"flex items-center gap-2 mb-3 text-sm font-semibold text-slate-900\">\n<i class=\"fas fa-percentage text-purple-500\"></i>结合系数计算\n                        </div>\n<div class=\"grid grid-cols-2 gap-4 items-end\">\n\n<div>\n<span class=\"block text-xs font-medium text-slate-700 mb-1\">审核组结合度：</span>\n<div class=\"coefficient-formula\" id=\"auditGroupCombination\" style=\"font-size: 13px; min-height: 40px; display: flex; align-items: center;\"></div>\n</div>\n\n<div class=\"flex items-center gap-3\">\n<span class=\"text-xs font-medium text-slate-700 whitespace-nowrap\">管理体系整合程度：</span>\n<div class=\"readonly-field flex items-center justify-between\" id=\"integrationDisplay\" style=\"width: 100px; text-align: center; font-weight: 600;\">90%</div>\n<div class=\"flex items-center gap-2 hidden\" id=\"integrationEditGroup\">\n<input class=\"editable-field\" id=\"integrationDegreeInput\" max=\"100\" min=\"0\" style=\"width: 80px; text-align: center;\" type=\"number\" value=\"90\"/>\n<span class=\"text-slate-600 font-medium\">%</span>\n<button class=\"px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-xs font-medium shadow-sm\" onclick=\"confirmIntegrationDegree()\">确认</button>\n<button class=\"px-3 py-1.5 border border-slate-300 rounded-lg hover:bg-slate-50 text-xs font-medium text-slate-700\" onclick=\"cancelIntegrationEdit()\">取消</button>\n</div>\n<button class=\"px-3 py-1.5 border border-slate-300 rounded-lg hover:bg-slate-50 text-xs font-medium text-slate-700 shadow-sm\" id=\"editIntegrationBtn\" onclick=\"editIntegrationDegree()\">\n<i class=\"fas fa-edit mr-1\"></i>修改\n                                </button>\n</div>\n</div>\n</div>\n\n<div class=\"field-group\">\n<div class=\"flex items-center gap-2 mb-3 text-sm font-semibold text-slate-900\">\n<i class=\"fas fa-map-marker-alt text-red-500\"></i>各场所审核时间计算结果\n                        </div>\n<div class=\"overflow-x-auto\">\n<table class=\
