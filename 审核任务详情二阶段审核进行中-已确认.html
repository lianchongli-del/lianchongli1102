n<th style=\"width: 80px\">已审核</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td>组织环境</td>\n<td>管理层</td>\n<td>各部门</td>\n<td>4.1,4.2,4.3,4.4</td>\n<td>《组织环境分析表》</td>\n<td class=\"text-center\"><i class=\"fas fa-check-square text-blue-600\"></i></td>\n<td class=\"text-center\"><span class=\"text-green-600 font-medium\">已确认</span></td>\n</tr>\n<tr>\n<td>2</td>\n<td>领导作用</td>\n<td>总经理</td>\n<td>管理层</td>\n<td>5.1,5.2,5.3</td>\n<td>质量方针、目标</td>\n<td class=\"text-center\"><i class=\"fas fa-check-square text-blue-600\"></i></td>\n<td class=\"text-center\"><span class=\"text-green-600 font-medium\">已确认</span></td>\n</tr>\n<tr>\n<td>3</td>\n<td>策划</td>\n<td>质量部</td>\n<td>各部门</td>\n<td>6.1,6.2,6.3</td>\n<td>风险机遇清单、目标方案</td>\n<td class=\"text-center\"><i class=\"fas fa-check-square text-blue-600\"></i></td>\n<td class=\"text-center\"><span class=\"text-green-600 font-medium\">已确认</span></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<!-- Tab 2: 管理体系过程清单 -->\n<div class=\"plan-tab-content hidden-section\" id=\"plan-tab-2\">\n<div class=\"flex justify-between items-center mb-4\">\n<div class=\"flex items-center gap-2\">\n<i class=\"fas fa-list-alt text-blue-500\"></i>\n<span class=\"font-semibold text-gray-800\">管理体系过程清单</span>\n<span class=\"text-xs text-gray-500\">适用于初次认证、监督、再认证</span>\n</div>\n<button class=\"btn btn-primary btn-sm\" onclick=\"addProcessRow()\">\n<i class=\"fas fa-plus mr-1\"></i>新增过程\r\n                        </button>\n</div>\n<div class=\"overflow-x-auto border border-gray-200 rounded\">\n<table class=\"data-table w-full\" id=\"processListTable\">\n<thead class=\"bg-gray-50\">\n<tr>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b w-16\">序号</th>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">过程名称</th>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">主责部门</th>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">相关部门</th>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">涉及标准条款</th>\n<th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">绩效参数或相关文件</th>\n<th class=\"px-4 py-3 text-center text-xs font-medium text-gray-700 border-b w-24\">操作</th>\n</tr>\n</thead>\n<tbody id=\"processListBody\">\n<tr data-row-id=\"1\">\n<td class=\"px-4 py-2 border-b text-sm text-gray-600\">1</td>\n<td class=\"px-4 py-2 border-b\">\n<input class=\"form-input w-full text-sm py-1\" placeholder=\"过程名称\" type=\"text\" value=\"组织环境理解\"/>\n</td>\n<td class=\"px-4 py-2 border-b\">\n<input class=\"form-input w-full text-sm py-1\" placeholder=\"主责部门\" type=\"text\" value=\"管理层\"/>\n</td>\n<td class=\"px-4 py-2 border-b\">\n<input class=\"form-input w-full text-sm py-1\" placeholder=\"相关部门\" type=\"text\" value=\"各部门\"/>\n</td>\n<td class=\"px-4 py-2 border-b\">\n<input class=\"form-input w-full text-sm py-1\" placeholder=\"涉及标准条款\" type=\"text\" value=\"4.1-4.4\"/>\n</td>\n<td class=\"px-4 py-2 border-b\">\n<input class=\"form-input w-full text-sm py-1\" placeholder=\"绩效参数或相关文件\" type=\"text\" value=\"环境因素识别表\"/>\n</td>\n<td class=\"px-4 py-2 border-b text-center\">\n<button class=\"text-red-500 hover:text-red-700\" onclick=\"deleteProcessRow(this)\" title=\"删除\">\n<i class=\"fas fa-trash-alt\"></i>\n</button>\n</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n</div>\n<div class=\"plan-header border-t\">\n<div></div>\n<button class=\"btn btn-default\" onclick=\"closePlanModal()\">关闭</button>\n</div>\n</div>\n</div>\n<!-- 接受任务确认弹窗 -->\n<div class=\"confirm-modal\" id=\"acceptModal\">\n<div class=\"confirm-modal-content\">\n<div class=\"confirm-modal-header\">\n<h3 class=\"text-lg font-semibold text-gray-900\">确认接受任务</h3>\n</div>\n<div class=\"confirm-modal-body\">\n<p class=\"text-gray-600\">确定接受该审核任务吗？接受后将正式加入审核组并进入后续流程。</p>\n</div>\n<div class=\"confirm-modal-footer\">\n<button class=\"btn btn-default\" onclick=\"closeAcceptModal()\">取消</button>\n<button class=\"btn btn-success\" onclick=\"confirmAccept()\">确认接受</button>\n</div>\n</div>\n</div>\n<!-- 退回任务确认弹窗 -->\n<div class=\"confirm-modal\" id=\"rejectModal\">\n<div class=\"confirm-modal-content\">\n<div class=\"confirm-modal-header\">\n<h3 class=\"text-lg font-semibold text-gray-900\">退回任务</h3>\n</div>\n<div class=\"confirm-modal-body\">\n<div class=\"mb-4\">\n<label class=\"form-label\">退回原因 <span class=\"text-red-500\">*</span></label>\n<textarea class=\"form-textarea\" id=\"rejectReason\" placeholder=\"请填写退回原因（必填）\"></textarea>\n</div>\n</div>\n<div class=\"confirm-modal-footer\">\n<button class=\"btn btn-default\" onclick=\"closeRejectModal()\">取消</button>\n<button class=\"btn btn-danger\" onclick=\"confirmReject()\">确认退回</button>\n</div>\n</div>\n</div>\n<script>\r\n        // 当前节点索引\r\n        let currentNodeIndex = 0;\r\n        \r\n        // 当前视角（leader/member）\r\n        let currentView = 'leader';\r\n        \r\n        // 节点配置（修改为4个节点）\r\n        const nodes = [\r\n            { id: 'node-task-confirm', name: '组内确认' },\r\n            { id: 'node-plan-confirm', name: '编制计划' },\r\n            { id: 'node-audit-progress', name: '审核任务中' },\r\n            { id: 'node-completed', name: '审核完结' }\r\n        ];\r\n        \r\n        // 切换节点\r\n        function switchNode(index) {\r\n            currentNodeIndex = index;\r\n            \r\n            // 更新步骤条样式\r\n            const stepItems = document.querySelectorAll('.step-item');\r\n            stepItems.forEach((item, idx) => {\r\n                item.classList.remove('active', 'completed', 'pending');\r\n                if (idx < index) {\r\n                    item.classList.add('completed');\r\n                } else if (idx === index) {\r\n                    item.classList.add('active');\r\n                } else {\r\n                    item.classList.add('pending');\r\n                }\r\n            });\r\n            \r\n            // 隐藏所有节点内容\r\n            document.querySelectorAll('.node-content').forEach(el => {\r\n                el.classList.add('hidden-section');\r\n            });\r\n            \r\n            // 显示当前节点内容\r\n            document.getElementById(nodes[index].id).classList.remove('hidden-section');\r\n            \r\n            // 更新页面标题状态\r\n            const statusBadge = document.getElementById('headerStatusBadge');\r\n            \r\n            if (index === 0) {\r\n                statusBadge.textContent = '组内确认中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 1) {\r\n                statusBadge.textContent = '编制计划中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 2) {\r\n                statusBadge.textContent = '审核任务中';\r\n                statusBadge.className = 'status-badge badge-warning';\r\n            } else if (index === 3) {\r\n                statusBadge.textContent = '审核完结';\r\n                statusBadge.className = 'status-badge badge-success';\r\n            }\r\n        }\r\n        \r\n        // 切换视角\r\n        function switchView(view) {\r\n            currentView = view;\r\n            \r\n            // 更新按钮样式\r\n            document.querySelectorAll('.view-switcher-btn').forEach(btn => {\r\n                btn.classList.remove('active');\r\n            });\r\n            document.getElementById(view + 'ViewBtn').classList.add('active');\r\n            \r\n            // 更新组员确认情况标签\r\n            const memberViewLabel = document.getElementById('memberViewLabel');\r\n            if (memberViewLabel) {\r\n                memberViewLabel.textContent = view === 'leader' ? '（仅组长视角可见）' : '（组员视角）';\r\n            }\r\n            \r\n            // 组长视角显示全部，组员视角只显示相关内容\r\n            if (view === 'leader') {\r\n                // 显示节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'block';\r\n                \r\n                // 显示组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'block';\r\n                \r\n                // 显示所有成员卡片\r\n                document.querySelectorAll('.member-confirm-card').forEach(card => {\r\n                    card.style.display = 'flex';\r\n                });\r\n                // 显示所有场所分配\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    site.style.display = 'block';\r\n                });\r\n                // 显示提醒按钮\r\n                document.querySelectorAll('.leader-only-btn').forEach(btn => {\r\n                    btn.style.display = 'inline-flex';\r\n                });\r\n                // 显示场所内所有成员行\r\n                document.querySelectorAll('.member-row').forEach(row => {\r\n                    row.style.display = 'table-row';\r\n                });\r\n                // 显示统计信息\r\n                document.getElementById('memberStats').style.display = 'flex';\r\n                // 隐藏组员自视视图\r\n                document.getElementById('memberSelfView').classList.add('hidden-section');\r\n                // 显示完整成员列表容器\r\n                document.getElementById('memberListContainer').classList.remove('hidden-section');\r\n                // 显示标题\r\n                document.getElementById('siteAllocationTitle').textContent = '场所审核组分配详情';\r\n                // 显示全局设置\r\n                document.getElementById('globalSettings').style.display = 'grid';\r\n                \r\n                // 显示锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'block';\r\n                document.getElementById('anchorNav').style.display = 'block';\r\n            } else {\r\n                // 组员视角 - 删除组员确认情况和节点进度栏\r\n                \r\n                // 隐藏节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'none';\r\n                \r\n                // 隐藏组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'none';\r\n                \r\n                // 隐藏锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'none';\r\n                \r\n                // 只显示一个场所（总部）\r\n                const currentMember = '王洪伟';\r\n                \r\n                // 只显示总部场所（假设当前组员分配到总部）\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    if (site.id === 'site-headquarters') {\r\n                        site.style.display = 'block';\r\n                        // 在该场所内，只显示组长和当前组员\r\n                        site.querySelectorAll('.member-row').forEach(row => {\r\n                            const rowMember = row.getAttribute('data-member');\r\n                            if (rowMember === '武荣刚' || rowMember === currentMember) {\r\n                                row.style.display = 'table-row';\r\n                            } else {\r\n                                row.style.display = 'none';\r\n                            }\r\n                        });\r\n                    } else {\r\n                        site.style.display = 'none';\r\n                    }\r\n                });\r\n                \r\n                // 隐藏其他场所\r\n                document.getElementById('site-branch1').style.display = 'none';\r\n                document.getElementById('site-branch2').style.display = 'none';\r\n                \r\n                // 修改标题\r\n                document.getElementById('siteAllocationTitle').textContent = '我的审核任务';\r\n                \r\n                // 隐藏全局设置中的组长和结束时间，只保留开始时间\r\n                document.getElementById('globalSettings').style.display = 'none';\r\n            }\r\n        }\r\n        \r\n        // 查看策划方案\r\n        function viewPlan(projectNo) {\r\n            document.getElementById('planProjectNo').textContent = '项目编号：' + projectNo;\r\n            document.getElementById('planModal').classList.add('show');\r\n        }\r\n        \r\n        function closePlanModal() {\r\n            document.getElementById('planModal').classList.remove('show');\r\n        }\r\n        \r\n        // 重新分配成员\r\n        function reassignMember(memberName) {\r\n            alert(`正在为 ${memberName} 重新分配审核任务...`);\r\n        }\r\n        \r\n        // 发送提醒\r\n\r\n        \r\n        // 显示接受任务弹窗\r\n        function showAcceptModal() {\r\n            document.getElementById('acceptModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭接受任务弹窗\r\n        function closeAcceptModal() {\r\n            document.getElementById('acceptModal').classList.remove('show');\r\n        }\r\n        \r\n        // 确认接受任务\r\n        function confirmAccept() {\r\n            alert('任务接受成功！您已正式加入审核组。');\r\n            closeAcceptModal();\r\n            // 可以在这里添加后续逻辑，比如切换状态等\r\n        }\r\n        \r\n        // 显示退回任务弹窗\r\n        function showRejectModal() {\r\n            document.getElementById('rejectModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭退回任务弹窗\r\n        function closeRejectModal() {\r\n            document.getElementById('rejectModal').classList.remove('show');\r\n            // 清空原因\r\n            document.getElementById('rejectReason').value = '';\r\n        }\r\n        \r\n        // 确认退回任务\r\n        function confirmReject() {\r\n            const reason = document.getElementById('rejectReason').value.trim();\r\n            if (!reason) {\r\n                alert('请填写退回原因！');\r\n                return;\r\n            }\r\n            alert(`任务已退回，原因：${reason}`);\r\n            closeRejectModal();\r\n            // 可以在这里添加后续逻辑，比如返回列表页等\r\n        }\r\n        \r\n        // 返回\r\n        function goBack() {\r\n            if (confirm('确定返回列表页？')) {\r\n                console.log('返回列表页');\r\n            }\r\n        }\r\n        \r\n        // Tab切换功能\r\n        function switchPlanTab(tabId) {\r\n            // 隐藏所有tab内容\r\n            document.querySelectorAll('.plan-tab lass=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"绩效参数或相关文件\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b text-center\">\r\n                    <button onclick=\"deleteProcessRow(this)\" class=\"text-red-500 hover:text-red-700\" title=\"删除\">\r\n                        <i class=\"fas fa-trash-alt\"></i>\r\n                    </button>\r\n                </td>\r\n            `;\r\n            \r\n            tbody.appendChild(newRow);\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 删除过程行\r\n        function deleteProcessRow(btn) {\r\n            const row = btn.closest('tr');\r\n            row.remove();\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 重新编号\r\n        function renumberProcessRows() {\r\n            const rows = document.querySelectorAll('#processListBody tr');\r\n            rows.forEach((row, index) => {\r\n                row.setAttribute('data-row-id', index + 1);\r\n                row.cells[0].textContent = index + 1;\r\n            });\r\n        }\r\n        \r\n        // 锚点导航滚动功能\r\n        function scrollToSection(sectionId, element) {\r\n            // 移除所有锚点的高亮状态\r\n            document.querySelectorAll('.anchor-item').forEach(item => {\r\n                item.classList.remove('active');\r\n            });\r\n            \r\n            // 给当前点击的锚点添加高亮状态\r\n            element.classList.add('active');\r\n            \r\n            // 滚动到对应区域\r\n            const targetSection = document.getElementById(sectionId);\r\n            if (targetSection) {\r\n                const offsetTop = targetSection.offsetTop - 200; // 预留顶部空间\r\n                window.scrollTo({\r\n                    top: offsetTop,\r\n                    behavior: 'smooth'\r\n                });\r\n            }\r\n        }\r\n        \r\n        // 监听滚动事件，自动更新锚点高亮状态\r\n        window.addEvent dActivityRow('site1', { date: '2024-04-16', startTime: '09:00', endTime: '11:00', auditors: ['zhangli'], process: 'EMS运行控制及合规性评价', dept: '运营一分公司' });\n            addActivityRow('site1', { date: '2024-04-16', startTime: '13:30', endTime: '15:30', auditors: ['liuna'], process: '职业健康安全风险管控', dept: '运营一分公司' });\n            addActivityRow('site2', { date: '2024-04-17', startTime: '09:00', endTime: '11:00', auditors: ['chenming'], process: '环境因素识别与运行绩效监视', dept: '运营二分公司' });\n            addActivityRow('site2', { date: '2024-04-17', startTime: '13:30', endTime: '15:30', auditors: ['zhaoqiang'], process: '现场应急准备与响应', dept: '运营二分公司' });\n        });\n\n        // 班次行生成\n        function updateShiftRows() {\n            const count = parseInt(document.getElementById('shiftCount').value);\n            const container = document.getElementById('shiftContainer');\n            const existingRows = container.querySelectorAll('.shift-row');\n            const currentCount = existingRows.length;\n            \n            let hourOptions = '';\n            for (let i = 0; i < 24; i++) {\n                hourOptions += `<option value=\"${i}\">${String(i).padStart(2, '0')}</option>`;\n            }\n            \n            let minuteOptions = `\n                <option value=\"0\">00</option>\n                <option value=\"15\">15</option>\n                <option value=\"30\">30</option>\n                <option value=\"45\">45</option>\n            `;\n            \n            if (count > currentCount) {\n                for (let i = currentCount + 1; i <= count; i++) {\n                    const row = document.createElement('div');\n                    row.className = 'shift-row';\n                    row.dataset.shift = i;\n                    row.innerHTML = `\n                        <span class=\"shift-label\">第${i}班次</span>\n                        <div class=\"shift-time-group\">\n                            <select class=\"time-select hour-select\" onchange=\"calculateShiftDuration(${i})\">\n                                ${hourOptions}\n                            </select>\n                            <span class=\"shift-separator\">:</span>\n                            <select class=\"time-select minute-select\" onchange=\"calculateShiftDuration(${i})\">\n                                ${minuteOptions}\n                            </select>\n                            <span class=\"shift-separator\">-</span>\n                            <select class=\"time-select hour-select\" onchange=\"calculateShiftDuration(${i})\">\n                                ${hourOptions}\n                            </select>\n                            <span class=\"shift-separator\">:</span>\n                            <select class=\"time-select minute-select\" onchange=\"calculateShiftDuration(${i})\">\n                                ${minuteOptions}\n                            </select>\n                        </div>\n                        <span class=\"shift-duration\" id=\"shift${i}Duration\">0小时0分钟</span>\n                    `;\n                    container.appendChild(row);\n                }\n            } else if (count < currentCount) {\n                for (let i = currentCount - 1; i >= count; i--) {\n                    existingRows[i].remove();\n                }\n            }\n            \n            for (let i = 1; i <= count; i++) {\n                const row = document.querySelector(`.shift-row[data-shift=\"${i}\"]`);\n                if (row) {\n                    const selects = row.querySelectorAll('select');\n                    selects[0].value = 8;\n                    selects[2].value = 17;\n                    calculateShiftDuration(i);\n                }\n            }\n        }\n\n        function calculateShiftDuration(shiftNum) {\n            const row = document.querySelector(`.shift-row[data-shift=\"${shiftNum}\"]`);\n            if (!row) return;\n            \n            const selects = row.querySelectorAll('select');\n            const startH = parseInt(selects[0].value) || 0;\n            const startM = parseInt(selects[1].value) || 0;\n            const endH = parseInt(selects[2].value) || 0;\n            const endM = parseInt(selects[3].value) || 0;\n            \n            let start = startH * 60 + startM;\n            let end = endH * 60 + endM;\n            \n            if (end < start) end += 24 * 60;\n            \n            const duration = end - start;\n            const hours = Math.floor(duration / 60);\n            const mins = duration % 60;\n            \n            const display = document.getElementById(`shift${shiftNum}Duration`);\n            if (display) {\n                display.textContent = `${hours}小时${mins}分钟`;\n            }\n        }\n\n        function toggleCriteriaCheckbox(checkboxId) {\n            event.stopPropagation();\n            const checkbox = document.getElementById(checkboxId);\n            checkbox.checked = !checkbox.checked;\n            toggleCriteriaField(checkboxId.replace('criteria-', ''));\n        }\n\n        function toggleCriteriaItem(item, event) {\n            if (item.id === 'criteria-item-standard') return;\n            \n            item.classList.toggle('expanded');\n            \n            if (event && !event.target.closest('.criteria-checkbox-wrapper')) {\n                const checkbox = item.querySelector('.criteria-checkbox');\n                if (!checkbox.disabled) {\n                    checkbox.checked = !checkbox.checked;\n                    const type = checkbox.id.replace('criteria-', '');\n                    const input = document.getElementById(`input-${type}`);\n                    if (input) {\n                        if (checkbox.checked) {\n                            input.parentElement.style.maxHeight = '200px';\n                            input.parentElement.style.padding = '0 16px 16px 48px';\n                            item.classList.add('active');\n                        } else {\n                            input.parentElement.style.maxHeight = '0';\n                            input.parentElement.style.padding = '0 16px 0 48px';\n                            input.value = '';\n                            item.classList.remove('active');\n                        }\n                    }\n                }\n            }\n        }\n\n        function toggleCriteriaField(type) {\n            const checkbox = document.getElementById(`criteria-${type}`);\n            const item = document.getElementById(`criteria-item-${type}`);\n            const input = document.getElementById(`input-${type}`);\n            \n            if (checkbox.checked) {\n                item.classList.add('expanded', 'active');\n            } else {\n                item.classList.remove('expanded', 'active');\n                item.querySelectorAll('input, textarea, select').forEach(control => {\n                    control.value = '';\n                });\n            }\n        }\n\n        function addActivityRow(siteId, data = null) {\n            const container = document.getElementById(`activityContainer-${siteId}`);\n            const rowId = `${siteId}_act_${Date.now()}`;\n            \n            const div = document.createElement('div');\n            div.className = 'activity-row';\n            div.dataset.rowId = rowId;\n            div.dataset.site = siteId;\n            \n            const date = data?.date || '2024-04-15';\n            const startTime = data?.startTime || '09:00';\n            const endTime = data?.endTime || '12:00';\n                        const allowedAuditorIds = siteAuditorAssignments[siteId] || auditTeam.map(t => t.id);\n            const allowedAuditors = allowedAuditorIds.map(id => auditTeam.find(a => a.id === id)).filter(Boolean);\n            const auditors = (data?.auditors || []).filter(aid => allowedAuditorIds.includes(aid));\n            const process = data?.process || '';\n            const dept = data?.dept || '';\n\n            div.innerHTML = `\n                <div style=\"display: flex; align-items: center; justify-content: center;\">\n                    <input type=\"checkbox\" class=\"row-checkbox criteria-checkbox\" style=\"width: 18px; height: 18px;\" data-row-id=\"${rowId}\" data-site=\"${siteId}\" onchange=\"updateSiteBatchDeleteBtn('${siteId}')\">\n                </div>\n                <div>\n                    <input type=\"date\" class=\"form-input\" value=\"${date}\" min=\"2024-04-15\" max=\"2024-04-18\" style=\"width: 110px;\" onchange=\"updateAuditStats()\">\n                </div>\n                <div class=\"flex items-center gap-1\">\n                    <select class=\"form-select time-select\" style=\"width: 65px;\" onchange=\"updateAuditStats()\">\n                        ${generateTimeOptions(startTime)}\n                    </select>\n                    <span class=\"text-slate-400\">-</span>\n                    <select class=\"form-select time-select\" style=\"width: 65px;\" onchange=\"updateAuditStats()\">\n                        ${generateTimeOptions(endTime)}\n                    </select>\n                </div>\n                <div class=\"auditor-select-container\">\n                    <div class=\"auditor-tags\" onclick=\"showAuditorDropdown('${rowId}')\" id=\"tags-${rowId}\">\n                        ${auditors.map(aid => {\n                            const auditor = allowedAuditors.find(a => a.id === aid);\n                            return auditor ? `<span class=\"auditor-tag\" data-id=\"${aid}\">${auditor.name}<span class=\"remove\" onclick=\"removeAuditor('${rowId}', '${aid}', event)\">×</span></span>` : '';\n                        }).join('') || '<span class=\"text-slate-400 text-xs px-1\">点击选择人员...</span>'}\n                    </div>\n                    <div class=\"auditor-dropdown\" id=\"dropdown-${rowId}\">\n                        ${allowedAuditors.map(t => `\n                            <div class=\"auditor-option\" onclick=\"selectAuditor('${rowId}', '${t.id}')\">\n                                <span class=\"auditor-color\" style=\"background: ${t.color};\"></span>\n                                <span>${t.name} (${t.maxHours}h)</span>\n                            </div>\n                        `).join('')}\n                    </div>\n                </div>\n                <div>\n                    <input type=\"text\" class=\"form-input\" value=\"${process}\" placeholder=\"如：组织环境 4.1-4.4\" style=\"width: 100%;\">\n                </div>\n                <div>\n                    <input type=\"text\" class=\"form-input\" value=\"${dept}\" placeholder=\"如：管理层/中心职能\" style=\"width: 100%;\">\n                </div>\n                <div>\n                    <button type=\"button\" class=\"btn btn-danger btn-xs\" onclick=\"removeActivityRow('${rowId}', '${siteId}')\">\n                        <i class=\"fas fa-trash\"></i>删除\n                    </button>\n                </div>\n            `;\n            \n            container.appendChild(div);\n            updateAuditStats();\n        }\n\n        function generateTimeOptions(selectedTime = '09:00') {\n            let html = '';\n            for (let h = 0; h < 24; h++) {\n                for (let m of ['00', '15', '30', '45']) {\n                    const time = `${String(h).padStart(2, '0')}:${m}`;\n                    const selected = time === selectedTime ? 'selected' : '';\n                    html += `<option value=\"${time}\" ${selected}>${time}</option>`;\n                }\n            }\n            return html;\n        }\n\n        function showAuditorDropdown(rowId) {\n            // 先关闭所有其他下拉框\n            document.querySelectorAll('.auditor-dropdown').forEach(d => {\n                if (d.id !== `dropdown-${rowId}`) d.classList.remove('show');\n            });\n            document.querySelectorAll('.activity-row.dropdown-active, .auditor-select-container.dropdown-active').forEach(el => {\n                el.classList.remove('dropdown-active');\n            });\n            \n            const dropdown = document.getElementById(`dropdown-${rowId}`);\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n            const container = dropdown?.closest('.auditor-select-container');\n            dropdown.classList.toggle('show');\n            const isOpen = dropdown.classList.contains('show');\n            row?.classList.toggle('dropdown-active', isOpen);\n            container?.classList.toggle('dropdown-active', isOpen);\n            \n            const closeDropdown = (e) => {\n                if (!e.target.closest(`#tags-${rowId}`) && !e.target.closest(`#dropdown-${rowId}`)) {\n                    dropdown.classList.remove('show');\n                    row?.classList.remove('dropdown-active');\n                    container?.classList.remove('dropdown-active');\n                    document.removeEventListener('click', closeDropdown);\n                }\n            };\n            setTimeout(() => document.addEventListener('click', closeDropdown), 0);\n        }\n\n        function selectAuditor(rowId, auditorId) {\n            const tagsContainer = document.getElementById(`tags-${rowId}`);\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n            const allowedAuditorIds = siteAuditorAssignments[row?.dataset.site] || auditTeam.map(t => t.id);\n            if (!allowedAuditorIds.includes(auditorId)) return;\n            const auditor = auditTeam.find(a => a.id === auditorId);\n            \n            if (tagsContainer.querySelector(`[data-id=\"${auditorId}\"]`)) return;\n            \n            const placeholder = tagsContainer.querySelector('.text-slate-400');\n            if (placeholder) placeholder.remove();\n            \n            const tag = document.createElement('span');\n            tag.className = 'auditor-tag';\n            tag.dataset.id = auditorId;\n            tag.innerHTML = `${auditor.name}<span class=\"remove\" onclick=\"removeAuditor('${rowId}', '${auditorId}', event)\">×</span>`;\n            tagsContainer.appendChild(tag);\n            \n            updateAuditStats();\n        }\n\n        function removeAuditor(rowId, auditorId, event) {\n            event.stopPropagation();\n            const tagsContainer = document.getElementById(`tags-${rowId}`);\n            const tag = tagsContainer.querySelector(`[data-id=\"${auditorId}\"]`);\n            if (tag) tag.remove();\n            \n            if (tagsContainer.children.length === 0) {\n                tagsContainer.innerHTML = '<span class=\"text-slate-400 text-xs px-1\">点击选择人员...</span>';\n            }\n            \n            updateAuditStats();\n        }\n\n        function removeActivityRow(rowId, siteId) {\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n            if (row) {\n                row.remove();\n                updateAuditStats();\n                updateSiteBatchDeleteBtn(siteId);\n            }\n        }\n\n        function updateAuditStats() {\n            auditTeam.forEach(t => t.current = 0);\n            const siteStats = { hq: 0, site1: 0, site2: 0 };\n            \n            document.querySelectorAll('.activity-row').forEach(row => {\n                const siteId = row.dataset.site;\n                const timeSelects = row.querySelectorAll('.time-select');\n                const start = timeSelects[0]?.value;\n                const end = timeSelects[1]?.value;\n                \n                if (start && end) {\n                    const [sh, sm] = start.split(':').map(Number);\n                    const [eh, em] = end.split(':').map(Number);\n                    let duration = (eh * 60 + em) - (sh * 60 + sm);\n                    if (duration < 0) duration += 24 * 60;\n                    const hours = duration / 60;\n                    \n                    const tags = row.querySelectorAll('.auditor-tag');\n                    tags.forEach(tag => {\n                        const auditorId = tag.dataset.id;\n                        const auditor = auditTeam.find(a => a.id === auditorId);\n                        if (auditor) {\n                            auditor.current += hours;\n                            siteStats[siteId] += hours;\n                        }\n                    });\n                }\n            });\n            \n            auditTeam.forEach(t => {\n                const el = document.getElementById(`stat-${t.id}`);\n                if (el) {\n                    el.textContent = t.current.toFixed(1);\n                    el.className = 'stat-value ' + (t.current > t.maxHours ? 'warning' : '');\n                }\n            });\n            \n            Object.keys(siteStats).forEach(siteId => {\n                const el = document.getElementById(`site-days-${siteId}`);\n                if (el) {\n                    el.textContent = (siteStats[siteId] / 8).toFixed(1);\n                }\n            });\n        }\n\n        function handleSiteExcelUpload(event, siteId) {\n            const file = event.target.files[0];\n            if (!file) return;\n            \n            const reader = new FileReader();\n            reader.onload = function(e) {\n                try {\n                    const data = new Uint8Array(e.target.result);\n                    const workbook = XLSX.read(data, {type: 'array'});\n                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];\n                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);\n                    \n                    const container = document.getElementById(`activityContainer-${siteId}`);\n                    container.innerHTML = '';\n                    \n                    jsonData.forEach(row => {\n                        const auditors = (row['审核人员'] || '').split(/[，,]/).map(s => {\n                            const name = s.trim();\n                            const found = auditTeam.find(a => a.name === name);\n                            return found ? found.id : '';\n                        }).filter(id => id);\n                        \n                        addActivityRow(siteId, {\n                            date: row['日期'] || '2024-04-15',\n                            startTime: row['开始时间'] || '09:00',\n                            endTime: row['结束时间'] || '12:00',\n                            auditors: auditors,\n                            process: row['过程或活动'] || '',\n                            dept: row['部门/场所'] || ''\n                        });\n                    });\n                    \n                    updateAuditStats();\n                    showToast(`成功导入 ${jsonData.length} 条记录到${sitesData[siteId].name}`);\n                } catch (err) {\n                    showToast('Excel解析失败，请检查文件格式', 'error');\n                }\n            };\n            reader.readAsArrayBuffer(file);\n            event.target.value = '';\n        }\n\n        function toggleSection(header) {\n            const content = header.nextElementSibling;\n            const icon = header.querySelector('.fa-chevron-down');\n            \n            if (content.style.maxHeight === '0px') {\n                content.style.maxHeight = '2000px';\n                content.style.overflow = 'visible';\n                content.style.padding = '';\n                if (icon) icon.style.transform = 'rotate(0deg)';\n            } else {\n                content.style.maxHeight = '0px';\n                content.style.overflow = 'hidden';\n                content.style.padding = '0 20px';\n                if (icon) icon.style.transform = 'rotate(-90deg)';\n            }\n        }\n\n        function savePlan() {\n            showToast('审核计划已保存为草稿');\n        }\n\n        function submitPlan() {\n            const rows = document.querySelectorAll('.activity-row');\n            if (rows.length === 0) {\n                showToast('请至少添加一条审核活动', 'error');\n                document.getElementById('section-activity').scrollIntoView({ behavior: 'smooth' });\n                return;\n            }\n            \n            const exceeded = auditTeam.filter(t => t.current > t.maxHours);\n            if (exceeded.length > 0) {\n                showToast(`${exceeded.map(e => e.name).join(',')} 的审核时长已超出最大可用时间`, 'error');\n                return;\n            }\n            \n            if (confirm('确定要提交审核计划吗？提交后将进入审批流程。')) {\n                showToast('审核计划已提交');\n            }\n        }\n\n        function toggleSiteSelectAll(siteId) {\n            const checkbox = document.querySelector(`.site-card[data-site-id=\"${siteId}\"] .select-all-site`);\n            const rowCheckboxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox`);\n            \n            rowCheckboxes.forEach(cb => {\n                cb.checked = checkbox.checked;\n            });\n            \n            updateSiteBatchDeleteBtn(siteId);\n        }\n\n        function updateSiteBatchDeleteBtn(siteId) {\n            const checkedBoxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox:checked`);\n            const btn = document.querySelector(`.batch-delete-site[data-site=\"${siteId}\"]`);\n            \n            if (checkedBoxes.length > 0) {\n                btn.disabled = false;\n                btn.style.opacity = '1';\n                btn.style.cursor = 'pointer';\n                btn.innerHTML = `<i class=\"fas fa-trash-alt\"></i>批量删除(${checkedBoxes.length})`;\n            } else {\n                btn.disabled = true;\n                btn.style.opacity = '0.5';\n                btn.style.cursor = 'not-allowed';\n                btn.innerHTML = `<i class=\"fas fa-trash-alt\"></i>批量删除`;\n            }\n        }\n\n        function batchDeleteSiteRows(siteId) {\n            const checkedBoxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox:checked`);\n            \n            if (checkedBoxes.length === 0) {\n                showToast('请先选择要删除的活动', 'warning');\n                return;\n            }\n            \n            if (confirm(`确定要删除选中的 ${checkedBoxes.length} 条活动记录吗？`)) {\n                checkedBoxes.forEach(cb => {\n                    const rowId = cb.dataset.rowId;\n                    const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n                    if (row) row.remove();\n                });\n                \n                document.querySelector(`.site-card[data-site-id=\"${siteId}\"] .select-all-site`).checked = false;\n                updateSiteBatchDeleteBtn(siteId);\n                updateAuditStats();\n                \n                showToast(`已成功删除 ${checkedBoxes.length} 条活动记录`);\n            }\n        }\n\n        function showToast(message, type = 'success') {\n            const toast = document.createElement('div');\n            const bgColor = type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-amber-500' : 'bg-green-600';\n            const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle';\n            \n            toast.className = `fixed top-24 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-6 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-2 transition-all duration-300 opacity-0`;\n            toast.innerHTML = `<i class=\"fas ${icon}\"></i><span>${message}</span>`;\n            \n            document.body.appendChild(toast);\n            setTimeout(() => toast.classList.remove('opacity-0'), 10);\n            setTimeout(() => {\n                toast.classList.add('opacity-0');\n                setTimeout(() => toast.remove(), 300);\n            }, 3000);\n        }\n    __COMBINED_SCRIPT_CLOSE__\n\n<script id=\"SIGNATURE_FILE_PREVIEW_SCRIPT\">\n        // SIGNATURE_FILE_PREVIEW_START\n        (function () {\n            var signatureNodes = [\n                { title: '组长', role: '审核组长', signer: '武荣刚', signedAt: '2024-04-12 09:32:18' },\n                { title: '项目管理', role: '项目管理', signer: '周静', signedAt: '2024-04-12 10:05:46' },\n                { title: '客户', role: '客户代表', signer: '刘海峰', signedAt: '2024-04-12 11:18:32' }\n            ];\n\n            function escapeHtml(value) {\n                return String(value == null ? '' : value)\n                    .replace(/&/g, '&amp;')\n                    .replace(/</g, '&lt;')\n                    .replace(/>/g, '&gt;')\n                    .replace(/\"/g, '&quot;')\n                    .replace(/'/g, '&#39;');\n            }\n\n            function normalizeText(value) {\n                return String(value == null ? '' : value)\n                    .replace(/\\u00a0/g, ' ')\n                    .replace(/\\s+/g, ' ')\n                    .replace(/^\\s+|\\s+$/g, '');\n            }\n\n            function controlValue(control) {\n                if (!control) return '';\n                var tag = control.tagName ? control.tagName.toLowerCase() : '';\n                var type = (control.type || '').toLowerCase();\n                if (type === 'checkbox' || type === 'radio') return control.checked ? '是' : '否';\n                if (tag === 'select') {\n                    var option = control.options && control.selectedIndex >= 0 ? control.options[control.selectedIndex] : null;\n                    return normalizeText(option ? option.textContent : control.value);\n                }\n                if (tag === 'textarea') return normalizeText(control.value || control.textContent);\n                return normalizeText(control.value || control.getAttribute('value') || control.textContent);\n            }\n\n            function textFromNode(el) {\n                if (!el) return '';\n                var clone = el.cloneNode(true);\n                var originalControls = Array.from(el.querySelectorAll('input, textarea, select'));\n                var cloneControls = Array.from(clone.querySelectorAll('input, textarea, select'));\n                cloneControls.forEach(function (control, index) {\n                    var span = clone.ownerDocument.createElement('span');\n                    span.textContent = controlValue(originalControls[index]);\n                    control.replaceWith(span);\n                });\n                clone.querySelectorAll('script, style, button, .signature-preview-mask, .signature-preview-toast, .node-popover, .auditor-dropdown, .criteria-expand-icon').forEach(function (item) {\n                    item.remove();\n                });\n                return normalizeText(clone.textContent);\n            }\n\n            function pdfRows(rows) {\n                return rows.map(function (row) {\n                    return '<tr><th>' + escapeHtml(row[0] || '') + '</th><td>' + escapeHtml(row[1] || '-') + '</td></tr>';\n                }).join('');\n            }\n\n            function makePdfTable(title, rows, extraClass) {\n                if (!rows || !rows.length) return '';\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">' + escapeHtml(title) + '</div><table class=\"plan-pdf-table ' + (extraClass || '') + '\"><tbody>' + pdfRows(rows) + '</tbody></table></div>';\n            }\n\n            function domTableToPdf(table, title) {\n                if (!table) return '';\n                var rows = Array.from(table.querySelectorAll('tr')).map(function (tr) {\n                    return Array.from(tr.children).map(function (cell) { return textFromNode(cell); });\n                }).filter(function (cells) { return cells.some(Boolean); });\n                if (!rows.length) return '';\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">' + escapeHtml(title) + '</div><table class=\"plan-pdf-table matrix\">' + rows.map(function (cells, rowIndex) {\n                    var cellTag = rowIndex === 0 ? 'th' : 'td';\n                    return '<tr>' + cells.map(function (cell) { return '<' + cellTag + '>' + escapeHtml(cell || '-') + '</' + cellTag + '>'; }).join('') + '</tr>';\n                }).join('') + '</table></div>';\n            }\n\n            function buildTypeTable() {\n                var sec = document.getElementById('section-type');\n                if (!sec) return '';\n                return makePdfTable('一、审核类型', [['审核类型及认证体系', textFromNode(sec.querySelector('.tip-box')) || textFromNode(sec)]]);\n            }\n\n            function buildPurposeTable() {\n                var sec = document.getElementById('section-purpose');\n                if (!sec) return '';\n                var rows = Array.from(sec.querySelectorAll('.form-field')).map(function (field) {\n                    var label = textFromNode(field.querySelector('.form-label'));\n                    var control = field.querySelector('textarea, input, select, .readonly-display');\n                    var value = control ? (controlValue(control) || textFromNode(control)) : textFromNode(field);\n                    return [label, value];\n                }).filter(function (row) { return row[0] || row[1]; });\n                return makePdfTable('二、审核目的', rows.length ? rows : [['审核目的', textFromNode(sec)]]);\n            }\n\n            function buildScopeTable() {\n                var sec = document.getElementById('section-scope');\n                if (!sec) return '';\n                var cards = Array.from(sec.querySelectorAll('.scope-site-card'));\n                if (!cards.length) return makePdfTable('三、审核范围', [['审核范围', textFromNode(sec)]]);\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">三、审核范围</div>' + cards.map(function (card, index) {\n                    var rows = Array.from(card.querySelectorAll('.scope-line')).map(function (line) {\n                        return [textFromNode(line.querySelector('.scope-label')), textFromNode(line.que  \r\n            // 隐藏所有内容模块\r\n            document.querySelectorAll('.module-content').forEach(content => {\r\n                content.classList.remove('active');\r\n            });\r\n            \r\n            // 添加active类到当前标签\r\n            element.classList.add('active');\r\n            \r\n            // 显示对应内容\r\n            document.getElementById(module + '-module').classList.add('active');\r\n            \r\n            console.log('切换到模块：' + module);\r\n        }\r\n\r\n        // ========== 首次会议 & 末次会议功能 ==========\r\n        \r\n        function uploadSignFile(type) {\r\n            document.getElementById(type + 'MeetingFile').click();\r\n        }\r\n\r\n        function handleSignUpload(event, type) {\r\n            const file = event.target.files[0];\r\n            if (!file) return;\r\n            \r\n            const validTypes = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];\r\n            if (!validTypes.includes(file.type)) {\r\n                alert('仅支持 PDF、JPG、PNG 格式文件');\r\n                return;\r\n            }\r\n            \r\n            if (file.size > 10 * 1024 * 1024) {\r\n                alert('文件大小不能超过10MB');\r\n                return;\r\n            }\r\n            \r\n            meetingFiles[type] = {\r\n                name: file.name,\r\n                size: (file.size / 1024).toFixed(2) + 'KB',\r\n                type: file.type\r\n            };\r\n            \r\n            const uploadArea = document.getElementById(type + 'MeetingUpload');\r\n            const fileList = document.getElementById(type + 'MeetingFileList');\r\n            \r\n            uploadArea.classList.add('hidden');\r\n            fileList.classList.remove('hidden');\r\n            \r\n            let icon = 'fa-file-pdf';\r\n            if (file.type.startsWith('image/')) icon = 'fa-file-image';\r\n            \r\n            fileList.innerHTML = `\r\n                <div class=\"sign-uploaded\">\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span style=\"flex: 1;\">${file.name} (${(file.size / 1024).toFixed(2)}KB)</span>\r\n                    <button class=\"btn btn-default\" onclick=\"previewSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px;\">\r\n                        <i class=\"fas fa-eye text-xs\"></i>预览\r\n                    </button>\r\n                    <button class=\"btn btn-default\" onclick=\"deleteSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px; color: #dc2626; border-color: #fca5a5;\">\r\n                        <i class=\"fas fa-trash text-xs\"></i>删除\r\n                    </button>\r\n                </div>\r\n            `;\r\n            \r\n            showToast('签到表上传成功', 'success');\r\n        }\r\n\r\n        function previewSignFile(type) {\r\n            const file = meetingFiles[type];\r\n            if (file) {\r\n                showToast('预览: ' + file.name, 'info');\r\n            }\r\n        }\r\n\r\n        function deleteSignFile(type) {\r\n            if (!confirm('确定删除该签到表吗？')) return;\r\n            \r\n            meetingFiles[type] = null;\r\n            \r\n            const uploadArea = document.getElementById(type + 'MeetingUpload');\r\n            const fileList = document.getElementById(type + 'MeetingFileList');\r\n            \r\n            uploadArea.classList.remove('hidden');\r\n            uploadArea.classList.remove('has-file');\r\n            fileList.classList.add('hidden');\r\n            fileList.innerHTML = '';\r\n            \r\n            showToast('签到表已删除', 'success');\r\n        }\r\n\r\n        // ========== 现场审核功能 ==========\r\n        \r\n        function calculateProgressStats(records) {\r\n            if (!records || records.length === 0) {\r\n                return { conform: 0, observation: 0, minor: 0, serious: 0, total: 0 };\r\n            }\r\n            \r\n            const stats = {\r\n                conform: 0,\r\n                observation: 0,\r\n                minor: 0,\r\n                serious: 0,\r\n                total: records.length\r\n            };\r\n            \r\n            records.forEach(record => {\r\n                switch(record.decision) {\r\n                    case '符合':\r\n                        stats.conform++;\r\n                        break;\r\n                    case '观察项':\r\n                        stats.observation++;\r\n                        break;\r\n                    case '轻微不符合':\r\n                        stats.minor++;\r\n                        break;\r\n                    case '严重不符合':\r\n                        stats.serious++;\r\n                        break;\r\n                }\r\n            });\r\n            \r\n            return stats;\r\n        }\r\n\r\n        function renderStatNumber(value, type) {\r\n            if (value === 0) {\r\n                return `<span class=\"stat-number stat-zero\">-</span>`;\r\n            }\r\n            \r\n            let colorClass = '';\r\n            switch(type) {\r\n                case 'conform':\r\n                    colorClass = 'color: #15803d; background: #f0fdf4; border: 1px solid #bbf7d0;';\r\n                    break;\r\n                case 'observation':\r\n                    colorClass = 'color: #92400e; background: #fef3c7; border: 1px solid #fcd34d;';\r\n                    break;\r\n                case 'minor':\r\n                    colorClass = 'color: #dc2626; background: #fef2f2; border: 1px solid #fecaca;';\r\n                    break;\r\n                case 'serious':\r\n                    colorClass = 'color: #991b1b; background: #fee2e2; border: 1px solid #fca5a5;';\r\n                    break;\r\n            }\r\n            \r\n            return `<span class=\"stat-number\" style=\"${colorClass}\">${value}</span>`;\r\n        }\r\n\r\n        function renderProgressBar(records) {\r\n            if (!records || records.length === 0) {\r\n                return `\r\n                    <div class=\"progress-bar-container\" title=\"未开始填报\">\r\n                        <div class=\"progress-bar-fill-table empty\"></div>\r\n                    </div>\r\n                `;\r\n            }\r\n            \r\n            const count = records.length;\r\n            const baseCount = 5;\r\n            const percentage = Math.min((count / baseCount) * 100, 100);\r\n            \r\n            let fillClass = 'low';\r\n            if (percentage >= 100) fillClass = 'full';\r\n            else if (percentage >= 80) fillClass = 'high';\r\n            else if (percentage >= 40) fillClass = 'medium';\r\n            \r\n            return `\r\n                <div class=\"progress-bar-container\" title=\"已填报 ${count} 条核查记录\">\r\n                    <div class=\"progress-bar-fill-table ${fillClass}\" style=\"width: ${percentage}%\">\r\n                    </div>\r\n                </div>\r\n            `;\r\n        }\r\n\r\n        function renderVerificationTable() {\r\n            const tbody = document.getElementById('verificationTableBody');\r\n            tbody.innerHTML = '';\r\n            \r\n            verificationData.forEach((item, index) => {\r\n                const tr = document.createElement('tr');\r\n                \r\n                let statusBadge = '';\r\n                if (item.status === 'unsubmitted') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-draft\">未提交</span>';\r\n                } else if (item.status === 'submitted') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-processing\">已提交</span>';\r\n                } else if (item.status === 'confirmed') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-success\">已确认</span>';\r\n                }\r\n                \r\n                const stats = calculateProgressStats(item.records);\r\n                \r\n                let actionBtns = '<div class=\"action-btns\">';\r\n                \r\n                actionBtns += `<button class=\"btn btn-info btn-sm\" onclick=\"viewVerificationDetails(${index})\">\r\n                    <i class=\"fas fa-eye text-xs\"></i>\r\n                    查看详情\r\n                </button>`;\r\n                \r\n                if (item.role === '组长') {\r\n                    if (item.status === 'unsubmitted') {\r\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"editLeaderVerification(${index})\">\r\n                            <i class=\"fas fa-edit text-xs\"></i>\r\n                            编辑\r\n                        </button>`;\r\n                    }\n                    else {\n                    }\r\n                } else {\r\n                    if (item.status === 'submitted') {\r\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"confirmMemberVerification(${index})\">\r\n                            <i class=\"fas fa-check-circle text-xs\"></i>\r\n                            核查记录确认\r\n                        </button>`;\r\n                    } else if (item.status === 'confirmed') {\r\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\r\n                            <i class=\"fas fa-check text-xs\"></i>\r\n                            已确认\r\n                        </button>`;\r\n                    } else {\r\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\r\n                            <i class=\"fas fa-clock text-xs\"></i>\r\n                            等待提交\r\n                        </button>`;\r\n                    }\r\n                }\r\n                \r\n                actionBtns += '</div>';\r\n                \r\n                tr.innerHTML = `\r\n                    <td class=\"font-medium\">${item.auditorName}</td>\r\n                    <td><span class=\"personnel-tag ${item.roleTag}\">${item.role}</span></td>\r\n                    <td style=\"white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\" title=\"${item.dateRange}\">${item.dateRange}</td>\r\n                    <td>${item.sites}</td>\r\n                    <td>${renderProgressBar(item.records)}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.conform, 'conform')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.observation, 'observation')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.minor, 'minor')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.serious, 'serious')}</td>\r\n                    <td>${statusBadge}</td>\r\n                    <td class=\"text-gray-500\">${item.submitTime}</td>\r\n                    <td>${actionBtns}</td>\r\n                `;\r\n                \r\n                tbody.appendChild(tr);\r\n            });\r\n        }\r\n\r\n        function viewVerificationDetails(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = true;\r\n            isLeaderEditMode = false;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录详情';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.remove('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>当前为只读模式，仅可查看不可编辑';\r\n            document.getElementById('confirmBtn').style.display = 'none';\r\n            document.getElementById('uploadBtn').style.display = 'none';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationFormsReadOnly(data);\r\n            renderAttachmentsReadOnly(data);\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function editLeaderVerification(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = true;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录填报';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>组长填报模式：填写完成后点击提交';\r\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\r\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationForms();\r\n            renderAttachments();\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function confirmMemberVerification(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = false;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录确认';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>确认后该核查记录将不可再次修改';\r\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\r\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationForms();\r\n            renderAttachments();\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function renderSidebar(data) {\r\n            const sidebarContent = document.getElementById('sidebarContent');\r\n            sidebarContent.innerHTML = '';\r\n            \r\n            if (!data.records || data.records.length === 0) {\r\n                sidebarContent.innerHTML = '<div style=\"padding: 12px; color: #64748b; font-size: 13px;\">暂无记录</div>';\r\n                return;\r\n            }\r\n            \r\n            data.records.forEach((record, idx) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'sidebar-item ' + (idx === currentActivityIndex ? 'active' : '');\r\n                item.onclick = () => switchActivity(idx);\r\n                \r\n                const hasNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\r\n                const ncIcon = hasNC ? '<i class=\"fas fa-exclamation-circle\" style=\"color: #dc2626; margin-right: 4px;\"></i>' : '';\r\n                \r\n                item.innerHTML = `\r\n                    <div style=\"font-weight: 600; margin-bottom: 2px; color: ${idx === currentActivityIndex ? '#1d4ed8' : '#334155'};\">${ncIcon}${record.date} ${record.time}</div>\r\n                    <div style=\"color: ${idx === currentActivityIndex ? '#60a5fa' : '#94a3b8'}; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">${record.content || '未填写内容'}</div>\r\n                `;\r\n                sidebarContent.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function switchActivity(index) {\r\n            if (!isReadOnlyMode && currentVerificationIndex !== null) {\r\n                saveCurrentFormData();\r\n            }\r\n            \r\n            currentActivityIndex = index;\r\n            \r\n            document.querySelectorAll('.sidebar-item').forEach((item, idx) => {\r\n                item.classList.toggle('active', idx === index);\r\n            });\r\n            \r\n            if (isReadOnlyMode) {\r\n                renderVerificationFormsReadOnly(verificationData[currentVerificationIndex]);\r\n            } else {\r\n                renderVerificationForms();\r\n            }\r\n        }\r\n\r\n        function saveCurrentFormData() {\r\n            const data = verificationData[currentVerificationIndex];\r\n            if (!data.records || data.records.length === 0) return;\r\n            \r\n            const record = data.records[currentActivityIndex];\r\n            const dateTime = document.getElementById('recordDateTime')?.value.split(' ');\r\n            \r\n            if (dateTime && dateTime.length >= 2) {\r\n                record.date = dateTime[0];\r\n                record.time = dateTime.slice(1).join(' ');\r\n            }\r\n            \r\n            const decisionEl = document.getElementById('recordDecision');\r\n            if (decisionEl) record.decision = decisionEl.value;\r\n            \r\n            const contentEl = document.getElementById('recordContent');\r\n            if (contentEl) record.content = contentEl.value;\r\n            \r\n            const deptEl = document.getElementById('recordDept');\r\n            if (deptEl) record.dept = deptEl.value;\r\n            \r\n            const richEditor = document.getElementById('richEditor');\r\n            if (richEditor) record.record = richEditor.innerHTML;\r\n            \r\n            const ncFactEl = document.getElementById('nonConformityFact');\r\n            if (ncFactEl) record.nonConformityFact = ncFactEl.value;\r\n            \r\n            const ncClauseEl = document.getElementById('nonConformityClause');\r\n            if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\r\n        }\r\n\r\n        function handleDecisionChange() {\r\n            const decision = document.getElementById('recordDecision').value;\r\n            const ncSection = document.getElementById('nonConformitySection');\r\n            \r\n            if (decision === '轻微不符合' || decision === '严重不符合') {\r\n                if (!ncSection) {\r\n                    renderNonConformityFields();\r\n                }\r\n            } else {\r\n                if (ncSection) {\r\n                    ncSection.remove();\r\n                }\r\n            }\r\n        }\r\n\r\n        function renderNonConformityFields() {\r\n            const container = document.getElementById('verificationForms');\r\n            const ncSection = document.createElement('div');\r\n            ncSection.id = 'nonConformitySection';\r\n            ncSection.className = 'nonconformity-section';\r\n            \r\n            const record = verificationData[currentVerificationIndex].records[currentActivityIndex];\r\n            \r\n            ncSection.innerHTML = `\r\n                <div class=\"nonconformity-title\">\r\n                    <i class=\"fas fa-exclamation-triangle\"></i>\r\n                    不符合项信息\r\n                </div>\r\n                <div style=\"margin-bottom: 12px;\">\r\n                    <label class=\"form-label\">不符合事实 <span class=\"text-red-500\">*</span></label>\r\n                    <textarea class=\"form-input\" id=\"nonConformityFact\" rows=\"3\" placeholder=\"请详细描述不符合事实的具体情况...\">${record.nonConformityFact || ''}</textarea>\r\n                </div>\r\n                <div>\r\n                    <label class=\"form-label\">不符合条款 <span class=\"text-red-500\">*</span></label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"nonConformityClause
