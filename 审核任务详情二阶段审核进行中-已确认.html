t-item {\n            display: inline-flex;\n            align-items: center;\n            gap: 8px;\n            padding: 6px 12px;\n            background: #f0fdf4;\n            border: 1px solid #bbf7d0;\n            border-radius: 6px;\n            font-size: 12px;\n            color: #15803d;\n            font-weight: 500;\n        }\n        \n        .attachment-item i {\n            font-size: 14px;\n        }\n        \n        .attachment-item .remove {\n            cursor: pointer;\n            color: #6b7280;\n            margin-left: 4px;\n            width: 18px;\n            height: 18px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            border-radius: 50%;\n            transition: all 0.2s;\n        }\n        \n        .attachment-item .remove:hover {\n            color: #dc2626;\n            background: #fee2e2;\n        }\n        \n        .empty-state {\n            text-align: center;\n            padding: 48px;\n            color: #94a3b8;\n        }\n        \n        .empty-state i {\n            font-size: 48px;\n            margin-bottom: 16px;\n            color: #cbd5e1;\n        }\n\n        .nonconformity-section {\n            background: #fef2f2;\n            border: 1px solid #fecaca;\n            border-radius: 10px;\n            padding: 16px;\n            margin-top: 16px;\n            animation: slideDown 0.3s ease;\n        }\n\n        @keyframes slideDown {\n            from {\n                opacity: 0;\n                transform: translateY(-10px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n\n        .nonconformity-title {\n            font-size: 14px;\n            font-weight: 600;\n            color: #dc2626;\n            margin-bottom: 12px;\n            display: flex;\n            align-items: center;\n            gap: 6px;\n        }\n        \n        ::-webkit-scrollbar {\n            width: 8px;\n            height: 8px;\n        }\n        ::-webkit-scrollbar-track {\n            background: #f1f5f9;\n            border-radius: 4px;\n        }\n        ::-webkit-scrollbar-thumb {\n            background: #cbd5e1;\n            border-radius: 4px;\n        }\n        ::-webkit-scrollbar-thumb:hover {\n            background: #94a3b8;\n        }\n    </style>\n<style>\n  /* Unified task-detail interaction style: actions follow 实施记录, readonly follows 审核计划. */\n  html,\n  body {\n    width: 100% !important;\n    min-width: 0 !important;\n    max-width: 100% !important;\n    overflow-x: hidden !important;\n  }\n  body {\n    box-sizing: border-box !important;\n  }\n  *,\n  *::before,\n  *::after {\n    box-sizing: border-box !important;\n  }\n  .container-fixed,\n  .page-container,\n  .main-container,\n  .scheme-shell,\n  .project-header .container-fixed,\n  main.container-fixed {\n    width: 100% !important;\n    max-width: 100% !important;\n    min-width: 0 !important;\n  }\n  .container-fixed,\n  main.container-fixed {\n    padding-left: 16px !important;\n    padding-right: 16px !important;\n  }\n  .page-container {\n    padding-left: 16px !important;\n    padding-right: 16px !important;\n  }\n  .main-container {\n    padding-left: 16px !important;\n    padding-right: 16px !important;\n  }\n  .table-scroll,\n  .table-responsive {\n    width: 100% !important;\n    max-width: 100% !important;\n    overflow-x: auto !important;\n  }\n  .btn {\n    border-radius: 8px !important;\n    font-size: 12px !important;\n    font-weight: 500 !important;\n    transition: all 0.2s !important;\n  }\n  .btn-primary {\n    background: #2563eb !important;\n    border-color: #2563eb !important;\n    color: #fff !important;\n  }\n  .btn-primary:hover {\n    background: #1d4ed8 !important;\n    border-color: #1d4ed8 !important;\n    transform: translateY(-1px);\n    box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);\n  }\n  .btn-default {\n    background: #fff !important;\n    border-color: #d1d5db !important;\n    color: #374151 !important;\n  }\n  .btn-default:hover {\n    border-color: #9ca3af !important;\n    background: #f9fafb !important;\n  }\n  .btn-danger {\n    color: #dc2626 !important;\n    background: #fff !important;\n    border-color: #fca5a5 !important;\n  }\n  .btn-danger:hover {\n    background: #fef2f2 !important;\n    border-color: #dc2626 !important;\n  }\n  .form-input,\n  .form-select,\n  .form-textarea,\n  textarea,\n  select,\n  input[type=\"text\"],\n  input[type=\"number\"],\n  input[type=\"month\"],\n  input[type=\"date\"] {\n    border-radius: 8px !important;\n    transition: all 0.2s !important;\n  }\n  .form-input:hover,\n  .form-select:hover,\n  .form-textarea:hover,\n  textarea:hover,\n  select:hover,\n  input[type=\"text\"]:hover,\n  input[type=\"number\"]:hover,\n  input[type=\"month\"]:hover,\n  input[type=\"date\"]:hover {\n    border-color: #9ca3af !important;\n  }\n  .form-input:focus,\n  .form-select:focus,\n  .form-textarea:focus,\n  textarea:focus,\n  select:focus,\n  input[type=\"text\"]:focus,\n  input[type=\"number\"]:focus,\n  input[type=\"month\"]:focus,\n  input[type=\"date\"]:focus {\n    outline: none !important;\n    border-color: #3b82f6 !important;\n    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;\n  }\n  .data-table th {\n    background: #f8fafc !important;\n    color: #64748b !important;\n    font-weight: 600 !important;\n  }\n  .data-table tr:hover {\n    background: #eff6ff !important;\n  }\n  .data-table {\n    width: 100% !important;\n  }\n  .table-scroll > .data-table,\n  .table-responsive > .data-table {\n    min-width: 920px;\n  }\n  .content-card,\n  .card,\n  .site-card,\n  .domain-section,\n  .block {\n    max-width: 100% !important;\n  }\n  .info-grid,\n  .site-meta-grid,\n  .compact-row-2,\n  .compact-row-3,\n  .compact-row-4,\n  .team-readonly-summary,\n  .cert-grid {\n    max-width: 100% !important;\n  }\n  img,\n  svg,\n  canvas,\n  video {\n    max-width: 100% !important;\n  }\n  .readonly-display,\n  .readonly,\n  .info-value,\n  .cert-text,\n  .form-input[readonly],\n  .form-input:disabled,\n  input[readonly],\n  input:disabled,\n  textarea[readonly],\n  textarea:disabled {\n    background: #f9fafb !important;\n    border-color: #e2e8f0 !important;\n    color: #334155 !important;\n  }\n  .info-label,\n  .form-label,\n  .detail-label {\n    color: #94a3b8 !important;\n    font-size: 12px !important;\n    font-weight: 500 !important;\n  }\n</style>\n\n\n<style id=\"REMOVE_SUBMITTED_ACTION_TAG_STYLE\">\n  #verificationTableBody .action-btns .btn-success[disabled] { display: none !important; }\n</style>\n</head>\n<body>\n\n   \n\n    <main class=\"container-fixed\">\n        <!-- Tab 状态切换栏 -->\n        <div class=\"status-bar-container\">\n            <div class=\"tab-navigation\">\n                \n                <!-- 首次会议 -->\n                <div class=\"tab-item completed\" onclick=\"switchModule('first', this)\" data-module=\"first\">\n                    <div class=\"tab-header\">\n                        <div class=\"tab-title-wrapper\">\n                            <div class=\"tab-icon\">\n                                <i class=\"fas fa-handshake\"></i>\n                            </div>\n                            <span class=\"tab-text\">首次会议</span>\n                        </div>\n                        <span class=\"status-badge status-completed\">\n                            <i class=\"fas fa-check-circle text-xs\"></i>\n                            已完成\n                        </span>\n                    </div>\n                    <div class=\"tab-progress\">\n                        <div class=\"progress-bar-bg\">\n                            <div class=\"progress-bar-fill\" style=\"width: 100%; background: #22c55e;\"></div>\n                        </div>\n                    </div>\n                    <div class=\"tab-stats\">\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-check-square text-green-500 text-xs\"></i>\n                            <span>签到表：<span class=\"stat-value text-green-600\">已上传</span></span>\n                        </div>\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-clipboard-check text-green-500 text-xs\"></i>\n                            <span>确认项：<span class=\"stat-value text-green-600\">7/7</span></span>\n                        </div>\n                    </div>\n                </div>\n\n                <!-- 现场审核 -->\n                <div class=\"tab-item completed active\" onclick=\"switchModule('field', this)\" data-module=\"field\">\n                    <div class=\"tab-header\">\n                        <div class=\"tab-title-wrapper\">\n                            <div class=\"tab-icon\">\n                                <i class=\"fas fa-tasks\"></i>\n                            </div>\n                            <span class=\"tab-text\">现场审核</span>\n                        </div>\n                        <span class=\"status-badge status-completed\">\n                            <i class=\"fas fa-check-circle text-xs\"></i>\n                            已完成\n                        </span>\n                    </div>\n                    <div class=\"tab-progress\">\n                        <div class=\"progress-bar-bg\">\n                            <div class=\"progress-bar-fill\" style=\"width: 100%; background: #22c55e;\"></div>\n                        </div>\n                    </div>\n                    <div class=\"tab-stats\">\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-users text-blue-500 text-xs\"></i>\n                            <span>审核员：<span class=\"stat-value\">4人</span></span>\n                        </div>\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-file-alt text-blue-500 text-xs\"></i>\n                            <span>记录：<span class=\"stat-value\">12条</span></span>\n                        </div>\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-exclamation-triangle text-orange-500 text-xs\"></i>\n                            <span>不符合：<span class=\"stat-value text-orange-600\">2项</span></span>\n                        </div>\n                    </div>\n                </div>\n\n                <!-- 末次会议 -->\n                <div class=\"tab-item completed\" onclick=\"switchModule('last', this)\" data-module=\"last\">\n                    <div class=\"tab-header\">\n                        <div class=\"tab-title-wrapper\">\n                            <div class=\"tab-icon\">\n                                <i class=\"fas fa-flag-checkered\"></i>\n                            </div>\n                            <span class=\"tab-text\">末次会议</span>\n                        </div>\n                        <span class=\"status-badge status-completed\">\n                            <i class=\"fas fa-check-circle text-xs\"></i>\n                            已完成\n                        </span>\n                    </div>\n                    <div class=\"tab-progress\">\n                        <div class=\"progress-bar-bg\">\n                            <div class=\"progress-bar-fill\" style=\"width: 100%; background: #22c55e;\"></div>\n                        </div>\n                    </div>\n                    <div class=\"tab-stats\">\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-check-square text-green-500 text-xs\"></i>\n                            <span>签到表：<span class=\"stat-value text-green-600\">已上传</span></span>\n                        </div>\n                        <div class=\"stat-item\">\n                            <i class=\"fas fa-list-check text-green-500 text-xs\"></i>\n                            <span>确认项：<span class=\"stat-value text-green-600\">8/8</span></span>\n                        </div>\n                    </div>\n                </div>\n\n            </div>\n        </div>\n\n        <!-- 首次会议内容 -->\n        <div id=\"first-module\" class=\"module-content\">\n            <div class=\"content-card\">\n                <div class=\"card-header\">\n                    <div class=\"card-title\">\n                        <i class=\"fas fa-handshake text-blue-500\"></i>\n                        首次会议记录\n                    </div>\n                </div>\n                <div class=\"p-5\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;\">\n                        <div>\n                            <label class=\"form-label\">会议日期</label>\n                            <input type=\"date\" class=\"form-input\" value=\"2024-04-15\">\n                        </div>\n                        <div>\n                            <label class=\"form-label\">开始时间</label>\n                            <input type=\"time\" class=\"form-input\" value=\"09:00\">\n                        </div>\n                        <div>\n                            <label class=\"form-label\">结束时间</label>\n                            <input type=\"time\" class=\"form-input\" value=\"09:30\">\n                        </div>\n                    </div>\n\n                    <div class=\"meeting-notice notice-green\">\n                        <div class=\"notice-title\">\n                            <i class=\"fas fa-exclamation-circle\"></i>\n                            首次会议注意事项（请逐项勾选确认）\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice1\" checked>\n                            <label for=\"f_notice1\">介绍审核组成员及分工，确认审核计划安排</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice2\" checked>\n                            <label for=\"f_notice2\">确认审核目的、范围、准则及审核程序</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice3\" checked>\n                            <label for=\"f_notice3\">确认审核组与受审核方之间的沟通渠道</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice4\" checked>\n                            <label for=\"f_notice4\">确认审核组所需的资源和设施已齐备</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice5\" checked>\n                            <label for=\"f_notice5\">确认保密事宜及信息安全事项</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice6\" checked>\n                            <label for=\"f_notice6\">确认陪同人员安排及向导职责</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"f_notice7\" checked>\n                            <label for=\"f_notice7\">确认审核期间的安全事项和应急程序</label>\n                        </div>\n                    </div>\n\n                    <div style=\"margin-top: 24px;\">\n                        <label class=\"form-label\">\n                            <i class=\"fas fa-file-signature text-orange-500 mr-1\"></i>\n                            首次会议签到表扫描件\n                            <span class=\"text-red-500\">*</span>\n                        </label>\n                        <div class=\"upload-area hidden\" id=\"firstMeetingUpload\" aria-hidden=\"true\"></div>\n                        <input type=\"file\" id=\"firstMeetingFile\" style=\"display: none;\" disabled>\n                        <div id=\"firstMeetingFileList\">\n                            <div class=\"sign-uploaded readonly-sign-file\">\n                                <i class=\"fas fa-file-pdf\"></i>\n                                <span style=\"flex: 1;\">首次会议签到表扫描件.pdf (326KB)</span>\n                                <button type=\"button\" class=\"btn btn-default\" onclick=\"previewSignFile('first')\" style=\"padding: 4px 10px; font-size: 11px;\">\n                                    <i class=\"fas fa-eye text-xs\"></i>预览\n                                </button>\n                                <button type=\"button\" class=\"btn btn-default\" onclick=\"downloadSignFile('first')\" style=\"padding: 4px 10px; font-size: 11px;\">\n                                    <i class=\"fas fa-download text-xs\"></i>下载\n                                </button>\n                            </div>\n                        </div>\n                    </div>\n\n                    <div style=\"margin-top: 24px;\">\n                        <label class=\"form-label\">首次会议记录摘要</label>\n                        <textarea class=\"form-input\" rows=\"4\" placeholder=\"记录首次会议的重要讨论内容、确认事项及双方达成的共识...\"></textarea>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- 现场审核内容 -->\n        <div id=\"field-module\" class=\"module-content active\">\n            <div class=\"content-card\">\n                <div class=\"card-header\">\n                    <div class=\"card-title\">\n                        <i class=\"fas fa-tasks text-blue-500\"></i>\n                        审核人员核查记录执行情况\n                    </div>\n                    <div class=\"text-xs text-gray-500\">\n                        提示：组长和组员核查记录统一在此处管理，点击\"编辑/确认\"按钮进入详情进行填报或确认\n                    </div>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <table class=\"data-table border border-gray-200\">\n                        <thead>\n                            <tr>\n                                <th style=\"width: 100px;\">审核人员</th>\n                                <th style=\"width: 100px;\">组内身份</th>\n                                <th style=\"width: 220px; white-space: nowrap;\">审核日期区间</th>\n                                <th style=\"min-width: 120px;\">审核场所</th>\n                                <th style=\"width: 80px; text-align: center;\">优势亮点</th>\n                                <th style=\"width: 90px; text-align: center;\">轻微不符合</th>\n                                <th style=\"width: 80px; text-align: center;\">严重不符合</th>\n                                <th style=\"width: 90px;\">状态</th>\n                                <th style=\"width: 140px;\">提交时间</th>\n                                <th style=\"width: 220px;\">操作</th>\n                            </tr>\n                        </thead>\n                        <tbody id=\"verificationTableBody\"></tbody>\n                    </table>\n                </div>\n            </div>\n        </div>\n\n        <!-- 末次会议内容 -->\n        <div id=\"last-module\" class=\"module-content\">\n            <div class=\"content-card\">\n                <div class=\"card-header\">\n                    <div class=\"card-title\">\n                        <i class=\"fas fa-flag-checkered text-blue-500\"></i>\n                        末次会议记录\n                    </div>\n                </div>\n                <div class=\"p-5\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;\">\n                        <div>\n                            <label class=\"form-label\">会议日期</label>\n                            <input type=\"date\" class=\"form-input\" value=\"2024-04-18\">\n                        </div>\n                        <div>\n                            <label class=\"form-label\">开始时间</label>\n                            <input type=\"time\" class=\"form-input\" value=\"16:00\">\n                        </div>\n                        <div>\n                            <label class=\"form-label\">结束时间</label>\n                            <input type=\"time\" class=\"form-input\" value=\"17:00\">\n                        </div>\n                    </div>\n\n                    <div class=\"meeting-notice notice-blue\">\n                        <div class=\"notice-title\">\n                            <i class=\"fas fa-exclamation-circle\"></i>\n                            末次会议注意事项（请逐项勾选确认）\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice1\" checked>\n                            <label for=\"l_notice1\">感谢受审核方的配合与支持</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice2\" checked>\n                            <label for=\"l_notice2\">重申审核的抽样性质及局限性</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice3\" checked>\n                            <label for=\"l_notice3\">报告审核发现，包括符合项和不符合项</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice4\" checked>\n                            <label for=\"l_notice4\">确认不符合项的分类及后续整改要求</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice5\" checked>\n                            <label for=\"l_notice5\">报告审核结论及推荐意见</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice6\" checked>\n                            <label for=\"l_notice6\">说明审核后续活动安排及时间安排</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice7\" checked>\n                            <label for=\"l_notice7\">就审核证据与受审核方达成一致意见</label>\n                        </div>\n                        <div class=\"notice-item\">\n                            <input type=\"checkbox\" id=\"l_notice8\" checked>\n                            <label for=\"l_notice8\">受审核方对审核结果的意见反馈</label>\n                        </div>\n                    </div>\n\n                    <div style=\"margin-top: 24px;\">\n                        <label class=\"form-label\">\n                            <i class=\"fas fa-file-signature text-orange-500 mr-1\"></i>\n                            末次会议签到表扫描件\n                            <span class=\"text-red-500\">*</span>\n                        </label>\n                        <div class=\"upload-area hidden\" id=\"lastMeetingUpload\" aria-hidden=\"true\"></div>\n                        <input type=\"file\" id=\"lastMeetingFile\" style=\"display: none;\" disabled>\n                        <div id=\"lastMeetingFileList\">\n                            <div class=\"sign-uploaded readonly-sign-file\">\n                                <i class=\"fas fa-file-pdf\"></i>\n                                <span style=\"flex: 1;\">末次会议签到表扫描件.pdf (342KB)</span>\n                                <button type=\"button\" class=\"btn btn-default\" onclick=\"previewSignFile('last')\" style=\"padding: 4px 10px; font-size: 11px;\">\n                                    <i class=\"fas fa-eye text-xs\"></i>预览\n                                </button>\n                                <button type=\"button\" class=\"btn btn-default\" onclick=\"downloadSignFile('last')\" style=\"padding: 4px 10px; font-size: 11px;\">\n                                    <i class=\"fas fa-download text-xs\"></i>下载\n                                </button>\n                            </div>\n                        </div>\n                    </div>\n\n                    <div style=\"margin-top: 24px;\">\n                        <label class=\"form-label\">末次会议记录摘要</label>\n                        <textarea class=\"form-input\" rows=\"4\" placeholder=\"记录末次会议的重要讨论内容、确认的不符合项、整改要求及双方达成的共识...\"></textarea>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </main>\n\n    <!-- 核查记录编辑/确认弹窗 -->\n    <div class=\"modal-overlay\" id=\"verificationModal\">\n        <div class=\"modal-container\" style=\"max-width: 1600px;\">\n            <div class=\"modal-header\">\n                <div class=\"modal-title\">\n                    <i class=\"fas fa-clipboard-check text-blue-500 mr-2\"></i>\n                    <span id=\"modalTitle\">核查记录填报</span> - <span id=\"modalAuditorName\">审核人员</span>\n                    <span id=\"modalReadOnlyTag\" class=\"ml-2 px-2 py-0.5 bg-gray-100 text-gray-500 rounded text-xs font-medium hidden\">只读模式</span>\n                </div>\n                <button class=\"modal-close\" onclick=\"closeVerificationModal()\">\n                    <i class=\"fas fa-times\"></i>\n                </button>\n            </div>\n            \n            <div class=\"modal-body\">\n                <div class=\"modal-sidebar\">\n                    <div class=\"sidebar-title\">\n                        <i class=\"fas fa-list-ul mr-2\"></i>\n                        审核活动列表\n                    </div>\n                    <div id=\"sidebarContent\"></div>\n                </div>\n                \n                <div class=\"modal-main\">\n                    <div id=\"verificationForms\"></div>\n                    \n                    <div style=\"margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0;\">\n                        <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;\">\n                            <span class=\"form-label\" style=\"margin-bottom: 0;\">附件资料</span>\n                            <button class=\"btn btn-default btn-sm\" id=\"uploadBtn\" onclick=\"uploadAttachment()\">\n                                <i class=\"fas fa-upload text-xs\"></i>\n                                上传附件\n                            </button>\n                        </div>\n                        <div class=\"attachment-list\" id=\"attachmentList\"></div>\n                        <input type=\"file\" id=\"fileInputModal\" style=\"display: none;\" accept=\".doc,.docx,.pdf,.jpg,.jpeg,.png,.gif\" onchange=\"handleFileSelectModal(event)\" multiple>\n                    </div>\n                </div>\n            </div>\n            \n            <div class=\"modal-footer\">\n                <span class=\"text-sm text-gray-500 mr-auto\" id=\"modalHint\">\n                    <i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>\n                    填写完成后点击提交保存记录\n                </span>\n                <button class=\"btn btn-default\" onclick=\"closeVerificationModal()\">取消</button>\n                <button class=\"btn btn-primary\" id=\"confirmBtn\" onclick=\"saveVerificationRecords()\">\n                    <i class=\"fas fa-save text-xs\"></i>\n                    提交\n                </button>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        // ========== 全局数据 ==========\n        \n        // 会议签到表文件\n        let meetingFiles = {\n            first: null,\n            last: null\n        };\n\n        // 核查记录数据\n        let verificationData = [\n            { \n                auditorId: 'wurg', \n                auditorName: '武荣刚', \n                role: '组长', \n                roleTag: 'tag-leader',\n                dateRange: '2024-04-15 至 2024-04-18', \n                sites: '中心职能、场所1、场所2', \n                status: 'unsubmitted', \n                submitTime: '-',\n                records: [\n                    {\n                        date: '2024-04-15',\n                        time: '09:00-12:00',\n                        content: '组织环境 4.1-4.4',\n                        dept: '中心职能/管理层',\n                        record: '审核了公司管理体系的组织环境相关内容，与总经理进行了访谈，了解了管理承诺、方针目标的建立与实施情况。查阅了相关文件化信息，包括内外部环境因素识别表、相关方需求和期望清单等。',\n                        decision: '符合',\n                        standard: 'GB/T 19001-2016',\n                        nonConformityFact: '',\n                        nonConformityClause: ''\n                    },\n                    {\n                        date: '2024-04-15',\n                        time: '14:00-17:00',\n                        content: '领导作用和承诺 5.1-5.3',\n                        dept: '中心职能',\n                        record: '审核了管理层的领导作用和承诺，包括质量方针的制定与沟通、组织角色职责权限的确定。与部门负责人进行了访谈，检查了管理评审记录。',\n                        decision: '符合',\n                        standard: 'GB/T 19001-2016',\n                        nonConformityFact: '',\n                        nonConformityClause: ''\n                    },\n                    {\n                        date: '2024-04-16',\n                        time: '09:00-12:00',\n                        content: '环境因素识别 6.1.2',\n                        dept: '场所1/生产部门',\n                        record: '审核了生产现场的环境因素识别与评价过程，检查了重要环境因素清单及控制措施。现场查看了污染物排放控制情况，相关环保设施运行正常。',\n                        decision: '观察项',\n                        standard: 'GB/T 24001-2016',\n                        nonConformityFact: '',\n                        nonConformityClause: ''\n                    },\n                    {\n                        date: '2024-04-17',\n                        time: '09:00-12:00',\n                        content: '危险源辨识 6.1.2',\n                        dept: '场所2/安全管理部门',\n                        record: '审核了职业健康安全管理体系的危险源辨识、风险评价和控制措施的确定。检查了安全操作规程、应急预案及演练记录。现场查看了安全防护设施配置情况。',\n                        decision: '轻微不符合',\n                        standard: 'GB/T 45001-2020',\n                        nonConformityFact: '未提供2024年第一季度安全演练记录，无法证实应急预案的有效性验证。',\n                        nonConformityClause: 'GB/T 45001-2020 8.2'\n                    }\n                ],\n                attachments: []\n            },\n            { \n                auditorId: 'whw', \n                auditorName: '王洪伟', \n                role: '组员', \n                roleTag: 'tag-qms',\n                dateRange: '2024-04-15 至 2024-04-16', \n                sites: '场所1', \n                status: 'confirmed', \n                submitTime: '2024-04-16 17:45:00',\n                records: [\n                    { date: '2024-04-15', time: '09:00-12:00', content: '环境因素识别 6.1.2', dept: '环保部门', record: '审核了环境管理体系的环境因素识别过程...', decision: '符合', standard: 'GB/T 24001-2016', nonConformityFact: '', nonConformityClause: '' }\n                ],\n                attachments: []\n            },\n            { \n                auditorId: 'lz', \n                auditorName: '李战', \n                role: '组员', \n                roleTag: 'tag-qms',\n                dateRange: '2024-04-17 至 2024-04-18', \n                sites: '场所2', \n                status: 'unsubmitted', \n                submitTime: '-',\n                records: [],\n                attachments: []\n            },\n            { \n                auditorId: 'zq', \n                auditorName: '赵强', \n                role: '组员', \n                roleTag: 'tag-qms',\n                dateRange: '2024-04-17', \n                sites: '中心职能', \n                status: 'submitted', \n                submitTime: '2024-04-17 19:20:00',\n                records: [\n                    { date: '2024-04-17', time: '09:00-12:00', content: '职业健康安全风险识别 6.1.2', dept: '安全管理部门', record: '审核了职业健康安全管理体系的危险源辨识...', decision: '轻微不符合', standard: 'GB/T 45001-2020', nonConformityFact: '部分岗位安全风险告知卡缺失', nonConformityClause: 'GB/T 45001-2020 6.1.2' }\n                ],\n                attachments: []\n            }\n        ];\n\n        let currentVerificationIndex = null;\n        let currentActivityIndex = 0;\n        let isLeaderEditMode = false;\n        let isReadOnlyMode = false;\n\n        // ========== Tab 切换功能 ==========\n        \n        function switchModule(module, element) {\n            // 移除所有active类\n            document.querySelectorAll('.tab-item').forEach(tab => {\n                tab.classList.remove('active');\n            });\n            \n            // 隐藏所有内容模块\n            document.querySelectorAll('.module-content').forEach(content => {\n                content.classList.remove('active');\n            });\n            \n            // 添加active类到当前标签\n            element.classList.add('active');\n            \n            // 显示对应内容\n            document.getElementById(module + '-module').classList.add('active');\n            \n            console.log('切换到模块：' + module);\n        }\n\n        // ========== 首次会议 & 末次会议功能 ==========\n        \n        function uploadSignFile(type) {\n            document.getElementById(type + 'MeetingFile').click();\n        }\n\n        function handleSignUpload(event, type) {\n            const file = event.target.files[0];\n            if (!file) return;\n            \n            const validTypes = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];\n            if (!validTypes.includes(file.type)) {\n                alert('仅支持 PDF、JPG、PNG 格式文件');\n                return;\n            }\n            \n            if (file.size > 10 * 1024 * 1024) {\n                alert('文件大小不能超过10MB');\n                return;\n            }\n            \n            meetingFiles[type] = {\n                name: file.name,\n                size: (file.size / 1024).toFixed(2) + 'KB',\n                type: file.type\n            };\n            \n            const uploadArea = document.getElementById(type + 'MeetingUpload');\n            const fileList = document.getElementById(type + 'MeetingFileList');\n            \n            uploadArea.classList.add('hidden');\n            fileList.classList.remove('hidden');\n            \n            let icon = 'fa-file-pdf';\n            if (file.type.startsWith('image/')) icon = 'fa-file-image';\n            \n            fileList.innerHTML = `\n                <div class=\"sign-uploaded\">\n                    <i class=\"fas ${icon}\"></i>\n                    <span style=\"flex: 1;\">${file.name} (${(file.size / 1024).toFixed(2)}KB)</span>\n                    <button class=\"btn btn-default\" onclick=\"previewSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px;\">\n                        <i class=\"fas fa-eye text-xs\"></i>预览\n                    </button>\n                    <button class=\"btn btn-default\" onclick=\"deleteSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px; color: #dc2626; border-color: #fca5a5;\">\n                        <i class=\"fas fa-trash text-xs\"></i>删除\n                    </button>\n                </div>\n            `;\n            \n            showToast('签到表上传成功', 'success');\n        }\n\n        function previewSignFile(type) {\n            const file = meetingFiles[type];\n            if (file) {\n                showToast('预览: ' + file.name, 'info');\n            }\n        }\n\n        function deleteSignFile(type) {\n            if (!confirm('确定删除该签到表吗？')) return;\n            \n            meetingFiles[type] = null;\n            \n            const uploadArea = document.getElementById(type + 'MeetingUpload');\n            const fileList = document.getElementById(type + 'MeetingFileList');\n            \n            uploadArea.classList.remove('hidden');\n            uploadArea.classList.remove('has-file');\n            fileList.classList.add('hidden');\n            fileList.innerHTML = '';\n            \n            showToast('签到表已删除', 'success');\n        }\n\n        // ========== 现场审核功能 ==========\n        \n        function calculateProgressStats(records) {\n            if (!records || records.length === 0) {\n                return { conform: 0, observation: 0, minor: 0, serious: 0, total: 0 };\n            }\n            \n            const stats = {\n                conform: 0,\n                observation: 0,\n                minor: 0,\n                serious: 0,\n                total: records.length\n            };\n            \n            records.forEach(record => {\n                switch(record.decision) {\n                    case '符合':\n                        stats.conform++;\n                        break;\n                    case '观察项':\n                        stats.observation++;\n                        break;\n                    case '轻微不符合':\n                        stats.minor++;\n                        break;\n                    case '严重不符合':\n                        stats.serious++;\n                        break;\n                }\n            });\n            \n            return stats;\n        }\n\n        function renderStatNumber(value, type) {\n            if (value === 0) {\n                return `<span class=\"stat-number stat-zero\">-</span>`;\n            }\n            \n            let colorClass = '';\n            switch(type) {\n                case 'conform':\n                    colorClass = 'color: #15803d; background: #f0fdf4; border: 1px solid #bbf7d0;';\n                    break;\n                case 'observation':\n                    colorClass = 'color: #92400e; background: #fef3c7; border: 1px solid #fcd34d;';\n                    break;\n                case 'minor':\n                    colorClass = 'color: #dc2626; background: #fef2f2; border: 1px solid #fecaca;';\n                    break;\n                case 'serious':\n                    colorClass = 'color: #991b1b; background: #fee2e2; border: 1px solid #fca5a5;';\n                    break;\n            }\n            \n            return `<span class=\"stat-number\" style=\"${colorClass}\">${value}</span>`;\n        }\n\n        function renderProgressBar(records) {\n            if (!records || records.length === 0) {\n                return `\n                    <div class=\"progress-bar-container\" title=\"未开始填报\">\n                        <div class=\"progress-bar-fill-table empty\"></div>\n                    </div>\n                `;\n            }\n            \n            const count = records.length;\n            const baseCount = 5;\n            const percentage = Math.min((count / baseCount) * 100, 100);\n            \n            let fillClass = 'low';\n            if (percentage >= 100) fillClass = 'full';\n            else if (percentage >= 80) fillClass = 'high';\n            else if (percentage >= 40) fillClass = 'medium';\n            \n            return `\n                <div class=\"progress-bar-container\" title=\"已填报 ${count} 条核查记录\">\n                    <div class=\"progress-bar-fill-table ${fillClass}\" style=\"width: ${percentage}%\">\n                    </div>\n                </div>\n            `;\n        }\n\n        function renderVerificationTable() {\n            const tbody = document.getElementById('verificationTableBody');\n            tbody.innerHTML = '';\n            \n            verificationData.forEach((item, index) => {\n                const tr = document.createElement('tr');\n                \n                let statusBadge = '';\n                if (item.status === 'unsubmitted') {\n                    statusBadge = '<span class=\"status-badge-table badge-draft\">未提交</span>';\n                } else if (item.status === 'submitted') {\n                    statusBadge = '<span class=\"status-badge-table badge-processing\">已提交</span>';\n                } else if (item.status === 'confirmed') {\n                    statusBadge = '<span class=\"status-badge-table badge-success\">已确认</span>';\n                }\n                \n                const stats = calculateProgressStats(item.records);\n                \n                let actionBtns = '<div class=\"action-btns\">';\n                \n                actionBtns += `<button class=\"btn btn-info btn-sm\" onclick=\"viewVerificationDetails(${index})\">\n                    <i class=\"fas fa-eye text-xs\"></i>\n                    查看详情\n                </button>`;\n                \n                if (item.role === '组长') {\n                    if (item.status === 'unsubmitted') {\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"editLeaderVerification(${index})\">\n                            <i class=\"fas fa-edit text-xs\"></i>\n                            编辑\n                        </button>`;\n                    } else { }\n                } else {\n                    if (item.status === 'submitted') {\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"confirmMemberVerification(${index})\">\n                            <i class=\"fas fa-check-circle text-xs\"></i>\n                            核查记录确认\n                        </button>`;\n                    } else if (item.status === 'confirmed') {\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\n                            <i class=\"fas fa-check text-xs\"></i>\n                            已确认\n                        </button>`;\n                    } else {\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\n                            <i class=\"fas fa-clock text-xs\"></i>\n                            等待提交\n                        </button>`;\n                    }\n                }\n                \n                actionBtns += '</div>';\n                \n                tr.innerHTML = `\n                    <td class=\"font-medium\">${item.auditorName}</td>\n                    <td><span class=\"personnel-tag ${item.roleTag}\">${item.role}</span></td>\n                    <td style=\"white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\" title=\"${item.dateRange}\">${item.dateRange}</td>\n                    <td>${item.sites}</td>\n                    <td>${renderProgressBar(item.records)}</td>\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.conform, 'conform')}</td>\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.observation, 'observation')}</td>\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.minor, 'minor')}</td>\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.serious, 'serious')}</td>\n                    <td>${statusBadge}</td>\n                    <td class=\"text-gray-500\">${item.submitTime}</td>\n                    <td>${actionBtns}</td>\n                `;\n                \n                tbody.appendChild(tr);\n            });\n        }\n\n        function viewVerificationDetails(index) {\n            currentVerificationIndex = index;\n            const data = verificationData[index];\n            currentActivityIndex = 0;\n            isReadOnlyMode = true;\n            isLeaderEditMode = false;\n            \n            document.getElementById('modalTitle').textContent = '核查记录详情';\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\n            document.getElementById('modalReadOnlyTag').classList.remove('hidden');\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>当前为只读模式，仅可查看不可编辑';\n            document.getElementById('confirmBtn').style.display = 'none';\n            document.getElementById('uploadBtn').style.display = 'none';\n            \n            renderSidebar(data);\n            renderVerificationFormsReadOnly(data);\n            renderAttachmentsReadOnly(data);\n            \n            document.getElementById('verificationModal').classList.add('show');\n            document.body.style.overflow = 'hidden';\n        }\n\n        function editLeaderVerification(index) {\n            currentVerificationIndex = index;\n            const data = verificationData[index];\n            currentActivityIndex = 0;\n            isReadOnlyMode = false;\n            isLeaderEditMode = true;\n            \n            document.getElementById('modalTitle').textContent = '核查记录填报';\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>组长填报模式：填写完成后点击提交';\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\n            \n            renderSidebar(data);\n            renderVerificationForms();\n            renderAttachments();\n            \n            document.getElementById('verificationModal').classList.add('show');\n            document.body.style.overflow = 'hidden';\n        }\n\n        function confirmMemberVerification(index) {\n            currentVerificationIndex = index;\n            const data = verificationData[index];\n            currentActivityIndex = 0;\n            isReadOnlyMode = false;\n            isLeaderEditMode = false;\n            \n            document.getElementById('modalTitle').textContent = '核查记录确认';\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>确认后该核查记录将不可再次修改';\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\n            \n            renderSidebar(data);\n            renderVerificationForms();\n            renderAttachments();\n            \n            document.getElementById('verificationModal').classList.add('show');\n            document.body.style.overflow = 'hidden';\n        }\n\n        function renderSidebar(data) {\n            const sidebarContent = document.getElementById('sidebarContent');\n            sidebarContent.innerHTML = '';\n            \n            if (!data.records || data.records.length === 0) {\n                sidebarContent.innerHTML = '<div style=\"padding: 12px; color: #64748b; font-size: 13px;\">暂无记录</div>';\n                return;\n            }\n            \n            data.records.forEach((record, idx) => {\n                const item = document.createElement('div');\n                item.className = 'sidebar-item ' + (idx === currentActivityIndex ? 'active' : '');\n                item.onclick = () => switchActivity(idx);\n                \n                const hasNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\n                const ncIcon = hasNC ? '<i class=\"fas fa-exclamation-circle\" style=\"color: #dc2626; margin-right: 4px;\"></i>' : '';\n                \n                item.innerHTML = `\n                    <div style=\"font-weight: 600; margin-bottom: 2px; color: ${idx === currentActivityIndex ? '#1d4ed8' : '#334155'};\">${ncIcon}${record.date} ${record.time}</div>\n                    <div style=\"color: ${idx === currentActivityIndex ? '#60a5fa' : '#94a3b8'}; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">${record.content || '未填写内容'}</div>\n                `;\n                sidebarContent.appendChild(item);\n            });\n        }\n\n        function switchActivity(index) {\n            if (!isReadOnlyMode && currentVerificationIndex !== null) {\n                saveCurrentFormData();\n            }\n            \n            currentActivityIndex = index;\n            \n            document.querySelectorAll('.sidebar-item').forEach((item, idx) => {\n                item.classList.toggle('active', idx === index);\n            });\n            \n            if (isReadOnlyMode) {\n                renderVerificationFormsReadOnly(verificationData[currentVerificationIndex]);\n            } else {\n                renderVerificationForms();\n            }\n        }\n\n        function saveCurrentFormData() {\n            const data = verificationData[currentVerificationIndex];\n            if (!data.records || data.records.length === 0) return;\n            \n            const record = data.records[currentActivityIndex];\n            const dateTime = document.getElementById('recordDateTime')?.value.split(' ');\n            \n            if (dateTime && dateTime.length >= 2) {\n                record.date = dateTime[0];\n                record.time = dateTime.slice(1).join(' ');\n            }\n            \n            const decisionEl = document.getElementById('recordDecision');\n            if (decisionEl) record.decision = decisionEl.value;\n            \n            const contentEl = document.getElementById('recordContent');\n            if (contentEl) record.content = contentEl.value;\n            \n            const deptEl = document.getElementById('recordDept');\n            if (deptEl) record.dept = deptEl.value;\n            \n            const richEditor = document.getElementById('richEditor');\n            if (richEditor) record.record = richEditor.innerHTML;\n            \n            const ncFactEl = document.getElementById('nonConformityFact');\n            if (ncFactEl) record.nonConformityFact = ncFactEl.value;\n            \n            const ncClauseEl = document.getElementById('nonConformityClause');\n            if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\n        }\n\n        function handleDecisionChange() {\n            const decision = document.getElementById('recordDecision').value;\n            const ncSection = document.getElementById('nonConformitySection');\n            \n            if (decision === '轻微不符合' || decision === '严重不符合') {\n                if (!ncSection) {\n                    renderNonConformityFields();\n                }\n            } else {\n                if (ncSection) {\n                    ncSection.remove();\n                }\n            }\n        }\n\n        function renderNonConformityFields() {\n            const container = document.getElementById('verificationForms');\n            const ncSection = document.createElement('div');\n            ncSection.id = 'nonConformitySection';\n            ncSection.className = 'nonconformity-section';\n            \n            const record = verificationData[currentVerificationIndex].records[currentActivityIndex];\n            \n            ncSection.innerHTML = `\n                <div class=\"nonconformity-title\">\n                    <i class=\"fas fa-exclamation-triangle\"></i>\n                    不符合项信息\n                </div>\n                <div style=\"margin-bottom: 12px;\">\n                    <label class=\"form-label\">不符合事实 <span class=\"text-red-500\">*</span></label>\n                    <textarea class=\"form-input\" id=\"nonConformityFact\" rows=\"3\" placeholder=\"请详细描述不符合事实的具体情况...\">${record.nonConformityFact || ''}</textarea>\n                </div>\n                <div>\n                    <label class=\"form-label\">不符合条款 <span class=\"text-red-500\">*</span></label>\n                    <input type=\"text\" class=\"form-input\" id=\"nonConformityClause\" value=\"${record.nonConformityClause || ''}\" placeholder=\"如：GB/T 19001-2016 8.5.1\">\n                </div>\n            `;\n            \n            container.appendChild(ncSection);\n        }\n\n        function renderVerificationForms() {\n            const container = document.getElementById('verificationForms');\n            const data = verificationData[currentVerificationIndex];\n            \n            if (!data.records || data.records.length === 0) {\n                container.innerHTML = '<div class=\"empty-state\"><i class=\"fas fa-inbox\"></i><p>暂无核查记录</p></div>';\n                return;\n            }\n            \n            const record = data.records[currentActivityIndex];\n            \n            container.innerHTML = `\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;\">\n                    <div>\n                        <label class=\"form-label\">日期/时间</label>\n                        <input type=\"text\" class=\"form-input\" id=\"recordDateTime\" value=\"${record.date} ${record.time}\" placeholder=\"如：2024-04-15 09:00-12:00\">\n                    </div>\n                    <div>\n                        <label class=\"form-label\">判定</label>\n                        <select class=\"form-input\" id=\"recordDecision\" onchange=\"handleDecisionChange()\">\n                            <option value=\"符合\" ${record.decision === '符合' ? 'selected' : ''}>符合</option>\n                            <option value=\"观察项\" ${record.decision === '观察项' ? 'selected' : ''}>观察项</option>\n                            <option value=\"轻微不符合\" ${record.decision === '轻微不符合' ? 'selected' : ''}>轻微不符合</option>\n                            <option value=\"严重不符合\" ${record.decision === '严重不符合' ? 'selected' : ''}>严重不符合</option>\n                        </select>\n                    </div>\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\n                    <input type=\"text\" class=\"form-input\" id=\"recordContent\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" placeholder=\"如：组织环境 4.1-4.4 GB/T 19001-2016\">\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">涉及部门/场所</label>\n                    <input type=\"text\" class=\"form-input\" id=\"recordDept\" value=\"${record.dept}\" style=\"width: 100%;\" placeholder=\"涉及部门/场所\">\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">审核记录 <span class=\"text-red-500\">*</span></label>\n                    <div class=\"rich-editor\">\n                        <div class=\"rich-editor-toolbar\">\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('bold')\" title=\"加粗\"><i class=\"fas fa-bold\"></i></button>\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('italic')\" title=\"斜体\"><i class=\"fas fa-italic\"></i></button>\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('underline')\" title=\"下划线\"><i class=\"fas fa-underline\"></i></button>\n                            <div style=\"width: 1px; height: 20px; background: #e2e8f0; margin: 0 4px;\"></div>\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"insertImage()\" title=\"插入图片\"><i class=\"fas fa-image\"></i></button>\n                        </div>\n                        <div class=\"rich-editor-content\" contenteditable=\"true\" id=\"richEditor\">\n                            ${record.record}\n                        </div>\n                    </div>\n                </div>\n            `;\n            \n            if (record.decision === '轻微不符合' || record.decision === '严重不符合') {\n                renderNonConformityFields();\n            }\n        }\n\n        function renderVerificationFormsReadOnly(data) {\n            const container = document.getElementById('verificationForms');\n            \n            if (!data.records || data.records.length === 0) {\n                container.innerHTML = '<div class=\"empty-state\"><i class=\"fas fa-inbox\"></i><p>暂无核查记录</p></div>';\n                return;\n            }\n            \n            const record = data.records[currentActivityIndex];\n            const isNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\n            \n            let ncHtml = '';\n            if (isNC) {\n                ncHtml = `\n                    <div class=\"nonconformity-section\" style=\"margin-top: 16px;\">\n                        <div class=\"nonconformity-title\">\n                            <i class=\"fas fa-exclamation-triangle\"></i>\n                            不符合项信息\n                        </div>\n                        <div style=\"margin-bottom: 12px;\">\n                            <label class=\"form-label\">不符合事实</label>\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6;\">\n                                ${record.nonConformityFact || '<span style=\"color: #94a3b8;\">无</span>'}\n                            </div>\n                        </div>\n                        <div>\n                            <label class=\"form-label\">不符合条款</label>\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px;\">\n                                ${record.nonConformityClause || '<span style=\"color: #94a3b8;\">无</span>'}\n                            </div>\n                        </div>\n                    </div>\n                `;\n            }\n            \n            container.innerHTML = `\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;\">\n                    <div>\n                        <label class=\"form-label\">日期/时间</label>\n                        <input type=\"text\" class=\"form-input\" value=\"${record.date} ${record.time}\" readonly style=\"background: #f8fafc;\">\n                    </div>\n                    <div>\n                        <label class=\"form-label\">判定</label>\n                        <input type=\"text\" class=\"form-input\" value=\"${record.decision}\" readonly style=\"background: #f8fafc; ${isNC ? 'color: #dc2626; font-weight: 600;' : ''}\">\n                    </div>\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\n                    <input type=\"text\" class=\"form-input\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">涉及部门/场所</label>\n                    <input type=\"text\" class=\"form-input\" value=\"${record.dept}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\n                </div>\n                \n                <div style=\"margin-bottom: 16px;\">\n                    <label class=\"form-label\">审核记录</label>\n                    <div style=\"min-height: 200px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.7; color: #334155;\">\n                        ${record.record || '<span style=\"color: #94a3b8;\">无记录内容</span>'}\n                    </div>\n                </div>\n                ${ncHtml}\n            `;\n        }\n\n        function execCmd(command) {\n            document.execCommand(command, false, null);\n            document.getElementById('richEditor').focus();\n        }\n\n        function insertImage() {\n            const url = prompt('请输入图片URL:');\n            if (url) {\n                document.execCommand('insertImage', false, url);\n            }\n        }\n\n        function renderAttachments() {\n            const container = document.getElementById('attachmentList');\n            const data = verificationData[currentVerificationIndex];\n            \n            container.innerHTML = '';\n            \n            data.attachments.forEach((att, index) => {\n                const item = document.createElement('div');\n                item.className = 'attachment-item';\n                \n                let icon = 'fa-file';\n                if (att.type === 'word') icon = 'fa-file-word';\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\n                if (att.type === 'image') icon = 'fa-file-image';\n                \n                item.innerHTML = `\n                    <i class=\"fas ${icon}\"></i>\n                    <span>${att.name}</span>\n                    <span class=\"remove\" onclick=\"removeAttachment(${index})\"><i class=\"fas fa-times\"></i></span>\n                `;\n                \n                container.appendChild(item);\n            });\n        }\n\n        function renderAttachmentsReadOnly(data) {\n            const container = document.getElementById('attachmentList');\n            container.innerHTML = '';\n            \n            if (!data.attachments || data.attachments.length === 0) {\n                container.innerHTML = '<span style=\"color: #94a3b8; font-size: 13px;\">无附件</span>';\n                return;\n            }\n            \n            data.attachments.forEach((att) => {\n                const item = document.createElement('div');\n                item.className = 'attachment-item';\n                item.style.cursor = 'default';\n                \n                let icon = 'fa-file';\n                if (att.type === 'word') icon = 'fa-file-word';\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\n                if (att.type === 'image') icon = 'fa-file-image';\n                \n                item.innerHTML = `\n                    <i class=\"fas ${icon}\"></i>\n                    <span>${att.name}</span>\n                `;\n                \n                container.appendChild(item);\n            });\n        }\n\n        function uploadAttachment() {\n            document.getElementById('fileInputModal').click();\n        }\n\n        function handleFileSelectModal(event) {\n            const files = event.target.files;\n            const data = verificationData[currentVerificationIndex];\n            \n            for (let file of files) {\n                let type = 'file';\n                if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) type = 'word';\n                else if (file.name.endsWith('.pdf')) type = 'pdf';\n                else if (file.name.match(/\\.(jpg|jpeg|png|gif)$/)) type = 'image';\n                \n                data.attachments.push({ name: file.name, type: type });\n            }\n            \n            renderAttachments();\n            event.target.value = '';\n        }\n\n        function removeAttachment(index) {\n            if (confirm('确定删除该附件吗？')) {\n                verificationData[currentVerificationIndex].attachments.splice(index, 1);\n                renderAttachments();\n            }\n        }\n\n        function saveVerificationRecords() {\n            const data = verificationData[currentVerificationIndex];\n            \n            if (!isReadOnlyMode && data.records && data.records.length > 0) {\n                const record = data.records[currentActivityIndex];\n                const dateTime = document.getElementById('recordDateTime').value.split(' ');\n                \n                if (dateTime.length >= 2) {\n                    record.date = dateTime[0];\n                    record.time = dateTime.slice(1).join(' ');\n                }\n                \n                record.decision = document.getElementById('recordDecision').value;\n                record.content = document.getElementById('recordContent').value;\n                record.dept = document.getElementById('recordDept').value;\n                record.record = document.getElementById('richEditor').innerHTML;\n                \n                const ncFactEl = document.getElementById('nonConformityFact');\n                const ncClauseEl = document.getElementById('nonConformityClause');\n                if (ncFactEl) record.nonConformityFact = ncFactEl.value;\n                if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\n            }\n            \n            const hasEmptyRecord = data.records.some(r => !r.record || r.record.trim() === '');\n            if (hasEmptyRecord) {\n                alert('请填写所有审核记录的内容');\n                return;\n            }\n            \n            const hasEmptyNC = data.records.some(r => {\n                if (r.decision === '轻微不符合' || r.decision === '严重不符合') {\n                    return !r.nonConformityFact || !r.nonConformityClause;\n                }\n                return false;\n            });\n            if (hasEmptyNC) {\n                alert('请填写所有不符合项的事实和条款');\n                return;\n            }\n            \n            if (isLeaderEditMode) {\n                if (!confirm('确定提交组长核查记录吗？')) return;\n                data.status = 'submitted';\n                data.submitTime = new Date().toLocaleString('zh-CN');\n                showToast('组长核查记录已提交', 'success');\n            } else {\n                if (!confirm('确定确认该核查记录吗？确认后将不可再次修改。')) return;\n                data.status = 'confirmed';\n                showToast('核查记录已确认', 'success');\n            }\n            \n            renderVerificationTable();\n            closeVerificationModal();\n        }\n\n        function closeVerificationModal() {\n            document.getElementById('verificationModal').classList.remove('show');\n            document.body.style.overflow = '';\n            currentVerificationIndex = null;\n            isReadOnlyMode = false;\n            isLeaderEditMode = false;\n        }\n\n        // ========== 通用功能 ==========\n        \n        function switchNode(index) {\n            if (index !== 2) {\n                alert('当前示例仅展示\"审核任务中\"节点内容');\n                return;\n            }\n        }\n\n        function goBack() {\n            if (confirm('确定返回列表页？未保存的数据将丢失。')) {\n                console.log('返回列表页');\n            }\n        }\n\n        function saveAll() {\n            showToast('保存成功', 'success');\n        }\n\n        function showToast(message, type) {\n            const toast = document.createElement('div');\n            const bgColor = type === 'success' ? '#10b981' : '#3b82f6';\n            const icon = type === 'success' ? 'fa-check-circle' : 'fa-info-circle';\n            \n            toast.style.cssText = `position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: ${bgColor}; color: white; padding: 12px 24px; border-radius: 10px; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px;`;\n            toast.innerHTML = `<i class=\"fas ${icon}\"></i><span>${message}</span>`;\n            \n            document.body.appendChild(toast);\n            setTimeout(() => {\n                toast.style.opacity = '0';\n                toast.style.transition = 'opacity 0.3s';\n                setTimeout(() => toast.remove(), 300);\n            }, 3000);\n        }\n\n        // ========== 初始化 ==========\n        \n        document.addEventListener('DOMContentLoaded', function() {\n            renderVerificationTable();\n            \n            // 点击弹窗外部关闭\n            document.getElementById('verificationModal').addEventListener('click', function(e) {\n                if (e.target === this) {\n                    closeVerificationModal();\n                }\n            });\n        });\n    <\/script>\n<script>\n(function () {\n  function wrapTables() {\n    document.querySelectorAll('table.data-table').forEach(function (table) {\n      if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;\n      var wrapper = document.createElement('div');\n      wrapper.className = 'table-scroll';\n      table.parentNode.insertBefore(wra
