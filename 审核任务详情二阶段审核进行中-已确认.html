ize:14px; font-weight:700; }\n    .return-reason-textarea { width:100%; min-height:118px; border:1px solid #cbd5e1; border-radius:8px; padding:10px 12px; color:#0f172a; font:inherit; font-size:13px; line-height:1.6; resize:vertical; outline:none; }\n    .return-reason-textarea:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }\n\n\n  </style>\n\n<style id=\"NC_VISIBLE_CLOSE_BUTTON_PATCH\">\n  .pdf-modal-close {\n    width: auto !important;\n    min-width: 72px !important;\n    height: 34px !important;\n    padding: 0 12px !important;\n    border: 1px solid #fecaca !important;\n    border-radius: 8px !important;\n    background: #fef2f2 !important;\n    color: #dc2626 !important;\n    display: inline-flex !important;\n    align-items: center !important;\n    justify-content: center !important;\n    gap: 6px !important;\n    font-weight: 800 !important;\n    box-shadow: 0 1px 2px rgba(220, 38, 38, 0.10) !important;\n  }\n  .pdf-modal-close:hover {\n    background: #fee2e2 !important;\n    border-color: #fca5a5 !important;\n    color: #b91c1c !important;\n  }\n  .sign-modal-close {\n    background: #eff6ff !important;\n    border: 1px solid #bfdbfe !important;\n    color: #2563eb !important;\n  }\n  .sign-modal-close:hover {\n    background: #dbeafe !important;\n    border-color: #93c5fd !important;\n    color: #1d4ed8 !important;\n  }\n</style>\n\n</head>\n<body>\n  <div class=\"page-shell\">\n    <header class=\"top-bar\">\n      <div class=\"page-title\">\n        <i class=\"fas fa-triangle-exclamation\"></i>\n        <span>不符合项报告</span>\n      </div>\n    </header>\n\n    <main class=\"content\">\n      <section class=\"nc-list\" id=\"ncList\"></section>\n    </main>\n  </div>\n\n  <div class=\"modal-mask\" id=\"rejectModal\" onclick=\"maskClose(event, 'rejectModal')\">\n    <div class=\"modal return-modal\" onclick=\"event.stopPropagation()\">\n      <div class=\"modal-head\">\n        <div>\n          <div class=\"return-modal-title\"><i class=\"fas fa-reply\"></i> 退回原因</div>\n          <div class=\"return-modal-subtitle\">退回后系统保留当前不符合项报告内容，等待重新调整后再次提交。</div>\n        </div>\n        <button type=\"button\" class=\"return-modal-close\" onclick=\"closeRejectModal()\" aria-label=\"关闭\">×</button>\n      </div>\n      <div class=\"modal-body\">\n        <label class=\"form-label\" for=\"rejectReasonInput\">请填写或者查看本次退回原因</label>\n        <textarea class=\"return-reason-textarea\" id=\"rejectReasonInput\" placeholder=\"请输入退回原因\"></textarea>\n        <div class=\"return-tip\"><i class=\"fas fa-circle-info\"></i><span>点击“确认退回”后，系统将记录退回原因和退回时间；客户退回时返回至第一个审核员签字环节。</span></div>\n      </div>\n      <div class=\"modal-foot\">\n        <button class=\"btn\" onclick=\"closeRejectModal()\">取消</button>\n        <button class=\"btn btn-danger\" onclick=\"confirmReject()\">确认退回</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"modal-mask\" id=\"attachmentPreviewModal\" onclick=\"maskClose(event, 'attachmentPreviewModal')\">\n    <div class=\"modal\" onclick=\"event.stopPropagation()\">\n      <div class=\"modal-head\">\n        <span><i class=\"fas fa-eye\"></i> 附件预览</span>\n        <button class=\"btn btn-link danger\" onclick=\"closeAttachmentPreviewModal()\"><i class=\"fas fa-times\"></i></button>\n      </div>\n      <div class=\"modal-body\">\n        <div class=\"preview-box\" id=\"attachmentPreviewBox\"></div>\n      </div>\n      <div class=\"modal-foot\">\n        <button class=\"btn\" onclick=\"closeAttachmentPreviewModal()\">关闭</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"modal-mask\" id=\"onlineSignModal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"onlineSignTitle\">\n    <div class=\"sign-modal-card\" onclick=\"event.stopPropagation()\">\n      <div class=\"sign-modal-header\">\n        <div>\n          <div class=\"sign-modal-title\" id=\"onlineSignTitle\"><i class=\"fas fa-stamp\" style=\"color:#2563eb;\"></i>线上签章确认</div>\n          <div class=\"sign-modal-subtitle\">以不符合项报告 PDF 内容发起个人签章，签章完成后自动流转至下一节点。</div>\n        </div>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span class=\"sign-status-pill sign-status-pending\" id=\"modalSignStatus\"><i class=\"fas fa-clock\"></i>待签章</span>\n        </div>\n      </div>\n      <div class=\"sign-modal-body\">\n        <div class=\"sign-platform-card\">\n          <div class=\"sign-platform-info\">\n            <div>\n              <small>当前不符合项报告</small>\n              <strong id=\"modalReportNo\">NC-20260623-001</strong>\n            </div>\n            <div>\n              <small>当前签字节点</small>\n              <strong id=\"modalNodeName\">审核员签字</strong>\n            </div>\n            <div style=\"text-align:right;\">\n              <small>签章人</small>\n              <strong id=\"modalSigner\">王审核</strong>\n            </div>\n          </div>\n          <div id=\"signHelpText\" style=\"color:#475569;font-size:13px;line-height:1.65;\">当前文件将以不符合项报告 PDF 样式提交线上签章，完成后在 PDF 预览中生成该节点签署后的 PDF 文件版本。</div>\n          <div class=\"sign-mode-box\" id=\"customerSignModeBox\" style=\"display:none;\">\n            <div class=\"sign-mode-title\"><i class=\"fas fa-signature\"></i>客户签字方式</div>\n            <div class=\"sign-mode-tabs\">\n              <button type=\"button\" class=\"sign-mode-tab active\" id=\"onlineModeBtn\" onclick=\"selectCustomerSignMode('online')\">\n                <strong><i class=\"fas fa-cloud-arrow-up\"></i>线上签章</strong>\n                <span>调用线上签章平台完成客户签章，系统自动生成客户线上签章版 PDF。</span>\n              </button>\n              <button type=\"button\" class=\"sign-mode-tab\" id=\"offlineModeBtn\" onclick=\"selectCustomerSignMode('offline')\">\n                <strong><i class=\"fas fa-file-arrow-up\"></i>线下签章</strong>\n                <span>下载待签 PDF，客户线下签署后上传签章 PDF 文件。</span>\n              </button>\n            </div>\n            <div class=\"offline-sign-panel\" id=\"offlineSignPanel\">\n              <div class=\"offline-actions\">\n                <button type=\"button\" class=\"btn\" onclick=\"downloadPendingCustomerPdf()\"><i class=\"fas fa-download\"></i>下载待签 PDF</button>\n                <button type=\"button\" class=\"btn btn-primary\" onclick=\"document.getElementById('offlineSignedPdfInput').click()\"><i class=\"fas fa-upload\"></i>上传签章 PDF</button>\n              </div>\n              <input type=\"file\" id=\"offlineSignedPdfInput\" accept=\"application/pdf,.pdf\" style=\"display:none\" onchange=\"handleOfflineSignedPdf(this.files)\">\n              <div class=\"offline-upload-box\" id=\"offlineUploadInfo\"><span><i class=\"fas fa-circle-info\"></i> 请先上传客户线下签署完成的 PDF 文件</span></div>\n            </div>\n          </div>\n          <div class=\"sign-process-list\" id=\"platformProgress\">\n            <div class=\"sign-process-line\" data-progress=\"0\"><i class=\"fas fa-file-pdf\"></i><span>生成不符合项报告 PDF 签章文件</span></div>\n            <div class=\"sign-process-line\" data-progress=\"1\"><i class=\"fas fa-stamp\"></i><span>线上签章平台执行个人签章</span></div>\n            <div class=\"sign-process-line\" data-progress=\"2\"><i class=\"fas fa-route\"></i><span>更新签章进度并自动流转下一节点</span></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"sign-modal-footer\">\n        <button type=\"button\" class=\"btn\" onclick=\"previewPdf(signTarget ? signTarget.idx : 0)\"><i class=\"fas fa-eye\"></i>预览当前文件</button>\n        <button type=\"button\" class=\"btn\" onclick=\"closeSignModal()\">取消</button>\n        <button type=\"button\" class=\"btn btn-primary\" id=\"confirmSignBtn\" onclick=\"startSignConfirm()\"><i class=\"fas fa-stamp\"></i>确认签章</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"pdf-modal-mask\" id=\"pdfModal\">\n    <div class=\"pdf-modal-card\">\n      <div class=\"pdf-modal-head\">\n        <div class=\"pdf-modal-title\"><i class=\"fas fa-file-pdf\" style=\"color:#dc2626;\"></i><span id=\"pdfModalTitle\">不符合项报告 PDF 预览</span></div>\n        <button class=\"btn pdf-modal-close\" onclick=\"closePdfModal()\"><i class=\"fas fa-times\"></i><span>关闭</span></button>\n      </div>\n      <div class=\"pdf-viewer\" id=\"pdfViewer\"></div>\n    </div>\n  </div>\n\n  \n  <script>\n    const flowNodes = [\n      { id: 'auditorSign', name: '审核员签字', owner: '审核员', desc: '确认不符合项报告内容' },\n      { id: 'leaderSign', name: '审核组长签字', owner: '审核组长', desc: '审核组长签字确认' },\n      { id: 'customerSign', name: '客户签字', owner: '客户', desc: '客户签字确认' },\n      { id: 'customerFill', name: '客户填写原因分析、纠正和纠正措施', owner: '客户', desc: '填写原因分析与整改措施' },\n      { id: 'auditorConclusion', name: '审核员确认跟踪结论', owner: '审核员', desc: '填写跟踪结论' }\n    ];\n\n    const conclusionOptions = [\n      '纠正和纠正措施可以接受且证实有效。',\n      '纠正和纠正措施计划可以接受，将在下次审核中验证有效性。（仅针对轻微不符合）',\n      '纠正和纠正措施不能接受，或纠正措施未有效实施。'\n    ];\n\n    const signMeta = {\n      auditorSign: { role: '审核员', signerField: 'auditor', defaultName: '王审核' },\n      leaderSign: { role: '审核组长', signerField: null, defaultName: '武荣刚' },\n      customerSign: { role: '客户代表', signerField: null, defaultName: '刘海峰' }\n    };\n\n    let currentStage = 'auditorSign';\n    let rejectTarget = null;\n    let signTarget = null;\n    let customerSignMode = 'online';\n\n    const ncReports = [\n      {\n        id: 'nc1',\n        no: 'NC-20260623-001',\n        nature: '轻微不符合',\n        standard: 'GB/T 19001-2016 / ISO 9001:2015',\n        clause: '8.5.1、8.5.2',\n        relatedDept: '生产部、质量管理部',\n        customerName: '北京华信智能制造有限公司',\n        auditDateCn: '2026 年 06 月 23 日',\n        dueDateCn: '2026 年 07 月 23 日之前',\n        dueDate: '2026-07-23',\n        auditor: '王审核',\n        auditDate: '2026-06-23',\n        description: '现场抽查生产过程控制记录时发现，M-202606-015批次的首件确认记录中缺少设备参数复核结果，且该记录未体现质量检验人员签字确认。上述情况与程序文件《生产过程控制程序》中关于关键工序记录完整性的要求不一致。',\n        cause: '',\n        correctionPlan: '',\n        conclusion: '',\n        templates: {\n          cause: '初步分析为生产班组对新版首件确认记录填写要求理解不充分，班组长复核时仅关注检验结论，未对设备参数复核栏和签字栏进行完整性检查。',\n          correctionPlan: '纠正：已补充M-202606-015批次首件确认记录中的设备参数复核结果，并由质量检验人员补签确认。\\n纠正措施或纠正措施计划：1）对生产班组和质量检验人员开展新版记录填写培训；2）在班组长日常点检清单中增加关键工序记录完整性检查项；3）质量管理部在下月内抽查不少于10份首件确认记录，验证措施有效性。',\n          conclusion: '纠正和纠正措施可以接受且证实有效。'\n        },\n        stageStatus: { auditorSign: 'current', leaderSign: 'waiting', customerSign: 'waiting', customerFill: 'waiting', auditorConclusion: 'waiting' },\n        rejectHistory: [],\n        signRecords: {},\n        attachments: { cause: [], plan: [] },\n        attachmentTemplates: {\n          cause: [{ name: 'NC-20260623-001_原因分析说明.pdf', size: '286KB', source: 'default' }],\n          plan: [\n            { name: 'NC-20260623-001_首件确认记录补充件.pdf', size: '512KB', source: 'default' },\n            { name: 'NC-20260623-001_培训计划.xlsx', size: '96KB', source: 'default' }\n          ]\n        },\n        autoFillState: { customerFill: false, auditorConclusion: false }\n      },\n      {\n        id: 'nc2',\n        no: 'NC-20260623-002',\n        nature: '轻微不符合',\n        standard: 'GB/T 24001-2016 / ISO 14001:2015',\n        clause: '8.1、9.1.1',\n        relatedDept: '综合管理部、仓储部',\n        customerName: '北京华信智能制造有限公司',\n        auditDateCn: '2026 年 06 月 23 日',\n        dueDateCn: '2026 年 07 月 23 日之前',\n        dueDate: '2026-07-23',\n        auditor: '李审核',\n        auditDate: '2026-06-23',\n        description: '现场查看危险废物暂存区时发现，6月12日产生的一批废过滤棉已入库，但《危险废物暂存台账》中未记录对应重量和责任人，暂存标签信息填写不完整，不利于后续追溯和合规性评价。',\n        cause: '',\n        correctionPlan: '',\n        conclusion: '',\n        templates: {\n          cause: '仓储人员在交接期间只完成实物入库，未同步完成台账登记；综合管理部对危废台账的日常监督频次不足，未能及时发现记录缺失。',\n          correctionPlan: '纠正：已补录6月12日废过滤棉的重量、责任人和暂存标签信息。\\n纠正措施或纠正措施计划：1）修订危废入库交接清单，明确实物、标签、台账三项同步确认；2）综合管理部每周对危废暂存区台账与实物进行一次核对；3）一个月后对台账完整性进行复查。',\n          conclusion: '纠正和纠正措施计划可以接受，将在下次审核中验证有效性。（仅针对轻微不符合）'\n        },\n        stageStatus: { auditorSign: 'current', leaderSign: 'waiting', customerSign: 'waiting', customerFill: 'waiting', auditorConclusion: 'waiting' },\n        rejectHistory: [],\n        signRecords: {},\n        attachments: { cause: [], plan: [] },\n        attachmentTemplates: {\n          cause: [{ name: 'NC-20260623-002_原因分析记录.docx', size: '188KB', source: 'default' }],\n          plan: [\n            { name: 'NC-20260623-002_危废台账补录截图.png', size: '742KB', source: 'default' },\n            { name: 'NC-20260623-002_危废交接清单修订稿.pdf', size: '354KB', source: 'default' }\n          ]\n        },\n        autoFillState: { customerFill: false, auditorConclusion: false }\n      }\n    ];\n\n    function escapeHtml(str) {\n      return String(str || '').replace(/[&<>\"']/g, function (s) {\n        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', \"'\": '&#39;' })[s];\n      });\n    }\n\n    function reportStage(report) { return report.currentStage || currentStage; }\n    function currentStageIndex(stage) { return flowNodes.findIndex(n => n.id === (stage || currentStage)); }\n    function getStageMeta(id) { return flowNodes.find(n => n.id === id) || flowNodes[0]; }\n    function isSignStage(stage) { return ['auditorSign', 'leaderSign', 'customerSign'].includes(stage || currentStage); }\n    function isCustomerFillOpen(report) { return reportStage(report) === 'customerFill'; }\n    function isConclusionOpen(report) { return reportStage(report) === 'auditorConclusion'; }\n    function signStageIds() { return ['auditorSign', 'leaderSign', 'customerSign']; }\n    function getPreviousStage(stage) {\n      const idx = currentStageIndex(stage);\n      return flowNodes[Math.max(0, idx - 1)].id;\n    }\n    function getRejectReturnStage(stage) {\n      // 客户退回必须回到第一个审核员签字环节；其他节点默认退回上一节点。\n      if (stage === 'customerSign') return 'auditorSign';\n      return getPreviousStage(stage);\n    }\n    function resetReportToStage(report, stageId) {\n      const targetIdx = currentStageIndex(stageId);\n      report.currentStage = stageId;\n      report.finished = false;\n      flowNodes.forEach((node, idx) => {\n        if (idx < targetIdx) report.stageStatus[node.id] = 'completed';\n        else if (idx === targetIdx) report.stageStatus[node.id] = 'current';\n        else report.stageStatus[node.id] = 'waiting';\n        if (idx >= targetIdx && signStageIds().includes(node.id)) { delete report.signRecords[node.id]; if (Array.isArray(report.pdfVersions)) report.pdfVersions = report.pdfVersions.filter(v => v.stage !== node.id); }\n      });\n      if (currentStageIndex(stageId) <= currentStageIndex('customerFill')) {\n        report.stageStatus.customerFill = currentStageIndex(stageId) === currentStageIndex('customerFill') ? 'current' : 'waiting';\n      }\n      if (currentStageIndex(stageId) <= currentStageIndex('auditorConclusion')) {\n        report.stageStatus.auditorConclusion = currentStageIndex(stageId) === currentStageIndex('auditorConclusion') ? 'current' : 'waiting';\n      }\n    }\n\n    function ensureStageAutoData(report) {\n      const stage = reportStage(report);\n      if ((stage === 'customerFill' || stage === 'auditorConclusion' || report.finished) && !report.autoFillState.customerFill) {\n        report.cause = report.templates.cause;\n        report.correctionPlan = report.templates.correctionPlan;\n        report.attachments.cause = report.attachmentTemplates.cause.map(item => ({ ...item }));\n        report.attachments.plan = report.attachmentTemplates.plan.map(item => ({ ...item }));\n        report.autoFillState.customerFill = true;\n      }\n      if ((stage === 'auditorConclusion' || report.finished) && !report.autoFillState.auditorConclusion) {\n        report.conclusion = report.templates.conclusion;\n        report.autoFillState.auditorConclusion = true;\n      }\n    }\n\n    function syncStageStatus(report) {\n      ensureStageAutoData(report);\n      if (report.finished) {\n        flowNodes.forEach((node) => {\n          if (report.stageStatus[node.id] !== 'rejected') report.stageStatus[node.id] = 'completed';\n        });\n        return;\n      }\n      const idx = currentStageIndex(reportStage(report));\n      flowNodes.forEach((node, nodeIdx) => {\n        const existing = report.stageStatus[node.id];\n        if (existing === 'rejected') return;\n        if (nodeIdx < idx) report.stageStatus[node.id] = 'completed';\n        else if (nodeIdx === idx) report.stageStatus[node.id] = existing === 'completed' ? 'completed' : 'current';\n        else report.stageStatus[node.id] = 'waiting';\n      });\n    }\n\n    function render() {\n      ncReports.forEach(syncStageStatus);\n      document.getElementById('ncList').innerHTML = ncReports.map((report, idx) => renderCard(report, idx)).join('');\n    }\n\n    function getCardButtonText(report) {\n      const stage = reportStage(report);\n      if (stage === 'customerFill') return '<i class=\"fas fa-paper-plane\"></i> 提交填写内容';\n      if (stage === 'auditorConclusion') return '<i class=\"fas fa-check-double\"></i> 提交跟踪结论';\n      if (report.finished) return '<i class=\"fas fa-check\"></i> 已完成';\n      return '<i class=\"fas fa-signature\"></i> 签章确认';\n    }\n\n\n\n    function isDescriptionEditable(report) {\n      if (!report || report.finished) return false;\n      if (report.signRecords && report.signRecords.auditorSign) return false;\n      return reportStage(report) === 'auditorSign';\n    }\n\n    function isDueDateEditable(report) {\n      return reportStage(report) === 'auditorSign' && !report.finished;\n    }\n\n    function formatDueDateCn(value) {\n      if (!value) return '';\n      const parts = String(value).split('-');\n      if (parts.length !== 3) return value;\n      return `${parts[0]} 年 ${parts[1]} 月 ${parts[2]} 日之前`;\n    }\n\n    function displayDueDate(report) {\n      if (!report) return '-';\n      return report.dueDateCn || formatDueDateCn(report.dueDate) || '-';\n    }\n\n    function displayNature(report) {\n      const value = String((report && report.nature) || '').trim();\n      if (!value) return '-';\n      if (value.indexOf('严重') >= 0) return '严重';\n      if (value.indexOf('轻微') >= 0) return '轻微';\n      return value;\n    }\n\n    function renderCard(report, idx) {\n      const stage = reportStage(report);\n      const fillOpen = isCustomerFillOpen(report);\n      const conclusionOpen = isConclusionOpen(report);\n      const showReject = stage === 'leaderSign' || stage === 'customerSign';\n      const actionDisabled = report.finished ? 'disabled' : '';\n      const dueDateEditable = isDueDateEditable(report);\n      const descriptionEditable = isDescriptionEditable(report);\n      return `\n        <article class=\"nc-card\">\n          <div class=\"nc-main\">\n            <div class=\"nc-header\">\n              <div class=\"nc-title\">\n                <span class=\"nc-no\"><i class=\"fas fa-file-lines\"></i>${escapeHtml(report.no)}</span>\n                \n              </div>\n              <div class=\"nc-card-toolbar\">\n                <button class=\"btn\" onclick=\"previewPdf(${idx})\"><i class=\"fas fa-file-pdf\"></i> 预览PDF文件</button>\n                ${showReject ? `<button class=\"btn btn-danger\" onclick=\"openRejectModal(${idx}, '${stage}')\"><i class=\"fas fa-reply\"></i> 退回</button>` : ''}\n                <button class=\"btn btn-primary\" onclick=\"submitCurrentStageForReport(${idx})\" ${actionDisabled}>${getCardButtonText(report)}</button>\n              </div>\n            </div>\n            <div class=\"nc-body\">\n              ${renderPdfVersionStrip(report)}\n              <div class=\"meta-grid\">\n                <div class=\"meta-item\"><div class=\"meta-label\">涉及标准和条款内容</div><div class=\"meta-value\">${escapeHtml((report.standard || '') + '；条款：' + (report.clause || ''))}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">受审核部门/过程</div><div class=\"meta-value\">${escapeHtml(report.relatedDept || '-')}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">性质</div><div class=\"meta-value\"><span class=\"nature-badge ${displayNature(report) === '严重' ? 'severe' : 'minor'}\">${escapeHtml(displayNature(report))}</span></div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">审核人员</div><div class=\"meta-value\">${escapeHtml(report.auditor)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">审核日期</div><div class=\"meta-value\">${escapeHtml(report.auditDate)}</div></div>\n                <div class=\"meta-item\"><div class=\"meta-label\">整改完成期限</div><div class=\"meta-value\">${dueDateEditable ? `<input type=\"date\" class=\"form-date-input\" value=\"${escapeHtml(report.dueDate || '')}\" onchange=\"updateField(${idx}, 'dueDate', this.value)\">` : escapeHtml(displayDueDate(report))}</div></div>\n              </div>\n\n              <section class=\"form-section\">\n                <div class=\"section-head\">\n                  <div class=\"section-title\"><i class=\"fas fa-clipboard-list\"></i>不符合项描述</div>\n                </div>\n                <div class=\"section-body\">\n                  <textarea class=\"form-textarea\" rows=\"4\" ${descriptionEditable ? '' : 'readonly'} onchange=\"updateField(${idx}, 'description', this.value)\">${escapeHtml(report.description)}</textarea>\n                  ${descriptionEditable ? '' : `<div class=\"locked-tip\"><i class=\"fas fa-lock\"></i><span>审核员签章完成后，不符合项描述已锁定，仅可查看。</span></div>`}\n                </div>\n              </section>\n\n              <div class=\"two-col\">\n                <section class=\"form-section\">\n                  <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-magnifying-glass-chart\"></i>原因分析</div></div>\n                  <div class=\"section-body\">\n                    <textarea class=\"form-textarea\" rows=\"5\" ${fillOpen ? '' : 'readonly'} onchange=\"updateField(${idx}, 'cause', this.value)\" placeholder=\"${fillOpen ? '请输入原因分析' : ''}\">${escapeHtml(report.cause)}</textarea>\n                    ${renderAttachmentPanel(idx, 'cause', '原因分析附件', report.attachments.cause, fillOpen)}\n                  </div>\n                </section>\n\n                <section class=\"form-section\">\n                  <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-screwdriver-wrench\"></i>纠正、纠正措施或纠正措施计划</div></div>\n                  <div class=\"section-body\">\n                    <textarea class=\"form-textarea\" rows=\"5\" ${fillOpen ? '' : 'readonly'} onchange=\"updateField(${idx}, 'correctionPlan', this.value)\" placeholder=\"${fillOpen ? '请输入纠正、纠正措施或纠正措施计划' : ''}\">${escapeHtml(report.correctionPlan)}</textarea>\n                    ${renderAttachmentPanel(idx, 'plan', '纠正及措施附件', report.attachments.plan, fillOpen)}\n                  </div>\n                </section>\n              </div>\n\n              <section class=\"form-section\">\n                <div class=\"section-head\"><div class=\"section-title\"><i class=\"fas fa-clipboard-check\"></i>跟踪结论</div></div>\n                <div class=\"section-body\">\n                  <div class=\"conclusion-options\">\n                    ${conclusionOptions.map((option, optIdx) => `\n                      <label class=\"radio-card ${conclusionOpen ? '' : 'locked'}\">\n                        <input type=\"radio\" name=\"conclusion-${idx}\" value=\"${optIdx}\" ${report.conclusion === option ? 'checked' : ''} ${conclusionOpen ? '' : 'disabled'} onchange=\"setConclusion(${idx}, ${optIdx})\">\n                        <span>${escapeHtml(option)}</span>\n                      </label>\n                    `).join('')}\n                  </div>\n                </div>\n              </section>\n            </div>\n          </div>\n\n          <aside class=\"flow-panel\">\n            <div class=\"flow-panel-head\">\n              <div class=\"flow-panel-title\"><i class=\"fas fa-diagram-project\"></i>流程节点</div>\n              <span class=\"badge current\">${escapeHtml(getStageMeta(stage).owner)}</span>\n            </div>\n            <div class=\"flow-list\">${renderFlow(report)}</div>\n          </aside>\n        </article>\n      `;\n    }\n\n    function renderPdfVersionStrip(report) {\n      return '';\n    }\n\n    function renderAttachmentPanel(idx, type, title, list, editable) {\n      return `\n        <div class=\"attachment-panel\">\n          <div class=\"attachment-head\">\n            <div class=\"attachment-title\"><i class=\"fas fa-paperclip\"></i>${escapeHtml(title)}</div>\n            <div>\n              <input type=\"file\" id=\"file-${idx}-${type}\" style=\"display:none\" multiple onchange=\"handleUpload(${idx}, '${type}', this.files)\">\n              <button class=\"btn\" ${editable ? '' : 'disabled'} onclick=\"document.getElementById('file-${idx}-${type}').click()\"><i class=\"fas fa-upload\"></i> 上传附件</button>\n            </div>\n          </div>\n          <div class=\"attachment-list\">\n            ${list.map((att, attIdx) => `\n              <div class=\"attachment-item\">\n                <div class=\"attachment-name\"><i class=\"fas ${fileIcon(att.name)}\"></i><span title=\"${escapeHtml(att.name)}\">${escapeHtml(att.name)}</span><span style=\"color:#94a3b8;\">${escapeHtml(att.size || '')}</span></div>\n                <div class=\"attachment-actions\">\n                  <button class=\"btn btn-link\" onclick=\"previewAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-eye\"></i>预览</button>\n                  <button class=\"btn btn-link\" onclick=\"downloadAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-download\"></i>下载</button>\n                  <button class=\"btn btn-link danger\" ${editable ? '' : 'disabled'} onclick=\"deleteAttachment(${idx}, '${type}', ${attIdx})\"><i class=\"fas fa-trash\"></i>删除</button>\n                </div>\n              </div>\n            `).join('') || '<div style=\"color:#94a3b8;font-size:12px;\">暂无附件</div>'}\n          </div>\n        </div>\n      `;\n    }\n\n    function fileIcon(name) {\n      const lower = String(name || '').toLowerCase();\n      if (lower.endsWith('.pdf')) return 'fa-file-pdf';\n      if (lower.endsWith('.doc') || lower.endsWith('.docx')) return 'fa-file-word';\n      if (lower.endsWith('.xls') || lower.endsWith('.xlsx')) return 'fa-file-excel';\n      if (lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg')) return 'fa-file-image';\n      return 'fa-file-lines';\n    }\n\n    function renderFlow(report) {\n      const reportIdx = ncReports.indexOf(report);\n      return flowNodes.map((node, idx) => {\n        const status = report.stageStatus[node.id] || 'waiting';\n        const reject = report.rejectHistory.filter(item => item.stage === node.id).slice(-1)[0];\n        const icon = status === 'completed' ? 'fa-check' : status === 'rejected' ? 'fa-xmark' : status === 'current' ? 'fa-location-dot' : 'fa-circle';\n        const statusText = status === 'completed' ? '已完成' : status === 'rejected' ? '已退回' : status === 'current' ? '当前节点' : '待处理';\n        const rejectAction = reject ? `<button type=\"button\" class=\"reject-node-action\" onclick=\"showRejectInfo(${reportIdx}, '${node.id}')\"><i class=\"fas fa-circle-info\"></i> 退回信息</button>` : '';\n        return `\n          <div class=\"flow-node ${status}\">\n            <div class=\"node-dot\"><i class=\"fas ${icon}\"></i></div>\n            <div>\n              <div class=\"node-name\">${idx + 1}. ${escapeHtml(node.name)}</div>\n              <div class=\"node-desc\">${escapeHtml(node.desc)}</div>\n              <span class=\"node-status\">${statusText}</span>\n              ${rejectAction}\n            </div>\n          </div>\n        `;\n      }).join('');\n    }\n\n    function updateField(idx, field, value) {\n      const report = ncReports[idx];\n      if (!report) return;\n      if (field === 'description') {\n        if (!isDescriptionEditable(report)) return;\n      }\n      if (field === 'dueDate') {\n        if (!isDueDateEditable(report)) return;\n        report.dueDate = value;\n        report.dueDateCn = formatDueDateCn(value);\n        return;\n      }\n      if (field === 'cause' || field === 'correctionPlan') {\n        if (!isCustomerFillOpen(report)) return;\n      }\n      report[field] = value;\n    }\n\n    function setConclusion(idx, optionIdx) {\n      const report = ncReports[idx];\n      if (!isConclusionOpen(report)) return;\n      report.conclusion = conclusionOptions[optionIdx];\n    }\n\n    function handleUpload(idx, type, files) {\n      const report = ncReports[idx];\n      if (!isCustomerFillOpen(report)) return;\n      Array.from(files || []).forEach(file => {\n        report.attachments[type].push({ name: file.name, size: prettySize(file.size), source: 'local' });\n      });\n      render();\n    }\n\n    function prettySize(size) {\n      if (!size && size !== 0) return '';\n      if (size < 1024) return size + 'B';\n      if (size < 1024 * 1024) return Math.round(size / 1024) + 'KB';\n      return (size / 1024 / 1024).toFixed(1) + 'MB';\n    }\n\n    function previewAttachment(idx, type, attIdx) {\n      const att = ncReports[idx].attachments[type][attIdx];\n      document.getElementById('attachmentPreviewBox').innerHTML = `\n        <div>\n          <div style=\"font-size:38px;color:#2563eb;margin-bottom:10px;\"><i class=\"fas ${fileIcon(att.name)}\"></i></div>\n          <div style=\"font-weight:800;color:#1e293b;margin-bottom:4px;\">${escapeHtml(att.name)}</div>\n          <div style=\"color:#64748b;\">原型预览：此处展示附件预览区域，实际系统可根据文件类型调用 PDF、图片或 Office 预览服务。</div>\n        </div>\n      `;\n      document.getElementById('attachmentPreviewModal').classList.add('show');\n    }\n\n    function downloadAttachment(idx, type, attIdx) {\n      const att = ncReports[idx].attachments[type][attIdx];\n      const blob = new Blob(['附件下载示例：' + att.name + '\\n该文件为原型演示生成的占位下载内容。'], { type: 'text/plain;charset=utf-8' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = att.name;\n      document.body.appendChild(a);\n      a.click();\n      a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 500);\n    }\n\n    function deleteAttachment(idx, type, attIdx) {\n      const report = ncReports[idx];\n      if (!isCustomerFillOpen(report)) return;\n      if (!confirm('确定删除该附件？')) return;\n      report.attachments[type].splice(attIdx, 1);\n      render();\n    }\n\n    function openRejectModal(idx, stage) {\n      if (!(stage === 'leaderSign' || stage === 'customerSign')) return;\n      rejectTarget = { idx, stage };\n      const report = ncReports[idx];\n      const returnStage = getRejectReturnStage(stage);\n      const tip = document.querySelector('#rejectModal .return-tip span');\n      if (tip) tip.textContent = `点击“确认退回”后，系统将记录退回原因和退回时间，并退回至“${getStageMeta(returnStage).name}”。`;\n      document.getElementById('rejectReasonInput').value = `审核计划中的审核时间与项目实际安排不一致，请调整后重新提交。`;\n      document.getElementById('rejectModal').classList.add('show');\n    }\n\n    function closeRejectModal() {\n      document.getElementById('rejectModal').classList.remove('show');\n      rejectTarget = null;\n    }\n\n    function confirmReject() {\n      const reason = document.getElementById('rejectReasonInput').value.trim();\n      if (!reason) { alert('请填写退回原因'); return; }\n      if (!rejectTarget) return;\n      const report = ncReports[rejectTarget.idx];\n      const fromStage = rejectTarget.stage;\n      const prevStage = getRejectReturnStage(fromStage);\n      report.rejectHistory.push({ stage: fromStage, fromStage, returnToStage: prevStage, reason, time: new Date().toLocaleString('zh-CN') });\n      resetReportToStage(report, prevStage);\n      closeRejectModal();\n      render();\n      alert('已退回：' + report.no + '，流程已返回至“' + getStageMeta(prevStage).name + '”。');\n    }\n\n    function submitCurrentStageForReport(idx) {\n      const report = ncReports[idx];\n      const stage = reportStage(report);\n      if (report.finished) return;\n      if (stage === 'customerFill') {\n        submitCustomerFill(idx);\n        return;\n      }\n      if (stage === 'auditorConclusion') {\n        submitConclusion(idx);\n        return;\n      }\n      openSignModal(idx);\n    }\n\n    function openSignModal(idx) {\n      const report = ncReports[idx];\n      const stage = reportStage(report);\n      if (!isSignStage(stage)) return;\n      signTarget = { idx, stage, offlineFile: null };\n      customerSignMode = 'online';\n      const meta = getSignerInfo(report, stage);\n      document.getElementById('modalReportNo').textContent = report.no;\n      document.getElementById('modalNodeName').textContent = getStageMeta(stage).name;\n      document.getElementById('modalSigner').textContent = meta.signer;\n      const isCustomer = stage === 'customerSign';\n      document.getElementById('customerSignModeBox').style.display = isCustomer ? 'block' : 'none';\n      document.getElementById('signHelpText').textContent = isCustomer\n        ? '客户签字环节支持线上签章和线下签章。线上签章完成后系统生成客户线上签章 PDF；线下签章需先下载待签 PDF，再上传客户签署后的 PDF。'\n        : '当前文件将以不符合项报告 PDF 样式提交线上签章，完成后在 PDF 预览中生成该节点签署后的 PDF 文件版本。';\n      selectCustomerSignMode('online', true);\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-pending';\n      status.innerHTML = '<i class=\"fas fa-clock\"></i>待签章';\n      document.querySelectorAll('#platformProgress .sign-process-line').forEach(line => {\n        line.classList.remove('running', 'done', 'failed');\n        line.querySelector('i').className = line.dataset.progress === '0' ? 'fas fa-file-pdf' : line.dataset.progress === '1' ? 'fas fa-stamp' : 'fas fa-route';\n      });\n      document.getElementById('confirmSignBtn').disabled = false;\n      document.getElementById('confirmSignBtn').innerHTML = '<i class=\"fas fa-stamp\"></i>确认签章';\n      document.getElementById('onlineSignModal').classList.add('show');\n    }\n\n    function selectCustomerSignMode(mode, silent) {\n      customerSignMode = mode === 'offline' ? 'offline' : 'online';\n      const onlineBtn = document.getElementById('onlineModeBtn');\n      const offlineBtn = document.getElementById('offlineModeBtn');\n      const offlinePanel = document.getElementById('offlineSignPanel');\n      const progress = document.getElementById('platformProgress');\n      if (onlineBtn) onlineBtn.classList.toggle('active', customerSignMode === 'online');\n      if (offlineBtn) offlineBtn.classList.toggle('active', customerSignMode === 'offline');\n      if (offlinePanel) offlinePanel.classList.toggle('show', customerSignMode === 'offline');\n      if (progress) progress.style.display = customerSignMode === 'offline' ? 'none' : 'grid';\n      const btn = document.getElementById('confirmSignBtn');\n      if (btn) btn.innerHTML = customerSignMode === 'offline' ? '<i class=\"fas fa-check\"></i>确认线下签章完成' : '<i class=\"fas fa-stamp\"></i>确认签章';\n      const status = document.getElementById('modalSignStatus');\n      if (status && !silent) {\n        status.className = 'sign-status-pill sign-status-pending';\n        status.innerHTML = customerSignMode === 'offline' ? '<i class=\"fas fa-file-upload\"></i>待上传' : '<i class=\"fas fa-clock\"></i>待签章';\n      }\n    }\n\n    function closeSignModal() {\n      document.getElementById('onlineSignModal').classList.remove('show');\n      signTarget = null;\n    }\n\n    function startSignConfirm() {\n      if (!signTarget) return;\n      const report = ncReports[signTarget.idx];\n      if (signTarget.stage === 'customerSign' && customerSignMode === 'offline') {\n        finishOfflineCustomerSign(report);\n        return;\n      }\n      const btn = document.getElementById('confirmSignBtn');\n      btn.disabled = true;\n      btn.innerHTML = '<i class=\"fas fa-spinner fa-spin\"></i>签章中';\n      const status = document.getElementById('modalSignStatus');\n      const lines = Array.from(document.querySelectorAll('#platformProgress .sign-process-line'));\n      status.className = 'sign-status-pill sign-status-signing';\n      status.innerHTML = '<i class=\"fas fa-spinner fa-spin\"></i>签章中';\n      runSignStep(lines, 0, () => runSignStep(lines, 1, () => runSignStep(lines, 2, finishSignConfirm)));\n    }\n\n    function handleOfflineSignedPdf(files) {\n      if (!signTarget) return;\n      const file = Array.from(files || [])[0];\n      if (!file) return;\n      const isPdf = file.type === 'application/pdf' || String(file.name || '').toLowerCase().endsWith('.pdf');\n      if (!isPdf) { alert('请上传 PDF 格式的签章文件'); return; }\n      signTarget.offlineFile = { name: file.name, size: prettySize(file.size) };\n      document.getElementById('offlineUploadInfo').innerHTML = `<span><i class=\"fas fa-file-pdf\" style=\"color:#dc2626;\"></i> 已上传：<strong>${escapeHtml(file.name)}</strong> <span style=\"color:#94a3b8;\">${escapeHtml(prettySize(file.size))}</span></span>`;\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-signing';\n      status.innerHTML = '<i class=\"fas fa-file-circle-check\"></i>待确认';\n    }\n\n    function downloadPendingCustomerPdf() {\n      if (!signTarget) return;\n      const report = ncReports[signTarget.idx];\n      const content = `不符合项报告线下签章待签文件\\n报告编号：${report.no}\\n客户名称：${report.customerName}\\n说明：原型演示中生成待签 PDF 下载文件，实际系统应下载正式 PDF。`;\n      const blob = new Blob([content], { type: 'application/pdf;charset=utf-8' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = `${report.no}_客户待签PDF.pdf`;\n      document.body.appendChild(a);\n      a.click();\n      a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 500);\n    }\n\n    function finishOfflineCustomerSign(report) {\n      if (!signTarget || !signTarget.offlineFile) { alert('请先上传客户线下签署完成的 PDF 文件'); return; }\n      const meta = getSignerInfo(report, 'customerSign');\n      report.stageStatus.customerSign = 'completed';\n      report.signRecords.customerSign = { role: meta.role, signer: meta.signer, time: new Date().toLocaleString('zh-CN'), method: '线下签章', fileName: signTarget.offlineFile.name };\n      addSignedPdfVersion(report, 'customerSign', '线下签章', signTarget.offlineFile.name);\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-signed';\n      status.innerHTML = '<i class=\"fas fa-check-circle\"></i>线下签章完成';\n      advanceToNextStage(report);\n      render();\n      const previewIdx = signTarget.idx;\n      setTimeout(() => {\n        closeSignModal();\n        previewPdf(previewIdx);\n      }, 260);\n    }\n\n    function runSignStep(lines, index, done) {\n      const line = lines[index];\n      line.classList.add('running');\n      setTimeout(() => {\n        line.classList.remove('running');\n        line.classList.add('done');\n        const icon = line.querySelector('i');\n        icon.className = 'fas fa-check';\n        done();\n      }, 420);\n    }\n\n    function finishSignConfirm() {\n      const target = signTarget;\n      if (!target) return;\n      const report = ncReports[target.idx];\n      const meta = getSignerInfo(report, target.stage);\n      report.stageStatus[target.stage] = 'completed';\n      report.signRecords[target.stage] = { role: meta.role, signer: meta.signer, time: new Date().toLocaleString('zh-CN'), method: '线上签章' };\n      addSignedPdfVersion(report, target.stage, '线上签章');\n      const status = document.getElementById('modalSignStatus');\n      status.className = 'sign-status-pill sign-status-signed';\n      status.innerHTML = '<i class=\"fas fa-check-circle\"></i>签章完成';\n      document.getElementById('confirmSignBtn').innerHTML = '<i class=\"fas fa-check\"></i>已完成';\n      advanceToNextStage(report);\n      render();\n      setTimeout(() => {\n        closeSignModal();\n        previewPdf(target.idx);\n      }, 280);\n    }\n\n    function getSignerInfo(report, stage) {\n      const meta = signMeta[stage] || signMeta.auditorSign;\n      return { role: meta.role, signer: meta.signerField ? (report[meta.signerField] || meta.defaultName) : meta.defaultName };\n    }\n\n    function advanceToNextStage(report) {\n      const next = flowNodes[currentStageIndex(reportStage(report)) + 1];\n      if (next) report.currentStage = next.id;\n      else report.finished = true;\n      ensureStageAutoData(report);\n    }\n\n    function submitCustomerFill(idx) {\n      const report = ncReports[idx];\n      if (!report.cause.trim()) { alert('请填写原因分析'); return; }\n      if (!report.correctionPlan.trim()) { alert('请填写纠正、纠正措施或纠正措施计划'); return; }\n      report.stageStatus.customerFill = 'completed';\n      report.currentStage = 'auditorConclusion';\n      ensureStageAutoData(report);\n      render();\n      alert(report.no + ' 已提交填写内容');\n    }\n\n    function submitConclusion(idx) {\n      const report = ncReports[idx];\n      if (!report.conclusion) { alert('请选择跟踪结论'); return; }\n      report.stageStatus.auditorConclusion = 'completed';\n      report.finished = true;\n      render();\n      alert(report.no + ' 跟踪结论已提交');\n    }\n\n    function previewPdf(idx) {\n      const reports = typeof idx === 'number' ? [ncReports[idx]] : ncReports;\n      document.getElementById('pdfModalTitle').textContent = reports.length === 1 ? reports[0].no + ' PDF 文件预览' : '不符合项报告 PDF 文件预览';\n      document.getElementById('pdfViewer').innerHTML = reports.map((report, i) => {\n        const realIdx = typeof idx === 'number' ? idx : i;\n        return buildPdfVersionPreview(report, realIdx);\n      }).join('');\n      document.getElementById('pdfModal').classList.add('show');\n    }\n\n    function ensurePdfVersions(report) {\n      if (!Array.isArray(report.pdfVersions)) report.pdfVersions = [];\n      signStageIds().forEach(stage => {\n        if (report.signRecords[stage] && !report.pdfVersions.some(v => v.stage === n class=\"btn\" onclick=\"closeFlowNodeModal()\">关闭</button></div>' +\n    '</div>';\n    document.body.appendChild(modal);\n    return modal;\n  }\n\n  window.openFlowNodeModal = function (idx) {\n    var report = ncReports[idx];\n    if (!report) return;\n    var modal = ensureFlowModal();\n    var title = document.getElementById('flowModalReportNo');\n    var list = document.getElementById('flowModalList');\n    if (title) title.innerHTML = '<i class=\"fas fa-file-lines\"></i> ' + escapeHtml(report.no);\n    if (list) list.innerHTML = renderFlow(report);\n    modal.classList.add('show');\n  };\n\n  window.closeFlowNodeModal = function () {\n    var modal = document.getElementById('flowNodeModal');\n    if (modal) modal.classList.remove('show');\n  };\n\n  function addFlowButtons() {\n    document.querySelectorAll('.nc-card').forEach(function (card, idx) {\n      var toolbar = card.querySelector('.nc-card-toolbar');\n      if (!toolbar || toolbar.querySelector('[data-flow-node-btn]')) return;\n      var btn = document.createElement('button');\n      btn.type = 'button';\n      btn.className = 'btn';\n      btn.setAttribute('data-flow-node-btn', String(idx));\n      btn.innerHTML = '<i class=\"fas fa-diagram-project\"></i> 流程节点';\n      btn.onclick = function () { openFlowNodeModal(idx); };\n      toolbar.insertBefore(btn, toolbar.firstElementChild || null);\n    });\n  }\n\n  var nativeIsConclusionOpen = window.isConclusionOpen;\n  window.isConclusionOpen = function (report) {\n    if (isConclusionConfirmed(report)) return false;\n    return typeof nativeIsConclusionOpen === 'function' ? nativeIsConclusionOpen(report) : false;\n  };\n\n  var nativeSetConclusion = window.setConclusion;\n  window.setConclusion = function (idx, optionIdx) {\n    var report = ncReports[idx];\n    if (isConclusionConfirmed(report)) return;\n    if (typeof nativeSetConclusion === 'function') nativeSetConclusion(idx, optionIdx);\n  };\n\n  var nativeSubmitConclusion = window.submitConclusion;\n  window.submitConclusion = function (idx) {\n    var report = ncReports[idx];\n    if (!report || isConclusionConfirmed(report)) return;\n    if (!report.conclusion) { alert('请选择跟踪结论'); return; }\n    report.conclusionLocked = true;\n    report.conclusionConfirmed = true;\n    report.conclusionConfirmTime = new Date().toLocaleString('zh-CN');\n    if (typeof nativeSubmitConclusion === 'function') nativeSubmitConclusion(idx);\n    renderSummaryBoard();\n    lockConfirmedConclusions();\n  };\n\n  var nativeRender = window.render;\n  window.render = function () {\n    if (typeof nativeRender === 'function') nativeRender();\n    renderSummaryBoard();\n    lockConfirmedConclusions();\n    addFlowButtons();\n  };\n\n  var style = document.createElement('style');\n  style.textContent = [\n    '.nc-summary-board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:0 0 10px;}',\n    '.nc-summary-item{min-height:42px;padding:8px 12px;border:1px solid #dbeafe;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 1px 2px rgba(15,23,42,.04);}',\n    '.nc-summary-item strong{font-size:20px;line-height:1;color:#1d4ed8;}',\n    '.nc-summary-label{display:inline-flex;align-items:center;gap:6px;min-width:0;color:#64748b;font-size:12px;font-weight:700;white-space:nowrap;}',\n    '.nc-summary-item.ok{border-color:#bbf7d0;background:#f0fdf4;}',\n    '.nc-summary-item.ok strong{color:#16a34a;}',\n    '.nc-summary-item.warn{border-color:#fed7aa;background:#fff7ed;}',\n    '.nc-summary-item.warn strong{color:#ea580c;}',\n    '.radio-card.confirmed-locked{background:#f8fafc!important;color:#64748b!important;cursor:not-allowed!important;}',\n    '.radio-card.confirmed-locked input{cursor:not-allowed!important;}',\n    '.nc-card{grid-template-columns:minmax(0,1fr)!important;}',\n    '.nc-main{border-right:0!important;}',\n    '.flow-panel{display:none!important;}',\n    '.flow-node-modal{width:min(760px,calc(100vw - 40px));max-height:86vh;}',\n    '.flow-node-modal .modal-body{max-height:calc(86vh - 112px);overflow:auto;}',\n    '.flow-modal-report{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;padding:5px 10px;border:1px solid #bfdbfe;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:800;}',\n    '.flow-list-modal{display:flex;flex-direction:column;gap:10px;}',\n    '.flow-reject-inline{margin-top:8px;padding:8px 10px;border:1px solid #fecaca;border-radius:8px;background:#fff7f7;color:#7f1d1d;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px 10px;font-size:12px;}',\n    '.flow-reject-inline span{display:block;color:#991b1b;font-weight:700;margin-bottom:2px;}',\n    '.flow-reject-inline strong{font-weight:600;color:#7f1d1d;word-break:break-word;}',\n    '.flow-reject-reason,.flow-restart-note{grid-column:1/-1;}',\n    '.flow-restart-note{display:flex;align-items:center;gap:6px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 7px;font-weight:700;}',\n    '@media (max-width:760px){.nc-summary-board{grid-template-columns:1fr;}.nc-summary-item{min-height:38px;}}'\n  ].join('\\n');\n  document.head.appendChild(style);\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      renderSummaryBoard();\n      lockConfirmedConclusions();\n      addFlowButtons();\n    });\n  } else {\n    renderSummaryBoard();\n    lockConfirmedConclusions();\n    addFlowButtons();\n  }\n})();\n<\/script>\n\n</body>\n</html>\n\n<style id=\"STAGE2_RECTIFY_HIDE_SIGN_CLOSE_STYLE\">\n  #onlineSignModal .sign-modal-close { display: none !important; }\n</style>\n<script id=\"STAGE2_RECTIFY_HIDE_SIGN_CLOSE_PATCH\">\n(function () {\n  function removeClose() {\n    document.querySelectorAll('#onlineSignModal .sign-modal-close').forEach(function (btn) { btn.remove(); });\n  }\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', removeClose);\n  else removeClose();\n})();\n<\/script>\n";

<script id="STAGE2_TAB_SRC_DOC_FALLBACK">
(function () {
  function htmlAt(index) {
    if (!Array.isArray(window.pageHtml)) return '';
    return (window.pageHtml[index] || '').replaceAll('__COMBINED_SCRIPT_CLOSE__', '</' + 'script>');
  }
  function hydrateFrames() {
    document.querySelectorAll('.page-frame').forEach(function (frame) {
      var index = Number(frame.dataset.pageIndex);
      var html = htmlAt(index);
      if (html) frame.srcdoc = html;
    });
  }
  function activate(target) {
    document.querySelectorAll('.main-tab').forEach(function (tab) {
      tab.classList.toggle('active', tab.dataset.target === target);
    });
    document.querySelectorAll('.page-frame').forEach(function (frame) {
      frame.classList.toggle('active', frame.id === 'frame-' + target);
    });
  }
  function bindTabs() {
    hydrateFrames();
    document.querySelectorAll('.main-tab').forEach(function (tab) {
      if (tab.dataset.stage2Bound === '1') return;
      tab.dataset.stage2Bound = '1';
      tab.addEventListener('click', function () {
        hydrateFrames();
        activate(tab.dataset.target);
      }, true);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindTabs);
  } else {
    bindTabs();
  }
})();
</script>
