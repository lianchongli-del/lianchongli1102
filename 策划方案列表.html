


<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核方案管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 滚动条样式 */
        .table-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: #f1f3f4;
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #c4c7c5;
            border-radius: 4px;
        }
        
        /* 锁定列基础样式 - 确保不串行 */
        .sticky-col {
            position: sticky;
            background-color: #ffffff;
            z-index: 20;
            vertical-align: middle !important;
        }
        
        /* 表头锁定 - 提高z-index */
        thead .sticky-col {
            background-color: #f3f6fc;
            z-index: 30;
            top: 0;
        }
        
        /* 锁定列位置定义 - 左侧 */
        .col-checkbox { left: 0; min-width: 40px; width: 40px; text-align: center; }
        .col-no { left: 40px; min-width: 140px; width: 140px; }
        .col-customer { left: 180px; min-width: 200px; width: 200px; }
        
        /* 锁定列位置定义 - 右侧 */
        .col-status { right: 260px; min-width: 100px; width: 100px; }
        .col-exec-status { right: 160px; min-width: 100px; width: 100px; }
        .col-action { right: 0; min-width: 160px; width: 160px; }
        
        /* 移除阴影/竖纹，确保视觉连贯 */
        .sticky-col::after,
        .sticky-col::before {
            display: none !important;
            content: none !important;
            box-shadow: none !important;
            border-right: none !important;
            border-left: none !important;
        }
        
        /* 搜索下拉 */
        .searchable-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
        }
        .searchable-dropdown.active {
            display: block;
        }
        .searchable-option:hover {
            background-color: #f3f6fc;
        }
        
        /* 行选中与高亮 */
        .row-selected td {
            background-color: #e8f0fe !important;
        }
        .row-urgent td {
            background-color: #fff8e1;
        }
        .row-urgent:hover td {
            background-color: #ffecb3 !important;
        }
        
        /* 确保表格行高一致，防止串行 */
        .data-table tr {
            height: 56px;
        }
        .data-table td, .data-table th {
            height: 56px;
            box-sizing: border-box;
        }
        
        /* 弹窗动画 */
        .modal-enter {
            animation: modalSlideIn 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Toast动画 */
        .toast-enter {
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* 表单规范样式 - 统一标签与输入框布局 */
        .form-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .form-row .form-label {
            min-width: 120px;
            max-width: 120px;
            text-align: right;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            line-height: 40px;
            flex-shrink: 0;
        }
        .form-row .form-input-wrap {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .form-row .form-input-wrap.full-width {
            width: 100%;
        }
        .form-row .form-input-wrap textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }
        .form-row .form-input-wrap .hint-text {
            font-size: 12px;
            color: #9CA3AF;
            white-space: nowrap;
        }
        .form-row .form-input-wrap .hint-text.wrap {
            white-space: normal;
        }
        /* 收款通知单样式 */
        .receipt-section {
            border: 1px dashed #CBD5E1;
            border-radius: 8px;
            padding: 16px;
            margin-top: 8px;
            background: #F8FAFC;
        }
        .receipt-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .receipt-row {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        .receipt-row .receipt-label {
            min-width: 100px;
            text-align: right;
            font-size: 13px;
            color: #475569;
            line-height: 36px;
        }
        .receipt-row .receipt-value {
            flex: 1;
        }

        /* ===== B端设计规范覆盖层：仅调整视觉，不改变功能 ===== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --ui-primary: #2563EB;
            --ui-primary-hover: #1D4ED8;
            --ui-border: #E2E8F0;
            --ui-surface: #FFFFFF;
            --ui-page: #F8FAFC;
            --ui-text: #1E293B;
            --ui-muted: #64748B;
            --ui-soft: #F1F5F9;
            --ui-radius: 6px;
            --ui-card-radius: 8px;
            --ui-shadow: 0 2px 4px rgba(15, 23, 42, 0.08);
            --ui-floating-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--ui-page) !important;
            color: var(--ui-text) !important;
            font-family: 'Inter', 'Noto Sans SC', 'Microsoft YaHei', sans-serif !important;
            font-size: 14px;
            line-height: 1.6;
            padding: 24px !important;
        }

        body > .bg-white {
            border: 1px solid var(--ui-border) !important;
            border-radius: var(--ui-card-radius) !important;
            box-shadow: var(--ui-shadow) !important;
        }

        #tabContainer {
            gap: 4px;
        }

        .tab-item {
            height: 34px;
            border-radius: var(--ui-radius) !important;
            color: #475569 !important;
            font-weight: 500 !important;
            padding: 0 12px !important;
        }

        .tab-item:hover {
            background: var(--ui-soft) !important;
            color: var(--ui-text) !important;
        }

        .tab-item.bg-blue-50,
        .tab-item.text-blue-600 {
            background: #EFF6FF !important;
            color: var(--ui-primary) !important;
            font-weight: 600 !important;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            border-color: var(--ui-border) !important;
            border-radius: var(--ui-radius) !important;
            color: var(--ui-text) !important;
            background-color: var(--ui-surface);
            box-shadow: none !important;
            transition: border-color .15s, box-shadow .15s, background-color .15s;
        }

        input::placeholder,
        textarea::placeholder {
            color: #94A3B8;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--ui-primary) !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12) !important;
            outline: none !important;
        }

        label {
            color: #475569 !important;
            font-weight: 500;
        }

        button {
            border-radius: var(--ui-radius) !important;
            font-weight: 500 !important;
            transition: background-color .15s, border-color .15s, color .15s, box-shadow .15s;
        }

        button.bg-blue-600,
        button.border-blue-600 {
            background: var(--ui-primary) !important;
            border-color: var(--ui-primary) !important;
            color: #fff !important;
        }

        button.bg-blue-600:hover,
        button.border-blue-600:hover {
            background: var(--ui-primary-hover) !important;
            border-color: var(--ui-primary-hover) !important;
        }

        button.border,
        button.border-gray-300 {
            border-color: #D1D5DB !important;
            background: #fff;
            color: #374151 !important;
        }

        button.border:hover,
        button.border-gray-300:hover {
            background: #F8FAFC !important;
            border-color: #CBD5E1 !important;
        }

        button:disabled {
            opacity: .45 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }

        .searchable-dropdown {
            border-color: var(--ui-border);
            border-radius: var(--ui-radius);
            box-shadow: var(--ui-floating-shadow);
        }

        .data-table {
            color: #334155;
            font-size: 13px;
        }

        .data-table thead tr,
        thead .sticky-col {
            background: #F8FAFC !important;
        }

        .data-table th {
            height: 44px !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            border-bottom: 1px solid var(--ui-border) !important;
            color: #475569 !important;
            font-size: 12px;
            font-weight: 600 !important;
            white-space: nowrap;
        }

        .data-table tr {
            height: 52px;
        }

        .data-table td {
            height: 52px;
            border-bottom-color: #F1F5F9 !important;
            color: #334155;
            vertical-align: middle !important;
        }

        .data-table tbody tr:hover td {
            background: #F8FAFC !important;
        }

        .sticky-col {
            background: #fff;
        }

        .row-selected td {
            background: #EFF6FF !important;
        }

        .row-urgent td {
            background: #FFFBEB !important;
        }

        .table-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }

        .rounded-xl,
        .rounded-lg {
            border-radius: var(--ui-card-radius) !important;
        }

        .rounded-md,
        .rounded {
            border-radius: var(--ui-radius) !important;
        }

        .shadow-lg {
            box-shadow: var(--ui-floating-shadow) !important;
        }

        .shadow-sm {
            box-shadow: var(--ui-shadow) !important;
        }

        #auditModal > div,
        #successModal > div {
            border-radius: 10px !important;
            border: 1px solid var(--ui-border);
            box-shadow: var(--ui-floating-shadow) !important;
        }

        .form-row .form-label {
            color: #334155 !important;
        }

        .receipt-section {
            border-color: #CBD5E1;
            background: #F8FAFC;
            border-radius: var(--ui-card-radius);
        }

        .receipt-section-title {
            color: var(--ui-text);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px !important;
            }

            .form-row .form-label,
            .receipt-row .receipt-label {
                width: 100%;
                max-width: none;
                min-width: 0;
                text-align: left;
                line-height: 1.5;
            }

            .receipt-row {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen p-6">

    <!-- 提示 Toast -->
    <div id="alertToast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-[2000] hidden font-medium"></div>

    <!-- 顶部栏 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-wrap justify-between items-center gap-4">
        <div class="flex gap-1 overflow-x-auto pb-1" id="tabContainer">
            <button onclick="switchTab(this, 'all')" class="tab-item px-4 py-2 rounded-lg font-medium text-sm bg-blue-50 text-blue-600 transition-all whitespace-nowrap">全部</button>
            <button onclick="switchTab(this, 'pending-notify')" class="tab-item px-4 py-2 rounded-lg font-medium text-sm text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                待通知审核 <span class="ml-1 bg-red-600 text-white text-xs min-w-[18px] h-[18px] rounded-full inline-flex items-center justify-center px-1.5">3</span>
            </button>
            <button onclick="switchTab(this, 'pending')" class="tab-item px-4 py-2 rounded-lg font-medium text-sm text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                待策划 <span class="ml-1 bg-red-600 text-white text-xs min-w-[18px] h-[18px] rounded-full inline-flex items-center justify-center px-1.5">2</span>
            </button>
            <button onclick="switchTab(this, 'notified')" class="tab-item px-4 py-2 rounded-lg font-medium text-sm text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">已通知审核</button>
            <button onclick="switchTab(this, 'planned')" class="tab-item px-4 py-2 rounded-lg font-medium text-sm text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">已策划</button>
        </div>
        
        <div class="flex gap-3">
            <button id="btnSupervise" onclick="openModal('supervise')" disabled class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm hover:shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                发送监督通知
            </button>
            <button id="btnReaudit" onclick="openModal('reaudit')" disabled class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm hover:shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                发送再认证通知
            </button>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6">
        <div class="flex flex-wrap items-end gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">策划方案编号</label>
                <input type="text" id="filterNo" placeholder="请输入项目编号" class="w-48 h-9 px-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">客户名称</label>
                <div class="relative w-48">
                    <input type="text" id="filterCustomer" placeholder="请输入或选择客户" autocomplete="off" class="w-full h-9 px-3 pr-8 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all cursor-pointer">
                    <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">▼</span>
                    <div id="customerDropdown" class="searchable-dropdown"></div>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">策划状态</label>
                <select id="filterStatus" class="w-40 h-9 px-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all bg-white">
                    <option value="">全部</option>
                    <option value="pending">待策划</option>
                    <option value="notified">已通知审核</option>
                    <option value="notify">待通知审核</option>
                    <option value="planned">已策划</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">待审核类型</label>
                <select id="filterType" class="w-40 h-9 px-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all bg-white">
                    <option value="">全部</option>
                    <option value="initial">初次认证</option>
                    <option value="supervise">监督</option>
                    <option value="rc">再认证</option>
                    <option value="temp">临时审核</option>
                </select>
            </div>

            <div class="flex gap-2 ml-auto items-end">
                <button onclick="resetFilter()" class="px-5 h-9 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-all">重置</button>
                <button onclick="applyFilter()" class="px-5 h-9 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-all shadow-sm">查询</button>
                <button onclick="toggleExpandFilter()" class="px-3 h-9 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-all flex items-center gap-1">
                    <span id="expandText">展开</span>
                    <svg id="expandIcon" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>
        </div>

        <div id="expandFilterRow" class="hidden mt-4 pt-4 border-t border-gray-100 flex-wrap items-end gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">所属区域</label>
                <select id="filterRegion" class="w-40 h-9 px-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all bg-white">
                    <option value="">全部</option>
                    <option value="南京市">南京市</option>
                    <option value="无锡市">无锡市</option>
                    <option value="徐州市">徐州市</option>
                    <option value="常州市">常州市</option>
                    <option value="苏州市">苏州市</option>
                    <option value="南通市">南通市</option>
                    <option value="连云港市">连云港市</option>
                    <option value="淮安市">淮安市</option>
                    <option value="盐城市">盐城市</option>
                    <option value="扬州市">扬州市</option>
                    <option value="镇江市">镇江市</option>
                    <option value="泰州市">泰州市</option>
                    <option value="宿迁市">宿迁市</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">客服人员</label>
                <div class="relative w-40">
                    <input type="text" id="filterService" placeholder="请输入或选择客服" autocomplete="off" class="w-full h-9 px-3 pr-8 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all cursor-pointer">
                    <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">▼</span>
                    <div id="serviceDropdown" class="searchable-dropdown"></div>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm text-gray-600 font-medium">联系人</label>
                <div class="relative w-40">
                    <input type="text" id="filterContact" placeholder="请输入或选择联系人" autocomplete="off" class="w-full h-9 px-3 pr-8 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all cursor-pointer">
                    <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">▼</span>
                    <div id="contactDropdown" class="searchable-dropdown"></div>
                </div>
            </div>
        </div>
    </div><!-- 数据表格区域 - 关键修复：移除所有阴影竖纹 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="table-scroll overflow-x-auto">
            <table class="data-table w-full text-sm border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-slate-900 font-medium">
                        <th class="sticky-col col-checkbox px-3 border-b border-gray-200 text-left font-semibold">
                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="w-4 h-4 cursor-pointer accent-blue-600">
                        </th>
                        <th class="sticky-col col-no px-4 border-b border-gray-200 text-left font-semibold">策划方案编号</th>
                        <th class="sticky-col col-customer px-4 border-b border-gray-200 text-left font-semibold">客户名称</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">客服人员</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">联系人</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">认证领域</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">当前轮次</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">待审核类型</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">审核截止日期</th>
                        <th class="px-4 border-b border-gray-200 text-left font-semibold whitespace-nowrap">是否多场所</th>

        function setupSearchableSelect(inputId, dropdownId, options) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            const wrapper = input.parentElement;

            input.addEventListener('focus', function() {
                renderDropdownOptions(dropdown, options, input.value, input);
                dropdown.classList.add('active');
            });

            input.addEventListener('input', function() {
                renderDropdownOptions(dropdown, options, input.value, input);
                dropdown.classList.add('active');
            });

            document.addEventListener('click', function(e) {
                if (!wrapper.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
        }

        function renderDropdownOptions(dropdown, options, filterText, input) {
            const filtered = options.filter(opt => opt.toLowerCase().includes(filterText.toLowerCase()));
            
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div class="px-3 py-2 text-gray-400 text-sm text-center">无匹配结果</div>';
            } else {
                dropdown.innerHTML = filtered.map(opt => {
                    const isSelected = input.value === opt ? 'bg-blue-50 text-blue-600 font-medium' : 'hover:bg-gray-50';

        function isSuperviseType(type) {
            return type && (type.includes('监督') || type === '初次认证');
        }

        function isReauditType(type) {
            return type === '再认证';
        }

        function toggleSelectRow(no, customer) {
            if (selectedItems.has(no)) {
                selectedItems.delete(no);
                if (selectedItems.size === 0) {
                    currentCustomer = null;
                }
            } else {
                if (selectedItems.size > 0 && currentCustomer !== customer) {
                    showAlert('只能选择同一客户的方案进行批量操作');
                    renderTable();
                    return;
                }
                selectedItems.add(no);
                currentCustomer = customer;
            }
            renderTable();
            updateSelectionState();
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            if (checked) {
                if (filteredData.length > 0) {
                    const firstCustomer = filteredData[0].customer;
                    const sameCustomerData = filteredData.filter(item => item.customer === firstCustomer);
                    if (sameCustomerData.length > 0) {
                        selectedItems = new Set(sameCustomerData.map(item => item.no));
                        currentCustomer = firstCustomer;
                        showAlert(`已全选同一客户（${firstCustomer}）的 ${sameCustomerData.length} 个方案`);
                    }
                }
            } else {
                selectedItems.clear();
                currentCustomer = null;
            }
            renderTable();
            updateSelectionState();
        }

        function updateSelectionState() {
            const hasSelection = selectedItems.size > 0;
            const btnSupervise = document.getElementById('btnSupervise');
            const btnReaudit = document.getElementById('btnReaudit');

            if (hasSelection && currentCustomer) {
                const selectedData = allData.filter(item => selectedItems.has(item.no));
                const allPendingNotify = selectedData.every(item => item.status === '待通知审核');
                const allSupervise = selectedData.every(item => isSuperviseType(item.currentType));
                const allReaudit = selectedData.every(item => isReauditType(item.currentType));
                
                const canSupervise = allPendingNotify && allSupervise;
                const canReaudit = allPendingNotify && allReaudit;

                btnSupervise.disabled = !canSupervise;
                btnReaudit.disabled = !canReaudit;
            } else {
                btnSupervise.disabled = true;
                btnReaudit.disabled = true;
            }

            const allCheckboxes = document.querySelectorAll('#tableBody input[type="checkbox"]');
            const allChecked = allCheckboxes.length > 0 && Array.from(allCheckboxes).every(cb => cb.checked);
            document.getElementById('selectAll').checked = allChecked;
        }

        function showAlert(message) {
            const toast = document.getElementById('alertToast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-enter');
            }, 3000);
        }

        
        function applyFilter() {
            const no = document.getElementById('filterNo').value.toLowerCase();
            const customer = document.getElementById('filterCustomer').value;
            const status = document.getElementById('filterStatus').value;
            const type = document.getElementById('filterType').value;
            const region = document.getElementById('filterRegion').value;
            const service = document.getElementById('filterService').value;
            const contact = document.getElementById('filterContact').value;

            filteredData = allData.filter(item => {
                let statusMatch = true;
                if (status === 'pending') statusMatch = item.status === '待策划';
                else if (status === 'notified') statusMatch = item.status === '已通知审核';
                else if (status === 'notify') statusMatch = item.status === '待通知审核';
                else if (status === 'planned') statusMatch = item.status === '已策划';
                else statusMatch = true;

                const customerMatch = !customer || item.customer.toLowerCase().includes(customer.toLowerCase());
                const serviceMatch = !service || item.service.toLowerCase().includes(service.toLowerCase());
                const contactMatch = !contact || item.contact.toLowerCase().includes(contact.toLowerCase());

                return (no === '' || item.no.toLowerCase().includes(no)) &&
                       customerMatch &&
                       statusMatch &&
                       (type === '' || (type === 'supervise' && (item.currentType.includes('监督'))) || item.currentType === getTypeText(type)) &&
                       (region === '' || item.region === region) &&
                       serviceMatch &&
                       contactMatch;
            });

            selectedItems.clear();
            currentCustomer = null;
            renderTable();
            updateSelectionState();
        }

        function getTypeText(typeValue) {

                'initial': '初次认证',
                'supervise': '监督',
                'rc': '再认证',
                'temp': '临时审核'
            };
            return typeMap[typeValue] || typeValue;

            const selectedServices = [...new Set(selectedData.map(item => item.service))];

            function fillServiceSelect(selectElId, services) {
                const selectEl = document.getElementById(selectElId);
                if (!selectEl) return;
                selectEl.innerHTML = '<option value="">请选择客服人员</option>';
                services.forEach((service) => {
                    const option = document.createElement('option');
                    option.value = service;
                    option.textContent = service;
                    selectEl.appendChild(option);
                });
                // 绑定联动事件
                selectEl.onchange = function() {
                    updateServiceContact(this.value, selectElId === 'superviseServiceName' ? 'supervise' : 'reaudit');
                };
            }

            fillServiceSelect('superviseServiceName', selectedServices);
            fillServiceSelect('reauditServiceName', selectedServices);

            // 联系方式联动更新函数（只读input显示）
            function updateServiceContact(serviceName, type) {
                const contactInputId = type === 'supervise' ? 'superviseServiceContact' : 'reauditServiceContact';
                const contactInput = document.getElementById(contactInputId);
                if (!contactInput || !serviceName) return;

                // 从已选方案中找该客服对应的所有联系人电话
                const relatedItems = selectedData.filter(item => item.service === serviceName);
                const relatedContacts = [...new Set(relatedItems.map(item => item.contact))];
                const phones = [];
                relatedContacts.forEach(contactName => {
                    if (contactDetails[contactName]) {
                        phones.push(contactDetails[contactName].phone);
                    }
                });

                // 只读input显示联系方式（多个用分号分隔）
                contactInput.value = phones.length > 0 ? phones.join('; ') : '';
            }

            // 初始化联系方式只读input（清空）
            const superviseServiceContact = document.getElementById('superviseServiceContact');
            const reauditServiceContact = document.getElementById('reauditServiceContact');
            if (superviseServiceContact) superviseServiceContact.value = '';
            if (reauditServiceContact) reauditServiceContact.value = '';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('auditModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        function submitAudit() {
            const contactSelect = document.getElementById('contactSelect');
            const phoneInput = document.getElementById('contactPhone');
            const emailInput = document.getElementById('contactEmail');
            
            if (!contactSelect.value) {
                showAlert('请选择客户通知联系人');
                return;
            }
            if (!phoneInput.value.trim()) {
                showAlert('请输入客户联系电话');
                return;
            }
            if (!emailInput.value.trim()) {
                showAlert('请输入客户电子邮箱');
                return;
            }

            selectedItems.forEach(itemNo => {
                const item = allData.find(i => i.no === itemNo);
                if (item && item.status === '待通知审核') {
                    item.status = '已通知审核';
                }
            });

            closeModal();
            showSuccessModal();
        }

        function showSuccessModal() {
            const successModal = document.getElementById('successModal');
            const successTitle = document.getElementById('successTitle');
            const successDesc = document.getElementById('successDesc');
            const downloadPackName = document.getElementById('downloadPackName');

            if (currentModalType === 'supervise') {
                successTitle.textContent = '监督审核通知发送成功';
                successDesc.textContent = `已向客户发送监督审核通知，共选择 ${selectedItems.size} 个方案`;
                downloadPackName.textContent = '监督审核通知附件包';
            } else {
                successTitle.textContent = '再认证审核通知发送成功';
                successDesc.textContent = `已向客户发送再认证审核通知，共选择 ${selectedItems.size} 个方案`;
                downloadPackName.textContent = '再认证审核通知附件包';
            }

            successModal.classList.remove('hidden');
            successModal.classList.add('flex');
        }

        function closeSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
            selectedItems.clear();
            currentCustomer = null;
            renderTable();
            updateSelectionState();
        }

        function downloadPack() {
            const packName = currentModalType === 'supervise' ? '监督审核通知附件包.zip' : '再认证审核通知附件包.zip';
            showAlert(`开始下载：${packName}（包含通知书及获证方情况调查表）`);
        }

        document.getElementById('auditModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) closeSuccessModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (!document.getElementById('successModal').classList.contains('hidden')) {
                    closeSuccessModal();
                } else if (!document.getElementById('auditModal').classList.contains('hidden')) {
                    closeModal();
                }
            }
        });
    </script>
</body>
</html>
