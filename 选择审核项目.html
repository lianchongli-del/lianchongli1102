
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认审核项目 - 审核任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --muted-border: #edf2f7;
            --text: #0f172a;
            --muted: #64748b;
            --page: #f5f7fb;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--page);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        .modal-container {
            width: min(760px, calc(100vw - 48px));
            max-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 20px 40px -12px rgba(15, 23, 42, .28);
        }

        .modal-header,
        .modal-footer {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            padding: 0 18px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .modal-footer {
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid var(--border);
            border-bottom: 0;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border: 0;
            border-radius: 6px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
        }

        .close-btn:hover {
            color: #334155;
            background: #f1f5f9;
        }

        .modal-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: auto;
            padding: 18px;
            background: #fff;
        }

        .customer-info {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
            padding: 12px 14px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .info-label {
            flex-shrink: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .info-value {
            overflow: hidden;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stage-tag {
            display: inline-flex;
            align-items: center;
            height: 24px;
            padding: 0 10px;
            border: 1px solid #bfdbfe;
            border-radius: 5px;
            background: #dbeafe;
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
        }

        .table-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead,
        th {
            background: #f8fafc;
        }

        th {
            padding: 11px 14px;
            color: #334155;
            font-weight: 600;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 11px 14px;
            color: #334155;
            border-bottom: 1px solid var(--muted-border);
        }

        tr:last-child td {
            border-bottom: 0;
        }

        tr:hover td {
            background: #f8fbff;
        }

        .audit-tag {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 8px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 12px;
            line-height: 20px;
        }

        .project-no {
            color: #1677ff;
            font-weight: 500;
        }

        .tag-blue {
            background: #dbeafe;
            border-color: #bfdbfe;
            color: var(--primary);
        }

        .tag-green {
            background: #dcfce7;
            border-color: #bbf7d0;
            color: #16a34a;
        }

        .tag-orange {
            background: #ffedd5;
            border-color: #fed7aa;
            color: #ea580c;
        }

        .btn {
            height: 34px;
            padding: 4px 15px;
            border: 1px solid transparent;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
        }

        .btn-default {
            background: #fff;
            border-color: #cbd5e1;
            color: #334155;
        }

        .btn-default:hover {
            color: var(--primary);
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        @media (max-width: 720px) {
            body {
                padding: 12px;
            }

            .modal-container {
                width: 100%;
            }

            .customer-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="modal-container">
        <div class="modal-header">
            <div class="modal-title">确认审核项目</div>
            <button class="close-btn" type="button" aria-label="关闭" onclick="handleCancel()">×</button>
        </div>

        <div class="modal-body">
            <div class="customer-info">
                <div class="info-item">
                    <span class="info-label">客户名称：</span>
                    <span class="info-value">北京市地铁运营有限公司</span>
                </div>
                <div class="info-item">
                    <span class="info-label">审核阶段：</span>
                    <span class="stage-tag">二阶段</span>
                </div>
            </div>

            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width: 34%;">项目编号</th>
                            <th style="width: 20%;">认证领域</th>
                            <th style="width: 24%;">审核类型</th>
                            <th style="width: 22%;">审核人天数</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-default" type="button" onclick="handleCancel()">取消</button>
            <button class="btn btn-primary" type="button" id="confirmBtn" onclick="handleConfirm()">确认审核项目</button>
        </div>
    </div>

    <script>
        const mockData = [
            { projectNo: '1100-Q1-2026-0001', certField: 'QMS', auditType: '监督一', auditDays: '5' },
            { projectNo: '1100-Q1-2026-0002', certField: 'EMS', auditType: '监督一', auditDays: '4' },
            { projectNo: '1100-Q1-2026-0003', certField: 'ISMS', auditType: '监督二', auditDays: '3' },
            { projectNo: '1100-Q1-2026-0004', certField: 'QMS', auditType: '监督二', auditDays: '4' },
            { projectNo: '1100-Q1-2026-0005', certField: 'OHSMS', auditType: '再认证', auditDays: '6' }
        ];

        function getAuditTypeClass(auditType) {
            if (auditType === '监督一') return 'tag-blue';
            if (auditType === '监督二') return 'tag-orange';
            return 'tag-green';
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');

            tbody.innerHTML = mockData.map(row => `
                <tr>
                    <td><span class="project-no">${row.projectNo}</span></td>
                    <td>${row.certField}</td>
                    <td>
                        <span class="audit-tag ${getAuditTypeClass(row.auditType)}">${row.auditType}</span>
                    </td>
                    <td>${row.auditDays}</td>
                </tr>
            `).join('');
        }

        function handleCancel() {
            console.log('取消操作');
        }

        function handleConfirm() {
            const invalidRow = mockData.find(item => !item.auditDays);

            if (invalidRow) {
                alert('请输入审核人天数');
                return;
            }

            console.log('确认审核项目:', mockData);
        }

        renderTable();
    </script>
</body>
</html>
