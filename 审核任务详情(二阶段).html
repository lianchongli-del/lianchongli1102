                 }).filter(Boolean).join('、') || el.value || '';\n                }\n                return el.value || el.textContent || '';\n            }\n\n            function classifyControl(el) {\n                if (el.type === 'date' || el.type === 'month') return 'readonly-date';\n                if (el.classList.contains('time-select')) return 'readonly-time';\n                if (el.tagName === 'TEXTAREA') return 'readonly-textarea';\n                return '';\n            }\n\n            function replaceControl(el) {\n                if (!el || el.dataset.readonlyConverted === 'true') return;\n                if (el.closest('.readonly-converted')) return;\n\n                var rawValue = valueOfControl(el).trim();\n                var text = rawValue || el.getAttribute('placeholder') || '-';\n                var display = document.createElement('div');\n                display.className = 'readonly-display ' + classifyControl(el) + (rawValue ? '' : ' empty');\n                display.textContent = text;\n                display.dataset.readonlyConverted = 'true';\n                el.replaceWith(display);\n            }\n\n            function replaceCheckbox(el) {\n                var icon = document.createElement('span');\n                icon.className = 'readonly-check' + (el.checked ? ' checked' : '');\n                icon.setAttribute('aria-label', el.checked ? '已选择' : '未选择');\n                el.replaceWith(icon);\n            }\n\n            function polishReadonlyPlan() {\n                document.querySelectorAll('button:not(.signature-file-btn):not(.sign-modal-close):not(.sign-preview-action), input[type=\"file\"], .hidden-file-input, .auditor-dropdown, .auditor-tag .remove').forEach(function (el) {\n                    el.remove();\n                });\n\n                document.querySelectorAll('input[type=\"checkbox\"], input[type=\"radio\"]').forEach(replaceCheckbox);\n                document.querySelectorAll('input:not([type=\"checkbox\"]):not([type=\"radio\"]):not([type=\"file\"]), textarea, select').forEach(replaceControl);\n\n                document.querySelectorAll('[onclick], [onchange], [ondblclick], [oninput]').forEach(function (el) {\n                    el.removeAttribute('onclick');\n                    el.removeAttribute('onchange');\n                    el.removeAttribute('ondblclick');\n                    el.removeAttribute('oninput');\n                });\n\n                document.querySelectorAll('.section-header .fa-chevron-down, .criteria-expand-icon').forEach(function (el) {\n                    el.style.display = 'none';\n                });\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', polishReadonlyPlan);\n            } else {\n                polishReadonlyPlan();\n            }\n            setTimeout(polishReadonlyPlan, 0);\n            setTimeout(polishReadonlyPlan, 80);\n        })();\n        // READONLY_DISPLAY_POLISH_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // PLAN_ANCHOR_NAV_START\n        (function () {\n            function initPlanAnchors() {\n                var nav = document.querySelector('.plan-anchor-nav');\n                if (!nav || nav.dataset.bound === 'true') return;\n                var pills = Array.from(nav.querySelectorAll('.plan-anchor-pill'));\n                var sections = pills.map(function (pill) {\n                    return document.getElementById(pill.dataset.target);\n                }).filter(Boolean);\n\n                function setActive(targetId) {\n                    pills.forEach(function (pill) {\n                        pill.classList.toggle('active', pill.dataset.target === targetId);\n                    });\n                }\n\n                pills.forEach(function (pill) {\n                    pill.addEventListener('click', function () {\n                        var target = document.getElementById(pill.dataset.target);\n                        if (!target) return;\n                        var navHeight = nav.offsetHeight || 0;\n                        var top = target.getBoundingClientRect().top + window.pageYOffset - navHeight - 8;\n                        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n                        setActive(pill.dataset.target);\n                    });\n                });\n\n                function syncActive() {\n                    var navHeight = nav.offsetHeight || 0;\n                    var pos = window.pageYOffset + navHeight + 24;\n                    var current = sections[0] ? sections[0].id : '';\n                    sections.forEach(function (section) {\n                        if (pos >= section.offsetTop) current = section.id;\n                    });\n                    if (current) setActive(current);\n                }\n\n                window.addEventListener('scroll', syncActive, { passive: true });\n                window.addEventListener('load', syncActive);\n                syncActive();\n                nav.dataset.bound = 'true';\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', initPlanAnchors);\n            } else {\n                initPlanAnchors();\n            }\n            setTimeout(initPlanAnchors, 120);\n        })();\n        // PLAN_ANCHOR_NAV_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // SCOPE_SOURCE_READONLY_START\n        (function () {\n            function keepScopeTimeReadonly() {\n                document.querySelectorAll('#section-scope .readonly-scope-time').forEach(function (el) {\n                    el.readOnly = true;\n                    el.setAttribute('readonly', 'readonly');\n                    el.setAttribute('aria-readonly', 'true');\n                    el.tabIndex = -1;\n                });\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', keepScopeTimeReadonly);\n            } else {\n                keepScopeTimeReadonly();\n            }\n            setTimeout(keepScopeTimeReadonly, 120);\n        })();\n        // SCOPE_SOURCE_READONLY_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // PLAN_ANCHOR_VISIBLE_FIX_START\n        (function () {\n            function bindVisiblePlanAnchors() {\n                var nav = document.querySelector('.plan-anchor-nav');\n                if (!nav) return;\n                var pills = Array.from(nav.querySelectorAll('.plan-anchor-pill'));\n                if (!pills.length) return;\n\n                function setActive(targetId) {\n                    pills.forEach(function (pill) {\n                        pill.classList.toggle('active', pill.dataset.target === targetId);\n                    });\n                }\n\n                pills.forEach(function (pill) {\n                    if (pill.dataset.visibleBound === 'true') return;\n                    pill.dataset.visibleBound = 'true';\n                    pill.addEventListener('click', function () {\n                        var target = document.getElementById(pill.dataset.target);\n                        if (!target) return;\n                        var navHeight = nav.offsetHeight || 0;\n                        var top = target.getBoundingClientRect().top + window.pageYOffset - navHeight - 8;\n                        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n                        setActive(pill.dataset.target);\n                    });\n                    pill.addEventListener('keydown', function (event) {\n                        if (event.key === 'Enter' || event.key === ' ') {\n                            event.preventDefault();\n                            pill.click();\n                        }\n                    });\n                });\n\n                function syncActive() {\n                    var navHeight = nav.offsetHeight || 0;\n                    var pos = window.pageYOffset + navHeight + 24;\n                    var current = pills[0] ? pills[0].dataset.target : '';\n                    pills.forEach(function (pill) {\n                        var section = document.getElementById(pill.dataset.target);\n                        if (section && pos >= section.offsetTop) current = section.id;\n                    });\n                    if (current) setActive(current);\n                }\n\n                if (nav.dataset.visibleScrollBound !== 'true') {\n                    window.addEventListener('scroll', syncActive, { passive: true });\n                    window.addEventListener('load', syncActive);\n                    nav.dataset.visibleScrollBound = 'true';\n                }\n                syncActive();\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', bindVisiblePlanAnchors);\n            } else {\n                bindVisiblePlanAnchors();\n            }\n            setTimeout(bindVisiblePlanAnchors, 0);\n            setTimeout(bindVisiblePlanAnchors, 160);\n        })();\n        // PLAN_ANCHOR_VISIBLE_FIX_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // PLAN_DATE_INLINE_FIX_START\n        (function () {\n            function fixDateInline() {\n                var section = document.getElementById('section-date');\n                if (!section) return;\n                var holder = section.querySelector('.flex.items-center, .date-inline-row');\n                if (!holder) return;\n                holder.classList.add('date-inline-row');\n                var badge = holder.querySelector('.readonly-days-badge');\n                if (badge) {\n                    badge.innerHTML = '共 <strong>4</strong> 天';\n                }\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', fixDateInline);\n            } else {\n                fixDateInline();\n            }\n            setTimeout(fixDateInline, 0);\n            setTimeout(fixDateInline, 160);\n        })();\n        // PLAN_DATE_INLINE_FIX_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script id=\"SIGNATURE_FILE_PREVIEW_SCRIPT\">\n        // SIGNATURE_FILE_PREVIEW_START\n        (function () {\n            var signatureNodes = [\n                { title: '组长', role: '审核组长', signer: '武荣刚', signedAt: '2024-04-12 09:32:18' },\n                { title: '项目管理', role: '项目管理', signer: '周静', signedAt: '2024-04-12 10:05:46' },\n                { title: '客户', role: '客户代表', signer: '刘海峰', signedAt: '2024-04-12 10:42:09' }\n            ];\n\n            function escapeHtml(value) {\n                return String(value == null ? '' : value)\n                    .replace(/&/g, '&amp;')\n                    .replace(/</g, '&lt;')\n                    .replace(/>/g, '&gt;')\n                    .replace(/\"/g, '&quot;')\n                    .replace(/'/g, '&#39;');\n            }\n\n            function normalizeText(value) {\n                return String(value == null ? '' : value)\n                    .replace(/\\u00a0/g, ' ')\n                    .replace(/\\s+/g, ' ')\n                    .replace(/^\\s+|\\s+$/g, '');\n            }\n\n            function controlValue(control) {\n                if (!control) return '';\n                var tag = control.tagName ? control.tagName.toLowerCase() : '';\n                var type = (control.type || '').toLowerCase();\n                if (type === 'checkbox' || type === 'radio') return control.checked ? '是' : '否';\n                if (tag === 'select') {\n                    var option = control.options && control.selectedIndex >= 0 ? control.options[control.selectedIndex] : null;\n                    return normalizeText(option ? option.textContent : control.value);\n                }\n                if (tag === 'textarea') return normalizeText(control.value || control.textContent);\n                return normalizeText(control.value || control.getAttribute('value') || control.textContent);\n            }\n\n            function textFromNode(el) {\n                if (!el) return '';\n                var clone = el.cloneNode(true);\n                var originalControls = Array.from(el.querySelectorAll('input, textarea, select'));\n                var cloneControls = Array.from(clone.querySelectorAll('input, textarea, select'));\n                cloneControls.forEach(function (control, index) {\n                    var span = clone.ownerDocument.createElement('span');\n                    span.textContent = controlValue(originalControls[index]);\n                    control.replaceWith(span);\n                });\n                clone.querySelectorAll('script, style, button, .signature-preview-mask, .signature-preview-toast, .node-popover, .auditor-dropdown, .criteria-expand-icon').forEach(function (item) {\n                    item.remove();\n                });\n                return normalizeText(clone.textContent);\n            }\n\n            function pdfRows(rows) {\n                return rows.map(function (row) {\n                    return '<tr><th>' + escapeHtml(row[0] || '') + '</th><td>' + escapeHtml(row[1] || '-') + '</td></tr>';\n                }).join('');\n            }\n\n            function makePdfTable(title, rows, extraClass) {\n                if (!rows || !rows.length) return '';\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">' + escapeHtml(title) + '</div><table class=\"plan-pdf-table ' + (extraClass || '') + '\"><tbody>' + pdfRows(rows) + '</tbody></table></div>';\n            }\n\n            function domTableToPdf(table, title) {\n                if (!table) return '';\n                var rows = Array.from(table.querySelectorAll('tr')).map(function (tr) {\n                    return Array.from(tr.children).map(function (cell) { return textFromNode(cell); });\n                }).filter(function (cells) { return cells.some(Boolean); });\n                if (!rows.length) return '';\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">' + escapeHtml(title) + '</div><table class=\"plan-pdf-table matrix\">' + rows.map(function (cells, rowIndex) {\n                    var cellTag = rowIndex === 0 ? 'th' : 'td';\n                    return '<tr>' + cells.map(function (cell) { return '<' + cellTag + '>' + escapeHtml(cell || '-') + '</' + cellTag + '>'; }).join('') + '</tr>';\n                }).join('') + '</table></div>';\n            }\n\n            function buildTypeTable() {\n                var sec = document.getElementById('section-type');\n                if (!sec) return '';\n                return makePdfTable('一、审核类型', [['审核类型及认证体系', textFromNode(sec.querySelector('.tip-box')) || textFromNode(sec)]]);\n            }\n\n            function buildPurposeTable() {\n                var sec = document.getElementById('section-purpose');\n                if (!sec) return '';\n                var rows = Array.from(sec.querySelectorAll('.form-field')).map(function (field) {\n                    var label = textFromNode(field.querySelector('.form-label'));\n                    var control = field.querySelector('textarea, input, select, .readonly-display');\n                    var value = control ? (controlValue(control) || textFromNode(control)) : textFromNode(field);\n                    return [label, value];\n                }).filter(function (row) { return row[0] || row[1]; });\n                return makePdfTable('二、审核目的', rows.length ? rows : [['审核目的', textFromNode(sec)]]);\n            }\n\n            function buildScopeTable() {\n                var sec = document.getElementById('section-scope');\n                if (!sec) return '';\n                var cards = Array.from(sec.querySelectorAll('.scope-site-card'));\n                if (!cards.length) return makePdfTable('三、审核范围', [['审核范围', textFromNode(sec)]]);\n                return '<div class=\"pdf-table-section\"><div class=\"pdf-section-title\">三、审核范围</div>' + cards.map(function (card, index) {\n                    var rows = Array.from(card.querySelectorAll('.scope-line')).map(function (line) {\n                        return [textFromNode(line.querySelector('.scope-label')), textFromNode(line.querySelector('.scope-value'))];\n                    }).filter(function (row) { return row[0] || row[1]; });\n                    return '<table class=\"plan-pdf-table scope-table\"><tbody><tr><th colspan=\"2\">场所 ' + (index + 1) + '</th></tr>' + pdfRows(rows) + '</tbody></table>';\n                }).join('') + '</div>';\n            }\n\n            function buildCriteriaTable() {\n                var sec = document.getElementById('section-criteria');\n                if (!sec) return '';\n                var rows = [];\n                Array.from(sec.querySelectorAll('.criteria-standards-grid .standard-tag')).forEach(function (tag, index) {\n                    rows.push([index === 0 ? '管理体系标准' : '', textFromNode(tag)]);\n                });\n                Array.from(sec.querySelectorAll('.criteria-item')).forEach(function (item) {\n                    var title = textFromNode(item.querySelector('.criteria-label-text'));\n                    if (!title || title === '管理体系标准') return;\n                    var checkbox = item.querySelector('input[type=\"checkbox\"]');\n                    var checkedText = checkbox ? (checkbox.checked ? '适用' : '不适用') : '适用';\n                    var input = item.querySelector('.criteria-content-area input, .criteria-content-area textarea, .readonly-display');\n                    var detail = input ? (controlValue(input) || textFromNode(input)) : '';\n                    rows.push([title, detail ? checkedText + '；' + detail : checkedText]);\n                });\n                return makePdfTable('四、审核准则', r
