

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQC审核人员排班计划表</title>
    <style>
        :root {
            --primary-color: #4a5568;
            --primary-hover: #2d3748;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --text-muted: #a0aec0;
            --border-color: #e2e8f0;
            --border-light: #edf2f7;

            --weekend-bg: #f0fff4;
            --weekend-text: #22543d;
            --holiday-bg: #fff5f5;
            --holiday-text: #c53030;
            --hover-bg: #f7fafc;
            --selected-bg: #ebf8ff;

            --audit-bg: #bee3f8;
            --audit-text: #2c5282;
            --audit-border: #90cdf4;

            --non-audit-bg: #fefcbf;
            --non-audit-text: #744210;
            --non-audit-border: #f6e05e;

            --leave-bg: #fed7d7;
            --leave-text: #742a2a;
            --leave-border: #fc8181;

            --external-bg: #e9d8fd;
            --external-text: #553c9a;
            --external-border: #d6bcfa;

            --exceed-color: #c53030;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
            --shadow-lg: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        select, input[type="text"] {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: all 0.2s;
            min-width: 90px;
            height: 32px;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #90cdf4;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.15);
        }

        input[type="text"] {
            min-width: 140px;
            width: 140px;
        }

        .btn {
            padding: 5px 14px;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 32px;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
        }

        .btn-primary:hover {
            background: #3182ce;
        }

        .btn-secondary {
            background: white;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .stats-bar {
            margin-top: 62px;
            background: linear-gradient(to right, #ebf8ff, #f0fff4);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 24px;
            font-size: 13px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            font-weight: 700;
            color: #2b6cb0;
            font-size: 16px;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-warning {
            margin-left: auto;
            color: var(--exceed-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .main-container {
            padding: 14px 20px;
            width: 100%;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            background: white;
            padding: 6px 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .schedule-wrapper {
            background: var(--card-bg);
            border-radius: 6px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .schedule-container {
            overflow: auto;
            max-height: calc(100vh - 200px);
            position: relative;
        }

        .schedule-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: max-content;
            table-layout: fixed;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: var(--card-bg);
            z-index: 20;
            box-shadow: 2px 0 3px rgba(0,0,0,0.06);
        }

        .sticky-col.header {
            z-index: 30;
            background: #f7fafc;
        }

        .schedule-table th {
            background: #f7fafc;
            padding: 8px 4px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-light);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            height: 52px;
        }

        .schedule-table th.date-header {
            min-width: 46px;
            max-width: 46px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .schedule-table th.date-header:hover {
            background: var(--hover-bg);
        }

        .schedule-table th.date-header.weekend {
            background: #f0fff4;
            color: var(--weekend-text);
        }

        .schedule-table th.date-header.holiday {
            background: #fff5f5;
            color: var(--holiday-text);
        }

        .day-number {
            font-size: 14px;
            font-weight: 700;
            display: block;
            line-height: 1.2;
        }

        .day-week {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 1px;
            display: block;
        }

        .holiday-name {
            font-size: 9px;
            font-weight: 600;
            margin-top: 1px;
            display: block;
        }

        .schedule-table tr {
            transition: background 0.15s;
        }

        .schedule-table tr:hover {
            background: var(--hover-bg);
        }

        .schedule-table tr.selected {
            background: var(--selected-bg);
        }

        .schedule-table td {
            padding: 0;
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
            vertical-align: top;
            height: 48px;
            /* position: relative; */
        }

        .person-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 6px 10px;
            height: 100%;
            justify-content: center;
        }

        .person-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .person-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .person-meta {
            display: flex;
            gap: 5px;
            margin-top: 1px;
        }

        .badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-primary {
            background: #bee3f8;
            color: #2c5282;
        }

        .badge-secondary {
            background: #edf2f7;
            color: #4a5568;
        }

        .badge-exceed {
            background: #fed7d7;
            color: #9b2c2c;
            font-weight: 600;
        }

        .days-cell {
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            padding: 6px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            user-select: none;
        }

        .days-cell:hover {
            background: #e6fffa;
        }

        .days-cell.exceed {
            color: var(--exceed-color);
            background: #fff5f5;
        }

        .days-cell.exceed:hover {
            background: #fed7d7;
        }

        .days-cell .sort-icon {
            font-size: 11px;
            margin-top: 2px;
            opacity: 0.6;
        }

        .schedule-cell {
            position: relative;
            height: 48px;
            min-width: 46px;
            max-width: 46px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .schedule-cell:hover {
            background: rgba(66, 153, 225, 0.04);
        }

        .schedule-cell.weekend {
            background: var(--weekend-bg);
        }

        .schedule-cell.holiday {
            background: var(--holiday-bg);
        }

        .task-bar {
            position: absolute;
            top: 2px;
            bottom: 2px;
            left: 2px;
            border-radius: 3px;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            padding: 2px 3px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            z-index: 5;
            line-height: 1.25;
            text-align: left;
            border: 1px solid transparent;
            min-width: 16px;
        }

        .task-bar:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
            z-index: 15;
        }

        .task-bar.audit {
            background: var(--audit-bg);
            color: var(--audit-text);
            border-color: var(--audit-border);
        }

        .task-bar.non-audit {
            background: var(--non-audit-bg);
            color: var(--non-audit-text);
            border-color: var(--non-audit-border);
        }

        .task-bar.leave {
            background: var(--leave-bg);
            color: var(--leave-text);
            border-color: var(--leave-border);
        }

        .task-bar.external {
            background: var(--external-bg);
            color: var(--external-text);
            border-color: var(--external-border);
        }

        .task-company {
            font-weight: 600;
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 1px;
        }

        .task-type {
            font-size: 9px;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-days {
            font-size: 9px;
            opacity: 0.85;
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-remaining {
            font-size: 8px;
            opacity: 0.8;
        }

        .task-bar.half-day {
            padding: 1px 2px;
            justify-content: center;
        }

        .task-bar.half-day .half-day-label {
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
        }

        .task-bar.half-day .half-day-type {
            font-size: 8px;
            opacity: 0.9;
            text-align: center;
            white-space: nowrap;
        }

        .tooltip {
            position: fixed;
            background: rgba(26, 32, 44, 0.95);
            color: white;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            max-width: 320px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: var(--shadow-lg);
            line-height: 1.5;
            backdrop-filter: blur(4px);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 5px;
            color: #fbd38d;
        }

        .tooltip-row {
            display: flex;
            gap: 6px;
            margin: 3px 0;
        }

        .tooltip-label {
            color: #a0aec0;
            min-width: 65px;
            flex-shrink: 0;
            font-size: 11px;
        }

        .tooltip-value {
            color: white;
            font-weight: 500;
        }

        .tooltip-status {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .tooltip-status.approved {
            background: #48bb78;
            color: white;
        }

        .tooltip-status.non-audit {
            background: #ecc94b;
            color: #744210;
        }

        .tooltip-status.leave {
            background: #fc8181;
            color: white;
        }

        .tooltip-status.external {
            background: #b794f4;
            color: white;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow: auto;
            transform: translateY(-10px);
            transition: transform 0.3s;
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;
            border-radius: 8px 8px 0 0;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 16px 18px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #90cdf4;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.15);
        }

        .modal-footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: #f7fafc;
            border-radius: 0 0 8px 8px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .col-person { width: 165px; min-width: 165px; }
        .col-days { width: 65px; min-width: 65px; text-align: center; }
        .col-date { width: 46px; min-width: 46px; max-width: 46px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <span style="font-size:20px;">📋</span> CQC审核人员排班计划表
            </div>

            <div class="filter-group">
                <label class="filter-label">年份</label>
                <select id="yearSelect">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">月份</label>
                <select id="monthSelect">
                    <option value="0">1月</option>
                    <option value="1">2月</option>
                    <option value="2">3月</option>
                    <option value="3" selected>4月</option>
                    <option value="4">5月</option>
                    <option value="5">6月</option>
                    <option value="6">7月</option>
                    <option value="7">8月</option>
                    <option value="8">9月</option>
                    <option value="9">10月</option>
                    <option value="10">11月</option>
                    <option value="11">12月</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">在职类型</label>
                <select id="typeSelect">
                    <option value="all" selected>全部</option>
                    <option value="专职">专职</option>
                    <option value="兼职">兼职</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">排班状态</label>
                <select id="scheduleStatusSelect">
                    <option value="all" selected>全部</option>
                    <option value="scheduled">已排班</option>
                    <option value="empty">未排班</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">审核类型</label>
                <select id="auditTypeSelect">
                    <option value="all" selected>全部</option>
                    <option value="初次认证">初次认证</option>
                    <option value="监督一">监督一</option>
                    <option value="监督二">监督二</option>
                    <option value="再认证">再认证</option>
                    <option value="二方审核">二方审核</option>
                    <option value="非审核活动">非审核活动</option>
                    <option value="休假">休假</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">月度天数</label>
                <select id="limitSelect">
                    <option value="all" selected>全部</option>
                    <option value="exceed">超过15天</option>
                    <option value="normal">未超过15天</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">人员查询</label>
                <input type="text" id="personSearch" placeholder="姓名/聘用号">
            </div>

            <button class="btn btn-primary" onclick="querySchedule()">查询</button>
            <button class="btn btn-secondary" onclick="resetFilter()">重置</button>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="totalCount">0</span>
            <span class="stat-label">审核人员总数</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="scheduledCount">0</span>
            <span class="stat-label">已排班人员</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="fullTimeCount">0</span>
            <span class="stat-label">专职</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="partTimeCount">0</span>
            <span class="stat-label">兼职</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="exceedCount">0</span>
            <span class="stat-label">超限人员</span>
        </div>
        <div class="stat-warning">⚠️ 红色表示月度累计超过15天</div>
    </div>

    <main class="main-container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn btn-secondary" onclick="exportData()">📊 导出Excel</button>
                <!-- <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印</button> -->
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--audit-bg); border-color: var(--audit-border);"></div>
                    <span>审核活动</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--non-audit-bg); border-color: var(--non-audit-border);"></div>
                    <span>非审核活动</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--leave-bg); border-color: var(--leave-border);"></div>
                    <span>休假/请假</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--external-bg); border-color: var(--external-border);"></div>
                    <span>二方审核</span>
                </div>
            </div>
        </div>

        <div class="schedule-wrapper">
            <div class="schedule-container" id="scheduleContainer">
                <table class="schedule-table" id="scheduleTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="tooltip" id="tooltip"></div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">排班详情</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">审核人员</label>
                    <input type="text" class="form-input" id="modalPerson" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="text" class="form-input" id="modalDate" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">客户企业</label>
                    <input type="text" class="form-input" id="modalCompany" placeholder="输入企业名称">
                </div>
                <div class="form-group">
                    <label class="form-label">审核类型</label>
                    <select class="form-input" id="modalType">
                        <option value="初次认证">初次认证</option>
                        <option value="监督一">监督一</option>
                        <option value="监督二">监督二</option>
                        <option value="再认证">再认证</option>
                        <option value="二方审核">二方审核</option>
                        <option value="非审核活动">非审核活动</option>
                        <option value="休假">休假</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">持续天数</label>
                    <input type="number" class="form-input" id="modalDays" step="0.5" min="0.5" value="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSchedule()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据定义 ====================
        const surnames = ['张','王','李','刘','陈','杨','黄','赵','周','吴','徐','孙','马','朱','胡','郭','何','高','林','罗'];
        const names = ['伟','芳','娜','敏','静','丽','强','磊','军','洋','勇','艳','杰','涛','明','超','秀','霞','平','刚','鹏','晶','辉','燕','鑫','雪'];
        const companies = ['广东电子','深圳制造','广州食品','东莞包装','佛山机械','惠州光学','珠海智能','中山医疗','江门化工','肇庆纺织'];
        const addresses = ['广州市天河区','深圳市南山区','东莞市松山湖','佛山市顺德区','惠州市仲恺区'];
        const auditTypes = ['初次认证','监督一','监督二','再认证'];
        const nonAuditTypes = ['内部培训','外部培训','会议','评审活动'];
        const leaveTypes = ['年假','病假','调休','事假'];

        // 全局变量
        let scheduleData = [];
        let currentData = [];
        let selectedRows = new Set();
        let currentEditing = null;
        let sortDirection = 'desc';
        let currentSortColumn = 'monthlyDays';

        // 节假日配置
        const holidays = {
            4: [{day: 4, name: "清明"}, {day: 5, name: "清明"}],
            5: [{day: 1, name: "劳动"}, {day: 2, name: "劳动"}],
            6: [{day: 22, name: "端午"}],
            10: [{day: 1, name: "国庆"}, {day: 2, name: "国庆"}, {day: 3, name: "国庆"}]
        };

        // ==================== 生成审核人员 ====================
        function generateAuditors() {
            const auditors = [];
            for (let i = 0; i < 30; i++) {
                const id = 'cqc' + String(Math.floor(Math.random() * 90000) + 10000).padStart(5, '0');
                const name = surnames[Math.floor(Math.random() * surnames.length)] + 
                            names[Math.floor(Math.random() * names.length)];
                const isFullTime = Math.random() > 0.3;
                const initialRemaining = 160 + Math.floor(Math.random() * 20);

                auditors.push({
                    id: id,
                    name: name,
                    type: isFullTime ? '专职' : '兼职',
                    initialRemaining: initialRemaining,
                    remainingDays: initialRemaining,
                    monthlyDays: 0,
                    plans: []
                });
            }
            return auditors;
        }

        // ==================== 生成不重叠的排班计划 ====================
        // 业务规则：
        // 1. 审核活动（初次认证/监督/再认证）必须 >= 1天（不能是0.5天）
        // 2. 非审核活动、休假/请假、二方审核支持0.5天（纯半天）
        function generatePlans(auditor, year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const plans = [];
            let currentDay = 1;
            let remaining = auditor.initialRemaining;
            const occupiedDays = new Set();

            while (currentDay <= daysInMonth) {
                const date = new Date(year, month, currentDay);
                const weekDay = date.getDay();

                // 跳过周末和已占用的日期
                if (weekDay === 0 || weekDay === 6 || occupiedDays.has(currentDay)) {
                    currentDay++;
                    continue;
                }

                // 随机决定是否安排任务（72%概率）
                if (Math.random() > 0.28) {
                    const rand = Math.random();
                    let taskCategory;

                    // 分类概率：审核活动65%、非审核活动12%、休假10%、二方审核8%、空5%
                    if (rand > 0.92) {
                        taskCategory = 'external';
                    } else if (rand > 0.82) {
                        taskCategory = 'leave';
                    } else if (rand > 0.70) {
                        taskCategory = 'non-audit';
                    } else {
                        taskCategory = 'audit';
                    }

                    // 根据类别确定duration（天数）
                    let duration;
                    if (taskCategory === 'audit') {
                        // 审核活动必须 >= 1天，不能是0.5天
                        const auditWeights = [1,1,1,1.5,1.5,2,2,2.5,3];
                        duration = auditWeights[Math.floor(Math.random() * auditWeights.length)];
                    } else {
                        // 其他类型支持0.5天（纯半天）
                        const otherWeights = [0.5,0.5,0.5,1,1,1,1.5,1.5,2];
                        duration = otherWeights[Math.floor(Math.random() * otherWeights.length)];
                    }

                    // 计算需要多少个工作日（0.5天也需要1个工作日）
                    const neededWorkdays = Math.ceil(duration);

                    // 收集连续可用工作日（跳过周末、节假日、已占用日）
                    let workdays = [];
                    let dayCounter = currentDay;
                    while (workdays.length < neededWorkdays && dayCounter <= daysInMonth) {
                        const checkDate = new Date(year, month, dayCounter);
                        const checkWeekDay = checkDate.getDay();
                        const isHoliday = getHoliday(month + 1, dayCounter);

                        if (checkWeekDay !== 0 && checkWeekDay !== 6 && !isHoliday) {
                            if (occupiedDays.has(dayCounter)) {
                                break;
                            }
                            workdays.push(dayCounter);
                        }
                        dayCounter++;
                    }

                    // 如果收集到的工作日不足，跳过
                    if (workdays.length < neededWorkdays) {
                        currentDay++;
                        continue;
                    }

                    const startDay = workdays[0];
                    const endDay = workdays[workdays.length - 1];

                    // 标记占用的日期
                    workdays.forEach(d => occupiedDays.add(d));

                    // 创建计划对象
                    let planObj = {
                        id: '',
                        companyName: '',
                        auditType: '',
                        isNonAudit: false,
                        isLeave: false,
                        isExternal: false,
                        days: duration,
                        startDay: startDay,
                        endDay: endDay,
                        leader: auditor.name,
                        members: '',
                        address: '-',
                        remainingAtStart: remaining.toFixed(1),
                        status: ''
                    };

                    if (taskCategory === 'non-audit') {
                        const type = nonAuditTypes[Math.floor(Math.random() * nonAuditTypes.length)];
                        planObj.id = 'NA' + Math.random().toString(36).substr(2, 9);
                        planObj.companyName = type;
                        planObj.auditType = type;
                        planObj.isNonAudit = true;
                        planObj.status = 'non-audit';
                    } else if (taskCategory === 'leave') {
                        const type = leaveTypes[Math.floor(Math.random() * leaveTypes.length)];
                        planObj.id = 'LV' + Math.random().toString(36).substr(2, 9);
                        planObj.companyName = type;
                        planObj.auditType = type;
                        planObj.isLeave = true;
                        planObj.status = 'leave';
                    } else if (taskCategory === 'external') {
                        const company = companies[Math.floor(Math.random() * companies.length)];
                        planObj.id = 'EX' + Math.floor(Math.random() * 100000000);
                        planObj.companyName = company + '有限公司';
                        planObj.auditType = '二方审核';
                        planObj.isExternal = true;
                        planObj.members = Math.random() > 0.6 ? generateMembers() : '';
                        planObj.address = addresses[Math.floor(Math.random() * addresses.length)];
                        planObj.leader = Math.random() > 0.5 ? auditor.name : 
                            surnames[Math.floor(Math.random() * surnames.length)] + names[Math.floor(Math.random() * names.length)];
                        planObj.status = 'external';
                        remaining -= duration;
                    } else {
                        const company = companies[Math.floor(Math.random() * companies.length)];
                        const type = auditTypes[Math.floor(Math.random() * auditTypes.length)];
                        planObj.id = 'RZ' + Math.floor(Math.random() * 100000000);
                        planObj.companyName = company + '有限公司';
                        planObj.auditType = type;
                        planObj.members = Math.random() > 0.6 ? generateMembers() : '';
                        planObj.address = addresses[Math.floor(Math.random() * addresses.length)];
                        planObj.leader = Math.random() > 0.5 ? auditor.name : 
                            surnames[Math.floor(Math.random() * surnames.length)] + names[Math.floor(Math.random() * names.length)];
                        planObj.status = 'approved';
                        remaining -= duration;
                    }

                    plans.push(planObj);
                    currentDay = endDay + 1;
                } else {
                    currentDay++;
                }
            }

            // 计算月度累计天数（支持小数）
            auditor.monthlyDays = plans.reduce((sum, p) => sum + parseFloat(p.days), 0);
            auditor.remainingDays = remaining;

            return plans;
        }

        function generateMembers() {
            const count = Math.floor(Math.random() * 2) + 1;
            const members = [];
            for (let i = 0; i < count; i++) {
                members.push(surnames[Math.floor(Math.random() * surnames.length)] + 
                           names[Math.floor(Math.random() * names.length)]);
            }
            return members.join('、');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            try {
                scheduleData = generateAuditors();
                querySchedule();

                // 绑定筛选器
                ['yearSelect', 'monthSelect', 'typeSelect', 'scheduleStatusSelect', 
                 'auditTypeSelect', 'limitSelect'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('change', querySchedule);
                    }
                });

                // 外部点击关闭弹窗
                const modalOverlay = document.getElementById('editModal');
                if (modalOverlay) {
                    modalOverlay.addEventListener('click', function(e) {
                        if (e.target === this) closeModal();
                    });
                }
            } catch (err) {
                console.error('初始化错误:', err);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="33" class="empty-state" style="color:#c53030;">初始化出错，请刷新页面重试<br>错误：' + err.message + '</td></tr>';
            }
        });

        // ==================== 查询排班 ====================
        function querySchedule() {
            try {
                const year = parseInt(document.getElementById('yearSelect').value) || 2026;
                const month = parseInt(document.getElementById('monthSelect').value) || 3;
                const type = document.getElementById('typeSelect').value || 'all';
                const scheduleStatus = document.getElementById('scheduleStatusSelect').value || 'all';
                const auditType = document.getElementById('auditTypeSelect').value || 'all';
                const limit = document.getElementById('limitSelect').value || 'all';
                const search = document.getElementById('personSearch').value.trim();

                // 为每个审核员生成该月的排班计划
                scheduleData.forEach(auditor => {
                    auditor.plans = generatePlans(auditor, year, month);
                });

                // 过滤数据
                let filtered = scheduleData.filter(person => {
                    if (type !== 'all' && person.type !== type) return false;
                    if (scheduleStatus === 'scheduled' && person.plans.length === 0) return false;
                    if (scheduleStatus === 'empty' && person.plans.length > 0) return false;

                    if (auditType !== 'all') {
                        if (auditType === '非审核活动') {
                            if (!person.plans.some(p => p.isNonAudit)) return false;
                        } else if (auditType === '休假') {
                            if (!person.plans.some(p => p.isLeave)) return false;
                        } else if (auditType === '二方审核') {
                            if (!person.plans.some(p => p.isExternal)) return false;
                        } else {
                            if (!person.plans.some(p => p.auditType === auditType)) return false;
                        }
                    }

                    if (limit === 'exceed' && person.monthlyDays <= 15) return false;
                    if (limit === 'normal' && person.monthlyDays > 15) return false;

                    if (search) {
                        const terms = search.split(/[\/\s]/).map(s => s.trim()).filter(s => s);
                        if (terms.length > 0) {
                            const matchName = terms.some(t => person.name.includes(t));
                            const matchId = terms.some(t => person.id.toLowerCase().includes(t.toLowerCase()));
                            if (!matchName && !matchId) return false;
                        }
                    }

                    return true;
                });

                // 排序
                filtered.sort((a, b) => {
                    if (currentSortColumn === 'monthlyDays') {
                        return sortDirection === 'desc' ? b.monthlyDays - a.monthlyDays : a.monthlyDays - b.monthlyDays;
                    }
                    return 0;
                });

                currentData = filtered;
                updateStats(filtered);
                renderSchedule(filtered, year, month);
            } catch (err) {
                console.error('查询错误:', err);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="33" class="empty-state" style="color:#c53030;">查询出错：' + err.message + '</td></tr>';
            }
        }

        // ==================== 排序功能 ====================
        function sortByMonthlyDays() {
            sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            currentSortColumn = 'monthlyDays';

            currentData.sort((a, b) => {
                return sortDirection === 'desc' ? b.monthlyDays - a.monthlyDays : a.monthlyDays - b.monthlyDays;
            });

            const year = parseInt(document.getElementById('yearSelect').value) || 2026;
            const month = parseInt(document.getElementById('monthSelect').value) || 3;
            renderSchedule(currentData, year, month);
        }

        // ==================== 重置筛选 ====================
        function resetFilter() {
            document.getElementById('typeSelect').value = 'all';
            document.getElementById('scheduleStatusSelect').value = 'all';
            document.getElementById('auditTypeSelect').value = 'all';
            document.getElementById('limitSelect').value = 'all';
            document.getElementById('personSearch').value = '';
            sortDirection = 'desc';
            currentSortColumn = 'monthlyDays';
            querySchedule();
        }

        // ==================== 更新统计 ====================
        function updateStats(data) {
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('scheduledCount').textContent = data.filter(p => p.plans && p.plans.length > 0).length;
            document.getElementById('fullTimeCount').textContent = data.filter(p => p.type === '专职').length;
            document.getElementById('partTimeCount').textContent = data.filter(p => p.type === '兼职').length;
            document.getElementById('exceedCount').textContent = data.filter(p => p.monthlyDays > 15).length;
        }

        // ==================== 渲染排班表 ====================
        function renderSchedule(data, year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            if (!data || data.length === 0) {
                document.getElementById('tableHead').innerHTML = '';
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="' + (daysInMonth + 2) + '" class="empty-state">暂无符合条件的数据</td></tr>';
                return;
            }

            renderHeader(daysInMonth, year, month);
            renderBody(data, daysInMonth, year, month);
        }

        // ==================== 渲染表头 ====================
        function renderHeader(days, year, month) {
            const thead = document.getElementById('tableHead');
            const sortIcon = sortDirection === 'desc' ? '▼' : '▲';

            let html = '<tr>';
            html += '<th class="sticky-col header col-person">审核人员信息</th>';
            html += `<th class="sticky-col header col-days" style="left:165px;cursor:pointer;" onclick="sortByMonthlyDays()">
                月度天数<br><span class="sort-icon">${sortIcon}</span>
            </th>`;

            for (let i = 1; i <= days; i++) {
                const date = new Date(year, month, i);
                const weekDay = date.getDay();
                const isWeekend = weekDay === 0 || weekDay === 6;
                const holiday = getHoliday(month + 1, i);
                const weekText = ['日','一','二','三','四','五','六'][weekDay];

                let className = 'date-header col-date';
                if (isWeekend) className += ' weekend';
                if (holiday) className += ' holiday';

                html += `<th class="${className}">
                    <span class="day-number">${i}</span>
                    <span class="day-week">${weekText}</span>
                    ${holiday ? `<span class="holiday-name">${holiday.name}</span>` : ''}
                </th>`;
            }

            html += '</tr>';
            thead.innerHTML = html;
        }

        function getHoliday(month, day) {
            if (holidays[month]) {
                return holidays[month].find(h => h.day === day);
            }
            return null;
        }

        // ==================== 渲染表格主体 ====================
        function renderBody(data, days, year, month) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            data.forEach((person) => {
                const isExceed = person.monthlyDays > 15;
                html += `<tr id="row-${person.id}" onclick="toggleRow('${person.id}')">`;

                // 人员信息列
                html += `<td class="sticky-col col-person">
                    <div class="person-info">
                        <div class="person-name">
                            ${person.name}
                            ${person.type === '专职' ? 
                                '<span class="badge badge-primary">专职</span>' : 
                                '<span class="badge badge-secondary">兼职</span>'}
                        </div>
                        <div class="person-id">${person.id}</div>
                        <div class="person-meta">
                            <span style="font-size:11px;color:#718096;">剩余 ${person.remainingDays.toFixed(1)}天</span>
                        </div>
                    </div>
                </td>`;

                // 月度天数列
                html += `<td class="sticky-col col-days ${isExceed ? 'exceed' : ''}" style="left:165px;">
                    <div class="days-cell ${isExceed ? 'exceed' : ''}">
                        ${person.monthlyDays.toFixed(1)}
                        ${isExceed ? '<span style="font-size:9px;color:#c53030;">超限</span>' : ''}
                    </div>
                </td>`;

                // 每天的单元格
                const dayPlans = buildDayPlanMap(person.plans, days, year, month);

                for (let day = 1; day <= days; day++) {
                    const date = new Date(year, month, day);
                    const weekDay = date.getDay();
                    const isWeekend = weekDay === 0 || weekDay === 6;
                    const holiday = getHoliday(month + 1, day);
                    const plan = dayPlans[day];

                    let cellClass = 'schedule-cell col-date';
                    if (isWeekend) cellClass += ' weekend';
                    if (holiday) cellClass += ' holiday';

                    html += `<td class="${cellClass}" 
                        ondblclick="openPlanEditor('${person.id}', ${year}, ${month}, ${day}, event)"
                        onmouseenter="showTooltip(event, '${person.id}', ${day}, ${month}, ${year})"
                        onmouseleave="hideTooltip()">`;

                    // 渲染任务条 - 只在任务开始日渲染
                    if (plan && plan.isStart) {
                        let barClass = 'task-bar';
                        if (plan.isLeave) {
                            barClass += ' leave';
                        } else if (plan.isNonAudit) {
                            barClass += ' non-audit';
                        } else if (plan.isExternal) {
                            barClass += ' external';
                        } else {
                            barClass += ' audit';
                        }

                        // 计算宽度：按实际天数比例 × 每日列宽(46px)，减去边距
                        let width = Math.max(plan.days * 46 - 4, 18);

                        // 半天任务使用简化展示
                        let taskContent = '';
                        if (plan.days === 0.5) {
                            barClass += ' half-day';
                            const shortType = plan.auditType.length > 2 ? plan.auditType.substring(0, 2) : plan.auditType;
                            taskContent = `<div class="half-day-label">${shortType}</div>
                                           <div class="half-day-type">0.5天</div>`;
                        } else {
                            const company = plan.companyName.length > 4 ? 
                                plan.companyName.substring(0, 4) + '..' : plan.companyName;
                            taskContent = `<div class="task-company" title="${plan.companyName}">${company}</div>
                                           <div class="task-type">${plan.auditType}</div>
                                           <div class="task-days">
                                               <span>${plan.days}天</span>
                                               <span class="task-remaining">剩${plan.remainingAtStart}</span>
                                           </div>`;
                        }

                        const hasHalfDay = plan.days % 1 !== 0;
                        const dataAttr = hasHalfDay ? ' data-has-half="true"' : '';

                        html += `<div class="${barClass}" style="width:${width}px;"${dataAttr}
                            onclick="showPlanDetail('${plan.id}', event)">
                            ${taskContent}
                        </div>`;
                    }

                    html += '</td>';
                }

                html += '</tr>';
            });

            tbody.innerHTML = html;
        }

        // 计算范围内的工作日数（排除周末和节假日）
        function countWorkdaysInRange(startDay, endDay, year, month) {
            let count = 0;
            for (let d = startDay; d <= endDay; d++) {
                const date = new Date(year, month, d);
                const weekDay = date.getDay();
                if (weekDay === 0 || weekDay === 6) continue;
                if (getHoliday(month + 1, d)) continue;
                count++;
            }
            return Math.max(count, 1);
        }

        // 构建每天的计划映射
        function buildDayPlanMap(plans, daysInMonth, year, month) {
            const dayMap = {};
            if (!plans || plans.length === 0) return dayMap;

            plans.forEach(plan => {
                const startDay = parseInt(plan.startDay);
                const endDay = parseInt(plan.endDay);

                for (let d = startDay; d <= endDay && d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const weekDay = date.getDay();

                    // 跳过周末和节假日
                    if (weekDay === 0 || weekDay === 6) continue;
                    if (getHoliday(month + 1, d)) continue;

                    dayMap[d] = {
                        ...plan,
                        isStart: d === startDay
                    };
                }
            });

            return dayMap;
        }

        // ==================== 行选中 ====================
        function toggleRow(id) {
            const row = document.getElementById(`row-${id}`);
            if (!row) return;
            if (selectedRows.has(id)) {
                selectedRows.delete(id);
                row.classList.remove('selected');
            } else {
                selectedRows.add(id);
                row.classList.add('selected');
            }
        }

        // ==================== 提示框 ====================
        function showTooltip(e, personId, day, month, year) {
            const person = currentData.find(p => p.id === personId);
            if (!person) return;

            const dayPlans = buildDayPlanMap(person.plans, 31, year, month);
            const plan = dayPlans[day];

            if (!plan) return;

            const tooltip = document.getElementById('tooltip');
            if (!tooltip) return;

            let content = `<div class="tooltip-title">${plan.companyName}</div>`;

            content += `
                <div class="tooltip-row">
                    <span class="tooltip-label">审核人员:</span>
                    <span class="tooltip-value">${person.name} (${person.id})</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">计划时间:</span>
                    <span class="tooltip-value">${month+1}月${plan.startDay}日 - ${month+1}月${plan.endDay}日</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">占用天数:</span>
                    <span class="tooltip-value">${plan.days}天</span>
                </div>
            `;

            if (plan.isLeave) {
                content += `
                    <div class="tooltip-row">
                        <span class="tooltip-label">请假类型:</span>
                        <span class="tooltip-value">${plan.auditType}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">剩余可用:</span>
                        <span class="tooltip-value">${plan.remainingAtStart}天</span>
                    </div>
                    <div style="margin-top:6px;">
                        <span class="tooltip-status leave">● 休假/请假</span>
                    </div>
                `;
            } else if (plan.isNonAudit) {
                content += `
                    <div class="tooltip-row">
                        <span class="tooltip-label">活动类型:</span>
                        <span class="tooltip-value">${plan.auditType}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">剩余可用:</span>
                        <span class="tooltip-value">${plan.remainingAtStart}天</span>
                    </div>
                    <div style="margin-top:6px;">
                        <span class="tooltip-status non-audit">◎ 非审核活动</span>
                    </div>
                `;
            } else if (plan.isExternal) {
                content += `
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核类型:</span>
                        <span class="tooltip-value">二方审核</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">公司地址:</span>
                        <span class="tooltip-value">${plan.address || '-'}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核组长:</span>
                        <span class="tooltip-value">${plan.leader || '-'}</span>
                    </div>
                    ${plan.members ? `
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核组员:</span>
                        <span class="tooltip-value">${plan.members}</span>
                    </div>` : ''}
                    <div class="tooltip-row">
                        <span class="tooltip-label">项目剩余:</span>
                        <span class="tooltip-value">${plan.remainingAtStart}天</span>
                    </div>
                    <div style="margin-top:6px;">
                        <span class="tooltip-status external">◆ 二方审核</span>
                    </div>
                `;
            } else {
                content += `
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核类型:</span>
                        <span class="tooltip-value">${plan.auditType}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">公司地址:</span>
                        <span class="tooltip-value">${plan.address || '-'}</span>
                    </div>
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核组长:</span>
                        <span class="tooltip-value">${plan.leader || '-'}</span>
                    </div>
                    ${plan.members ? `
                    <div class="tooltip-row">
                        <span class="tooltip-label">审核组员:</span>
                        <span class="tooltip-value">${plan.members}</span>
                    </div>` : ''}
                    <div class="tooltip-row">
                        <span class="tooltip-label">项目剩余:</span>
                        <span class="tooltip-value">${plan.remainingAtStart}天</span>
                    </div>
                    <div style="margin-top:6px;">
                        <span class="tooltip-status approved">✓ 已安排（已批准）</span>
                    </div>
                `;
            }

            tooltip.innerHTML = content;
            tooltip.classList.add('visible');

            const rect = e.target.getBoundingClientRect();
            let left = rect.right + 8;
            let top = rect.top;

            if (left + 320 > window.innerWidth) {
                left = rect.left - 330;
            }
            if (top + 250 > window.innerHeight) {
                top = window.innerHeight - 260;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            if (tooltip) tooltip.classList.remove('visible');
        }

        // ==================== 编辑弹窗 ====================
        function openPlanEditor(personId, year, month, day, event) {
            if (event) event.stopPropagation();
            const person = currentData.find(p => p.id === personId);
            if (!person) return;

            document.getElementById('modalPerson').value = `${person.name} (${person.id})`;
            document.getElementById('modalDate').value = `${year}年${month+1}月${day}日`;
            document.getElementById('modalCompany').value = '';
            document.getElementById('modalType').value = '初次认证';
            document.getElementById('modalDays').value = '1';

            currentEditing = { personId, year, month, day };
            document.getElementById('editModal').classList.add('active');
        }

        function showPlanDetail(planId, event) {
            if (event) event.stopPropagation();
            console.log('Plan ID:', planId);
        }

        function closeModal() {
            const modal = document.getElementById('editModal');
            if (modal) modal.classList.remove('active');
            currentEditing = null;
        }

        function saveSchedule() {
            if (!currentEditing) return;

            const company = document.getElementById('modalCompany').value;
            const type = document.getElementById('modalType').value;
            const days = parseFloat(document.getElementById('modalDays').value);

            if (!company) {
                alert('请输入客户企业名称');
                return;
            }

            // 业务校验：审核活动必须 >= 1天
            const auditActivities = ['初次认证', '监督一', '监督二', '再认证'];
            if (auditActivities.includes(type) && days < 1) {
                alert('审核活动（初次认证/监督/再认证）必须至少安排1天，不能为0.5天');
                return;
            }

            alert('排班信息已保存！');
            closeModal();
            querySchedule();
        }

        // ==================== 导出数据 ====================
        function exportData() {
            const year = document.getElementById('yearSelect').value;
            const month = parseInt(document.getElementById('monthSelect').value) + 1;

            let csv = '\uFEFF审核员编号,姓名,类型,初始剩余天数,月度累计天数,最终剩余天数\n';

            currentData.forEach(person => {
                csv += `${person.id},${person.name},${person.type},${person.initialRemaining},${person.monthlyDays.toFixed(1)},${person.remainingDays.toFixed(1)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `CQC排班表_${year}_${month}.csv`;
            link.click();
        }
    </script>
</body>
</html>
