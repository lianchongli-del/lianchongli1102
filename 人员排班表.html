

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQC审核人员排班计划表</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;

            --weekend-bg: #f8fafc;
            --weekend-text: #475569;
            --holiday-bg: #fff7ed;
            --holiday-text: #c2410c;
            --hover-bg: #f8fafc;
            --selected-bg: #eff6ff;

            --audit-bg: #dbeafe;
            --audit-text: #1e40af;
            --audit-border: #93c5fd;

            --non-audit-bg: #fef3c7;
            --non-audit-text: #92400e;
            --non-audit-border: #fcd34d;

            --leave-bg: #fee2e2;
            --leave-text: #991b1b;
            --leave-border: #fca5a5;

            --external-bg: #ede9fe;
            --external-text: #5b21b6;
            --external-border: #c4b5fd;

            --borrow-bg: #dcfce7;
            --borrow-text: #166534;
            --borrow-border: #86efac;

            --exceed-color: #dc2626;
            --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-right: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            flex: 0 0 100%;
        }

        .title-mark {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #eff6ff;
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            border: 1px solid #bfdbfe;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            color: #374151;
            font-weight: 500;
            white-space: nowrap;
        }

        select, input[type="text"], input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: all 0.2s;
            min-width: 90px;
            height: 32px;
        }

        select:focus, input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input[type="text"] {
            min-width: 140px;
            width: 140px;
        }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .btn {
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 32px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-secondary {
            background: white;
            color: #374151;
            border-color: #d1d5db;
        }

        .btn-secondary:hover {
            background: #f9fafb;
            border-color: #9ca3af;
            color: var(--text-primary);
        }

        .stats-bar {
            margin: 20px 24px 0;
            background: transparent;
            padding: 0;
            border-bottom: none;
            display: flex;
            gap: 12px;
            font-size: 13px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .stat-value {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 16px;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-warning {
            margin-left: auto;
            color: var(--exceed-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            background: #fff;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .main-container {
            padding: 20px 24px 24px;
            width: 100%;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 12px;
            background: white;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .schedule-wrapper {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .schedule-container {
            overflow: auto;
            max-height: calc(100vh - 200px);
            position: relative;
        }

        .schedule-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: max-content;
            table-layout: fixed;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: var(--card-bg);
            z-index: 20;
            box-shadow: 2px 0 3px rgba(0,0,0,0.06);
        }

        .sticky-col.header {
            z-index: 30;
            background: #f8fafc;
        }

        .schedule-table th {
            background: #f8fafc;
            padding: 8px 4px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-light);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            height: 52px;
        }

        .schedule-table th.date-header {
            min-width: 46px;
            max-width: 46px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .schedule-table th.date-header:hover {
            background: var(--hover-bg);
        }

        .schedule-table th.date-header.weekend {
            background: #f0fff4;
            color: var(--weekend-text);
        }

        .schedule-table th.date-header.holiday {
            background: #fff5f5;
            color: var(--holiday-text);
        }

        .day-number {
            font-size: 14px;
            font-weight: 700;
            display: block;
            line-height: 1.2;
        }

        .day-week {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 1px;
            display: block;
        }

        .schedule-table tr {
            transition: background 0.15s;
        }

        .schedule-table tr:hover {
            background: var(--hover-bg);
        }

        .schedule-table tr.selected {
            background: var(--selected-bg);
        }

        .schedule-table td {
            padding: 0;
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
            vertical-align: top;
            height: 48px;
            /* position: relative; */
        }

        .person-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 6px 10px;
            height: 100%;
            justify-content: center;
        }

        .person-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .person-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-primary {
            background: #bee3f8;
            color: #2c5282;
        }

        .badge-secondary {
            background: #edf2f7;
            color: #4a5568;
        }

        .badge-exceed {
            background: #fed7d7;
            color: #9b2c2c;
            font-weight: 600;
        }

        .days-cell {
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            padding: 6px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            user-select: none;
        }

        .days-cell:hover {
            background: #e6fffa;
        }

        .days-cell.exceed {
            color: var(--exceed-color);
            background: #fff5f5;
        }

        .days-cell.exceed:hover {
            background: #fed7d7;
        }

        .schedule-cell {
            position: relative;
            height: 48px;
            min-width: 46px;
            max-width: 46px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .schedule-cell:hover {
            background: rgba(66, 153, 225, 0.04);
        }

        .schedule-cell.weekend {
            background: var(--weekend-bg);
        }

        .schedule-cell.holiday {
            background: var(--holiday-bg);
        }

        .task-bar {
            position: absolute;
            top: 2px;
            bottom: 2px;
            left: 2px;
            border-radius: 4px;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            padding: 2px 3px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            z-index: 5;
            line-height: 1.25;
            text-align: left;
            border: 1px solid transparent;
            min-width: 16px;
        }

        .task-bar:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
            z-index: 15;
        }

        .task-bar.audit {
            background: var(--audit-bg);
            color: var(--audit-text);
            border-color: var(--audit-border);
        }

        .task-bar.non-audit {
            background: var(--non-audit-bg);
            color: var(--non-audit-text);
            border-color: var(--non-audit-border);
        }

        .task-bar.leave {
            background: var(--leave-bg);
            color: var(--leave-text);
            border-color: var(--leave-border);
        }

        .task-bar.external {
            background: var(--external-bg);
            color: var(--external-text);
            border-color: var(--external-border);
        }

        .task-bar.borrow {
            background: var(--borrow-bg);
            color: var(--borrow-text);
            border-color: var(--borrow-border);
        }

        .task-company {
            font-weight: 600;
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 1px;
        }

        .task-type {
            font-size: 9px;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-days {
            font-size: 9px;
            opacity: 0.85;
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-remaining {
            font-size: 8px;
            opacity: 0.8;
        }

        .task-bar.half-day {
            padding: 1px 2px;
            justify-content: center;
        }

        .task-bar.half-day .half-day-label {
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
        }

        .task-bar.half-day .half-day-type {
            font-size: 8px;
            opacity: 0.9;
            text-align: center;
            white-space: nowrap;
        }

        .tooltip {
            position: fixed;
            background: #fff;
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 320px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            line-height: 1.5;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 8px;
            color: var(--text-primary);
        }

        .tooltip-row {
            display: flex;
            gap: 6px;
            margin: 3px 0;
        }

        .tooltip-label {
            color: var(--text-muted);
            min-width: 65px;
            flex-shrink: 0;
            font-size: 11px;
        }

        .tooltip-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 640px;
            max-height: 80vh;
            overflow: auto;
            transform: translateY(-10px);
            transition: transform 0.3s;
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            min-height: 52px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-radius: 8px 8px 0 0;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 18px 20px;
        }

        .form-group {
            margin-bottom: 0;
            min-width: 0;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            height: 36px;
            padding: 7px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font: inherit;
            font-size: 13px;
            color: var(--text-primary);
            background: #fff;
            transition: all 0.2s;
        }

        .file-input-hidden {
            display: none;
        }

        .upload-button {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #374151;
            font: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-button:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .application-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .application-row-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .person-picker {
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 7px 12px;
            height: 36px;
            min-width: 0;
            width: 100% !important;
            background: #fff;
            color: var(--text-primary);
            font: inherit;
            font-size: 13px;
            font-weight: 500;
            box-shadow: none;
        }

        .person-picker-wrap {
            position: relative;
            width: 100%;
        }

        .person-dropdown {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 4px);
            z-index: 20;
            display: none;
            max-height: 240px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: var(--shadow-lg);
            padding: 4px;
        }

        .person-dropdown.open {
            display: block;
        }

        .person-option {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            padding: 8px 10px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            font: inherit;
        }

        .person-option:hover {
            background: #eff6ff;
            color: var(--primary-color);
        }

        .person-option-name {
            font-weight: 600;
        }

        .person-option-id {
            color: var(--text-muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
        }

        .person-empty {
            padding: 14px 10px;
            color: var(--text-muted);
            text-align: center;
        }

        .person-picker:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .date-range-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea.form-input {
            min-height: 88px;
            height: auto;
            resize: vertical;
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-section {
            border-top: 1px solid var(--border-light);
            margin-top: 14px;
            padding-top: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .required {
            color: var(--exceed-color);
            margin-left: 2px;
        }

        .approval-flow {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .approval-step {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            background: #f8fafc;
        }

        .approval-step-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 13px;
        }

        .approval-step-meta {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }

        .attachment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .attachment-chip {
            background: #fff;
            color: #475569;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
        }

        .attachment-name {
            max-width: 190px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .attachment-action {
            border: 0;
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            padding: 0 2px;
        }

        .attachment-action.delete {
            color: var(--exceed-color);
        }

        .attachment-action:hover {
            text-decoration: underline;
        }

        .field-hidden {
            display: none !important;
        }

        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: #fff;
            border-radius: 0 0 8px 8px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;

</head>

    <script>
        // ==================== 数据定义 ====================
        const surnames = ['张','王','李','刘','陈','杨','黄','赵','周','吴','徐','孙','马','朱','胡','郭','何','高','林','罗'];
        const names = ['伟','芳','娜','敏','静','丽','强','磊','军','洋','勇','艳','杰','涛','明','超','秀','霞','平','刚','鹏','晶','辉','燕','鑫','雪'];
        const companies = ['广东电子','深圳制造','广州食品','东莞包装','佛山机械','惠州光学','珠海智能','中山医疗','江门化工','肇庆纺织'];
        const addresses = ['广州市天河区','深圳市南山区','东莞市松山湖','佛山市顺德区','惠州市仲恺区'];
        const auditTypes = ['初次认证','监督一','监督二','再认证'];
        const nonAuditTypes = ['内部培训','外部培训','会议'];
        const leaveTypes = ['年假','事假','病假','调休'];
        const applicationTypeOptions = {
            '审核活动': auditTypes,
            '非审核活动': nonAuditTypes,
            '休假/请假': leaveTypes,
            '二方审核': ['二方审核'],
            '借调': ['借调']
        };

        // 全局变量
        let scheduleData = [];
        let currentData = [];
        let manualApplications = [];
        let selectedRows = new Set();
        let currentEditing = null;
        let selectedApplicationPersonId = '';
        let applicationAttachments = [];
        let sortDirection = 'desc';
        let currentSortColumn = 'monthlyDays';

        // 节假日配置
        const holidays = {
            4: [{day: 4, name: "清明"}, {day: 5, name: "清明"}],
            5: [{day: 1, name: "劳动"}, {day: 2, name: "劳动"}],
            6: [{day: 22, name: "端午"}],
            10: [{day: 1, name: "国庆"}, {day: 2, name: "国庆"}, {day: 3, name: "国庆"}]
        };

        // ==================== 生成审核人员 ====================
        function generateAuditors() {
            const auditors = [];
            for (let i = 0; i < 30; i++) {
                const id = 'cqc' + String(Math.floor(Math.random() * 90000) + 10000).padStart(5, '0');
                const name = surnames[Math.floor(Math.random() * surnames.length)] + 
                            names[Math.floor(Math.random() * names.length)];
                const isFullTime = Math.random() > 0.3;
                const initialRemaining = 160 + Math.floor(Math.random() * 20);

                auditors.push({
                    id: id,
                    name: name,
                    type: isFullTime ? '专职' : '兼职',
                    initialRemaining: initialRemaining,
                    remainingDays: initialRemaining,
                    monthlyDays: 0,
                    plans: []
                });
            }
            return auditors;
        }

        // ==================== 生成不重叠的排班计划 ====================
        // 业务规则：
        // 1. 审核活动（初次认证/监督/再认证）必须 >= 1天（不能是0.5天）
        // 2. 非审核活动、休假/请假、二方审核支持0.5天（纯半天）
        function generatePlans(auditor, year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const plans = [];
            let currentDay = 1;
            let remaining = auditor.initialRemaining;
            const occupiedDays = new Set();

            while (currentDay <= daysInMonth) {
                const date = new Date(year, month, currentDay);
                const weekDay = date.getDay();

                // 跳过周末和已占用的日期
                if (weekDay === 0 || weekDay === 6 || occupiedDays.has(currentDay)) {
                    currentDay++;
                    continue;
                }

                // 随机决定是否安排任务（72%概率）
                if (Math.random() > 0.28) {
                    const rand = Math.random();
                    let taskCategory;

                    // 分类概率：审核活动65%、非审核活动12%、休假10%、二方审核8%、空5%
                    if (rand > 0.92) {
                        taskCategory = 'external';
                    } else if (rand > 0.82) {
                        taskCategory = 'leave';
                    } else if (rand > 0.70) {
                        taskCategory = 'non-audit';
                    } else {
                        taskCategory = 'audit';
                    }

                    // 根据类别确定duration（天数）
                    let duration;
                    if (taskCategory === 'audit') {
                        // 审核活动必须 >= 1天，不能是0.5天
                        const auditWeights = [1,1,1,1.5,1.5,2,2,2.5,3];
                        duration = auditWeights[Math.floor(Math.random() * auditWeights.length)];
                    } else {
                        // 其他类型支持0.5天（纯半天）
                        const otherWeights = [0.5,0.5,0.5,1,1,1,1.5,1.5,2];
                        duration = otherWeights[Math.floor(Math.random() * otherWeights.length)];
                    }

                    // 计算需要多少个工作日（0.5天也需要1个工作日）
                    const neededWorkdays = Math.ceil(duration);

                    // 收集连续可用工作日（跳过周末、节假日、已占用日）
                    let workdays = [];
                    let dayCounter = currentDay;
                    while (workdays.length < neededWorkdays && dayCounter <= daysInMonth) {
                        const checkDate = new Date(year, month, dayCounter);
                        const checkWeekDay = checkDate.getDay();
                        const isHoliday = getHoliday(month + 1, dayCounter);

                        if (checkWeekDay !== 0 && checkWeekDay !== 6 && !isHoliday) {
                            if (occupiedDays.has(dayCounter)) {
                                break;
                            }
                            workdays.push(dayCounter);
                        }
                        dayCounter++;
                    }

                    // 如果收集到的工作日不足，跳过
                    if (workdays.length < neededWorkdays) {
                        currentDay++;
                        continue;
                    }

                    const startDay = workdays[0];
                    const endDay = workdays[workdays.length - 1];

                    // 标记占用的日期
                    workdays.forEach(d => occupiedDays.add(d));

                    // 创建计划对象
                    let planObj = {
                        id: '',
                        companyName: '',
                        auditType: '',
                        isNonAudit: false,
                        isLeave: false,
                        isExternal: false,
                        isBorrowed: false,
                        days: duration,
                        startDay: startDay,
                        endDay: endDay,
                        leader: auditor.name,
                        members: '',
                        address: '-',
                        remainingAtStart: remaining.toFixed(1),
                        status: '',
                        approvalSteps: []
                    };

                    if (taskCategory === 'non-audit') {
                        const type = nonAuditTypes[Math.floor(Math.random() * nonAuditTypes.length)];
                        planObj.id = 'NA' + Math.random().toString(36).substr(2, 9);
                        planObj.companyName = type;
                        planObj.auditType = type;
                        planObj.isNonAudit = true;
                        planObj.status = 'non-audit';
                    } else if (taskCategory === 'leave') {
                        const type = leaveTypes[Math.floor(Math.random() * leaveTypes.length)];
                        planObj.id = 'LV' + Math.random().toString(36).substr(2, 9);
                        planObj.companyName = type;
                        planObj.auditType = type;
                        planObj.isLeave = true;
                        planObj.status = 'leave';
                    } else if (taskCategory === 'external') {
                        const company = companies[Math.floor(Math.random() * companies.length)];
                        planObj.id = 'EX' + Math.floor(Math.random() * 100000000);
                        planObj.companyName = company + '有限公司';
                        planObj.auditType = '二方审核';
                        planObj.isExternal = true;
                        planObj.members = Math.random() > 0.6 ? generateMembers() : '';
                        planObj.address = addresses[Math.floor(Math.random() * addresses.length)];
                        planObj.leader = Math.random() > 0.5 ? auditor.name : 
                            surnames[Math.floor(Math.random() * surnames.length)] + names[Math.floor(Math.random() * names.length)];
                        planObj.status = 'external';
                        remaining -= duration;
                    } else {
                        const company = companies[Math.floor(Math.random() * companies.length)];
                        const type = auditTypes[Math.floor(Math.random() * auditTypes.length)];
                        planObj.id = 'RZ' + Math.floor(Math.random() * 100000000);
                        planObj.companyName = company + '有限公司';
                        planObj.auditType = type;
                        planObj.members = Math.random() > 0.6 ? generateMembers() : '';
                        planObj.address = addresses[Math.floor(Math.random() * addresses.length)];
                        planObj.leader = Math.random() > 0.5 ? auditor.name : 
                            surnames[Math.floor(Math.random() * surnames.length)] + names[Math.floor(Math.random() * names.length)];
                        planObj.status = 'approved';
                        remaining -= duration;
                    }

                    plans.push(planObj);
                    currentDay = endDay + 1;
                } else {
                    currentDay++;
                }
            }

            // 计算月度累计天数（支持小数）
            auditor.monthlyDays = plans.reduce((sum, p) => sum + parseFloat(p.days), 0);
            auditor.remainingDays = remaining;

            return plans;
        }

        function generateMembers() {
            const count = Math.floor(Math.random() * 2) + 1;
            const members = [];
            for (let i = 0; i < count; i++) {
                members.push(surnames[Math.floor(Math.random() * surnames.length)] + 
                           names[Math.floor(Math.random() * names.length)]);
            }
            return members.join('、');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            try {
                scheduleData = generateAuditors();
                querySchedule();

                // 绑定筛选器
                ['yearSelect', 'monthSelect', 'typeSelect', 'isExceedSelect', 'over180Select'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('change', querySchedule);
                    }
                });

                // 外部点击关闭弹窗
                const modalOverlay = document.getElementById('editModal');
                if (modalOverlay) {
                    modalOverlay.addEventListener('click', function(e) {
                        if (e.target === this) closeModal();
                    });
                }

                document.addEventListener('click', function(e) {
                    const picker = document.querySelector('.person-picker-wrap');
                    if (picker && !picker.contains(e.target)) {
                        closePersonDropdown();
                    }
                });
            } catch (err) {
                console.error('初始化错误:', err);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="33" class="empty-state" style="color:#c53030;">初始化出错，请刷新页面重试<br>错误：' + err.message + '</td></tr>';
            }
        });

        // ==================== 查询排班 ====================
        function querySchedule() {
            try {
                const year = parseInt(document.getElementById('yearSelect').value) || 2026;
                const month = parseInt(document.getElementById('monthSelect').value) || 3;
                const type = document.getElementById('typeSelect').value || 'all';
                const scheduleStatus = document.getElementById('scheduleStatusSelect')?.value || 'all';
                const auditType = document.getElementById('auditTypeSelect')?.value || 'all';
                const limit = document.getElementById('limitSelect')?.value || 'all';
                const isExceed = document.getElementById('isExceedSelect')?.value || 'all';
                const over180 = document.getElementById('over180Select')?.value || 'all';
                const search = document.getElementById('personSearch').value.trim();

                // 为每个审核员生成该月的排班计划
                scheduleData.forEach(auditor => {
                    const generatedPlans = generatePlans(auditor, year, month);
                    const applications = manualApplications.filter(app => 
                        app.personId === auditor.id && app.year === year && app.month === month
                    );
                    auditor.plans = generatedPlans.concat(applications);
                    auditor.monthlyDays = auditor.plans.reduce((sum, p) => sum + parseFloat(p.days), 0);
                    auditor.remainingDays = auditor.initialRemaining - auditor.plans
                        .filter(p => !p.isLeave && !p.isNonAudit)
                        .reduce((sum, p) => sum + parseFloat(p.days), 0);
                });

                // 过滤数据
                let filtered = scheduleData.filter(person => {
                    if (type !== 'all' && person.type !== type) return false;
                    if (scheduleStatus === 'scheduled' && person.plans.length === 0) return false;
                    if (scheduleStatus === 'empty' && person.plans.length > 0) return false;

                    if (auditType !== 'all') {
                        if (auditType === '非审核活动') {
                            if (!person.plans.some(p => p.isNonAudit)) return false;
                        } else if (auditType === '休假') {
                            if (!person.plans.some(p => p.isLeave)) return false;
                        } else if (auditType === '二方审核') {
                            if (!person.plans.some(p => p.isExternal)) return false;
                        } else if (auditType === '借调') {
                            if (!person.plans.some(p => p.isBorrowed)) return false;
                        } else {
                            if (!person.plans.some(p => p.auditType === auditType)) return false;
                        }
                    }

                    if (limit === 'exceed' && person.monthlyDays <= 15) return false;
                    if (limit === 'normal' && person.monthlyDays > 15) return false;
                    if (isExceed === 'yes' && person.monthlyDays <= 15) return false;
                    if (isExceed === 'no' && person.monthlyDays > 15) return false;
                    if (over180 === 'yes' && person.initialRemaining <= 180) return false;
                    if (over180 === 'no' && person.initialRemaining > 180) return false;

                    if (search) {
                        const terms = search.split(/[\/\s]/).map(s => s.trim()).filter(s => s);
                        if (terms.length > 0) {
                            const matchName = terms.some(t => person.name.includes(t));
                            const matchId = terms.some(t => person.id.toLowerCase().includes(t.toLowerCase()));
                            if (!matchName && !matchId) return false;
                        }
                    }

                    return true;
                });

                // 排序
                filtered.sort((a, b) => {
                    if (currentSortColumn === 'monthlyDays') {
                        return sortDirection === 'desc' ? b.monthlyDays - a.monthlyDays : a.monthlyDays - b.monthlyDays;
                    }
                    return 0;
                });

                currentData = filtered;
                updateStats(filtered);
                renderSchedule(filtered, year, month);
            } catch (err) {
                console.error('查询错误:', err);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="33" class="empty-state" style="color:#c53030;">查询出错：' + err.message + '</td></tr>';
            }
        }

        // ==================== 排序功能 ====================
        function sortByMonthlyDays() {
            sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            currentSortColumn = 'monthlyDays';

            currentData.sort((a, b) => {
                return sortDirection === 'desc' ? b.monthlyDays - a.monthlyDays : a.monthlyDays - b.monthlyDays;
            });

            const year = parseInt(document.getElementById('yearSelect').value) || 2026;
            const month = parseInt(document.getElementById('monthSelect').value) || 3;
            renderSchedule(currentData, year, month);
        }

        // ==================== 重置筛选 ====================
        function resetFilter() {
            document.getElementById('typeSelect').value = 'all';
            document.getElementById('isExceedSelect').value = 'all';
            document.getElementById('over180Select').value = 'all';
            if (document.getElementById('scheduleStatusSelect')) document.getElementById('scheduleStatusSelect').value = 'all';
            if (document.getElementById('auditTypeSelect')) document.getElementById('auditTypeSelect').value = 'all';
            if (document.getElementById('limitSelect')) document.getElementById('limitSelect').value = 'all';
            document.getElementById('personSearch').value = '';
            sortDirection = 'desc';
            currentSortColumn = 'monthlyDays';
            querySchedule();
        }

        // ==================== 更新统计 ====================
        function updateStats(data) {
            const setText = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value;
            };
            setText('totalCount', data.length);
            setText('scheduledCount', data.filter(p => p.plans && p.plans.length > 0).length);
            setText('fullTimeCount', data.filter(p => p.type === '专职').length);
            setText('partTimeCount', data.filter(p => p.type === '兼职').length);
            setText('exceedCount', data.filter(p => p.monthlyDays > 15).length);
        }

        // ==================== 渲染排班表 ====================
        function renderSchedule(data, year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            if (!data || data.length === 0) {
                document.getElementById('tableHead').innerHTML = '';
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="' + (daysInMonth + 2) + '" class="empty-state">暂无符合条件的数据</td></tr>';
                return;
            }

            renderHeader(daysInMonth, year, month);
            renderBody(data, daysInMonth, year, month);
        }

        // ==================== 渲染表头 ====================
        function renderHeader(days, year, month) {
            const thead = document.getElementById('tableHead');

            let html = '<tr>';
            html += '<th class="sticky-col header col-person">审核人员信息</th>';
            html += '<th class="sticky-col header col-days" style="left:165px;">月度天数</th>';
            html += '<th class="sticky-col header col-remaining" style="left:230px;">180剩余天数</th>';

            for (let i = 1; i <= days; i++) {
                const date = new Date(year, month, i);
                const weekDay = date.getDay();
                const isWeekend = weekDay === 0 || weekDay === 6;
                const holiday = getHoliday(month + 1, i);
                const weekText = ['日','一','二','三','四','五','六'][weekDay];

                let className = 'date-header col-date';
                if (isWeekend) className += ' weekend';
                if (holiday) className += ' holiday';

                html += `<th class="${className}">
                    <span class="day-number">${i}</span>
                    <span class="day-week">${weekText}</span>
                </th>`;
            }

            html += '</tr>';
            thead.innerHTML = html;
        }

        function getHoliday(month, day) {
            if (holidays[month]) {
                return holidays[month].find(h => h.day === day);
            }
            return null;
        }

        // ==================== 渲染表格主体 ====================
        function renderBody(data, days, year, month) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            data.forEach((person) => {
                const isExceed = person.monthlyDays > 15;
                html += `<tr id="row-${person.id}" onclick="toggleRow('${person.id}')">`;

                // 人员信息列
                html += `<td class="sticky-col col-person">
                    <div class="person-info">
                        <div class="person-name">
                            ${person.name}
                            ${person.type === '专职' ? 
                                '<span class="badge badge-primary">专职</span>' : 
                                '<span class="badge badge-secondary">兼职</span>'}
                        </div>
                        <div class="person-id">${person.id}</div>
                    </div>
                </td>`;

                // 月度天数列
                html += `<td class="sticky-col col-days ${isExceed ? 'exceed' : ''}" style="left:165px;">
                    <div class="days-cell ${isExceed ? 'exceed' : ''}">
                        ${person.monthlyDays.toFixed(1)}
                        ${isExceed ? '<span style="font-size:9px;color:#c53030;">超限</span>' : ''}
                    </div>
                </td>`;

                html += `<td class="sticky-col col-remaining" style="left:230px;">
                    <div class="days-cell">
                        ${person.remainingDays.toFixed(1)}
                    </div>
                </td>`;

                // 每天的单元格
                const dayPlans = buildDayPlanMap(person.plans, days, year, month);

                for (let day = 1; day <= days; day++) {
                    const date = new Date(year, month, day);
                    const weekDay = date.getDay();
                    const isWeekend = weekDay === 0 || weekDay === 6;
                    const holiday = getHoliday(month + 1, day);
                    const plan = dayPlans[day];

                    let cellClass = 'schedule-cell col-date';
                    if (isWeekend) cellClass += ' weekend';
                    if (holiday) cellClass += ' holiday';

                    html += `<td class="${cellClass}" 
                        ondblclick="openPlanEditor('${person.id}', ${year}, ${month}, ${day}, event)"
                        onmouseenter="showTooltip(event, '${person.id}', ${day}, ${month}, ${year})"
                        onmouseleave="hideTooltip()">`;

                    // 渲染任务条 - 只在任务开始日渲染
                    if (plan && plan.isStart) {
                        let barClass = 'task-bar';
                        if (plan.isLeave) {
                            barClass += ' leave';
                        } else if (plan.isNonAudit) {
                            barClass += ' non-audit';
                        } else if (plan.isBorrowed) {
                            barClass += ' borrow';
                        } else if (plan.isExternal) {
                            barClass += ' external';
                        } else {
                            barClass += ' audit';
                        }

                        // 计算宽度：按实际天数比例 × 每日列宽(46px)，减去边距
                        let width = Math.max(plan.days * 46 - 4, 18);

                        // 半天任务使用简化展示
                        let taskContent = '';
                        if (plan.days === 0.5) {
                            barClass += ' half-day';
                            const shortType = plan.auditType.length > 2 ? plan.auditType.substring(0, 2) : plan.auditType;
                            taskContent = `<div class="half-day-label">${shortType}</div>
                                           <div class="half-day-type">0.5天</div>`;
                        } else {
                            const company = plan.companyName.length > 4 ? 
                                plan.companyName.substring(0, 4) + '..' : plan.companyName;
                            taskContent = `<div class="task-company" title="${plan.companyName}">${company}</div>
                                           <div class="task-type">${plan.auditType}</div>
                                           <div class="task-days">
                                               <span>${plan.days}天</span>
                                               <span class="task-remaining">剩${plan.remainingAtStart}</span>
                                           </div>`;
                        }

                        const hasHalfDay = plan.days % 1 !== 0;
                        const dataAttr = hasHalfDay ? ' data-has-half="true"' : '';

                        html += `<div class="${barClass}" style="width:${width}px;"${dataAttr}
                            onclick="showPlanDetail('${plan.id}', event)">
                            ${taskContent}
                        </div>`;
                    }

                    html += '</td>';
                }

                html += '</tr>';
            });

            tbody.innerHTML = html;
        }

        // 计算范围内的工作日数（排除周末和节假日）
        function countWorkdaysInRange(startDay, endDay, year, month) {
            let count = 0;
            for (let d = startDay; d <= endDay; d++) {
                const date = new Date(year, month, d);
                const weekDay = date.getDay();
                if (weekDay === 0 || weekDay === 6) continue;
                if (getHoliday(month + 1, d)) continue;
                count++;
            }
            return Math.max(count, 1);
        }

        // 构建每天的计划映射
        function buildDayPlanMap(plans, daysInMonth, year, month) {
            const dayMap = {};
            if (!plans || plans.length === 0) return dayMap;

            plans.forEach(plan => {
                const startDay = parseInt(plan.startDay);
                const endDay = parseInt(plan.endDay);

                for (let d = startDay; d <= endDay && d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const weekDay = date.getDay();

                    // 跳过周末和节假日
                    if (weekDay === 0 || weekDay === 6) continue;
                    if (getHoliday(month + 1, d)) continue;

                    dayMap[d] = {
                        ...plan,
                        isStart: d === startDay
                    };
                }
            });

            return dayMap;
        }

            } else {

            }
        }

        function saveSchedule() {
            if (!currentEditing) return;

            const selectedPerson = resolveSelectedPerson();
            const startDate = document.getElementById('modalStartDate').value;
            const endDate = document.getElementById('modalEndDate').value;
            const [category, type] = document.getElementById('modalApplicationType').value.split('|');
            const reason = document.getElementById('modalReason').value.trim();
            const attachments = applicationAttachments.map(item => item.file.name);

            if (!selectedPerson) {
                alert('请选择申请人员');
                return;
            }
            if (!startDate || !endDate) {
                alert('请选择开始日期和结束日期');
                return;
            }
            if (new Date(endDate) < new Date(startDate)) {
                alert('结束日期不能早于开始日期');
                return;
            }
            if (!reason) {
                alert('请输入申请理由');
                return;
            }
            if (category === '借调' && applicationAttachments.length === 0) {
                alert('借调申请必须上传附件');
                return;
            }

            const start = parseDateInput(startDate);
            const end = parseDateInput(endDate);
            const days = countWorkdaysBetween(start, end);
            const approvalSteps = buildApprovalSteps(category);
            const application = {
                id: (category === '借调' ? 'BD' : 'AP') + Date.now(),
                personId: selectedPerson.id,
                year: start.year,
                month: start.month,
                companyName: reason,
                auditType: type,
                isNonAudit: category === '非审核活动',
                isLeave: category === '休假/请假',
                isExternal: category === '二方审核',
                isBorrowed: category === '借调',
                days: days,
                startDay: start.day,
                endDay: end.day,
                leader: selectedPerson.name,
                members: '',
                address: '-',
                remainingAtStart: selectedPerson.remainingDays.toFixed(1),
                status: 'pending',
                borrowUnit: '',
                homeUnit: '',
                cqcNo: selectedPerson.id,
                role: '',
                certification: '',
                fee: '',
                remark: reason,
                attachments: attachments,
                approvalSteps: approvalSteps
            };

            manualApplications.push(application);
            alert(`申请已提交！${approvalSteps.length ? '审批流程：' + approvalSteps.map(s => s.name).join(' → ') : '待主管审批'}`);
            closeModal();
            querySchedule();
        }

        function buildApprovalSteps(category) {
            if (category === '二方审核' || category === '借调') {
                return [
                    { name: '借用单位', description: '确认业务需要和人员借用安排' },
                    { name: '所在单位', description: '确认人员可借调并审批放行' }
                ];
            }
            if (category === '非审核活动') {
                return [{ name: '部门负责人', description: '确认培训、会议等非审核活动安排' }];
            }
            if (category === '休假/请假') {
                return [{ name: '所在部门', description: '确认假期类型、余额和工作交接' }];
            }
            return [{ name: '项目负责人', description: '确认审核任务安排' }];
        }

        function formatPersonOption(person) {
            if (!person || !person.name || !person.id) return '';
            return `${person.name} (${person.id})`;
        }

        function resolveSelectedPerson() {
            const value = document.getElementById('modalPerson').value.trim();
            if (selectedApplicationPersonId) {
                const selected = scheduleData.find(person => person.id === selectedApplicationPersonId);
                if (selected && formatPersonOption(selected) === value) return selected;
            }
            const idMatch = value.match(/\(([^)]+)\)$/);
            const id = idMatch ? idMatch[1] : value;
            return scheduleData.find(person => 
                person.id.toLowerCase() === id.toLowerCase() || 
                formatPersonOption(person) === value || 
                person.name === value
            );
        }

        function formatDateInput(year, month, day) {
            const mm = String(month + 1).padStart(2, '0');
            const dd = String(day).padStart(2, '0');
            return `${year}-${mm}-${dd}`;
        }

        function parseDateInput(value) {
            const [year, month, day] = value.split('-').map(Number);
            return { year, month: month - 1, day };
        }

        function countWorkdaysBetween(start, end) {
            const startDate = new Date(start.year, start.month, start.day);
            const endDate = new Date(end.year, end.month, end.day);
            let count = 0;
            for (let date = new Date(startDate); date <= endDate; date.setDate(date.getDate() + 1)) {
                const weekDay = date.getDay();
                if (weekDay === 0 || weekDay === 6) continue;
                if (getHoliday(date.getMonth() + 1, date.getDate())) continue;
                count++;
            }
            return Math.max(count, 0.5);
        }

                applicationAttachments.push({

                    <button type="button" class="attachment-action" onclick="downloadAttachment('${item.id}')">下载</button>

            `).join('');
        }

        function findAttachment(id) {
            return applicationAttachments.find(item => item.id === id);
        }

        function previewAttachment(id) {
            const item = findAttachment(id);
            if (!item) return;
            window.open(item.url, '_blank');
        }

        function downloadAttachment(id) {
            const item = findAttachment(id);
            if (!item) return;
            const link = document.createElement('a');
            link.href = item.url;
            link.download = item.file.name;
            link.click();
        }

        function removeAttachment(id) {
            const item = findAttachment(id);
            if (item) URL.revokeObjectURL(item.url);
            applicationAttachments = applicationAttachments.filter(file => file.id !== id);
            renderAttachmentList();
        }

        function getEndWorkday(startDay, days, year, month) {
            const neededWorkdays = Math.ceil(days);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let collected = 0;
            for (let day = startDay; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const weekDay = date.getDay();
                if (weekDay === 0 || weekDay === 6 || getHoliday(month + 1, day)) continue;
                collected++;
                if (collected >= neededWorkdays) return day;
            }
            return Math.min(daysInMonth, startDay);
        }

        // ==================== 导出数据 ====================
        function exportData() {
            const year = document.getElementById('yearSelect').value;
            const month = parseInt(document.getElementById('monthSelect').value) + 1;

            let csv = '\uFEFF审核员编号,姓名,类型,初始剩余天数,月度累计天数,最终剩余天数\n';

            currentData.forEach(person => {
                csv += `${person.id},${person.name},${person.type},${person.initialRemaining},${person.monthlyDays.toFixed(1)},${person.remainingDays.toFixed(1)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `CQC排班表_${year}_${month}.csv`;
            link.click();
        }
    </script>
</body>
