<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核任务详情整合</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
        }

        .combined-shell {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            min-width: 0;
        }

        .combined-tabs {
            height: 52px;
            flex: 0 0 52px;
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            padding: 0 24px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
            z-index: 20;
            min-width: 0;
            overflow-x: auto;
        }

        .tab-left,
        .tab-right {
            display: flex;
            align-items: stretch;
            gap: 24px;
            min-width: 0;
        }

        .tab-right {
            gap: 28px;
            flex: 0 0 auto;
        }

        .main-tab,
        .aux-tab {
            border: 0;
            background: transparent;
            padding: 0 4px;
            height: 52px;
            color: #7b8494;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            font-family: inherit;
            transition: all 0.2s;
        }

        .main-tab:hover,
        .aux-tab:hover {
            color: #2563eb;
        }

        .main-tab.active {
            color: #2563eb;
        }

        .main-tab.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: #2563eb;
        }

        .frame-stage {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }

        .page-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .page-frame.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="combined-shell">
        <header class="combined-tabs">
            <nav class="tab-left" aria-label="任务详情模块">
                <button class="main-tab active" type="button" data-target="scheme">审核方案</button>
                <button class="main-tab" type="button" data-target="task">任务信息</button>
                <button class="main-tab" type="button" data-target="confirm">确认进度</button>
                <button class="main-tab" type="button" data-target="plan">审核计划</button>
                <button class="main-tab" type="button" data-target="record">实施记录</button>
                <button class="main-tab" type="button" data-target="rectify">问题整改</button>
            </nav>
            <div class="tab-right" aria-label="辅助入口">
                <button class="aux-tab" type="button" onclick="alert('历史审核数据')">历史审核数据</button>
                <button class="aux-tab" type="button" onclick="alert('操作日志')">操作日志</button>
            </div>
        </header>
        <main class="frame-stage">
            <iframe class="page-frame active" id="frame-scheme" title="审核方案" data-page-index="0"></iframe>
            <iframe class="page-frame" id="frame-task" title="任务信息" data-page-index="1"></iframe>
            <iframe class="page-frame" id="frame-confirm" title="确认进度" data-page-index="2"></iframe>
            <iframe class="page-frame" id="frame-plan" title="审核计划" data-page-index="3"></iframe>
            <iframe class="page-frame" id="frame-record" title="实施记录" data-page-index="4"></iframe>
            <iframe class="page-frame" id="frame-rectify" title="问题整改" data-page-index="5"></iframe>
        </main>
    </div>

    <script>

                       <td>质量部</td>\r\n                                <td>各部门</td>\r\n                                <td>6.1,6.2,6.3</td>\r\n                                <td>风险机遇清单、目标方案</td>\r\n                                <td class=\"text-center\"><i class=\"fas fa-check-square text-blue-600\"></i></td>\r\n                                <td class=\"text-center\"><span class=\"text-gray-400\">待审核</span></td>\r\n                            </tr>\r\n                        </tbody>\r\n                    </table>\r\n                </div>\r\n                </div>\r\n                \r\n                <!-- Tab 2: 管理体系过程清单 -->\r\n                <div id=\"plan-tab-2\" class=\"plan-tab-content hidden-section\">\r\n                    <div class=\"flex justify-between items-center mb-4\">\r\n                        <div class=\"flex items-center gap-2\">\r\n                            <i class=\"fas fa-list-alt text-blue-500\"></i>\r\n                            <span class=\"font-semibold text-gray-800\">管理体系过程清单</span>\r\n                            <span class=\"text-xs text-gray-500\">适用于初次认证、监督、再认证</span>\r\n                        </div>\r\n                        <button onclick=\"addProcessRow()\" class=\"btn btn-primary btn-sm\">\r\n                            <i class=\"fas fa-plus mr-1\"></i>新增过程\r\n                        </button>\r\n                    </div>\r\n                    \r\n                    <div class=\"overflow-x-auto border border-gray-200 rounded\">\r\n                        <table class=\"data-table w-full\" id=\"processListTable\">\r\n                            <thead class=\"bg-gray-50\">\r\n                                <tr>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b w-16\">序号</th>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">过程名称</th>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">主责部门</th>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">相关部门</th>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">涉及标准条款</th>\r\n                                    <th class=\"px-4 py-3 text-left text-xs font-medium text-gray-700 border-b\">绩效参数或相关文件</th>\r\n                                    <th class=\"px-4 py-3 text-center text-xs font-medium text-gray-700 border-b w-24\">操作</th>\r\n                                </tr>\r\n                            </thead>\r\n                            <tbody id=\"processListBody\">\r\n                                <tr data-row-id=\"1\">\r\n                                    <td class=\"px-4 py-2 border-b text-sm text-gray-600\">1</td>\r\n                                    <td class=\"px-4 py-2 border-b\">\r\n                                        <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"组织环境理解\" placeholder=\"过程名称\">\r\n                                    </td>\r\n                                    <td class=\"px-4 py-2 border-b\">\r\n                                        <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"管理层\" placeholder=\"主责部门\">\r\n                                    </td>\r\n                                    <td class=\"px-4 py-2 border-b\">\r\n                                        <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"各部门\" placeholder=\"相关部门\">\r\n                                    </td>\r\n                                    <td class=\"px-4 py-2 border-b\">\r\n                                        <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"4.1-4.4\" placeholder=\"涉及标准条款\">\r\n                                    </td>\r\n                                    <td class=\"px-4 py-2 border-b\">\r\n                                        <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"环境因素识别表\" placeholder=\"绩效参数或相关文件\">\r\n                                    </td>\r\n                                    <td class=\"px-4 py-2 border-b text-center\">\r\n                                        <button onclick=\"deleteProcessRow(this)\" class=\"text-red-500 hover:text-red-700\" title=\"删除\">\r\n                                            <i class=\"fas fa-trash-alt\"></i>\r\n                                        </button>\r\n                                    </td>\r\n                                </tr>\r\n                            </tbody>\r\n                        </table>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n            \r\n            <div class=\"plan-header border-t\">\r\n                <div></div>\r\n                <button onclick=\"closePlanModal()\" class=\"btn btn-default\">关闭</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <!-- 接受任务确认弹窗 -->\r\n    <div class=\"confirm-modal\" id=\"acceptModal\">\r\n        <div class=\"confirm-modal-content\">\r\n            <div class=\"confirm-modal-header\">\r\n                <h3 class=\"text-lg font-semibold text-gray-900\">确认接受任务</h3>\r\n            </div>\r\n            <div class=\"confirm-modal-body\">\r\n                <p class=\"text-gray-600\">确定接受该审核任务吗？接受后将正式加入审核组并进入后续流程。</p>\r\n            </div>\r\n            <div class=\"confirm-modal-footer\">\r\n                <button class=\"btn btn-default\" onclick=\"closeAcceptModal()\">取消</button>\r\n                <button class=\"btn btn-success\" onclick=\"confirmAccept()\">确认接受</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <!-- 退回任务确认弹窗 -->\r\n    <div class=\"confirm-modal\" id=\"rejectModal\">\r\n        <div class=\"confirm-modal-content\">\r\n            <div class=\"confirm-modal-header\">\r\n                <h3 class=\"text-lg font-semibold text-gray-900\">退回任务</h3>\r\n            </div>\r\n            <div class=\"confirm-modal-body\">\r\n                <div class=\"mb-4\">\r\n                    <label class=\"form-label\">退回原因 <span class=\"text-red-500\">*</span></label>\r\n                    <textarea class=\"form-textarea\" id=\"rejectReason\" placeholder=\"请填写退回原因（必填）\"></textarea>\r\n                </div>\r\n            </div>\r\n            <div class=\"confirm-modal-footer\">\r\n                <button class=\"btn btn-default\" onclick=\"closeRejectModal()\">取消</button>\r\n                <button class=\"btn btn-danger\" onclick=\"confirmReject()\">确认退回</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <script>\r\n        // 当前节点索引\r\n        let currentNodeIndex = 0;\r\n        \r\n        // 当前视角（leader/member）\r\n        let currentView = 'leader';\r\n        \r\n        // 节点配置（修改为4个节点）\r\n        const nodes = [\r\n            { id: 'node-task-confirm', name: '组内确认' },\r\n            { id: 'node-plan-confirm', name: '编制计划' },\r\n            { id: 'node-audit-progress', name: '审核任务中' },\r\n            { id: 'node-completed', name: '审核完结' }\r\n        ];\r\n        \r\n        // 切换节点\r\n        function switchNode(index) {\r\n            currentNodeIndex = index;\r\n            \r\n            // 更新步骤条样式\r\n            const stepItems = document.querySelectorAll('.step-item');\r\n            stepItems.forEach((item, idx) => {\r\n                item.classList.remove('active', 'completed', 'pending');\r\n                if (idx < index) {\r\n                    item.classList.add('completed');\r\n                } else if (idx === index) {\r\n                    item.classList.add('active');\r\n                } else {\r\n                    item.classList.add('pending');\r\n                }\r\n            });\r\n            \r\n            // 隐藏所有节点内容\r\n            document.querySelectorAll('.node-content').forEach(el => {\r\n                el.classList.add('hidden-section');\r\n            });\r\n            \r\n            // 显示当前节点内容\r\n            document.getElementById(nodes[index].id).classList.remove('hidden-section');\r\n            \r\n            // 更新页面标题状态\r\n            const statusBadge = document.getElementById('headerStatusBadge');\r\n            \r\n            if (index === 0) {\r\n                statusBadge.textContent = '组内确认中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 1) {\r\n                statusBadge.textContent = '编制计划中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 2) {\r\n                statusBadge.textContent = '审核任务中';\r\n                statusBadge.className = 'status-badge badge-warning';\r\n            } else if (index === 3) {\r\n                statusBadge.textContent = '审核完结';\r\n                statusBadge.className = 'status-badge badge-success';\r\n            }\r\n        }\r\n        \r\n        // 切换视角\r\n        function switchView(view) {\r\n            currentView = view;\r\n            \r\n            // 更新按钮样式\r\n            document.querySelectorAll('.view-switcher-btn').forEach(btn => {\r\n                btn.classList.remove('active');\r\n            });\r\n            document.getElementById(view + 'ViewBtn').classList.add('active');\r\n            \r\n            // 更新组员确认情况标签\r\n            const memberViewLabel = document.getElementById('memberViewLabel');\r\n            if (memberViewLabel) {\r\n                memberViewLabel.textContent = view === 'leader' ? '（组长视角）' : '（组员视角）';\r\n            }\r\n            \r\n            // 组长视角显示全部，组员视角只显示相关内容\r\n            if (view === 'leader') {\r\n                // 显示节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'block';\r\n                \r\n                // 显示组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'block';\r\n                \r\n                // 显示所有成员卡片\r\n                document.querySelectorAll('.member-confirm-card').forEach(card => {\r\n                    card.style.display = 'flex';\r\n                });\r\n                // 显示所有场所分配\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    site.style.display = 'block';\r\n                });\r\n                // 显示提醒按钮\r\n                document.querySelectorAll('.leader-only-btn').forEach(btn => {\r\n                    btn.style.display = 'inline-flex';\r\n                });\r\n                // 显示场所内所有成员行\r\n                document.querySelectorAll('.member-row').forEach(row => {\r\n                    row.style.display = 'table-row';\r\n                });\r\n                // 显示统计信息\r\n                document.getElementById('memberStats').style.display = 'flex';\r\n                // 隐藏组员自视视图\r\n                document.getElementById('memberSelfView').classList.add('hidden-section');\r\n                // 显示完整成员列表容器\r\n                document.getElementById('memberListContainer').classList.remove('hidden-section');\r\n                // 显示标题\r\n                document.getElementById('siteAllocationTitle').textContent = '场所审核组分配详情';\r\n                // 显示全局设置\r\n                document.getElementById('globalSettings').style.display = 'grid';\r\n                \r\n                // 显示锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'block';\r\n                document.getElementById('anchorNav').style.display = 'block';\r\n            } else {\r\n                // 组员视角 - 删除组员确认情况和节点进度栏\r\n                \r\n                // 隐藏节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'none';\r\n                \r\n                // 隐藏组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'none';\r\n                \r\n                // 隐藏锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'none';\r\n                \r\n                // 只显示一个场所（总部）\r\n                const currentMember = '王洪伟';\r\n                \r\n                // 只显示总部场所（假设当前组员分配到总部）\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    if (site.id === 'site-headquarters') {\r\n                        site.style.display = 'block';\r\n                        // 在该场所内，只显示组长和当前组员\r\n                        site.querySelectorAll('.member-row').forEach(row => {\r\n                            const rowMember = row.getAttribute('data-member');\r\n                            if (rowMember === '武荣刚' || rowMember === currentMember) {\r\n                                row.style.display = 'table-row';\r\n                            } else {\r\n                                row.style.display = 'none';\r\n                            }\r\n                        });\r\n                    } else {\r\n                        site.style.display = 'none';\r\n                    }\r\n                });\r\n                \r\n                // 隐藏其他场所\r\n                document.getElementById('site-branch1').style.display = 'none';\r\n                document.getElementById('site-branch2').style.display = 'none';\r\n                \r\n                // 修改标题\r\n                document.getElementById('siteAllocationTitle').textContent = '我的审核任务';\r\n                \r\n                // 隐藏全局设置中的组长和结束时间，只保留开始时间\r\n                document.getElementById('globalSettings').style.display = 'none';\r\n            }\r\n        }\r\n        \r\n        // 查看策划方案\r\n        function viewPlan(projectNo) {\r\n            document.getElementById('planProjectNo').textContent = '项目编号：' + projectNo;\r\n            document.getElementById('planModal').classList.add('show');\r\n        }\r\n        \r\n        function closePlanModal() {\r\n            document.getElementById('planModal').classList.remove('show');\r\n        }\r\n        \r\n        // 重新分配成员\r\n        function reassignMember(memberName) {\r\n            alert(`正在为 ${memberName} 重新分配审核任务...`);\r\n        }\r\n        \r\n        // 发送提醒\r\n        function sendReminder() {\r\n            alert('已向待确认组员发送提醒通知！');\r\n        }\r\n        \r\n        // 显示接受任务弹窗\r\n        function showAcceptModal() {\r\n            document.getElementById('acceptModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭接受任务弹窗\r\n        function closeAcceptModal() {\r\n            document.getElementById('acceptModal').classList.remove('show');\r\n        }\r\n        \r\n        // 确认接受任务\r\n        function confirmAccept() {\r\n            alert('任务接受成功！您已正式加入审核组。');\r\n            closeAcceptModal();\r\n            // 可以在这里添加后续逻辑，比如切换状态等\r\n        }\r\n        \r\n        // 显示退回任务弹窗\r\n        function showRejectModal() {\r\n            document.getElementById('rejectModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭退回任务弹窗\r\n        function closeRejectModal() {\r\n            document.getElementById('rejectModal').classList.remove('show');\r\n            // 清空原因\r\n            document.getElementById('rejectReason').value = '';\r\n        }\r\n        \r\n        // 确认退回任务\r\n        function confirmReject() {\r\n            const reason = document.getElementById('rejectReason').value.trim();\r\n            if (!reason) {\r\n                alert('请填写退回原因！');\r\n                return;\r\n            }\r\n            alert(`任务已退回，原因：${reason}`);\r\n            closeRejectModal();\r\n            // 可以在这里添加后续逻辑，比如返回列表页等\r\n        }\r\n        \r\n        // 返回\r\n        function goBack() {\r\n            if (confirm('确定返回列表页？')) {\r\n                console.log('返回列表页');\r\n            }\r\n        }\r\n        \r\n        // Tab切换功能\r\n        function switchPlanTab(tabId) {\r\n            // 隐藏所有tab内容\r\n            document.querySelectorAll('.plan-tab-content').forEach(el => {\r\n                el.classList.add('hidden-section');\r\n            });\r\n            // 显示选中的tab\r\n            document.getElementById(tabId).classList.remove('hidden-section');\r\n            \r\n            // 更新按钮样式\r\n            document.querySelectorAll('.plan-tab-btn').forEach(btn => {\r\n                btn.classList.remove('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');\r\n                btn.classList.add('text-gray-500', 'border-transparent');\r\n            });\r\n            event.target.classList.add('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');\r\n            event.target.classList.remove('text-gray-500', 'border-transparent');\r\n        }\r\n        \r\n        // 新增过程行\r\n        function addProcessRow() {\r\n            const tbody = document.getElementById('processListBody');\r\n            const rowCount = tbody.children.length + 1;\r\n            \r\n            const newRow = document.createElement('tr');\r\n            newRow.setAttribute('data-row-id', rowCount);\r\n            newRow.innerHTML = `\r\n                <td class=\"px-4 py-2 border-b text-sm text-gray-600\">${rowCount}</td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"过程名称\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"主责部门\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"相关部门\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"涉及标准条款\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"绩效参数或相关文件\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b text-center\">\r\n                    <button onclick=\"deleteProcessRow(this)\" class=\"text-red-500 hover:text-red-700\" title=\"删除\">\r\n                        <i class=\"fas fa-trash-alt\"></i>\r\n                    </button>\r\n                </td>\r\n            `;\r\n            \r\n            tbody.appendChild(newRow);\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 删除过程行\r\n        function deleteProcessRow(btn) {\r\n            const row = btn.closest('tr');\r\n            row.remove();\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 重新编号\r\n        function renumberProcessRows() {\r\n            const rows = document.querySelectorAll('#processListBody tr');\r\n            rows.forEach((row, index) => {\r\n                row.setAttribute('data-row-id', index + 1);\r\n                row.cells[0].textContent = index + 1;\r\n            });\r\n        }\r\n        \r\n        // 锚点导航滚动功能\r\n        function scrollToSection(sectionId, element) {\r\n            // 移除所有锚点的高亮状态\r\n            document.querySelectorAll('.anchor-item').forEach(item => {\r\n                item.classList.remove('active');\r\n            });\r\n            \r\n            // 给当前点击的锚点添加高亮状态\r\n            element.classList.add('active');\r\n            \r\n            // 滚动到对应区域\r\n            const targetSection = document.getElementById(sectionId);\r\n            if (targetSection) {\r\n                const offsetTop = targetSection.offsetTop - 200; // 预留顶部空间\r\n                window.scrollTo({\r\n                    top: offsetTop,\r\n                    behavior: 'smooth'\r\n                });\r\n   </table>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n            \r\n            <div class=\"plan-header border-t\">\r\n                <div></div>\r\n                <button onclick=\"closePlanModal()\" class=\"btn btn-default\">关闭</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <!-- 接受任务确认弹窗 -->\r\n    <div class=\"confirm-modal\" id=\"acceptModal\">\r\n        <div class=\"confirm-modal-content\">\r\n            <div class=\"confirm-modal-header\">\r\n                <h3 class=\"text-lg font-semibold text-gray-900\">确认接受任务</h3>\r\n            </div>\r\n            <div class=\"confirm-modal-body\">\r\n                <p class=\"text-gray-600\">确定接受该审核任务吗？接受后将正式加入审核组并进入后续流程。</p>\r\n            </div>\r\n            <div class=\"confirm-modal-footer\">\r\n                <button class=\"btn btn-default\" onclick=\"closeAcceptModal()\">取消</button>\r\n                <button class=\"btn btn-success\" onclick=\"confirmAccept()\">确认接受</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <!-- 退回任务确认弹窗 -->\r\n    <div class=\"confirm-modal\" id=\"rejectModal\">\r\n        <div class=\"confirm-modal-content\">\r\n            <div class=\"confirm-modal-header\">\r\n                <h3 class=\"text-lg font-semibold text-gray-900\">退回任务</h3>\r\n            </div>\r\n            <div class=\"confirm-modal-body\">\r\n                <div class=\"mb-4\">\r\n                    <label class=\"form-label\">退回原因 <span class=\"text-red-500\">*</span></label>\r\n                    <textarea class=\"form-textarea\" id=\"rejectReason\" placeholder=\"请填写退回原因（必填）\"></textarea>\r\n                </div>\r\n            </div>\r\n            <div class=\"confirm-modal-footer\">\r\n                <button class=\"btn btn-default\" onclick=\"closeRejectModal()\">取消</button>\r\n                <button class=\"btn btn-danger\" onclick=\"confirmReject()\">确认退回</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <script>\r\n        // 当前节点索引\r\n        let currentNodeIndex = 0;\r\n        \r\n        // 当前视角（leader/member）\r\n        let currentView = 'leader';\r\n        \r\n        // 节点配置（修改为4个节点）\r\n        const nodes = [\r\n            { id: 'node-task-confirm', name: '组内确认' },\r\n            { id: 'node-plan-confirm', name: '编制计划' },\r\n            { id: 'node-audit-progress', name: '审核任务中' },\r\n            { id: 'node-completed', name: '审核完结' }\r\n        ];\r\n        \r\n        // 切换节点\r\n        function switchNode(index) {\r\n            currentNodeIndex = index;\r\n            \r\n            // 更新步骤条样式\r\n            const stepItems = document.querySelectorAll('.step-item');\r\n            stepItems.forEach((item, idx) => {\r\n                item.classList.remove('active', 'completed', 'pending');\r\n                if (idx < index) {\r\n                    item.classList.add('completed');\r\n                } else if (idx === index) {\r\n                    item.classList.add('active');\r\n                } else {\r\n                    item.classList.add('pending');\r\n                }\r\n            });\r\n            \r\n            // 隐藏所有节点内容\r\n            document.querySelectorAll('.node-content').forEach(el => {\r\n                el.classList.add('hidden-section');\r\n            });\r\n            \r\n            // 显示当前节点内容\r\n            document.getElementById(nodes[index].id).classList.remove('hidden-section');\r\n            \r\n            // 更新页面标题状态\r\n            const statusBadge = document.getElementById('headerStatusBadge');\r\n            \r\n            if (index === 0) {\r\n                statusBadge.textContent = '组内确认中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 1) {\r\n                statusBadge.textContent = '编制计划中';\r\n                statusBadge.className = 'status-badge badge-processing';\r\n            } else if (index === 2) {\r\n                statusBadge.textContent = '审核任务中';\r\n                statusBadge.className = 'status-badge badge-warning';\r\n            } else if (index === 3) {\r\n                statusBadge.textContent = '审核完结';\r\n                statusBadge.className = 'status-badge badge-success';\r\n            }\r\n        }\r\n        \r\n        // 切换视角\r\n        function switchView(view) {\r\n            currentView = view;\r\n            \r\n            // 更新按钮样式\r\n            document.querySelectorAll('.view-switcher-btn').forEach(btn => {\r\n                btn.classList.remove('active');\r\n            });\r\n            document.getElementById(view + 'ViewBtn').classList.add('active');\r\n            \r\n            // 更新组员确认情况标签\r\n            const memberViewLabel = document.getElementById('memberViewLabel');\r\n            if (memberViewLabel) {\r\n                memberViewLabel.textContent = view === 'leader' ? '（组长视角）' : '（组员视角）';\r\n            }\r\n            \r\n            // 组长视角显示全部，组员视角只显示相关内容\r\n            if (view === 'leader') {\r\n                // 显示节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'block';\r\n                \r\n                // 显示组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'block';\r\n                \r\n                // 显示所有成员卡片\r\n                document.querySelectorAll('.member-confirm-card').forEach(card => {\r\n                    card.style.display = 'flex';\r\n                });\r\n                // 显示所有场所分配\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    site.style.display = 'block';\r\n                });\r\n                // 显示提醒按钮\r\n                document.querySelectorAll('.leader-only-btn').forEach(btn => {\r\n                    btn.style.display = 'inline-flex';\r\n                });\r\n                // 显示场所内所有成员行\r\n                document.querySelectorAll('.member-row').forEach(row => {\r\n                    row.style.display = 'table-row';\r\n                });\r\n                // 显示统计信息\r\n                document.getElementById('memberStats').style.display = 'flex';\r\n                // 隐藏组员自视视图\r\n                document.getElementById('memberSelfView').classList.add('hidden-section');\r\n                // 显示完整成员列表容器\r\n                document.getElementById('memberListContainer').classList.remove('hidden-section');\r\n                // 显示标题\r\n                document.getElementById('siteAllocationTitle').textContent = '场所审核组分配详情';\r\n                // 显示全局设置\r\n                document.getElementById('globalSettings').style.display = 'grid';\r\n                \r\n                // 显示锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'block';\r\n                document.getElementById('anchorNav').style.display = 'block';\r\n            } else {\r\n                // 组员视角 - 删除组员确认情况和节点进度栏\r\n                \r\n                // 隐藏节点进度栏（时间轴）\r\n                document.getElementById('timelineSection').style.display = 'none';\r\n                \r\n                // 隐藏组员确认情况卡片\r\n                document.getElementById('section-member').style.display = 'none';\r\n                \r\n                // 隐藏锚点导航中的\"组员确认情况\"\r\n                document.getElementById('anchor-member').style.display = 'none';\r\n                \r\n                // 只显示一个场所（总部）\r\n                const currentMember = '王洪伟';\r\n                \r\n                // 只显示总部场所（假设当前组员分配到总部）\r\n                document.querySelectorAll('.site-allocation').forEach(site => {\r\n                    if (site.id === 'site-headquarters') {\r\n                        site.style.display = 'block';\r\n                        // 在该场所内，只显示组长和当前组员\r\n                        site.querySelectorAll('.member-row').forEach(row => {\r\n                            const rowMember = row.getAttribute('data-member');\r\n                            if (rowMember === '武荣刚' || rowMember === currentMember) {\r\n                                row.style.display = 'table-row';\r\n                            } else {\r\n                                row.style.display = 'none';\r\n                            }\r\n                        });\r\n                    } else {\r\n                        site.style.display = 'none';\r\n                    }\r\n                });\r\n                \r\n                // 隐藏其他场所\r\n                document.getElementById('site-branch1').style.display = 'none';\r\n                document.getElementById('site-branch2').style.display = 'none';\r\n                \r\n                // 修改标题\r\n                document.getElementById('siteAllocationTitle').textContent = '我的审核任务';\r\n                \r\n                // 隐藏全局设置中的组长和结束时间，只保留开始时间\r\n                document.getElementById('globalSettings').style.display = 'none';\r\n            }\r\n        }\r\n        \r\n        // 查看策划方案\r\n        function viewPlan(projectNo) {\r\n            document.getElementById('planProjectNo').textContent = '项目编号：' + projectNo;\r\n            document.getElementById('planModal').classList.add('show');\r\n        }\r\n        \r\n        function closePlanModal() {\r\n            document.getElementById('planModal').classList.remove('show');\r\n        }\r\n        \r\n        // 重新分配成员\r\n        function reassignMember(memberName) {\r\n            alert(`正在为 ${memberName} 重新分配审核任务...`);\r\n        }\r\n        \r\n        // 发送提醒\r\n\r\n        \r\n        // 显示接受任务弹窗\r\n        function showAcceptModal() {\r\n            document.getElementById('acceptModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭接受任务弹窗\r\n        function closeAcceptModal() {\r\n            document.getElementById('acceptModal').classList.remove('show');\r\n        }\r\n        \r\n        // 确认接受任务\r\n        function confirmAccept() {\r\n            alert('任务接受成功！您已正式加入审核组。');\r\n            closeAcceptModal();\r\n            // 可以在这里添加后续逻辑，比如切换状态等\r\n        }\r\n        \r\n        // 显示退回任务弹窗\r\n        function showRejectModal() {\r\n            document.getElementById('rejectModal').classList.add('show');\r\n        }\r\n        \r\n        // 关闭退回任务弹窗\r\n        function closeRejectModal() {\r\n            document.getElementById('rejectModal').classList.remove('show');\r\n            // 清空原因\r\n            document.getElementById('rejectReason').value = '';\r\n        }\r\n        \r\n        // 确认退回任务\r\n        function confirmReject() {\r\n            const reason = document.getElementById('rejectReason').value.trim();\r\n            if (!reason) {\r\n                alert('请填写退回原因！');\r\n                return;\r\n            }\r\n            alert(`任务已退回，原因：${reason}`);\r\n            closeRejectModal();\r\n            // 可以在这里添加后续逻辑，比如返回列表页等\r\n        }\r\n        \r\n        // 返回\r\n        function goBack() {\r\n            if (confirm('确定返回列表页？')) {\r\n                console.log('返回列表页');\r\n            }\r\n        }\r\n        \r\n        // Tab切换功能\r\n        function switchPlanTab(tabId) {\r\n            // 隐藏所有tab内容\r\n            document.querySelectorAll('.plan-tab-content').forEach(el => {\r\n                el.classList.add('hidden-section');\r\n            });\r\n            // 显示选中的tab\r\n            document.getElementById(tabId).classList.remove('hidden-section');\r\n            \r\n            // 更新按钮样式\r\n            document.querySelectorAll('.plan-tab-btn').forEach(btn => {\r\n                btn.classList.remove('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');\r\n                btn.classList.add('text-gray-500', 'border-transparent');\r\n            });\r\n            event.target.classList.add('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');\r\n            event.target.classList.remove('text-gray-500', 'border-transparent');\r\n        }\r\n        \r\n        // 新增过程行\r\n        function addProcessRow() {\r\n            const tbody = document.getElementById('processListBody');\r\n            const rowCount = tbody.children.length + 1;\r\n            \r\n            const newRow = document.createElement('tr');\r\n            newRow.setAttribute('data-row-id', rowCount);\r\n            newRow.innerHTML = `\r\n                <td class=\"px-4 py-2 border-b text-sm text-gray-600\">${rowCount}</td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"过程名称\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"主责部门\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"相关部门\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"涉及标准条款\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b\">\r\n                    <input type=\"text\" class=\"form-input w-full text-sm py-1\" value=\"\" placeholder=\"绩效参数或相关文件\">\r\n                </td>\r\n                <td class=\"px-4 py-2 border-b text-center\">\r\n                    <button onclick=\"deleteProcessRow(this)\" class=\"text-red-500 hover:text-red-700\" title=\"删除\">\r\n                        <i class=\"fas fa-trash-alt\"></i>\r\n                    </button>\r\n                </td>\r\n            `;\r\n            \r\n            tbody.appendChild(newRow);\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 删除过程行\r\n        function deleteProcessRow(btn) {\r\n            const row = btn.closest('tr');\r\n            row.remove();\r\n            renumberProcessRows();\r\n        }\r\n        \r\n        // 重新编号\r\n        function renumberProcessRows() {\r\n            const rows = document.querySelectorAll('#processListBody tr');\r\n            rows.forEach((row, index) => {\r\n                row.setAttribute('data-row-id', index + 1);\r\n                row.cells[0].textContent = index + 1;\r\n            });\r\n        }\r\n        \r\n        // 锚点导航滚动功能\r\n        function scrollToSection(sectionId, element) {\r\n            // 移除所有锚点的高亮状态\r\n            document.querySelectorAll('.anchor-item').forEach(item => {\r\n                item.classList.remove('active');\r\n            });\r\n            \r\n            // 给当前点击的锚点添加高亮状态\r\n            element.classList.add('active');\r\n            \r\n            // 滚动到对应区域\r\n            const targetSection = document.getElementById(sectionId);\r\n            if (targetSection) {\r\n                const offsetTop = targetSection.offsetTop - 200; // 预留顶部空间\r\n                window.scrollTo({\r\n                    top: offsetTop,\r\n                    behavior: 'smooth'\r\n                });\r\n            }\r\n        }\r\n        \r\n        // 监听滚动事件，自动更新锚点高亮状态\r\n        window.addEventListener('scroll', function() {\r\n            const sections = ['section-member', 'section-project', 'section-team'];\r\n            const scrollPosition = window.scrollY + 250;\r\n            \r\n            sections.forEach((sectionId, index) => {\r\n                const section = document.getElementById(sectionId);\r\n                if (section && section.style.display !== 'none') {\r\n                    const sectionTop = section.offsetTop;\r\n                    const sectionBottom = sectionTop + section.offsetHeight;\r\n                    \r\n                    if (scrollPosition >= sectionTop && scrollPosition < sectionBottom) {\r\n                        document.querySelectorAll('.anchor-item').forEach(item => {\r\n                            item.classList.remove('active');\r\n                        });\r\n                        const anchorItems = document.querySelectorAll('.anchor-item');\r\n                        if (anchorItems[index]) {\r\n                            anchorItems[index].classList.add('active');\r\n                        }\r\n                    }\r\n                }\r\n            });\r\n        });\r\n        \r\n        // 初始化\r\n        document.addEventListener('DOMContentLoaded', function() {\r\n            switchNode(0);\r\n        });\r\n    __COMBINED_SCRIPT_CLOSE__\r\n<script>\n(function () {\n  function wrapTables() {\n    document.querySelectorAll('table.data-table').forEach(function (table) {\n      if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;\n      var wrapper = document.createElement('div');\n      wrapper.className = 'table-scroll';\n      table.parentNode.insertBefore(wrapper, table);\n      wrapper.appendChild(table);\n    });\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', wrapTables);\n  } else {\n    wrapTables();\n  }\n})();\n__COMBINED_SCRIPT_CLOSE__\n</body>\r\n</html>\r\n","﻿\r\n<!DOCTYPE html>\r\n<html lang=\"zh-CN\">\r\n<head>\r\n    <meta charset=\"UTF-8\">\r\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\r\n    <title>审核计划</title>\r\n    <script src=\"https://cdn.tailwindcss.com\">__COMBINED_SCRIPT_CLOSE__\r\n    <link href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\" rel=\"stylesheet\">\r\n    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\">__COMBINED_SCRIPT_CLOSE__\r\n    <style>\r\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');\r\n\r\n        body {\r\n            font-family: 'Inter', 'Noto Sans SC', sans-serif;\r\n            background-color: #f8fafc !important;\r\n        }\r\n        .main-container {\r\n            width: auto !important;\r\n            margin: 0 auto;\r\n            padding: 24px !important;\r\n        }\r\n        .form-section {\r\n            background: white;\r\n            border-radius: 12px;\r\n            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);\r\n            border: 1px solid #e2e8f0;\r\n            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);\r\n            scroll-margin-top: 20px;\r\n        }\r\n\r\n        .form-section:hover {\r\n            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);\r\n        }\r\n\r\n        .section-header {\r\n            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);\r\n            border-bottom: 1px solid #e2e8f0;\r\n            padding: 16px 20px;\r\n            border-radius: 12px 12px 0 0;\r\n            display: flex;\r\n            align-items: center;\r\n            justify-content: space-between;\r\n            cursor: pointer;\r\n        }\r\n\r\n        .section-title {\r\n            display: flex;\r\n            align-items: center;\r\n            gap: 8px;\r\n            font-weight: 600;\r\n            color: #1e293b;\r\n            font-size: 15px;\r\n        }\r\n\r\n        .section-icon {\r\n            width: 28px;\r\n            height: 28px;\r\n            border-radius: 6px;\r\n            display: flex;\r\n            align-items: center;\r\n            justify-content: center;\r\n            font-size: 13px;\r\n        }\r\n\r\n        .form-grid {\r\n            display: grid;\r\n            gap: 16px;\r\n        }\r\n\r\n        .form-grid-2 {\r\n            grid-template-columns: repeat(2, 1fr);\r\n        }\r\n\r\n        .form-grid-3 {\r\n            grid-template-columns: repeat(3, 1fr);\r\n        }\r\n\r\n        .form-grid-4 {\r\n            grid-template-columns: repeat(4,
