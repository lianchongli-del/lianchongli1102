                    </div>\r\n                        \r\n                        <div class=\"activity-table-wrapper\">\r\n                            <div class=\"activity-header\">\r\n                                <div style=\"display: flex; align-items: center; gap: 8px;\">\r\n                                    <input type=\"checkbox\" class=\"select-all-site criteria-checkbox\" style=\"width: 18px; height: 18px;\" onchange=\"toggleSiteSelectAll('hq')\">\r\n                                </div>\r\n                                <div>日期</div>\r\n                                <div>时间</div>\r\n                                <div class=\"auditor-head-hint\">审核人员<button type=\"button\" class=\"auditor-hint-button\" aria-label=\"可安排人员\"><i class=\"fas fa-user-check\"></i></button><span class=\"auditor-hint-tooltip\">可安排人员：武荣刚、王洪伟、陈明</span></div>\r\n                                <div>拟审核的过程或活动及相关的标准条款</div>\r\n                                <div>涉及的部门/场所</div>\r\n                                <div style=\"display: flex; align-items: center; gap: 6px;\">\r\n                                    <button type=\"button\" class=\"btn btn-danger btn-xs batch-delete-site\" data-site=\"hq\" onclick=\"batchDeleteSiteRows('hq')\" style=\"opacity: 0.5; cursor: not-allowed;\" disabled>\r\n                                        <i class=\"fas fa-trash-alt\"></i>批量删除\r\n                                    </button>\r\n                                </div>\r\n                            </div>\r\n                            <div class=\"site-activity-container\" id=\"activityContainer-hq\">\r\n                                <!-- 动态生成活动行 -->\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                </div>\r\n\r\n                <!-- 场所1 -->\r\n                <div class=\"site-card\" data-site-id=\"site1\">\r\n                    <div class=\"site-header\">\r\n                        <div class=\"site-title\">\r\n                            <span class=\"site-type-tag tag-site\">场所</span>\r\n                            <span class=\"site-name\">北京市地铁运营有限公司运营一分公司</span>\r\n                            <div class=\"site-scopes\">\r\n                                <span class=\"scope-badge standard-qms\">QMS</span>\r\n                            </div>\r\n                        </div>\r\n                        <div class=\"site-info-grid\">\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">场所地址</span>\r\n                                <span class=\"site-info-value\">北京市东城区建国门南大街5号</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">有效人数</span>\r\n                                <span class=\"site-info-value\">180人</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">审核日期区间</span>\r\n                                <span class=\"site-info-value\">2024-04-16 至 2024-04-17</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">已分配人天</span>\r\n                                <div class=\"assigned-days\">\r\n                                    <strong id=\"site-days-site1\">0.0</strong> 人天\r\n                                </div>\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                    <div class=\"site-content\">\r\n                        <div class=\"flex justify-between items-center mb-4\">\r\n                            <h4 class=\"text-sm font-semibold text-slate-700\">审核活动明细</h4>\r\n                            <div class=\"flex gap-2\">\r\n                                <input type=\"file\" id=\"excelUpload-site1\" accept=\".xlsx,.xls\" class=\"hidden-file-input\" onchange=\"handleSiteExcelUpload(event, 'site1')\">\r\n                                <button class=\"btn btn-default btn-sm\" onclick=\"document.getElementById('excelUpload-site1').click()\">\r\n                                    <i class=\"fas fa-file-excel\"></i>导入Excel\r\n                                </button>\r\n                                <button class=\"btn btn-primary btn-sm\" onclick=\"addActivityRow('site1')\">\r\n                                    <i class=\"fas fa-plus\"></i>新增活动\r\n                                </button>\r\n                            </div>\r\n                        </div>\r\n                        \r\n                        <div class=\"activity-table-wrapper\">\r\n                            <div class=\"activity-header\">\r\n                                <div style=\"display: flex; align-items: center; gap: 8px;\">\r\n                                    <input type=\"checkbox\" class=\"select-all-site criteria-checkbox\" style=\"width: 18px; height: 18px;\" onchange=\"toggleSiteSelectAll('site1')\">\r\n                                </div>\r\n                                <div>日期</div>\r\n                                <div>时间</div>\r\n                                <div class=\"auditor-head-hint\">审核人员<button type=\"button\" class=\"auditor-hint-button\" aria-label=\"可安排人员\"><i class=\"fas fa-user-check\"></i></button><span class=\"auditor-hint-tooltip\">可安排人员：张丽、刘娜、赵强</span></div>\r\n                                <div>拟审核的过程或活动及相关的标准条款</div>\r\n                                <div>涉及的部门/场所</div>\r\n                                <div style=\"display: flex; align-items: center; gap: 6px;\">\r\n                                    <button type=\"button\" class=\"btn btn-danger btn-xs batch-delete-site\" data-site=\"site1\" onclick=\"batchDeleteSiteRows('site1')\" style=\"opacity: 0.5; cursor: not-allowed;\" disabled>\r\n                                        <i class=\"fas fa-trash-alt\"></i>批量删除\r\n                                    </button>\r\n                                </div>\r\n                            </div>\r\n                            <div class=\"site-activity-container\" id=\"activityContainer-site1\">\r\n                                <!-- 动态生成活动行 -->\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                </div>\r\n\r\n                <!-- 场所2 -->\r\n                <div class=\"site-card\" data-site-id=\"site2\">\r\n                    <div class=\"site-header\">\r\n                        <div class=\"site-title\">\r\n                            <span class=\"site-type-tag tag-site\">场所</span>\r\n                            <span class=\"site-name\">北京市地铁运营有限公司运营二分公司</span>\r\n                            <div class=\"site-scopes\">\r\n                                <span class=\"scope-badge standard-ohsms\">OHSMS</span>\r\n                                <span class=\"scope-badge standard-ems\">EMS</span>\r\n                            </div>\r\n                        </div>\r\n                        <div class=\"site-info-grid\">\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">场所地址</span>\r\n                                <span class=\"site-info-value\">北京市朝阳区望京北路9号</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">有效人数</span>\r\n                                <span class=\"site-info-value\">150人</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">审核日期区间</span>\r\n                                <span class=\"site-info-value\">2024-04-17 至 2024-04-18</span>\r\n                            </div>\r\n                            <div class=\"site-info-item\">\r\n                                <span class=\"site-info-label\">已分配人天</span>\r\n                                <div class=\"assigned-days\">\r\n                                    <strong id=\"site-days-site2\">0.0</strong> 人天\r\n                                </div>\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                    <div class=\"site-content\">\r\n                        <div class=\"flex justify-between items-center mb-4\">\r\n                            <h4 class=\"text-sm font-semibold text-slate-700\">审核活动明细</h4>\r\n                            <div class=\"flex gap-2\">\r\n                                <input type=\"file\" id=\"excelUpload-site2\" accept=\".xlsx,.xls\" class=\"hidden-file-input\" onchange=\"handleSiteExcelUpload(event, 'site2')\">\r\n                                <button class=\"btn btn-default btn-sm\" onclick=\"document.getElementById('excelUpload-site2').click()\">\r\n                                    <i class=\"fas fa-file-excel\"></i>导入Excel\r\n                                </button>\r\n                                <button class=\"btn btn-primary btn-sm\" onclick=\"addActivityRow('site2')\">\r\n                                    <i class=\"fas fa-plus\"></i>新增活动\r\n                                </button>\r\n                            </div>\r\n                        </div>\r\n                        \r\n                        <div class=\"activity-table-wrapper\">\r\n                            <div class=\"activity-header\">\r\n                                <div style=\"display: flex; align-items: center; gap: 8px;\">\r\n                                    <input type=\"checkbox\" class=\"select-all-site criteria-checkbox\" style=\"width: 18px; height: 18px;\" onchange=\"toggleSiteSelectAll('site2')\">\r\n                                </div>\r\n                                <div>日期</div>\r\n                                <div>时间</div>\r\n                                <div class=\"auditor-head-hint\">审核人员<button type=\"button\" class=\"auditor-hint-button\" aria-label=\"可安排人员\"><i class=\"fas fa-user-check\"></i></button><span class=\"auditor-hint-tooltip\">可安排人员：武荣刚、刘娜、陈明、赵强</span></div>\r\n                                <div>拟审核的过程或活动及相关的标准条款</div>\r\n                                <div>涉及的部门/场所</div>\r\n                                <div style=\"display: flex; align-items: center; gap: 6px;\">\r\n                                    <button type=\"button\" class=\"btn btn-danger btn-xs batch-delete-site\" data-site=\"site2\" onclick=\"batchDeleteSiteRows('site2')\" style=\"opacity: 0.5; cursor: not-allowed;\" disabled>\r\n                                        <i class=\"fas fa-trash-alt\"></i>批量删除\r\n                                    </button>\r\n                                </div>\r\n                            </div>\r\n                            <div class=\"site-activity-container\" id=\"activityContainer-site2\">\r\n                                <!-- 动态生成活动行 -->\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n    </main>\r\n\r\n    <script>\r\n        // 审核组人员数据\r\n        const auditTeam = [\n            { id: 'wurg', name: '武荣刚', maxHours: 32, color: '#3b82f6', current: 0 },\n            { id: 'whw', name: '王洪伟', maxHours: 16, color: '#10b981', current: 0 },\n            { id: 'zhangli', name: '张丽', maxHours: 16, color: '#f59e0b', current: 0 },\n            { id: 'liuna', name: '刘娜', maxHours: 16, color: '#8b5cf6', current: 0 },\n            { id: 'chenming', name: '陈明', maxHours: 16, color: '#06b6d4', current: 0 },\n            { id: 'zhaoqiang', name: '赵强', maxHours: 16, color: '#ef4444', current: 0 }\n        ];\n        // 每个场所仅展示上一审核任务已下发到该场所的人员\n        const siteAuditorAssignments = {\n            hq: ['wurg', 'whw', 'chenming'],\n            site1: ['zhangli', 'liuna', 'zhaoqiang'],\n            site2: ['wurg', 'liuna', 'chenming', 'zhaoqiang']\n        };\r\n\r\n        // 场所数据\r\n        const sitesData = {\r\n            hq: { name: '总部', type: '总部', address: '北京市西城区北礼士路甲38号', scopes: ['QMS', 'EMS'], staff: 200 },\r\n            site1: { name: '运营一分公司', type: '场所', address: '北京市东城区建国门南大街5号', scopes: ['QMS'], staff: 180 },\r\n            site2: { name: '运营二分公司', type: '场所', address: '北京市朝阳区望京北路9号', scopes: ['OHSMS', 'EMS'], staff: 150 }\r\n        };\r\n\r\n        // 初始化\r\n        document.addEventListener('DOMContentLoaded', function() {\n            addActivityRow('hq', { date: '2024-04-15', startTime: '09:00', endTime: '11:00', auditors: ['wurg'], process: '管理体系范围、方针目标及职责权限', dept: '最高管理者/中心职能' });\n            addActivityRow('hq', { date: '2024-04-15', startTime: '13:30', endTime: '15:30', auditors: ['whw'], process: 'QMS过程控制与文件记录', dept: '质量管理部/中心职能' });\n            addActivityRow('site1', { date: '2024-04-16', startTime: '09:00', endTime: '11:00', auditors: ['zhangli'], process: 'EMS运行控制及合规性评价', dept: '运营一分公司' });\n            addActivityRow('site1', { date: '2024-04-16', startTime: '13:30', endTime: '15:30', auditors: ['liuna'], process: '职业健康安全风险管控', dept: '运营一分公司' });\n            addActivityRow('site2', { date: '2024-04-17', startTime: '09:00', endTime: '11:00', auditors: ['chenming'], process: '环境因素识别与运行绩效监视', dept: '运营二分公司' });\n            addActivityRow('site2', { date: '2024-04-17', startTime: '13:30', endTime: '15:30', auditors: ['zhaoqiang'], process: '现场应急准备与响应', dept: '运营二分公司' });\n        });\r\n\r\n        // 班次行生成\r\n        function updateShiftRows() {\r\n            const count = parseInt(document.getElementById('shiftCount').value);\r\n            const container = document.getElementById('shiftContainer');\r\n            const existingRows = container.querySelectorAll('.shift-row');\r\n            const currentCount = existingRows.length;\r\n            \r\n            let hourOptions = '';\r\n            for (let i = 0; i < 24; i++) {\r\n                hourOptions += `<option value=\"${i}\">${String(i).padStart(2, '0')}</option>`;\r\n            }\r\n            \r\n            let minuteOptions = `\r\n                <option value=\"0\">00</option>\r\n                <option value=\"15\">15</option>\r\n                <option value=\"30\">30</option>\r\n                <option value=\"45\">45</option>\r\n            `;\r\n            \r\n            if (count > currentCount) {\r\n                for (let i = currentCount + 1; i <= count; i++) {\r\n                    const row = document.createElement('div');\r\n                    row.className = 'shift-row';\r\n                    row.dataset.shift = i;\r\n                    row.innerHTML = `\r\n                        <span class=\"shift-label\">第${i}班次</span>\r\n                        <div class=\"shift-time-group\">\r\n                            <select class=\"time-select hour-select\" onchange=\"calculateShiftDuration(${i})\">\r\n                                ${hourOptions}\r\n                            </select>\r\n                            <span class=\"shift-separator\">:</span>\r\n                            <select class=\"time-select minute-select\" onchange=\"calculateShiftDuration(${i})\">\r\n                                ${minuteOptions}\r\n                            </select>\r\n                            <span class=\"shift-separator\">-</span>\r\n                            <select class=\"time-select hour-select\" onchange=\"calculateShiftDuration(${i})\">\r\n                                ${hourOptions}\r\n                            </select>\r\n                            <span class=\"shift-separator\">:</span>\r\n                            <select class=\"time-select minute-select\" onchange=\"calculateShiftDuration(${i})\">\r\n                                ${minuteOptions}\r\n                            </select>\r\n                        </div>\r\n                        <span class=\"shift-duration\" id=\"shift${i}Duration\">0小时0分钟</span>\r\n                    `;\r\n                    container.appendChild(row);\r\n                }\r\n            } else if (count < currentCount) {\r\n                for (let i = currentCount - 1; i >= count; i--) {\r\n                    existingRows[i].remove();\r\n                }\r\n            }\r\n            \r\n            for (let i = 1; i <= count; i++) {\r\n                const row = document.querySelector(`.shift-row[data-shift=\"${i}\"]`);\r\n                if (row) {\r\n                    const selects = row.querySelectorAll('select');\r\n                    selects[0].value = 8;\r\n                    selects[2].value = 17;\r\n                    calculateShiftDuration(i);\r\n                }\r\n            }\r\n        }\r\n\r\n        function calculateShiftDuration(shiftNum) {\r\n            const row = document.querySelector(`.shift-row[data-shift=\"${shiftNum}\"]`);\r\n            if (!row) return;\r\n            \r\n            const selects = row.querySelectorAll('select');\r\n            const startH = parseInt(selects[0].value) || 0;\r\n            const startM = parseInt(selects[1].value) || 0;\r\n            const endH = parseInt(selects[2].value) || 0;\r\n            const endM = parseInt(selects[3].value) || 0;\r\n            \r\n            let start = startH * 60 + startM;\r\n            let end = endH * 60 + endM;\r\n            \r\n            if (end < start) end += 24 * 60;\r\n            \r\n            const duration = end - start;\r\n            const hours = Math.floor(duration / 60);\r\n            const mins = duration % 60;\r\n            \r\n            const display = document.getElementById(`shift${shiftNum}Duration`);\r\n            if (display) {\r\n                display.textContent = `${hours}小时${mins}分钟`;\r\n            }\r\n        }\r\n\r\n        function toggleCriteriaCheckbox(checkboxId) {\r\n            event.stopPropagation();\r\n            const checkbox = document.getElementById(checkboxId);\r\n            checkbox.checked = !checkbox.checked;\r\n            toggleCriteriaField(checkboxId.replace('criteria-', ''));\r\n        }\r\n\r\n        function toggleCriteriaItem(item, event) {\r\n            if (item.id === 'criteria-item-standard') return;\r\n            \r\n            item.classList.toggle('expanded');\r\n            \r\n            if (event && !event.target.closest('.criteria-checkbox-wrapper')) {\r\n                const checkbox = item.querySelector('.criteria-checkbox');\r\n                if (!checkbox.disabled) {\r\n                    checkbox.checked = !checkbox.checked;\r\n                    const type = checkbox.id.replace('criteria-', '');\r\n                    const input = document.getElementById(`input-${type}`);\r\n                    if (input) {\r\n                        if (checkbox.checked) {\r\n                            input.parentElement.style.maxHeight = '200px';\r\n                            input.parentElement.style.padding = '0 16px 16px 48px';\r\n                            item.classList.add('active');\r\n                        } else {\r\n                            input.parentElement.style.maxHeight = '0';\r\n                            input.parentElement.style.padding = '0 16px 0 48px';\r\n                            input.value = '';\r\n                            item.classList.remove('active');\r\n                        }\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        function toggleCriteriaField(type) {\r\n            const checkbox = document.getElementById(`criteria-${type}`);\r\n            const item = document.getElementById(`criteria-item-${type}`);\r\n            const input = document.getElementById(`input-${type}`);\r\n            \r\n            if (checkbox.checked) {\r\n                item.classList.add('expanded', 'active');\r\n            } else {\r\n                item.classList.remove('expanded', 'active');\r\n                input.value = '';\r\n            }\r\n        }\r\n\r\n        function addActivityRow(siteId, data = null) {\r\n            const container = document.getElementById(`activityContainer-${siteId}`);\r\n            const rowId = `${siteId}_act_${Date.now()}`;\r\n            \r\n            const div = document.createElement('div');\r\n            div.className = 'activity-row';\r\n            div.dataset.rowId = rowId;\r\n            div.dataset.site = siteId;\r\n            \r\n            const date = data?.date || '2024-04-15';\r\n            const startTime = data?.startTime || '09:00';\r\n            const endTime = data?.endTime || '12:00';\r\n                        const allowedAuditorIds = siteAuditorAssignments[siteId] || auditTeam.map(t => t.id);\n            const allowedAuditors = allowedAuditorIds.map(id => auditTeam.find(a => a.id === id)).filter(Boolean);\n            const auditors = (data?.auditors || []).filter(aid => allowedAuditorIds.includes(aid));\n            const process = data?.process || '';\n            const dept = data?.dept || '';\r\n\r\n            div.innerHTML = `\r\n                <div style=\"display: flex; align-items: center; justify-content: center;\">\r\n                    <input type=\"checkbox\" class=\"row-checkbox criteria-checkbox\" style=\"width: 18px; height: 18px;\" data-row-id=\"${rowId}\" data-site=\"${siteId}\" onchange=\"updateSiteBatchDeleteBtn('${siteId}')\">\r\n                </div>\r\n                <div>\r\n                    <input type=\"date\" class=\"form-input\" value=\"${date}\" min=\"2024-04-15\" max=\"2024-04-18\" style=\"width: 110px;\" onchange=\"updateAuditStats()\">\r\n                </div>\r\n                <div class=\"flex items-center gap-1\">\r\n                    <select class=\"form-select time-select\" style=\"width: 65px;\" onchange=\"updateAuditStats()\">\r\n                        ${generateTimeOptions(startTime)}\r\n                    </select>\r\n                    <span class=\"text-slate-400\">-</span>\r\n                    <select class=\"form-select time-select\" style=\"width: 65px;\" onchange=\"updateAuditStats()\">\r\n                        ${generateTimeOptions(endTime)}\r\n                    </select>\r\n                </div>\r\n                <div class=\"auditor-select-container\">\n                    <div class=\"auditor-tags\" onclick=\"showAuditorDropdown('${rowId}')\" id=\"tags-${rowId}\">\n                        ${auditors.map(aid => {\n                            const auditor = allowedAuditors.find(a => a.id === aid);\n                            return auditor ? `<span class=\"auditor-tag\" data-id=\"${aid}\">${auditor.name}<span class=\"remove\" onclick=\"removeAuditor('${rowId}', '${aid}', event)\">×</span></span>` : '';\n                        }).join('') || '<span class=\"text-slate-400 text-xs px-1\">点击选择人员...</span>'}\n                    </div>\n                    <div class=\"auditor-dropdown\" id=\"dropdown-${rowId}\">\n                        ${allowedAuditors.map(t => `\n                            <div class=\"auditor-option\" onclick=\"selectAuditor('${rowId}', '${t.id}')\">\n                                <span class=\"auditor-color\" style=\"background: ${t.color};\"></span>\n                                <span>${t.name} (${t.maxHours}h)</span>\n                            </div>\n                        `).join('')}\n                    </div>\n                </div>\n                <div>\n                    <input type=\"text\" class=\"form-input\" value=\"${process}\" placeholder=\"如：组织环境 4.1-4.4\" style=\"width: 100%;\">\r\n                </div>\r\n                <div>\r\n                    <input type=\"text\" class=\"form-input\" value=\"${dept}\" placeholder=\"如：管理层/中心职能\" style=\"width: 100%;\">\r\n                </div>\r\n                <div>\r\n                    <button type=\"button\" class=\"btn btn-danger btn-xs\" onclick=\"removeActivityRow('${rowId}', '${siteId}')\">\r\n                        <i class=\"fas fa-trash\"></i>删除\r\n                    </button>\r\n                </div>\r\n            `;\r\n            \r\n            container.appendChild(div);\r\n            updateAuditStats();\r\n        }\r\n\r\n        function generateTimeOptions(selectedTime = '09:00') {\r\n            let html = '';\r\n            for (let h = 0; h < 24; h++) {\r\n                for (let m of ['00', '15', '30', '45']) {\r\n                    const time = `${String(h).padStart(2, '0')}:${m}`;\r\n                    const selected = time === selectedTime ? 'selected' : '';\r\n                    html += `<option value=\"${time}\" ${selected}>${time}</option>`;\r\n                }\r\n            }\r\n            return html;\r\n        }\r\n\r\n        function showAuditorDropdown(rowId) {\n            // 先关闭所有其他下拉框\n            document.querySelectorAll('.auditor-dropdown').forEach(d => {\n                if (d.id !== `dropdown-${rowId}`) d.classList.remove('show');\n            });\n            document.querySelectorAll('.activity-row.dropdown-active, .auditor-select-container.dropdown-active').forEach(el => {\n                el.classList.remove('dropdown-active');\n            });\n            \n            const dropdown = document.getElementById(`dropdown-${rowId}`);\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n            const container = dropdown?.closest('.auditor-select-container');\n            dropdown.classList.toggle('show');\n            const isOpen = dropdown.classList.contains('show');\n            row?.classList.toggle('dropdown-active', isOpen);\n            container?.classList.toggle('dropdown-active', isOpen);\n            \n            const closeDropdown = (e) => {\n                if (!e.target.closest(`#tags-${rowId}`) && !e.target.closest(`#dropdown-${rowId}`)) {\n                    dropdown.classList.remove('show');\n                    row?.classList.remove('dropdown-active');\n                    container?.classList.remove('dropdown-active');\n                    document.removeEventListener('click', closeDropdown);\n                }\n            };\n            setTimeout(() => document.addEventListener('click', closeDropdown), 0);\n        }\n\n        function selectAuditor(rowId, auditorId) {\r\n            const tagsContainer = document.getElementById(`tags-${rowId}`);\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\n            const allowedAuditorIds = siteAuditorAssignments[row?.dataset.site] || auditTeam.map(t => t.id);\n            if (!allowedAuditorIds.includes(auditorId)) return;\n            const auditor = auditTeam.find(a => a.id === auditorId);\n            \n            if (tagsContainer.querySelector(`[data-id=\"${auditorId}\"]`)) return;\r\n            \r\n            const placeholder = tagsContainer.querySelector('.text-slate-400');\r\n            if (placeholder) placeholder.remove();\r\n            \r\n            const tag = document.createElement('span');\r\n            tag.className = 'auditor-tag';\r\n            tag.dataset.id = auditorId;\r\n            tag.innerHTML = `${auditor.name}<span class=\"remove\" onclick=\"removeAuditor('${rowId}', '${auditorId}', event)\">×</span>`;\r\n            tagsContainer.appendChild(tag);\r\n            \r\n            updateAuditStats();\r\n        }\r\n\r\n        function removeAuditor(rowId, auditorId, event) {\r\n            event.stopPropagation();\r\n            const tagsContainer = document.getElementById(`tags-${rowId}`);\r\n            const tag = tagsContainer.querySelector(`[data-id=\"${auditorId}\"]`);\r\n            if (tag) tag.remove();\r\n            \r\n            if (tagsContainer.children.length === 0) {\r\n                tagsContainer.innerHTML = '<span class=\"text-slate-400 text-xs px-1\">点击选择人员...</span>';\r\n            }\r\n            \r\n            updateAuditStats();\r\n        }\r\n\r\n        function removeActivityRow(rowId, siteId) {\r\n            const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\r\n            if (row) {\r\n                row.remove();\r\n                updateAuditStats();\r\n                updateSiteBatchDeleteBtn(siteId);\r\n            }\r\n        }\r\n\r\n        function updateAuditStats() {\r\n            auditTeam.forEach(t => t.current = 0);\r\n            const siteStats = { hq: 0, site1: 0, site2: 0 };\r\n            \r\n            document.querySelectorAll('.activity-row').forEach(row => {\r\n                const siteId = row.dataset.site;\r\n                const timeSelects = row.querySelectorAll('.time-select');\r\n                const start = timeSelects[0]?.value;\r\n                const end = timeSelects[1]?.value;\r\n                \r\n                if (start && end) {\r\n                    const [sh, sm] = start.split(':').map(Number);\r\n                    const [eh, em] = end.split(':').map(Number);\r\n                    let duration = (eh * 60 + em) - (sh * 60 + sm);\r\n                    if (duration < 0) duration += 24 * 60;\r\n                    const hours = duration / 60;\r\n                    \r\n                    const tags = row.querySelectorAll('.auditor-tag');\r\n                    tags.forEach(tag => {\r\n                        const auditorId = tag.dataset.id;\r\n                        const auditor = auditTeam.find(a => a.id === auditorId);\r\n                        if (auditor) {\r\n                            auditor.current += hours;\r\n                            siteStats[siteId] += hours;\r\n                        }\r\n                    });\r\n                }\r\n            });\r\n            \r\n            auditTeam.forEach(t => {\r\n                const el = document.getElementById(`stat-${t.id}`);\r\n                if (el) {\r\n                    el.textContent = t.current.toFixed(1);\r\n                    el.className = 'stat-value ' + (t.current > t.maxHours ? 'warning' : '');\r\n                }\r\n            });\r\n            \r\n            Object.keys(siteStats).forEach(siteId => {\r\n                const el = document.getElementById(`site-days-${siteId}`);\r\n                if (el) {\r\n                    el.textContent = (siteStats[siteId] / 8).toFixed(1);\r\n                }\r\n            });\r\n        }\r\n\r\n        function handleSiteExcelUpload(event, siteId) {\r\n            const file = event.target.files[0];\r\n            if (!file) return;\r\n            \r\n            const reader = new FileReader();\r\n            reader.onload = function(e) {\r\n                try {\r\n                    const data = new Uint8Array(e.target.result);\r\n                    const workbook = XLSX.read(data, {type: 'array'});\r\n                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];\r\n                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);\r\n                    \r\n                    const container = document.getElementById(`activityContainer-${siteId}`);\r\n                    container.innerHTML = '';\r\n                    \r\n                    jsonData.forEach(row => {\r\n                        const auditors = (row['审核人员'] || '').split(/[，,]/).map(s => {\r\n                            const name = s.trim();\r\n                            const found = auditTeam.find(a => a.name === name);\r\n                            return found ? found.id : '';\r\n                        }).filter(id => id);\r\n                        \r\n                        addActivityRow(siteId, {\r\n                            date: row['日期'] || '2024-04-15',\r\n                            startTime: row['开始时间'] || '09:00',\r\n                            endTime: row['结束时间'] || '12:00',\r\n                            auditors: auditors,\r\n                            process: row['过程或活动'] || '',\r\n                            dept: row['部门/场所'] || ''\r\n                        });\r\n                    });\r\n                    \r\n                    updateAuditStats();\r\n                    showToast(`成功导入 ${jsonData.length} 条记录到${sitesData[siteId].name}`);\r\n                } catch (err) {\r\n                    showToast('Excel解析失败，请检查文件格式', 'error');\r\n                }\r\n            };\r\n            reader.readAsArrayBuffer(file);\r\n            event.target.value = '';\r\n        }\r\n\r\n        function toggleSection(header) {\r\n            const content = header.nextElementSibling;\r\n            const icon = header.querySelector('.fa-chevron-down');\r\n            \r\n            if (content.style.maxHeight === '0px') {\r\n                content.style.maxHeight = '2000px';\r\n                content.style.overflow = 'visible';\r\n                content.style.padding = '';\r\n                if (icon) icon.style.transform = 'rotate(0deg)';\r\n            } else {\r\n                content.style.maxHeight = '0px';\r\n                content.style.overflow = 'hidden';\r\n                content.style.padding = '0 20px';\r\n                if (icon) icon.style.transform = 'rotate(-90deg)';\r\n            }\r\n        }\r\n\r\n        function savePlan() {\r\n            showToast('审核计划已保存为草稿');\r\n        }\r\n\r\n        function submitPlan() {\r\n            const rows = document.querySelectorAll('.activity-row');\r\n            if (rows.length === 0) {\r\n                showToast('请至少添加一条审核活动', 'error');\r\n                document.getElementById('section-activity').scrollIntoView({ behavior: 'smooth' });\r\n                return;\r\n            }\r\n            \r\n            const exceeded = auditTeam.filter(t => t.current > t.maxHours);\r\n            if (exceeded.length > 0) {\r\n                showToast(`${exceeded.map(e => e.name).join(',')} 的审核时长已超出最大可用时间`, 'error');\r\n                return;\r\n            }\r\n            \r\n            if (confirm('确定要提交审核计划吗？提交后将进入审批流程。')) {\r\n                showToast('审核计划已提交');\r\n            }\r\n        }\r\n\r\n        function toggleSiteSelectAll(siteId) {\r\n            const checkbox = document.querySelector(`.site-card[data-site-id=\"${siteId}\"] .select-all-site`);\r\n            const rowCheckboxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox`);\r\n            \r\n            rowCheckboxes.forEach(cb => {\r\n                cb.checked = checkbox.checked;\r\n            });\r\n            \r\n            updateSiteBatchDeleteBtn(siteId);\r\n        }\r\n\r\n        function updateSiteBatchDeleteBtn(siteId) {\r\n            const checkedBoxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox:checked`);\r\n            const btn = document.querySelector(`.batch-delete-site[data-site=\"${siteId}\"]`);\r\n            \r\n            if (checkedBoxes.length > 0) {\r\n                btn.disabled = false;\r\n                btn.style.opacity = '1';\r\n                btn.style.cursor = 'pointer';\r\n                btn.innerHTML = `<i class=\"fas fa-trash-alt\"></i>批量删除(${checkedBoxes.length})`;\r\n            } else {\r\n                btn.disabled = true;\r\n                btn.style.opacity = '0.5';\r\n                btn.style.cursor = 'not-allowed';\r\n                btn.innerHTML = `<i class=\"fas fa-trash-alt\"></i>批量删除`;\r\n            }\r\n        }\r\n\r\n        function batchDeleteSiteRows(siteId) {\r\n            const checkedBoxes = document.querySelectorAll(`#activityContainer-${siteId} .row-checkbox:checked`);\r\n            \r\n            if (checkedBoxes.length === 0) {\r\n                showToast('请先选择要删除的活动', 'warning');\r\n                return;\r\n            }\r\n            \r\n            if (confirm(`确定要删除选中的 ${checkedBoxes.length} 条活动记录吗？`)) {\r\n                checkedBoxes.forEach(cb => {\r\n                    const rowId = cb.dataset.rowId;\r\n                    const row = document.querySelector(`[data-row-id=\"${rowId}\"]`);\r\n                    if (row) row.remove();\r\n                });\r\n                \r\n                document.querySelector(`.site-card[data-site-id=\"${siteId}\"] .select-all-site`).checked = false;\r\n                updateSiteBatchDeleteBtn(siteId);\r\n                updateAuditStats();\r\n                \r\n                showToast(`已成功删除 ${checkedBoxes.length} 条活动记录`);\r\n            }\r\n        }\r\n\r\n        function showToast(message, type = 'success') {\r\n            const toast = document.createElement('div');\r\n            const bgColor = type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-amber-500' : 'bg-green-600';\r\n            const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle';\r\n            \r\n            toast.className = `fixed top-24 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-6 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-2 transition-all duration-300 opacity-0`;\r\n            toast.innerHTML = `<i class=\"fas ${icon}\"></i><span>${message}</span>`;\r\n            \r\n            document.body.appendChild(toast);\r\n            setTimeout(() => toast.classList.remove('opacity-0'), 10);\r\n            setTimeout(() => {\r\n                toast.classList.add('opacity-0');\r\n                setTimeout(() => toast.remove(), 300);\r\n            }, 3000);\r\n        }\r\n    __COMBINED_SCRIPT_CLOSE__\r\n\n    <script>\n        (function () {\n            function applyReadonlyPlan() {\n                document.querySelectorAll('button, input[type=\"file\"], .hidden-file-input, .auditor-dropdown, .auditor-tag .remove').forEach(function (el) {\n                    el.remove();\n                });\n\n                document.querySelectorAll('[onclick], [onchange], [ondblclick], [oninput]').forEach(function (el) {\n                    el.removeAttribute('onclick');\n                    el.removeAttribute('onchange');\n                    el.removeAttribute('ondblclick');\n                    el.removeAttribute('oninput');\n                });\n\n                document.querySelectorAll('input, textarea, select').forEach(function (el) {\n                    if (el.matches('input[type=\"checkbox\"], input[type=\"radio\"], select')) {\n                        el.disabled = true;\n                    } else {\n                        el.readOnly = true;\n                        el.setAttribute('readonly', 'readonly');\n                    }\n                    el.tabIndex = -1;\n                    el.setAttribute('aria-readonly', 'true');\n                });\n\n                document.querySelectorAll('.section-header .fa-chevron-down, .criteria-expand-icon').forEach(function (el) {\n                    el.style.display = 'none';\n                });\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', applyReadonlyPlan);\n            } else {\n                applyReadonlyPlan();\n            }\n            setTimeout(applyReadonlyPlan, 0);\n        })();\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // READONLY_DISPLAY_POLISH_START\n        (function () {\n            function valueOfControl(el) {\n                if (el.tagName === 'SELECT') {\n                    return Array.from(el.selectedOptions).map(function (option) {\n                        return option.textContent.trim();\n                    }).filter(Boolean).join('、') || el.value || '';\n                }\n                return el.value || el.textContent || '';\n            }\n\n            function classifyControl(el) {\n                if (el.type === 'date' || el.type === 'month') return 'readonly-date';\n                if (el.classList.contains('time-select')) return 'readonly-time';\n                if (el.tagName === 'TEXTAREA') return 'readonly-textarea';\n                return '';\n            }\n\n            function replaceControl(el) {\n                if (!el || el.dataset.readonlyConverted === 'true') return;\n                if (el.closest('.readonly-converted')) return;\n\n                var rawValue = valueOfControl(el).trim();\n                var text = rawValue || el.getAttribute('placeholder') || '-';\n                var display = document.createElement('div');\n                display.className = 'readonly-display ' + classifyControl(el) + (rawValue ? '' : ' empty');\n                display.textContent = text;\n                display.dataset.readonlyConverted = 'true';\n                el.replaceWith(display);\n            }\n\n            function replaceCheckbox(el) {\n                var icon = document.createElement('span');\n                icon.className = 'readonly-check' + (el.checked ? ' checked' : '');\n                icon.setAttribute('aria-label', el.checked ? '已选择' : '未选择');\n                el.replaceWith(icon);\n            }\n\n            function polishReadonlyPlan() {\n                document.querySelectorAll('button, input[type=\"file\"], .hidden-file-input, .auditor-dropdown, .auditor-tag .remove').forEach(function (el) {\n                    el.remove();\n                });\n\n                document.querySelectorAll('input[type=\"checkbox\"], input[type=\"radio\"]').forEach(replaceCheckbox);\n                document.querySelectorAll('input:not([type=\"checkbox\"]):not([type=\"radio\"]):not([type=\"file\"]), textarea, select').forEach(replaceControl);\n\n                document.querySelectorAll('[onclick], [onchange], [ondblclick], [oninput]').forEach(function (el) {\n                    el.removeAttribute('onclick');\n                    el.removeAttribute('onchange');\n                    el.removeAttribute('ondblclick');\n                    el.removeAttribute('oninput');\n                });\n\n                document.querySelectorAll('.section-header .fa-chevron-down, .criteria-expand-icon').forEach(function (el) {\n                    el.style.display = 'none';\n                });\n            }\n\n            if (document.readyState === 'loading') {\n                document.addEventListener('DOMContentLoaded', polishReadonlyPlan);\n            } else {\n                polishReadonlyPlan();\n            }\n            setTimeout(polishReadonlyPlan, 0);\n            setTimeout(polishReadonlyPlan, 80);\n        })();\n        // READONLY_DISPLAY_POLISH_END\n    __COMBINED_SCRIPT_CLOSE__\n\n\n    <script>\n        // PLAN_ANCHOR_NAV_START\n        (function () {\n            function initPlanAnchors() {\n                var nav = document.querySelector('.plan-anchor-nav');\n                if (!nav || nav.dataset.bound === 'true') return;\n                var pills = Array.from(nav.querySelectorAll('.plan-anchor-pill'));\n                var sections = pills.map(function (pill) {\n                    return document.getElementById(pill.dataset.target);\n                }).filter(Boolean);\n\n                function setActive(targetId) {\n                    pills.forEach(function (pill) {\n                        pill.classList.toggle('active', pill.dataset.target === targetId);\n                    });\n                }\n\n                pills.forEach(function (pill) {\n                    pill.addEventListener('click', function () {\n                        var target = document.getElementById(pill.dataset.target);\n                        if (!target) return;\n                        var navHeight = nav.offsetHeight || 0;\n                        var top = target.getBoundingClientRect().top + window.pageYOffset - navHeight - 8;\n                        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n                        setActive(pill.dataset.target);\n                    });\n
