: 16px; border-top: 1px solid #e2e8f0;\">\r\n                        <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;\">\r\n                            <span class=\"form-label\" style=\"margin-bottom: 0;\">附件资料</span>\r\n                            <button class=\"btn btn-default btn-sm\" id=\"uploadBtn\" onclick=\"uploadAttachment()\">\r\n                                <i class=\"fas fa-upload text-xs\"></i>\r\n                                上传附件\r\n                            </button>\r\n                        </div>\r\n                        <div class=\"attachment-list\" id=\"attachmentList\"></div>\r\n                        <input type=\"file\" id=\"fileInputModal\" style=\"display: none;\" accept=\".doc,.docx,.pdf,.jpg,.jpeg,.png,.gif\" onchange=\"handleFileSelectModal(event)\" multiple>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n            \r\n            <div class=\"modal-footer\">\r\n                <span class=\"text-sm text-gray-500 mr-auto\" id=\"modalHint\">\r\n                    <i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>\r\n                    填写完成后点击提交保存记录\r\n                </span>\r\n                <button class=\"btn btn-default\" onclick=\"closeVerificationModal()\">取消</button>\r\n                <button class=\"btn btn-primary\" id=\"confirmBtn\" onclick=\"saveVerificationRecords()\">\r\n                    <i class=\"fas fa-save text-xs\"></i>\r\n                    提交\r\n                </button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <script>\r\n        // ========== 全局数据 ==========\r\n        \r\n        // 会议签到表文件\r\n        let meetingFiles = {\r\n            first: null,\r\n            last: null\r\n        };\r\n\r\n        // 核查记录数据\r\n        let verificationData = [\r\n            { \r\n                auditorId: 'wurg', \r\n                auditorName: '武荣刚', \r\n                role: '组长', \r\n                roleTag: 'tag-leader',\r\n                dateRange: '2024-04-15 至 2024-04-18', \r\n                sites: '中心职能、场所1、场所2', \r\n                status: 'unsubmitted', \r\n                submitTime: '-',\r\n                records: [\r\n                    {\r\n                        date: '2024-04-15',\r\n                        time: '09:00-12:00',\r\n                        content: '组织环境 4.1-4.4',\r\n                        dept: '中心职能/管理层',\r\n                        record: '审核了公司管理体系的组织环境相关内容，与总经理进行了访谈，了解了管理承诺、方针目标的建立与实施情况。查阅了相关文件化信息，包括内外部环境因素识别表、相关方需求和期望清单等。',\r\n                        decision: '符合',\r\n                        standard: 'GB/T 19001-2016',\r\n                        nonConformityFact: '',\r\n                        nonConformityClause: ''\r\n                    },\r\n                    {\r\n                        date: '2024-04-15',\r\n                        time: '14:00-17:00',\r\n                        content: '领导作用和承诺 5.1-5.3',\r\n                        dept: '中心职能',\r\n                        record: '审核了管理层的领导作用和承诺，包括质量方针的制定与沟通、组织角色职责权限的确定。与部门负责人进行了访谈，检查了管理评审记录。',\r\n                        decision: '符合',\r\n                        standard: 'GB/T 19001-2016',\r\n                        nonConformityFact: '',\r\n                        nonConformityClause: ''\r\n                    },\r\n                    {\r\n                        date: '2024-04-16',\r\n                        time: '09:00-12:00',\r\n                        content: '环境因素识别 6.1.2',\r\n                        dept: '场所1/生产部门',\r\n                        record: '审核了生产现场的环境因素识别与评价过程，检查了重要环境因素清单及控制措施。现场查看了污染物排放控制情况，相关环保设施运行正常。',\r\n                        decision: '观察项',\r\n                        standard: 'GB/T 24001-2016',\r\n                        nonConformityFact: '',\r\n                        nonConformityClause: ''\r\n                    },\r\n                    {\r\n                        date: '2024-04-17',\r\n                        time: '09:00-12:00',\r\n                        content: '危险源辨识 6.1.2',\r\n                        dept: '场所2/安全管理部门',\r\n                        record: '审核了职业健康安全管理体系的危险源辨识、风险评价和控制措施的确定。检查了安全操作规程、应急预案及演练记录。现场查看了安全防护设施配置情况。',\r\n                        decision: '轻微不符合',\r\n                        standard: 'GB/T 45001-2020',\r\n                        nonConformityFact: '未提供2024年第一季度安全演练记录，无法证实应急预案的有效性验证。',\r\n                        nonConformityClause: 'GB/T 45001-2020 8.2'\r\n                    }\r\n                ],\r\n                attachments: []\r\n            },\r\n            { \r\n                auditorId: 'whw', \r\n                auditorName: '王洪伟', \r\n                role: '组员', \r\n                roleTag: 'tag-qms',\r\n                dateRange: '2024-04-15 至 2024-04-16', \r\n                sites: '场所1', \r\n                status: 'confirmed', \r\n                submitTime: '2024-04-16 17:45:00',\r\n                records: [\r\n                    { date: '2024-04-15', time: '09:00-12:00', content: '环境因素识别 6.1.2', dept: '环保部门', record: '审核了环境管理体系的环境因素识别过程...', decision: '符合', standard: 'GB/T 24001-2016', nonConformityFact: '', nonConformityClause: '' }\r\n                ],\r\n                attachments: []\r\n            },\r\n            { \r\n                auditorId: 'lz', \r\n                auditorName: '李战', \r\n                role: '组员', \r\n                roleTag: 'tag-qms',\r\n                dateRange: '2024-04-17 至 2024-04-18', \r\n                sites: '场所2', \r\n                status: 'unsubmitted', \r\n                submitTime: '-',\r\n                records: [],\r\n                attachments: []\r\n            },\r\n            { \r\n                auditorId: 'zq', \r\n                auditorName: '赵强', \r\n                role: '组员', \r\n                roleTag: 'tag-qms',\r\n                dateRange: '2024-04-17', \r\n                sites: '中心职能', \r\n                status: 'submitted', \r\n                submitTime: '2024-04-17 19:20:00',\r\n                records: [\r\n                    { date: '2024-04-17', time: '09:00-12:00', content: '职业健康安全风险识别 6.1.2', dept: '安全管理部门', record: '审核了职业健康安全管理体系的危险源辨识...', decision: '轻微不符合', standard: 'GB/T 45001-2020', nonConformityFact: '部分岗位安全风险告知卡缺失', nonConformityClause: 'GB/T 45001-2020 6.1.2' }\r\n                ],\r\n                attachments: []\r\n            }\r\n        ];\r\n\r\n        let currentVerificationIndex = null;\r\n        let currentActivityIndex = 0;\r\n        let isLeaderEditMode = false;\r\n        let isReadOnlyMode = false;\r\n\r\n        // ========== Tab 切换功能 ==========\r\n        \r\n        function switchModule(module, element) {\r\n            // 移除所有active类\r\n            document.querySelectorAll('.tab-item').forEach(tab => {\r\n                tab.classList.remove('active');\r\n            });\r\n            \r\n            // 隐藏所有内容模块\r\n            document.querySelectorAll('.module-content').forEach(content => {\r\n                content.classList.remove('active');\r\n            });\r\n            \r\n            // 添加active类到当前标签\r\n            element.classList.add('active');\r\n            \r\n            // 显示对应内容\r\n            document.getElementById(module + '-module').classList.add('active');\r\n            \r\n            console.log('切换到模块：' + module);\r\n        }\r\n\r\n        // ========== 首次会议 & 末次会议功能 ==========\r\n        \r\n        function uploadSignFile(type) {\r\n            document.getElementById(type + 'MeetingFile').click();\r\n        }\r\n\r\n        function handleSignUpload(event, type) {\r\n            const file = event.target.files[0];\r\n            if (!file) return;\r\n            \r\n            const validTypes = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];\r\n            if (!validTypes.includes(file.type)) {\r\n                alert('仅支持 PDF、JPG、PNG 格式文件');\r\n                return;\r\n            }\r\n            \r\n            if (file.size > 10 * 1024 * 1024) {\r\n                alert('文件大小不能超过10MB');\r\n                return;\r\n            }\r\n            \r\n            meetingFiles[type] = {\r\n                name: file.name,\r\n                size: (file.size / 1024).toFixed(2) + 'KB',\r\n                type: file.type\r\n            };\r\n            \r\n            const uploadArea = document.getElementById(type + 'MeetingUpload');\r\n            const fileList = document.getElementById(type + 'MeetingFileList');\r\n            \r\n            uploadArea.classList.add('hidden');\r\n            fileList.classList.remove('hidden');\r\n            \r\n            let icon = 'fa-file-pdf';\r\n            if (file.type.startsWith('image/')) icon = 'fa-file-image';\r\n            \r\n            fileList.innerHTML = `\r\n                <div class=\"sign-uploaded\">\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span style=\"flex: 1;\">${file.name} (${(file.size / 1024).toFixed(2)}KB)</span>\r\n                    <button class=\"btn btn-default\" onclick=\"previewSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px;\">\r\n                        <i class=\"fas fa-eye text-xs\"></i>预览\r\n                    </button>\r\n                    <button class=\"btn btn-default\" onclick=\"deleteSignFile('${type}')\" style=\"padding: 4px 10px; font-size: 11px; color: #dc2626; border-color: #fca5a5;\">\r\n                        <i class=\"fas fa-trash text-xs\"></i>删除\r\n                    </button>\r\n                </div>\r\n            `;\r\n            \r\n            showToast('签到表上传成功', 'success');\r\n        }\r\n\r\n        function previewSignFile(type) {\r\n            const file = meetingFiles[type];\r\n            if (file) {\r\n                showToast('预览: ' + file.name, 'info');\r\n            }\r\n        }\r\n\r\n        function deleteSignFile(type) {\r\n            if (!confirm('确定删除该签到表吗？')) return;\r\n            \r\n            meetingFiles[type] = null;\r\n            \r\n            const uploadArea = document.getElementById(type + 'MeetingUpload');\r\n            const fileList = document.getElementById(type + 'MeetingFileList');\r\n            \r\n            uploadArea.classList.remove('hidden');\r\n            uploadArea.classList.remove('has-file');\r\n            fileList.classList.add('hidden');\r\n            fileList.innerHTML = '';\r\n            \r\n            showToast('签到表已删除', 'success');\r\n        }\r\n\r\n        // ========== 现场审核功能 ==========\r\n        \r\n        function calculateProgressStats(records) {\r\n            if (!records || records.length === 0) {\r\n                return { conform: 0, observation: 0, minor: 0, serious: 0, total: 0 };\r\n            }\r\n            \r\n            const stats = {\r\n                conform: 0,\r\n                observation: 0,\r\n                minor: 0,\r\n                serious: 0,\r\n                total: records.length\r\n            };\r\n            \r\n            records.forEach(record => {\r\n                switch(record.decision) {\r\n                    case '符合':\r\n                        stats.conform++;\r\n                        break;\r\n                    case '观察项':\r\n                        stats.observation++;\r\n                        break;\r\n                    case '轻微不符合':\r\n                        stats.minor++;\r\n                        break;\r\n                    case '严重不符合':\r\n                        stats.serious++;\r\n                        break;\r\n                }\r\n            });\r\n            \r\n            return stats;\r\n        }\r\n\r\n        function renderStatNumber(value, type) {\r\n            if (value === 0) {\r\n                return `<span class=\"stat-number stat-zero\">-</span>`;\r\n            }\r\n            \r\n            let colorClass = '';\r\n            switch(type) {\r\n                case 'conform':\r\n                    colorClass = 'color: #15803d; background: #f0fdf4; border: 1px solid #bbf7d0;';\r\n                    break;\r\n                case 'observation':\r\n                    colorClass = 'color: #92400e; background: #fef3c7; border: 1px solid #fcd34d;';\r\n                    break;\r\n                case 'minor':\r\n                    colorClass = 'color: #dc2626; background: #fef2f2; border: 1px solid #fecaca;';\r\n                    break;\r\n                case 'serious':\r\n                    colorClass = 'color: #991b1b; background: #fee2e2; border: 1px solid #fca5a5;';\r\n                    break;\r\n            }\r\n            \r\n            return `<span class=\"stat-number\" style=\"${colorClass}\">${value}</span>`;\r\n        }\r\n\r\n        function renderProgressBar(records) {\r\n            if (!records || records.length === 0) {\r\n                return `\r\n                    <div class=\"progress-bar-container\" title=\"未开始填报\">\r\n                        <div class=\"progress-bar-fill-table empty\"></div>\r\n                    </div>\r\n                `;\r\n            }\r\n            \r\n            const count = records.length;\r\n            const baseCount = 5;\r\n            const percentage = Math.min((count / baseCount) * 100, 100);\r\n            \r\n            let fillClass = 'low';\r\n            if (percentage >= 100) fillClass = 'full';\r\n            else if (percentage >= 80) fillClass = 'high';\r\n            else if (percentage >= 40) fillClass = 'medium';\r\n            \r\n            return `\r\n                <div class=\"progress-bar-container\" title=\"已填报 ${count} 条核查记录\">\r\n                    <div class=\"progress-bar-fill-table ${fillClass}\" style=\"width: ${percentage}%\">\r\n                    </div>\r\n                </div>\r\n            `;\r\n        }\r\n\r\n        function renderVerificationTable() {\r\n            const tbody = document.getElementById('verificationTableBody');\r\n            tbody.innerHTML = '';\r\n            \r\n            verificationData.forEach((item, index) => {\r\n                const tr = document.createElement('tr');\r\n                \r\n                let statusBadge = '';\r\n                if (item.status === 'unsubmitted') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-draft\">未提交</span>';\r\n                } else if (item.status === 'submitted') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-processing\">已提交</span>';\r\n                } else if (item.status === 'confirmed') {\r\n                    statusBadge = '<span class=\"status-badge-table badge-success\">已确认</span>';\r\n                }\r\n                \r\n                const stats = calculateProgressStats(item.records);\r\n                \r\n                let actionBtns = '<div class=\"action-btns\">';\r\n                \r\n                actionBtns += `<button class=\"btn btn-info btn-sm\" onclick=\"viewVerificationDetails(${index})\">\r\n                    <i class=\"fas fa-eye text-xs\"></i>\r\n                    查看详情\r\n                </button>`;\r\n                \r\n                if (item.role === '组长') {\r\n                    if (item.status === 'unsubmitted') {\r\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"editLeaderVerification(${index})\">\r\n                            <i class=\"fas fa-edit text-xs\"></i>\r\n                            编辑\r\n                        </button>`;\r\n                    } else {\r\n                        actionBtns += `<button class=\"btn btn-success btn-sm\" disabled>\r\n                            <i class=\"fas fa-check text-xs\"></i>\r\n                            已提交\r\n                        </button>`;\r\n                    }\r\n                } else {\r\n                    if (item.status === 'submitted') {\r\n                        actionBtns += `<button class=\"btn btn-primary btn-sm\" onclick=\"confirmMemberVerification(${index})\">\r\n                            <i class=\"fas fa-check-circle text-xs\"></i>\r\n                            核查记录确认\r\n                        </button>`;\r\n                    } else if (item.status === 'confirmed') {\r\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\r\n                            <i class=\"fas fa-check text-xs\"></i>\r\n                            已确认\r\n                        </button>`;\r\n                    } else {\r\n                        actionBtns += `<button class=\"btn btn-default btn-sm\" disabled>\r\n                            <i class=\"fas fa-clock text-xs\"></i>\r\n                            等待提交\r\n                        </button>`;\r\n                    }\r\n                }\r\n                \r\n                actionBtns += '</div>';\r\n                \r\n                tr.innerHTML = `\r\n                    <td class=\"font-medium\">${item.auditorName}</td>\r\n                    <td><span class=\"personnel-tag ${item.roleTag}\">${item.role}</span></td>\r\n                    <td style=\"white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\" title=\"${item.dateRange}\">${item.dateRange}</td>\r\n                    <td>${item.sites}</td>\r\n                    <td>${renderProgressBar(item.records)}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.conform, 'conform')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.observation, 'observation')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.minor, 'minor')}</td>\r\n                    <td style=\"text-align: center;\">${renderStatNumber(stats.serious, 'serious')}</td>\r\n                    <td>${statusBadge}</td>\r\n                    <td class=\"text-gray-500\">${item.submitTime}</td>\r\n                    <td>${actionBtns}</td>\r\n                `;\r\n                \r\n                tbody.appendChild(tr);\r\n            });\r\n        }\r\n\r\n        function viewVerificationDetails(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = true;\r\n            isLeaderEditMode = false;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录详情';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.remove('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>当前为只读模式，仅可查看不可编辑';\r\n            document.getElementById('confirmBtn').style.display = 'none';\r\n            document.getElementById('uploadBtn').style.display = 'none';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationFormsReadOnly(data);\r\n            renderAttachmentsReadOnly(data);\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function editLeaderVerification(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = true;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录填报';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>组长填报模式：填写完成后点击提交';\r\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\r\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationForms();\r\n            renderAttachments();\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function confirmMemberVerification(index) {\r\n            currentVerificationIndex = index;\r\n            const data = verificationData[index];\r\n            currentActivityIndex = 0;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = false;\r\n            \r\n            document.getElementById('modalTitle').textContent = '核查记录确认';\r\n            document.getElementById('modalAuditorName').textContent = data.auditorName;\r\n            document.getElementById('modalReadOnlyTag').classList.add('hidden');\r\n            document.getElementById('modalHint').innerHTML = '<i class=\"fas fa-info-circle text-blue-500 mr-1\"></i>确认后该核查记录将不可再次修改';\r\n            document.getElementById('confirmBtn').style.display = 'inline-flex';\r\n            document.getElementById('uploadBtn').style.display = 'inline-flex';\r\n            \r\n            renderSidebar(data);\r\n            renderVerificationForms();\r\n            renderAttachments();\r\n            \r\n            document.getElementById('verificationModal').classList.add('show');\r\n            document.body.style.overflow = 'hidden';\r\n        }\r\n\r\n        function renderSidebar(data) {\r\n            const sidebarContent = document.getElementById('sidebarContent');\r\n            sidebarContent.innerHTML = '';\r\n            \r\n            if (!data.records || data.records.length === 0) {\r\n                sidebarContent.innerHTML = '<div style=\"padding: 12px; color: #64748b; font-size: 13px;\">暂无记录</div>';\r\n                return;\r\n            }\r\n            \r\n            data.records.forEach((record, idx) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'sidebar-item ' + (idx === currentActivityIndex ? 'active' : '');\r\n                item.onclick = () => switchActivity(idx);\r\n                \r\n                const hasNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\r\n                const ncIcon = hasNC ? '<i class=\"fas fa-exclamation-circle\" style=\"color: #dc2626; margin-right: 4px;\"></i>' : '';\r\n                \r\n                item.innerHTML = `\r\n                    <div style=\"font-weight: 600; margin-bottom: 2px; color: ${idx === currentActivityIndex ? '#1d4ed8' : '#334155'};\">${ncIcon}${record.date} ${record.time}</div>\r\n                    <div style=\"color: ${idx === currentActivityIndex ? '#60a5fa' : '#94a3b8'}; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">${record.content || '未填写内容'}</div>\r\n                `;\r\n                sidebarContent.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function switchActivity(index) {\r\n            if (!isReadOnlyMode && currentVerificationIndex !== null) {\r\n                saveCurrentFormData();\r\n            }\r\n            \r\n            currentActivityIndex = index;\r\n            \r\n            document.querySelectorAll('.sidebar-item').forEach((item, idx) => {\r\n                item.classList.toggle('active', idx === index);\r\n            });\r\n            \r\n            if (isReadOnlyMode) {\r\n                renderVerificationFormsReadOnly(verificationData[currentVerificationIndex]);\r\n            } else {\r\n                renderVerificationForms();\r\n            }\r\n        }\r\n\r\n        function saveCurrentFormData() {\r\n            const data = verificationData[currentVerificationIndex];\r\n            if (!data.records || data.records.length === 0) return;\r\n            \r\n            const record = data.records[currentActivityIndex];\r\n            const dateTime = document.getElementById('recordDateTime')?.value.split(' ');\r\n            \r\n            if (dateTime && dateTime.length >= 2) {\r\n                record.date = dateTime[0];\r\n                record.time = dateTime.slice(1).join(' ');\r\n            }\r\n            \r\n            const decisionEl = document.getElementById('recordDecision');\r\n            if (decisionEl) record.decision = decisionEl.value;\r\n            \r\n            const contentEl = document.getElementById('recordContent');\r\n            if (contentEl) record.content = contentEl.value;\r\n            \r\n            const deptEl = document.getElementById('recordDept');\r\n            if (deptEl) record.dept = deptEl.value;\r\n            \r\n            const richEditor = document.getElementById('richEditor');\r\n            if (richEditor) record.record = richEditor.innerHTML;\r\n            \r\n            const ncFactEl = document.getElementById('nonConformityFact');\r\n            if (ncFactEl) record.nonConformityFact = ncFactEl.value;\r\n            \r\n            const ncClauseEl = document.getElementById('nonConformityClause');\r\n            if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\r\n        }\r\n\r\n        function handleDecisionChange() {\r\n            const decision = document.getElementById('recordDecision').value;\r\n            const ncSection = document.getElementById('nonConformitySection');\r\n            \r\n            if (decision === '轻微不符合' || decision === '严重不符合') {\r\n                if (!ncSection) {\r\n                    renderNonConformityFields();\r\n                }\r\n            } else {\r\n                if (ncSection) {\r\n                    ncSection.remove();\r\n                }\r\n            }\r\n        }\r\n\r\n        function renderNonConformityFields() {\r\n            const container = document.getElementById('verificationForms');\r\n            const ncSection = document.createElement('div');\r\n            ncSection.id = 'nonConformitySection';\r\n            ncSection.className = 'nonconformity-section';\r\n            \r\n            const record = verificationData[currentVerificationIndex].records[currentActivityIndex];\r\n            \r\n            ncSection.innerHTML = `\r\n                <div class=\"nonconformity-title\">\r\n                    <i class=\"fas fa-exclamation-triangle\"></i>\r\n                    不符合项信息\r\n                </div>\r\n                <div style=\"margin-bottom: 12px;\">\r\n                    <label class=\"form-label\">不符合事实 <span class=\"text-red-500\">*</span></label>\r\n                    <textarea class=\"form-input\" id=\"nonConformityFact\" rows=\"3\" placeholder=\"请详细描述不符合事实的具体情况...\">${record.nonConformityFact || ''}</textarea>\r\n                </div>\r\n                <div>\r\n                    <label class=\"form-label\">不符合条款 <span class=\"text-red-500\">*</span></label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"nonConformityClause\" value=\"${record.nonConformityClause || ''}\" placeholder=\"如：GB/T 19001-2016 8.5.1\">\r\n                </div>\r\n            `;\r\n            \r\n            container.appendChild(ncSection);\r\n        }\r\n\r\n        function renderVerificationForms() {\r\n            const container = document.getElementById('verificationForms');\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            if (!data.records || data.records.length === 0) {\r\n                container.innerHTML = '<div class=\"empty-state\"><i class=\"fas fa-inbox\"></i><p>暂无核查记录</p></div>';\r\n                return;\r\n            }\r\n            \r\n            const record = data.records[currentActivityIndex];\r\n            \r\n            container.innerHTML = `\r\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;\">\r\n                    <div>\r\n                        <label class=\"form-label\">日期/时间</label>\r\n                        <input type=\"text\" class=\"form-input\" id=\"recordDateTime\" value=\"${record.date} ${record.time}\" placeholder=\"如：2024-04-15 09:00-12:00\">\r\n                    </div>\r\n                    <div>\r\n                        <label class=\"form-label\">判定</label>\r\n                        <select class=\"form-input\" id=\"recordDecision\" onchange=\"handleDecisionChange()\">\r\n                            <option value=\"符合\" ${record.decision === '符合' ? 'selected' : ''}>符合</option>\r\n                            <option value=\"观察项\" ${record.decision === '观察项' ? 'selected' : ''}>观察项</option>\r\n                            <option value=\"轻微不符合\" ${record.decision === '轻微不符合' ? 'selected' : ''}>轻微不符合</option>\r\n                            <option value=\"严重不符合\" ${record.decision === '严重不符合' ? 'selected' : ''}>严重不符合</option>\r\n                        </select>\r\n                    </div>\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"recordContent\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" placeholder=\"如：组织环境 4.1-4.4 GB/T 19001-2016\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">涉及部门/场所</label>\r\n                    <input type=\"text\" class=\"form-input\" id=\"recordDept\" value=\"${record.dept}\" style=\"width: 100%;\" placeholder=\"涉及部门/场所\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">审核记录 <span class=\"text-red-500\">*</span></label>\r\n                    <div class=\"rich-editor\">\r\n                        <div class=\"rich-editor-toolbar\">\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('bold')\" title=\"加粗\"><i class=\"fas fa-bold\"></i></button>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('italic')\" title=\"斜体\"><i class=\"fas fa-italic\"></i></button>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"execCmd('underline')\" title=\"下划线\"><i class=\"fas fa-underline\"></i></button>\r\n                            <div style=\"width: 1px; height: 20px; background: #e2e8f0; margin: 0 4px;\"></div>\r\n                            <button type=\"button\" class=\"toolbar-btn\" onclick=\"insertImage()\" title=\"插入图片\"><i class=\"fas fa-image\"></i></button>\r\n                        </div>\r\n                        <div class=\"rich-editor-content\" contenteditable=\"true\" id=\"richEditor\">\r\n                            ${record.record}\r\n                        </div>\r\n                    </div>\r\n                </div>\r\n            `;\r\n            \r\n            if (record.decision === '轻微不符合' || record.decision === '严重不符合') {\r\n                renderNonConformityFields();\r\n            }\r\n        }\r\n\r\n        function renderVerificationFormsReadOnly(data) {\r\n            const container = document.getElementById('verificationForms');\r\n            \r\n            if (!data.records || data.records.length === 0) {\r\n                container.innerHTML = '<div class=\"empty-state\"><i class=\"fas fa-inbox\"></i><p>暂无核查记录</p></div>';\r\n                return;\r\n            }\r\n            \r\n            const record = data.records[currentActivityIndex];\r\n            const isNC = record.decision === '轻微不符合' || record.decision === '严重不符合';\r\n            \r\n            let ncHtml = '';\r\n            if (isNC) {\r\n                ncHtml = `\r\n                    <div class=\"nonconformity-section\" style=\"margin-top: 16px;\">\r\n                        <div class=\"nonconformity-title\">\r\n                            <i class=\"fas fa-exclamation-triangle\"></i>\r\n                            不符合项信息\r\n                        </div>\r\n                        <div style=\"margin-bottom: 12px;\">\r\n                            <label class=\"form-label\">不符合事实</label>\r\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6;\">\r\n                                ${record.nonConformityFact || '<span style=\"color: #94a3b8;\">无</span>'}\r\n                            </div>\r\n                        </div>\r\n                        <div>\r\n                            <label class=\"form-label\">不符合条款</label>\r\n                            <div style=\"background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px;\">\r\n                                ${record.nonConformityClause || '<span style=\"color: #94a3b8;\">无</span>'}\r\n                            </div>\r\n                        </div>\r\n                    </div>\r\n                `;\r\n            }\r\n            \r\n            container.innerHTML = `\r\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;\">\r\n                    <div>\r\n                        <label class=\"form-label\">日期/时间</label>\r\n                        <input type=\"text\" class=\"form-input\" value=\"${record.date} ${record.time}\" readonly style=\"background: #f8fafc;\">\r\n                    </div>\r\n                    <div>\r\n                        <label class=\"form-label\">判定</label>\r\n                        <input type=\"text\" class=\"form-input\" value=\"${record.decision}\" readonly style=\"background: #f8fafc; ${isNC ? 'color: #dc2626; font-weight: 600;' : ''}\">\r\n                    </div>\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">检查内容/涉及标准条款</label>\r\n                    <input type=\"text\" class=\"form-input\" value=\"${record.content} ${record.standard}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">涉及部门/场所</label>\r\n                    <input type=\"text\" class=\"form-input\" value=\"${record.dept}\" style=\"width: 100%;\" readonly style=\"background: #f8fafc;\">\r\n                </div>\r\n                \r\n                <div style=\"margin-bottom: 16px;\">\r\n                    <label class=\"form-label\">审核记录</label>\r\n                    <div style=\"min-height: 200px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.7; color: #334155;\">\r\n                        ${record.record || '<span style=\"color: #94a3b8;\">无记录内容</span>'}\r\n                    </div>\r\n                </div>\r\n                ${ncHtml}\r\n            `;\r\n        }\r\n\r\n        function execCmd(command) {\r\n            document.execCommand(command, false, null);\r\n            document.getElementById('richEditor').focus();\r\n        }\r\n\r\n        function insertImage() {\r\n            const url = prompt('请输入图片URL:');\r\n            if (url) {\r\n                document.execCommand('insertImage', false, url);\r\n            }\r\n        }\r\n\r\n        function renderAttachments() {\r\n            const container = document.getElementById('attachmentList');\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            container.innerHTML = '';\r\n            \r\n            data.attachments.forEach((att, index) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'attachment-item';\r\n                \r\n                let icon = 'fa-file';\r\n                if (att.type === 'word') icon = 'fa-file-word';\r\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\r\n                if (att.type === 'image') icon = 'fa-file-image';\r\n                \r\n                item.innerHTML = `\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span>${att.name}</span>\r\n                    <span class=\"remove\" onclick=\"removeAttachment(${index})\"><i class=\"fas fa-times\"></i></span>\r\n                `;\r\n                \r\n                container.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function renderAttachmentsReadOnly(data) {\r\n            const container = document.getElementById('attachmentList');\r\n            container.innerHTML = '';\r\n            \r\n            if (!data.attachments || data.attachments.length === 0) {\r\n                container.innerHTML = '<span style=\"color: #94a3b8; font-size: 13px;\">无附件</span>';\r\n                return;\r\n            }\r\n            \r\n            data.attachments.forEach((att) => {\r\n                const item = document.createElement('div');\r\n                item.className = 'attachment-item';\r\n                item.style.cursor = 'default';\r\n                \r\n                let icon = 'fa-file';\r\n                if (att.type === 'word') icon = 'fa-file-word';\r\n                if (att.type === 'pdf') icon = 'fa-file-pdf';\r\n                if (att.type === 'image') icon = 'fa-file-image';\r\n                \r\n                item.innerHTML = `\r\n                    <i class=\"fas ${icon}\"></i>\r\n                    <span>${att.name}</span>\r\n                `;\r\n                \r\n                container.appendChild(item);\r\n            });\r\n        }\r\n\r\n        function uploadAttachment() {\r\n            document.getElementById('fileInputModal').click();\r\n        }\r\n\r\n        function handleFileSelectModal(event) {\r\n            const files = event.target.files;\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            for (let file of files) {\r\n                let type = 'file';\r\n                if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) type = 'word';\r\n                else if (file.name.endsWith('.pdf')) type = 'pdf';\r\n                else if (file.name.match(/\\.(jpg|jpeg|png|gif)$/)) type = 'image';\r\n                \r\n                data.attachments.push({ name: file.name, type: type });\r\n            }\r\n            \r\n            renderAttachments();\r\n            event.target.value = '';\r\n        }\r\n\r\n        function removeAttachment(index) {\r\n            if (confirm('确定删除该附件吗？')) {\r\n                verificationData[currentVerificationIndex].attachments.splice(index, 1);\r\n                renderAttachments();\r\n            }\r\n        }\r\n\r\n        function saveVerificationRecords() {\r\n            const data = verificationData[currentVerificationIndex];\r\n            \r\n            if (!isReadOnlyMode && data.records && data.records.length > 0) {\r\n                const record = data.records[currentActivityIndex];\r\n                const dateTime = document.getElementById('recordDateTime').value.split(' ');\r\n                \r\n                if (dateTime.length >= 2) {\r\n                    record.date = dateTime[0];\r\n                    record.time = dateTime.slice(1).join(' ');\r\n                }\r\n                \r\n                record.decision = document.getElementById('recordDecision').value;\r\n                record.content = document.getElementById('recordContent').value;\r\n                record.dept = document.getElementById('recordDept').value;\r\n                record.record = document.getElementById('richEditor').innerHTML;\r\n                \r\n                const ncFactEl = document.getElementById('nonConformityFact');\r\n                const ncClauseEl = document.getElementById('nonConformityClause');\r\n                if (ncFactEl) record.nonConformityFact = ncFactEl.value;\r\n                if (ncClauseEl) record.nonConformityClause = ncClauseEl.value;\r\n            }\r\n            \r\n            const hasEmptyRecord = data.records.some(r => !r.record || r.record.trim() === '');\r\n            if (hasEmptyRecord) {\r\n                alert('请填写所有审核记录的内容');\r\n                return;\r\n            }\r\n            \r\n            const hasEmptyNC = data.records.some(r => {\r\n                if (r.decision === '轻微不符合' || r.decision === '严重不符合') {\r\n                    return !r.nonConformityFact || !r.nonConformityClause;\r\n                }\r\n                return false;\r\n            });\r\n            if (hasEmptyNC) {\r\n                alert('请填写所有不符合项的事实和条款');\r\n                return;\r\n            }\r\n            \r\n            if (isLeaderEditMode) {\r\n                if (!confirm('确定提交组长核查记录吗？')) return;\r\n                data.status = 'submitted';\r\n                data.submitTime = new Date().toLocaleString('zh-CN');\r\n                showToast('组长核查记录已提交', 'success');\r\n            } else {\r\n                if (!confirm('确定确认该核查记录吗？确认后将不可再次修改。')) return;\r\n                data.status = 'confirmed';\r\n                showToast('核查记录已确认', 'success');\r\n            }\r\n            \r\n            renderVerificationTable();\r\n            closeVerificationModal();\r\n        }\r\n\r\n        function closeVerificationModal() {\r\n            document.getElementById('verificationModal').classList.remove('show');\r\n            document.body.style.overflow = '';\r\n            currentVerificationIndex = null;\r\n            isReadOnlyMode = false;\r\n            isLeaderEditMode = false;\r\n        }\r\n\r\n view-other tr th:first-child {\n      width: 90px !important;\n      min-width: 90px !important;\n      max-width: 90px !important;\n      text-align: center !important;\n    }\n    #phase-leader-review .form-textarea {\n      width: 100% !important;\n      min-width: 0 !important;\n      max-width: 100% !important;\n      display: block !important;\n      margin: 0 !important;\n    }\n    #phase-leader-review .record-badge {\n      display: inline-flex !important;\n      max-width: 100% !important;\n      white-space: nowrap !important;\n    }\n    #phase-leader-review .btn-danger {\n      min-width: 68px;\n    }\n  </style>\n<style id=\"RECTIFY_SEQ_WIDTH_SCOPED_PATCH\">\n  .data-table th.rectify-seq-col {\n    width: 72px !important;\n    min-width: 72px !important;\n    max-width: 72px !important;\n    text-align: center !important;\n  }\n  .data-table td.rectify-seq-td {\n    width: 72px !important;\n    min-width: 72px !important;\n    max-width: 72px !important;\n    text-align: center !important;\n  }\n  .rectify-seq-cell {\n    width: 100%;\n    text-align: center;\n    font-weight: 700;\n    color: #334155;\n  }\n</style>\n<style id=\"RECTIFY_ALL_SEQ_NARROW_PATCH\">\n  #phase-leader-review .data-table th:first-child,\n  #phase-leader-review .data-table td:first-child,\n  #phase-customer-rectify .data-table th:first-child,\n  #phase-customer-rectify .data-table td:first-child,\n  #phase-leader-confirm .data-table th:first-child,\n  #phase-leader-confirm .data-table td:first-child,\n  #phase-customer-adjust .data-table th:first-child,\n  #phase-customer-adjust .data-table td:first-child,\n  #phase-completed .data-table th:first-child,\n  #phase-completed .data-table td:first-child {\n    width: 72px !important;\n    min-width: 72px !important;\n    max-width: 72px !important;\n    text-align: center !important;\n  }\n  #phase-leader-review .data-table th:nth-child(2),\n  #phase-leader-review .data-table td:nth-child(2) {\n    padding-left: 8px !important;\n  }\n  .rectify-seq-cell {\n    width: 100%;\n    text-align: center;\n    font-weight: 700;\n    color: #334155;\n  }\n</style>\n</head>\r\n<body>\r\n\r\n    <!-- <header class=\"top-header\">\r\n        <div class=\"breadcrumb\">审核任务 / 审核任务详情 / <strong>问题整改</strong></div>\r\n        <button class=\"btn btn-default\" onclick=\"alert('返回')\"><i class=\"fas fa-arrow-left\"></i> 返回</button>\r\n    </header> -->\r\n\r\n    <div class=\"page-header\">\r\n        <div class=\"task-meta\">\r\n            <span class=\"task-id\">RW-202403240001</span>\r\n            <span class=\"tag tag-blue\">问题整改</span>\r\n            <span class=\"tag tag-orange\" id=\"currentPhaseTag\">待组长确认清单</span>\r\n        </div>\r\n        <h1 class=\"task-title\">北京市地铁运营有限公司一阶段审核任务 - 问题整改</h1>\r\n    </div>\r\n\r\n    <div class=\"main-container\">\r\n\r\n        <div class=\"phase-selector\">\r\n            <label><i class=\"fas fa-exchange-alt\"></i> 当前阶段</label>\r\n            <select class=\"phase-select\" id=\"phaseSelect\" onchange=\"switchPhase(this.value)\">\r\n                <option value=\"leader_review\">组长确认清单</option>\r\n                <option value=\"customer_rectify\">客户填写整改</option>\r\n                <option value=\"leader_confirm\">组长确认整改</option>\r\n                <option value=\"customer_adjust\">驳回整改（客户调整）</option>\r\n                <option value=\"completed\">整改完成</option>\r\n            </select>\r\n            <div class=\"phase-badge leader\" id=\"roleBadge\">\r\n                <i class=\"fas fa-user-shield\"></i> 审核组长视角\r\n            </div>\r\n        </div>\r\n\r\n        <div id=\"alertContainer\"></div>\r\n\r\n        <!-- 阶段1: 组长确认清单 -->\r\n        <div id=\"phase-leader-review\">\r\n            <div class=\"alert alert-info\">\r\n                <i class=\"fas fa-info-circle\"></i>\r\n                <span>核对从核查记录自动带入的不符合项，补充问题描述，可新增手动问题，核查记录带入的问题不可删除。</span>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <div class=\"flex items-center gap-4\">\r\n                        <span class=\"card-title\"><i class=\"fas fa-exclamation-triangle\" style=\"color: #ea580c;\"></i> 需整改问题清单</span>\r\n                    </div>\r\n                    <button class=\"btn btn-primary btn-sm\" onclick=\"openAddModal('rectify')\"><i class=\"fas fa-plus\"></i> 新增问题</button>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 60%;\">问题描述</th>\r\n                                <th class=\"col-action\">操作</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-leader-review\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <div class=\"flex items-center gap-4\">\r\n                        <span class=\"card-title\"><i class=\"fas fa-eye\" style=\"color: #2563eb;\"></i> 其他应关注的问题</span>\r\n                        <span class=\"card-subtitle\">管理建议项，无需强制整改</span>\r\n                    </div>\r\n                    <button class=\"btn btn-primary btn-sm\" onclick=\"openAddModal('other')\"><i class=\"fas fa-plus\"></i> 新增关注项</button>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"col-seq\">序号</th>\r\n                                <th style=\"width: 80%;\">关注内容</th>\r\n                                <th class=\"col-action\">操作</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-leader-review-other\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- 阶段2: 客户填写整改 -->\r\n        <div id=\"phase-customer-rectify\" class=\"hidden\">\r\n            <div class=\"alert alert-info\">\r\n                <i class=\"fas fa-pen\"></i>\r\n                <span>请针对每个不符合项填写具体的整改措施、完成情况及相关证明材料说明。</span>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-tasks\" style=\"color: #2563eb;\"></i> 填写整改情况</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 40%;\">问题描述</th>\r\n                                <th>整改情况（必填）</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-customer-rectify\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-eye\" style=\"color: #2563eb;\"></i> 其他应关注的问题（参考）</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"col-seq\">序号</th>\r\n                                <th>关注内容</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-customer-rectify-other\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- 阶段3: 组长确认整改 -->\r\n        <div id=\"phase-leader-confirm\" class=\"hidden\">\r\n            <div class=\"alert alert-warning\">\r\n                <i class=\"fas fa-gavel\"></i>\r\n                <span>审核客户提交的整改情况，判定\"整改完成\"或\"整改未完成（驳回）\"。如有驳回项，将退回客户重新整改。</span>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-check-double\" style=\"color: #ea580c;\"></i> 整改结果确认</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 30%;\">问题描述</th>\r\n                                <th style=\"width: 30%;\">整改情况</th>\r\n                                <th style=\"width: 200px;\">审核结论</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-leader-confirm\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- 阶段4: 客户调整整改（驳回后） -->\r\n        <div id=\"phase-customer-adjust\" class=\"hidden\">\r\n            <div class=\"alert alert-danger\">\r\n                <i class=\"fas fa-exclamation-circle\"></i>\r\n                <span id=\"adjust-summary\"></span>\r\n            </div>\r\n\r\n            <div class=\"card\" id=\"card-rejected\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-redo\" style=\"color: #dc2626;\"></i> 被驳回的问题（需重新整改）</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 25%;\">问题描述</th>\r\n                                <th style=\"width: 25%;\">驳回原因</th>\r\n                                <th>重新整改（必填）</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-customer-adjust-rejected\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"card\" id=\"card-passed\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-check-circle\" style=\"color: #059669;\"></i> 已通过的问题（无需修改）</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 40%;\">问题描述</th>\r\n                                <th>整改情况</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-customer-adjust-passed\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n        <!-- 阶段5: 整改完成 -->\r\n        <div id=\"phase-completed\" class=\"hidden\">\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-clipboard-check\" style=\"color: #059669;\"></i> 整改完成清单</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"rectify-seq-col\">序号</th>\r\n                                <th style=\"width: 35%;\">问题描述</th>\r\n                                <th style=\"width: 35%;\">最终整改情况</th>\r\n                                <th class=\"col-time\">确认时间</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-completed\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n\r\n            <div class=\"card\">\r\n                <div class=\"card-header\">\r\n                    <span class=\"card-title\"><i class=\"fas fa-eye\" style=\"color: #2563eb;\"></i> 其他关注项</span>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <table class=\"data-table\">\r\n                        <thead>\r\n                            <tr>\r\n                                <th class=\"col-seq\">序号</th>\r\n                                <th>关注内容</th>\r\n                            </tr>\r\n                        </thead>\r\n                        <tbody id=\"table-completed-other\"></tbody>\r\n                    </table>\r\n                </div>\r\n            </div>\r\n        </div>\r\n\r\n    </div>\r\n\r\n    <div class=\"bottom-actions\">\r\n        <div id=\"bottom-hint\" style=\"color: #6b7280; font-size: 13px;\">\r\n            <i class=\"fas fa-info-circle\"></i> 核对完成后点击提交\r\n        </div>\r\n        <div class=\"flex items-center gap-2\">\r\n            <button class=\"btn btn-default\" onclick=\"saveDraft()\"><i class=\"fas fa-save\"></i> 保存草稿</button>\r\n            <button class=\"btn btn-primary\" id=\"submitBtn\" onclick=\"submitFlow()\"><i class=\"fas fa-paper-plane\"></i> 提交</button>\r\n        </div>\r\n    </div>\r\n\r\n    <div class=\"modal-overlay\" id=\"addModal\">\r\n        <div class=\"modal-content\">\r\n            <div class=\"modal-header\" id=\"modalTitle\">新增需整改问题</div>\r\n            <div class=\"modal-body\">\r\n                <label style=\"display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px;\">描述 <span style=\"color: #dc2626;\">*</span></label>\r\n                <textarea class=\"form-textarea\" id=\"newIssueDesc\" rows=\"3\" placeholder=\"请输入...\"></textarea>\r\n            </div>\r\n            <div class=\"modal-footer\">\r\n                <button class=\"btn btn-default\" onclick=\"closeModal()\">取消</button>\r\n                <button class=\"btn btn-primary\" onclick=\"confirmAdd()\">确定</button>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n    <script>\r\n        let currentPhase = 'leader_review';\r\n        let currentRole = 'leader';\r\n        let addType = '';\r\n\r\n        let rectifyIssues = [\r\n            {\r\n                id: 1,\r\n                recordNo: 'CR-20240415-001',\r\n                description: '组织的环境因素识别不充分，未包含新开通线路的环境影响评价。',\r\n                rectification: '',\r\n                status: 'pending',\r\n                history: [],\r\n                isAutoImported: true,\r\n                round: 1,\r\n                tempRejectReason: ''\r\n            },\r\n            {\r\n                id: 2,\r\n                recordNo: 'CR-20240416-002',\r\n                description: '危险源辨识缺少对地铁施工期间交叉作业的风险评估。',\r\n                rectification: '',\r\n                status: 'pending',\r\n                history: [],\r\n                isAutoImported: true,\r\n                round: 1,\r\n                tempRejectReason: ''\r\n            },\r\n            {\r\n                id: 3,\r\n                recordNo: '',\r\n                description: '应急预案演练记录不完整，缺少2024年第一季度演练记录。',\r\n                rectification: '',\r\n                status: 'pending',\r\n                history: [],\r\n                isAutoImported: false,\r\n                round: 1,\r\n                tempRejectReason: ''\r\n            }\r\n        ];\r\n\r\n        let otherIssues = [\r\n            { id: 1, description: '建议关注员工心理健康管理，特别是高压岗位的心理疏导机制。' },\r\n            { id: 2, description: '建议完善供应商管理体系，特别是对关键零部件供应商的二方审核频次。' }\r\n        ];\r\n\r\n        document.addEventListener('DOMContentLoaded', () => {\r\n            renderPhase();\r\n        });\r\n\r\n        function switchPhase(phase) {\r\n            currentPhase = phase;\r\n            currentRole = (phase === 'leader_review' || phase === 'leader_confirm' || phase === 'completed') ? 'leader' : 'customer';\r\n\r\n            if (phase === 'customer_rectify' && rectifyIssues[0].rectification === '') {\r\n                rectifyIssues[0].rectification = '已补充新开通线路的环境影响评价报告，更新了环境因素识别清单。';\r\n                rectifyIssues[1].rectification = '已完成地铁施工期间交叉作业的风险评估，制定了专项安全管理方案。';\r\n            } else if (phase === 'leader_confirm') {\r\n                rectifyIssues.forEach(i => { if (i.rectification === '') i.rectification = '已完成整改，补充了相关记录和文件。'; });\r\n            } else if (phase === 'customer_adjust') {\r\n                rectifyIssues[0].status = 'rejected';\r\n                rectifyIssues[0].history.push({ round: 1, result: 'rejected', reason: '整改措施不够具体，缺少环境影响评价报告的审批签字页。', time: '2024-04-18 10:30' });\r\n                rectifyIssues[0].round = 2;\r\n                rectifyIssues[0].rectification = '';\r\n                rectifyIssues[0].tempRejectReason = '';\r\n\r\n                rectifyIssues[1].status = 'completed';\r\n                rectifyIssues[1].history.push({ round: 1, result: 'passed', time: '2024-04-18 10:30' });\r\n\r\n                rectifyIssues[2].status = 'completed';\r\n                rectifyIssues[2].history.push({ round: 1, result: 'passed', time: '2024-04-18 10:30' });\r\n            } else if (phase === 'completed') {\r\n                rectifyIssues.forEach(i => {\r\n                    i.status = 'completed';\r\n                    if (i.history.length === 0) i.history.push({ round: 1, result: 'passed', time: '2024-04-19 14:00' });\r\n                    else if (i.history[i.history.length-1].result === 'rejected') i.history.push({ round: 2, result: 'passed', time: '2024-04-19 14:00' });\r\n                });\r\n            }\r\n\r\n            renderPhase();\r\n        }\r\n\r\n        function renderPhase() {\r\n            document.querySelectorAll('[id^=\"phase-\"]').forEach(el => el.classList.add('hidden'));\r\n            document.getElementById(`phase-${currentPhase.replace(/_/g, '-')}`).classList.remove('hidden');\r\n\r\n            const phaseNames = {\r\n                'leader_review': '待组长确认清单',\r\n                'customer_rectify': '待客户填写整改',\r\n                'leader_confirm': '待组长确认整改',\r\n                'customer_adjust': '整改被驳回',\r\n                'completed': '整改已完成'\r\n            };\r\n            document.getElementById('currentPhaseTag').textContent = phaseNames[currentPhase];\r\n\r\n            const roleBadge = document.getElementById('roleBadge');\r\n            if (currentRole === 'leader') {\r\n                roleBadge.className = 'phase-badge leader';\r\n                roleBadge.innerHTML = '<i class=\"fas fa-user-shield\"></i> 审核组长视角';\r\n            } else {\r\n                roleBadge.className = 'phase-badge customer';\r\n                roleBadge.innerHTML = '<i class=\"fas fa-user\"></i> 客户视角';\r\n            }\r\n\r\n            const btn = document.getElementById('submitBtn');\r\n            const hint = document.getElementById('bottom-hint');\r\n\r\n            const configs = {\r\n                'leader_review': { text: '提交至客户整改', hint: '核对完成后提交给客户填写整改情况', icon: 'fa-paper-plane' },\r\n                'customer_rectify': { text: '提交至组长确认', hint: '所有整改项填写完成后提交', icon: 'fa-paper-plane' },\r\n                'leader_confirm': { text: '确认整改结果', hint: '选择审核结论后提交', icon: 'fa-check-double' },\r\n                'customer_adjust': { text: '重新提交整改', hint: '重新填写被驳回项后提交', icon: 'fa-redo' },\r\n                'completed': { text: '导出整改报告', hint: '所有问题已处理完毕', icon: 'fa-file-export' }\r\n            };\r\n\r\n            const cfg = configs[currentPhase];\r\n            btn.innerHTML = `<i class=\"fas ${cfg.icon}\"></i> ${cfg.text}`;\r\n            hint.innerHTML = `<i class=\"fas fa-info-circle\"></i> ${cfg.hint}`;\r\n\r\n            if (currentPhase === 'leader_review') renderLeaderReview();\r\n            else if (currentPhase === 'customer_rectify') renderCustomerRectify();\r\n            else if (currentPhase === 'leader_confirm') renderLeaderConfirm();\r\n            else if (currentPhase === 'customer_adjust') renderCustomerAdjust();\r\n            else if (currentPhase === 'completed') renderCompleted();\r\n        }\r\n\r\n        function renderLeaderReview() {\r\n            let html = '';\r\n            rectifyIssues.forEach((issue, idx) => {\r\n                html += `<tr>\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\"><i class=\"fas ${issue.isAutoImported ? 'fa-link' : 'fa-edit'}\"></i> ${issue.recordNo}</span></td>\r\n                    <td><textarea class=\"form-textarea\" style=\"min-width: 400px;\" onchange=\"updateDesc(${idx}, this.value)\">${issue.description}</textarea></td>\r\n                    <td style=\"text-align: center;\">${!issue.isAutoImported ? `<button class=\"btn btn-danger btn-sm\" onclick=\"deleteRectify(${idx})\"><i class=\"fas fa-trash\"></i> 删除</button>` : '<span style=\"color: #9ca3af; font-size: 12px;\">不可删</span>'}</td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-leader-review').innerHTML = html;\r\n\r\n            let otherHtml = '';\r\n            otherIssues.forEach((issue, idx) => {\r\n                otherHtml += `<tr>\r\n                    <td style=\"text-align: center; color: #6b7280; font-weight: 600;\">${idx + 1}</td>\r\n                    <td><textarea class=\"form-textarea\" style=\"min-width: 400px;\" onchange=\"updateOther(${idx}, this.value)\">${issue.description}</textarea></td>\r\n                    <td style=\"text-align: center;\"><button class=\"btn btn-danger btn-sm\" onclick=\"deleteOther(${idx})\"><i class=\"fas fa-trash\"></i> 删除</button></td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-leader-review-other').innerHTML = otherHtml;\r\n        }\r\n\r\n        function renderCustomerRectify() {\r\n            let html = '';\r\n            rectifyIssues.forEach((issue, idx) => {\r\n                html += `<tr>\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\">${issue.recordNo}</span></td>\r\n                    <td><div class=\"text-ellipsis\" title=\"${issue.description}\">${issue.description}</div></td>\r\n                    <td><textarea class=\"form-textarea\" style=\"min-width: 300px;\" onchange=\"updateRectification(${idx}, this.value)\" placeholder=\"请详细描述整改措施、完成情况及附件...\">${issue.rectification}</textarea></td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-customer-rectify').innerHTML = html;\r\n\r\n            let otherHtml = '';\r\n            otherIssues.forEach((issue, idx) => {\r\n                otherHtml += `<tr><td style=\"text-align: center; color: #6b7280;\">${idx + 1}</td><td style=\"color: #6b7280;\">${issue.description}</td></tr>`;\r\n            });\r\n            document.getElementById('table-customer-rectify-other').innerHTML = otherHtml;\r\n        }\r\n\r\n        function renderLeaderConfirm() {\r\n            let html = '';\r\n            rectifyIssues.forEach((issue, idx) => {\r\n                html += `<tr>\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\">${issue.recordNo}</span></td>\r\n                    <td><div class=\"text-ellipsis\" title=\"${issue.description}\">${issue.description}</div></td>\r\n                    <td><div class=\"form-textarea readonly\" style=\"min-width: 200px; min-height: 36px; white-space: normal;\">${issue.rectification || '<span style=\"color: #9ca3af; font-style: italic;\">未填写</span stReject = issue.history.filter(h => h.result === 'rejected').pop();\r\n                html += `<tr>\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\">${issue.recordNo}</span></td>\r\n                    <td><div class=\"text-ellipsis\" title=\"${issue.description}\">${issue.description}</div></td>\r\n                    <td><div style=\"background: #fef2f2; padding: 8px; border-radius: 4px; border-left: 3px solid #dc2626; font-size: 12px; color: #dc2626; white-space: normal; min-width: 150px;\">${lastReject ? lastReject.reason : ''}</div></td>\r\n                    <td>\r\n                        <textarea class=\"form-textarea\" style=\"min-width: 250px;\" onchange=\"updateRectification(${idx}, this.value)\" placeholder=\"请根据驳回原因重新填写整改情况...\">${issue.rectification}</textarea>\r\n                        <div style=\"margin-top: 4px; font-size: 11px; color: #ea580c;\"><i class=\"fas fa-redo\"></i> 第 ${issue.round} 轮整改</div>\r\n                    </td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-customer-adjust-rejected').innerHTML = html || '<tr><td colspan=\"4\" style=\"text-align: center; color: #9ca3af; padding: 40px;\">没有需要重新整改的问题</td></tr>';\r\n\r\n            let passedHtml = '';\r\n            passed.forEach(issue => {\r\n                passedHtml += `<tr style=\"background: #f9fafb;\">\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\">${issue.recordNo}</span></td>\r\n                    <td><div class=\"text-ellipsis\" style=\"color: #6b7280;\" title=\"${issue.description}\">${issue.description}</div></td>\r\n                    <td><div class=\"form-textarea readonly\" style=\"min-width: 200px; min-height: 36px; background: transparent; white-space: normal;\">${issue.rectification}</div><div style=\"margin-top: 4px; color: #059669; font-size: 11px;\"><i class=\"fas fa-check\"></i> 已审核通过</div></td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-customer-adjust-passed').innerHTML = passedHtml || '<tr><td colspan=\"3\" style=\"text-align: center; color: #9ca3af; padding: 20px;\">无</td></tr>';\r\n\r\n            document.getElementById('card-rejected').style.display = rejected.length ? 'block' : 'none';\r\n            document.getElementById('card-passed').style.display = passed.length ? 'block' : 'none';\r\n        }\r\n\r\n        function renderCompleted() {\r\n            let html = '';\r\n            rectifyIssues.forEach(issue => {\r\n                const lastHistory = issue.history[issue.history.length - 1];\r\n                html += `<tr>\r\n                    <td><span class=\"record-badge ${issue.isAutoImported ? 'auto' : 'manual'}\">${issue.recordNo}</span></td>\r\n                    <td><div class=\"text-ellipsis\" title=\"${issue.description}\">${issue.description}</div></td>\r\n                    <td><div class=\"form-textarea readonly\" style=\"min-width: 200px; min-height: 36px; white-space: normal;\">${issue.rectification}</div></td>\r\n                    <td style=\"color: #059669; font-size: 12px;\">${lastHistory ? lastHistory.time : '-'}</td>\r\n                </tr>`;\r\n            });\r\n            document.getElementById('table-completed').innerHTML = html;\r\n\r\n            let otherHtml = '';\r\n            otherIssues.forEach((issue, idx) => {\r\n                otherHtml += `<tr><td style=\"text-align: center; color: #6b7280;\">${idx + 1}</td><td style=\"color: #6b7280;\">${issue.description}</td></tr>`;\r\n            });\r\n            document.getElementById('table-completed-other').innerHTML = otherHtml;\r\n        }\r\n\r\n        function updateDesc(idx, val) { rectifyIssues[idx].description = val; }\r\n        function updateOther(idx, val) { otherIssues[idx].description = val; }\r\n        function updateRectification(idx, val) { rectifyIssues[idx].rectification = val; }\r\n        function setStatus(idx, status) { rectifyIssues[idx].status = status; renderLeaderConfirm(); }\r\n        function setRejectReason(idx, val) { rectifyIssues[idx].tempRejectReason = val; }\r\n\r\n        function deleteRectify(idx) {\r\n            if (confirm('确定删除？')) { rectifyIssues.splice(idx, 1); renderLeaderReview(); }\r\n        }\r\n\r\n        function deleteOther(idx) {\r\n            if (confirm('确定删除？')) { otherIssues.splice(idx, 1); renderLeaderReview(); }\r\n        }\r\n\r\n        function openAddModal(type) {\r\n            addType = type;\r\n            document.getElementById('modalTitle').textContent = type === 'rectify' ? '新增需整改问题' : '新增关注项';\r\n            document.getElementById('newIssueDesc').value = '';\r\n            document.getElementById('addModal').classList.add('show');\r\n        }\r\n\r\n        function closeModal() { document.getElementById('addModal').classList.remove('show'); }\r\n\r\n        function confirmAdd() {\r\n            const val = document.getElementById('newIssueDesc').value.trim();\r\n            if (!val) { alert('请输入内容'); return; }\r\n\r\n            if (addType === 'rectify') {\r\n                rectifyIssues.push({ id: Date.now(), recordNo: '', description: val, rectification: '', status: 'pending', history: [], isAutoImported: false, round: 1, tempRejectReason: '' });\r\n                renderLeaderReview();\r\n            } else {\r\n                otherIssues.push({ id: Date.now(), description: val });\r\n                renderLeaderReview();\r\n            }\r\n            closeModal();\r\n        }\r\n\r\n        function submitFlow() {\r\n            if (currentPhase === 'leader_review') {\r\n                if (rectifyIssues.some(i => !i.description.trim())) { showAlert('请填写所有问题描述', 'warning'); return; }\r\n                if (!confirm('提交后问题描述将不可修改，确定？')) return;\r\n                showAlert('已提交', 'success');\r\n                document.getElementById('phaseSelect').value = 'customer_rectify';\r\n                switchPhase('customer_rectify');\r\n            } else if (currentPhase === 'customer_rectify') {\r\n                if (rectifyIssues.some(i => !i.rectification.trim())) { showAlert('请填写所有整改情况', 'warning'); return; }\r\n                if (!confirm('确定提交？')) return;\r\n                showAlert('已提交', 'success');\r\n                document.getElementById('phaseSelect').value = 'leader_confirm';\r\n                switchPhase('leader_confirm');\r\n            } else if (currentPhase === 'leader_confirm') {\r\n                if (rectifyIssues.some(i => i.status === 'pending')) { showAlert('请确认所有问题整改结论', 'warning'); return; }\r\n                const rejected = rectifyIssues.filter(i => i.status === 'rejected');\r\n                if (rejected.length > 0) {\r\n                    if (rejected.some(i => !i.tempRejectReason.trim())) { showAlert('请填写驳回原因', 'warning'); return; }\r\n                    const now = new Date().toLocaleString('zh-CN');\r\n                    rejected.forEach(i => { i.history.push({ round: i.round, result: 'rejected', reason: i.tempRejectReason, time: now }); });\r\n                    if (!confirm(`将驳回 ${rejected.length} 项，退回客户整改？`)) return;\r\n                    showAlert('已驳回', 'warning');\r\n                    document.getElementById('phaseSelect').value = 'customer_adjust';\r\n                    switchPhase('customer_adjust');\r\n                } else {\r\n                    const now = new Date().toLocaleString('zh-CN');\r\n                    rectifyIssues.forEach(i => i.history.push({ round: 1, result: 'passed', time: now }));\r\n                    if (!confirm('所有通过，完成整改流程？')) return;\r\n                    showAlert('整改完成', 'success');\r\n                    document.getElementById('phaseSelect').value = 'completed';\r\n                    switchPhase('completed');\r\n                }\r\n            } else if (currentPhase === 'customer_adjust') {\r\n                const rejected = rectifyIssues.filter(i => i.statu
