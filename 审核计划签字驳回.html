<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核计划签字记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .modal {
            width: 480px;
            height: 600px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            letter-spacing: 0.5px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            color: #595959;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #f0f0f0;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 28px;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .timeline-item.completed .timeline-dot {
            background: #52c41a;
        }

        .timeline-item.completed .timeline-dot::after {
            content: '✓';
            color: white;
            font-size: 10px;
            font-weight: bold;
        }

        .timeline-item.rejected .timeline-dot {
            background: #ff4d4f;
            box-shadow: 0 0 0 4px rgba(255, 77, 79, 0.12);
        }

        .timeline-item.rejected .timeline-dot::after {
            content: '!';
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .timeline-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            line-height: 1.4;
        }

        .timeline-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #8c8c8c;
        }

        .timeline-meta .operator {
            color: #595959;
            font-weight: 500;
        }

        .timeline-desc {
            font-size: 13px;
            color: #595959;
            line-height: 1.5;
            margin-top: 2px;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
            width: fit-content;
        }

        .status-tag.completed {
            background: #f6ffed;
            color: #389e0d;
            border: 1px solid #b7eb8f;
        }

        .status-tag.rejected {
            background: #fff2f0;
            color: #cf1322;
            border: 1px solid #ffccc7;
        }

        .reject-info {
            margin-top: 8px;
            padding: 10px 12px;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 6px;
            font-size: 13px;
            color: #595959;
            line-height: 1.6;
        }

        .reject-info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .reject-info-row:last-child {
            margin-bottom: 0;
        }

        .reject-label {
            flex-shrink: 0;
            color: #8c8c8c;
        }

        .reject-value {
            color: #262626;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
            background: #fafafa;
        }

        .btn-close {
            padding: 8px 24px;
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            color: #595959;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close:hover {
            color: #262626;
            border-color: #262626;
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: #d9d9d9;
            border-radius: 3px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: #bfbfbf;
        }
    </style>
</head>
<body>

    <div class="modal">
        <div class="modal-header">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            <h2>审核计划签字记录</h2>
        </div>

        <div class="modal-body">
            <div class="timeline">
                <div class="timeline-item completed">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">编制审核计划</div>
                        <div class="timeline-meta">
                            <span class="operator">武荣刚</span>
                            <span>·</span>
                            <span>2024-03-30 14:30:25</span>
                        </div>
                        <div class="timeline-desc">已完成审核计划编制并签署</div>
                        <span class="status-tag completed">已完成</span>
                    </div>
                </div>

                <div class="timeline-item completed">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">项目管理人员签字</div>
                        <div class="timeline-meta">
                            <span class="operator">李经理</span>
                            <span>·</span>
                            <span>2024-04-01 10:00:00</span>
                        </div>
                        <div class="timeline-desc">已完成审核计划最终确认</div>
                        <span class="status-tag completed">已完成</span>
                    </div>
                </div>

                <div class="timeline-item rejected">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-title">客户确认</div>
                        <div class="timeline-meta">
                            <span class="operator">北京市地铁运营有限公司</span>
                            <span>·</span>
                            <span>2024-04-02 15:26:18</span>
                        </div>
                        <div class="timeline-desc">客户已驳回审核计划，请调整后重新提交确认</div>

                        <div class="reject-info">
                            <div class="reject-info-row">
                                <span class="reject-label">退回人：</span>
                                <span class="reject-value">王建国</span>
                            </div>
                            <div class="reject-info-row">
                                <span class="reject-label">退回时间：</span>
                                <span class="reject-value">2024-04-02 15:26:18</span>
                            </div>
                            <div class="reject-info-row">
                                <span class="reject-label">退回原因：</span>
                                <span class="reject-value">审核计划中的现场审核时间与我方生产安排冲突，请调整审核日期后重新提交确认。</span>
                            </div>
                        </div>

                        <span class="status-tag rejected">已驳回</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-close">关闭</button>
        </div>
    </div>

</body>
</html>
