
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监督变更评审 - 中检华南认证业务管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc; 
        }
        
        .review-section { 
            transition: all 0.3s ease; 
            scroll-margin-top: 120px; 
        }
        
        .nav-item { 
            position: relative; 
            transition: all 0.2s ease; 
        }
        
        .nav-item.active { 
            background: linear-gradient(90deg, #eff6ff 0%, #ffffff 100%); 
            border-left: 3px solid #2563eb; 
            color: #2563eb; 
            font-weight: 600; 
        }
        
        .nav-item:hover:not(.active) { 
            background-color: #f8fafc; 
            border-left: 3px solid #cbd5e1; 
        }

        .domain-nav-item {
            display: block;
            width: 100%;
            padding: 8px 16px 8px 48px;
            text-align: left;
            font-size: 12px;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .domain-nav-item:hover {
            background-color: #f8fafc;
            color: #2563eb;
        }

        .domain-nav-item.active {
            background-color: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }
        
        .readonly-field { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            color: #1e293b; 
            min-height: 36px; 
        }
        
        .editable-field { 
            border: 1px solid #d1d5db; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            transition: all 0.2s; 
            width: 100%; 
        }
        
        .editable-field:focus { 
            outline: none; 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
        }
        
        /* 变更对比卡片样式 */
        .change-compare-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .change-compare-header {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .change-compare-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        
        @media (max-width: 768px) {
            .change-compare-body {
                grid-template-columns: 1fr;
            }
        }
        
        .compare-section {
            padding: 16px;
        }
        
        .compare-section.before {
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
        }
        
        @media (max-width: 768px) {
            .compare-section.before {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
        }
        
        .compare-section.after {
            background: #f0fdf4;
        }
        
        .compare-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .compare-content {
            font-size: 14px;
            color: #1e293b;
            line-height: 1.5;
        }
        
        .compare-content.before-text {
            color: #64748b;
            text-decoration: line-through;
            text-decoration-color: #cbd5e1;
        }
        
        .compare-content.after-text {
            color: #059669;
            font-weight: 500;
        }
        
        .change-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .change-badge.modified {
            background: #fef3c7;
            color: #92400e;
        }
        
        .change-badge.added {
            background: #d1fae5;
            color: #065f46;
        }
        
        .change-badge.deleted {
            background: #fee2e2;
            color: #991b1b;
        }

        .investigation-note {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
        }

        /* 附件预览卡片 */
        .attachment-preview-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .attachment-preview-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
        }
        
        .file-icon-lg {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .file-icon-lg.pdf {
            background: #fef2f2;
            color: #dc2626;
        }
        
        .file-icon-lg.word {
            background: #eff6ff;
            color: #2563eb;
        }
        
        .file-icon-lg.img {
            background: #f0fdf4;
            color: #059669;
        }

        /* 专业代码标签 */
        .prof-code-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            font-size: 13px;
            color: #1e40af;
            font-weight: 500;
        }
        
        .prof-code-tag .remove {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .prof-code-tag .remove:hover {
            opacity: 1;
            color: #dc2626;
        }

        /* 条件显示区域 */
        .conditional-block {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        
        .conditional-block.show {
            max-height: 1000px;
            opacity: 1;
            margin-top: 1rem;
        }

        /* 单选卡片 */
        .radio-card {
            display: flex;
            align-items: start;
            gap: 12px;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .radio-card:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }
        
        .radio-card.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .radio-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        /* 图片预览模态框 */
        .image-preview-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .image-preview-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .image-preview-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        
        .image-preview-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }
        
        .image-preview-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        
        .image-preview-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-surveillance1 { background: #dbeafe; color: #1e40af; }
        .status-surveillance2 { background: #fef3c7; color: #92400e; }
        .status-recertification { background: #f3e8ff; color: #7c3aed; }
        .cert-status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .cert-status-valid { background: #dcfce7; color: #166534; }

        /* 复选框样式优化 */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid #d1d5db;
            cursor: pointer;
        }
        
        .checkbox-wrapper input[type="checkbox"]:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- 顶部导航 -->
    <div class="fixed top-0 left-0 right-0 z-40 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-[1920px] mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-4">
                    <button onclick="history.back()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 text-sm transition-colors">
                        <i class="fas fa-arrow-left"></i>
                        <span>返回列表</span>
                    </button>
                    <div class="h-6 w-px bg-slate-300"></div>
                    <div class="flex items-center gap-3">
                        <h1 class="text-lg font-bold text-slate-900">监督变更评审</h1>
                        <span class="px-2 py-1 rounded text-xs font-medium bg-amber-100 text-amber-700 border border-amber-200">待评审</span>
                        <span class="px-2 py-1 rounded text-xs font-medium bg-indigo-100 text-indigo-700 border border-indigo-200">QMS</span>
                        <span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-700 border border-blue-200">EMS</span>
                        <span class="px-2 py-1 rounded text-xs font-medium bg-emerald-100 text-emerald-700 border border-emerald-200">OHSMS</span>
                        <span class="px-2 py-1 rounded text-xs font-medium bg-purple-100 text-purple-700 border border-purple-200">监督变更</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="saveReview()" class="px-4 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 text-sm font-medium text-slate-700 transition-all">
                        <i class="fas fa-save mr-2"></i>暂存
                    </button>
                    <button onclick="submitReview()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium shadow-md shadow-blue-200 transition-all">
                        <i class="fas fa-paper-plane mr-2"></i>提交
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主体布局 -->
    <div class="max-w-[1920px] mx-auto px-6 pt-24 pb-8 flex gap-6">

        <!-- 左侧导航 -->
        <div class="w-72 shrink-0 sidebar">
            <div class="sticky top-24 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-200">
                    <h3 class="font-semibold text-slate-900 text-sm">评审导航</h3>
                    <p class="text-xs text-slate-500 mt-1">监督变更评审流程</p>
                </div>
                <nav class="py-2">
                    <a href="#section-basic" class="nav-item active block px-4 py-3 text-sm text-slate-700 border-l-3 border-transparent" onclick="switchTab('basic')">
                        <div class="flex items-center justify-between">
                            <span class="flex items-center gap-2"><i class="fas fa-file-signature w-5 text-center"></i>变更内容信息</span>
                        </div>
                    </a>
                    <div class="border-l border-slate-100 ml-4 my-1" id="changeDomainNav">
                        <button type="button" class="domain-nav-item" data-domain="质量管理体系" onclick="switchChangeDomain('质量管理体系')">质量管理体系</button>
                        <button type="button" class="domain-nav-item" data-domain="环境管理体系" onclick="switchChangeDomain('环境管理体系')">环境管理体系</button>
                        <button type="button" class="domain-nav-item" data-domain="职业健康安全管理体系" onclick="switchChangeDomain('职业健康安全管理体系')">职业健康安全管理体系</button>
                    </div>
                    <a href="#section-profcode" class="nav-item block px-4 py-3 text-sm text-slate-700 border-l-3 border-transparent" onclick="switchTab('profcode')">
                        <div class="flex items-center justify-between">
                            <span class="flex items-center gap-2"><i class="fas fa-list-check w-5 text-center"></i>专业代码</span>
                            <span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full" id="profCountBadge">0</span>
                        </div>
                    </a>
                    <a href="#section-audit" class="nav-item block px-4 py-3 text-sm text-slate-700 border-l-3 border-transparent" onclick="switchTab('audit')">
                        <div class="flex items-center justify-between">
                            <span class="flex items-center gap-2"><i class="fas fa-tasks w-5 text-center"></i>审核方式</span>
                        </div>
                    </a>
                    <a href="#section-conclusion" class="nav-item block px-4 py-3 text-sm text-slate-700 border-l-3 border-transparent" onclick="switchTab('conclusion')">
                        <div class="flex items-center justify-between">
                            <span class="flex items-center gap-2"><i class="fas fa-gavel w-5 text-center"></i>评审结论</span>
                        </div>
                    </a>
                </nav>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 space-y-6" id="mainContent">

            <!-- 业务信息栏 -->
            <div class="bg-blue-50 rounded-xl border border-blue-200 p-4 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex gap-6 text-sm">
                    <div><span class="text-slate-500">监督申请号：</span><span class="font-mono font-semibold text-slate-900">JD202604220006</span></div>
                    <div><span class="text-slate-500">涉及证书：</span><span class="font-semibold text-slate-900">3个领域 / 6份证书</span></div>
                    <div><span class="text-slate-500">企业名称：</span><span class="font-semibold text-slate-900">彩晶光电科技(昆山)有限公司</span></div>
                    <div><span class="text-slate-500">审核类型：</span><span class="font-semibold text-slate-900">监督审核</span></div>
                    <div><span class="text-slate-500">签发类型：</span><span class="font-semibold text-slate-900">自动签发</span></div>
                    <div><span class="text-slate-500">是否加急：</span><span class="font-semibold text-slate-900">否</span></div>
                </div>
                <div class="flex items-center gap-2 text-xs text-slate-500"><i class="fas fa-clock"></i><span>申请日期：2026-04-22</span></div>
            </div>

            <!-- 1. 变更内容信息 -->
            <div id="section-basic" class="review-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-file-signature text-blue-600"></i>
                        <h3 class="font-semibold text-slate-900">变更内容信息</h3>
                    </div>
                </div>
                
                <div class="p-6 space-y-6">
                    <div id="applicationChangeInfo" class="space-y-5"></div>
                </div>
            </div>

            <!-- 3. 专业代码选择模块 -->
            <div id="section-profcode" class="review-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-list-check text-blue-600"></i>
                        <h3 class="font-semibold text-slate-900">评审专业代码</h3>
                    </div>
                    <span class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">可多选</span>
                </div>
                
                <div class="p-6">
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-slate-700 mb-2">
                            专业代码 <span class="text-red-500">*</span>
                            <span class="text-slate-400 font-normal ml-1">（按证书分别填写，每份证书单独选择专业代码并自动带入认可机构）</span>
                        </label>
                        <div id="certificateProfCodeDisplay" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <!-- 4. 审核方式选择模块（修改后逻辑） -->
            <div id="section-audit" class="review-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-tasks text-blue-600"></i>
                        <h3 class="font-semibold text-slate-900">审核方式选择</h3>
                    </div>
                </div>
                
                <div class="p-6 space-y-6">
                    
                    <!-- 第一层：是否结合监督 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-3">是否结合监督审核进行？<span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-1 gap-4">
                            <label class="radio-card selected" id="combineAuditCard" onclick="selectAuditMode('combine')">
                                <input type="radio" name="auditMode" value="combine" class="text-blue-600 mt-1" onchange="handleAuditModeChange(this.value)" checked>
                                <div class="flex-1">
                                    <div class="font-medium text-slate-900">与监督审核结合</div>
                                    <div class="text-xs text-slate-500 mt-1">监督变更评审只能与本次监督审核合并进行</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 结合审核时显示：是否有审核一阶段 -->
                    <div id="hasStage1Section" class="conditional-block hidden bg-amber-50 border border-amber-200 rounded-lg p-4">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <div class="flex items-center h-5 mt-0.5">
                                <input type="checkbox" id="hasStage1Check" class="rounded text-amber-600 focus:ring-amber-500 w-4 h-4" onchange="handleHasStage1Change(this.checked)">
                            </div>
                            <div class="flex-1">
                                <span class="text-sm font-medium text-amber-900 block">是否有审核一阶段？</span>
                                <p class="text-xs text-amber-700 mt-1">如勾选，审核方案将包含一阶段审核内容</p>
                            </div>
                        </label>
                    </div>

                    <!-- 单独审核时显示：现场审核类型 -->
                    <div id="siteAuditTypeSection" class="conditional-block hidden">
                        <label class="block text-sm font-medium text-slate-700 mb-3">现场审核类型<span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <label class="radio-card" id="hasSiteCard" onclick="selectSiteType('hasSite')">
                                <input type="radio" name="siteType" value="hasSite" class="text-blue-600 mt-1" onchange="handleSiteTypeChange(this.value)">
                                <div class="flex-1">
                                    <div class="font-medium text-slate-900">有现场审核</div>
                                    <div class="text-xs text-slate-500 mt-1">需要安排现场审核活动</div>
                                </div>
                            </label>

                            <label class="radio-card" id="noSiteCard" onclick="selectSiteType('noSite')">
                                <input type="radio" name="siteType" value="noSite" class="text-blue-600 mt-1" onchange="handleSiteTypeChange(this.value)">
                                <div class="flex-1">
                                    <div class="font-medium text-slate-900">无现场审核</div>
                                    <div class="text-xs text-slate-500 mt-1">仅进行文件评审，不安排现场</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 有现场审核时显示：选择文审或一阶段 -->
                    <div id="auditStageSection" class="conditional-block hidden">
                        <label class="block text-sm font-medium text-slate-700 mb-3">审核阶段选择<span class="text-red-500">*</span></label>

        function initScrollSpy() {
            const sections = document.querySelectorAll('.review-section[id]');
            const navItems = document.querySelectorAll('.nav-item');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        navItems.forEach(item => {
                            item.classList.remove('active');
                            if (item.getAttribute('href') === `#${id}`) {
                                item.classList.add('active');
                            }
                        });
                    }
                });
            }, { rootMargin: '-20% 0px -80% 0px', threshold: 0 });
            
            sections.forEach(section => observer.observe(section));
        }

            const auditStageSection = document.getElementById('auditStageSection');

        function renderModalProfCodeList(keyword = '') {
            const tbody = document.getElementById('modalProfCodeList');
            const lowerKeyword = keyword.toLowerCase();

            let filtered = professionalCodeData;
            if (keyword.trim()) {
                filtered = professionalCodeData.filter(item => 
                    item.code.toLowerCase().includes(lowerKeyword) || 
                    item.category.toLowerCase().includes(lowerKeyword)
                );
            }

            document.getElementById('totalCodesCount').textContent = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-slate-400">未找到匹配的专业代码</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const isSelected = selectedProfCodes.some(s => s.code === item.code);
                const accBadges = item.accreditation.map(acc => {
                    const colorClass = acc === 'CNAS' ? 'bg-blue-100 text-blue-700' : 
                                      acc === 'DAKKS' ? 'bg-pink-100 text-pink-700' : 
                                      'bg-green-100 text-green-700';
                    return `<span class="${colorClass} text-xs px-2 py-0.5 rounded font-medium">${acc}</span>`;
                }).join('');

                return `<tr class="hover:bg-blue-50 transition-colors ${isSelected ? 'bg-blue-50' : ''}">
                    <td class="py-3 px-4">
                        <input type="checkbox" value="${item.code}" ${isSelected ? 'checked' : ''} 
                            onchange="toggleModalCode('${item.code}', '${item.category}', '${item.accreditation.join(',')}')"
                            class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer w-4 h-4">
                    </td>
                    <td class="py-3 px-4 font-mono font-semibold text-slate-700">${item.code}</td>
                    <td class="py-3 px-4 text-slate-700">${item.category}</td>
                    <td class="py-3 px-4">${accBadges || '<span class="text-slate-400 text-xs">-</span>'}</td>
                </tr>`;
            }).join('');

            updateHeaderCheckbox();
        }

        function toggleModalCode(code, category, accreditationStr) {
            const accreditation = accreditationStr ? accreditationStr.split(',') : [];
            const index = selectedProfCodes.findIndex(s => s.code === code);
            if (index >= 0) {
                selectedProfCodes.splice(index, 1);
            } else {
                selectedProfCodes.push({code, category, accreditation});
            }
            renderModalProfCodeList(document.getElementById('modalProfCodeSearch').value);
            updateModalPreview();
        }

            const previewContainer = document.getElementById('previewTags');
            const countSpan = document.getElementById('selectedCount');

                previewContainer.innerHTML = '<span class="text-slate-400 text-sm">暂未选择</span>';
            } else {
                previewContainer.innerHTML = selectedProfCodes.map(item => {
                    return `<span class="inline-flex items-center gap-1 px-3 py-1.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium border border-blue-200">
                        <span class="font-mono font-bold">${item.code}</span>
                        <span class="text-blue-400">|</span>
                        <span class="truncate max-w-[150px]">${item.category}</span>
                        <button onclick="event.stopPropagation(); removeFromPreview('${item.code}')" class="ml-1 w-4 h-4 flex items-center justify-center rounded-full hover:bg-blue-200 text-blue-600 transition-colors">
                            <i class="fas fa-times text-[10px]"></i>
                        </button>
                    </span>`;
                }).join('');
            }
        }

        function removeFromPreview(code) {
            const index = selectedProfCodes.findIndex(s => s.code === code);
            if (index >= 0) {
                selectedProfCodes.splice(index, 1);
            }
            renderModalProfCodeList(document.getElementById('modalProfCodeSearch').value);
            updateModalPreview();
        }

        function selectAllModalCodes() {
            const searchValue = document.getElementById('modalProfCodeSearch').value.toLowerCase();
            let targetCodes = professionalCodeData;

            if (searchValue) {
                targetCodes = professionalCodeData.filter(item => 
                    item.code.toLowerCase().includes(searchValue) || 
                    item.category.toLowerCase().includes(searchValue)
                );
            }

            let addedCount = 0;
            targetCodes.forEach(item => {
                if (!selectedProfCodes.some(s => s.code === item.code)) {
                    selectedProfCodes.push({code: item.code, category: item.category, accreditation: item.accreditation});
                    addedCount++;
                }
            });

            renderModalProfCodeList(searchValue);
            updateModalPreview();
            showToast(addedCount > 0 ? `已添加 ${addedCount} 项` : '所有可见项已选中');
        }

        function clearModalSelection() {
            if (selectedProfCodes.length === 0) return;
            if (confirm(`确定要清空已选择的 ${selectedProfCodes.length} 个专业代码吗？`)) {
                selectedProfCodes = [];
                renderModalProfCodeList(document.getElementById('modalProfCodeSearch').value);
                updateModalPreview();
                showToast('已清空所有选择');
            }
        }

        function toggleAllFromHeader() {
            const headerCheckbox = document.getElementById('headerCheckbox');
            const searchValue = document.getElementById('modalProfCodeSearch').value.toLowerCase();
            let visibleCodes = professionalCodeData;

            if (searchValue) {
                visibleCodes = professionalCodeData.filter(item => 
                    item.code.toLowerCase().includes(searchValue) || 
                    item.category.toLowerCase().includes(searchValue)
                );
            }

            if (headerCheckbox.checked) {
                visibleCodes.forEach(item => {
                    if (!selectedProfCodes.some(s => s.code === item.code)) {
                        selectedProfCodes.push({code: item.code, category: item.category, accreditation: item.accreditation});
                    }
                });
            } else {
                visibleCodes.forEach(item => {
                    const index = selectedProfCodes.findIndex(s => s.code === item.code);
                    if (index >= 0) selectedProfCodes.splice(index, 1);
                });
            }

            renderModalProfCodeList(searchValue);
            updateModalPreview();
        }

        function updateHeaderCheckbox() {
            const headerCheckbox = document.getElementById('headerCheckbox');
            const searchValue = document.getElementById('modalProfCodeSearch').value.toLowerCase();
            let visibleCodes = professionalCodeData;

            if (searchValue) {
                visibleCodes = professionalCodeData.filter(item => 
                    item.code.toLowerCase().includes(searchValue) || 
                    item.category.toLowerCase().includes(searchValue)
                );
            }

            const allVisibleSelected = visibleCodes.every(item => 
                selectedProfCodes.some(s => s.code === item.code)
            );
            const someVisibleSelected = visibleCodes.some(item => 
                selectedProfCodes.some(s => s.code === item.code)
            );

            headerCheckbox.checked = allVisibleSelected;
            headerCheckbox.indeterminate = someVisibleSelected && !allVisibleSelected;
        }

        function confirmProfCodeSelection() {
            if (activeProfCertId) {
                certificateProfCodes[activeProfCertId] = selectedProfCodes.map(item => ({...item}));
            }
            renderMainProfCodeDisplay();
            closeProfCodeModal();
            const cert = reviewCertificates.find(item => item.id === activeProfCertId);
            showToast(`${cert ? cert.certNo : '当前证书'} 已选择 ${selectedProfCodes.length} 个专业代码`);
        }

        function renderMainProfCodeDisplay() {
            const container = document.getElementById('certificateProfCodeDisplay');
            const badge = document.getElementById('profCountBadge');
            if (!container) return;
            const totalCount = Object.values(certificateProfCodes).reduce((sum, list) => sum + list.length, 0);
            if (badge) badge.textContent = totalCount;

            const renderCertProfCard = cert => {
                const codes = certificateProfCodes[cert.id] || [];
                const scopeChanged = cert.scopeBefore !== cert.scopeAfter;
                const scopeHtml = scopeChanged
                    ? `<div class="mt-3 grid grid-cols-1 xl:grid-cols-2 gap-3 text-sm">
                            <div class="rounded-lg border border-slate-200 bg-white p-3">
                                <div class="text-[11px] text-slate-500 mb-1 flex items-center gap-1"><i class="fas fa-history"></i>变更前认证范围</div>
                                <div class="text-slate-500 leading-relaxed line-through decoration-slate-300">${cert.scopeBefore}</div>
                            </div>
                            <div class="rounded-lg border border-green-200 bg-green-50 p-3">
                                <div class="text-[11px] text-green-700 mb-1 flex items-center gap-1"><i class="fas fa-arrow-right"></i>变更后认证范围</div>
                                <div class="text-green-800 font-medium leading-relaxed">${cert.scopeAfter}</div>
                            </div>
                        </div>`
                    : `<div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm">
                            <div class="text-[11px] text-slate-500 mb-1 flex items-center gap-1"><i class="fas fa-equals"></i>认证范围</div>
                            <div class="text-slate-700 leading-relaxed">${cert.scopeAfter}</div>
                        </div>`;
                const codeHtml = codes.length === 0
                    ? `<div class="text-sm text-slate-400 py-5 px-4 bg-slate-50 rounded-lg border border-slate-200 border-dashed text-center">
                            <i class="fas fa-list-check text-xl mb-2 text-slate-300"></i>
                            <p>暂未为本证书选择专业代码</p>
                        </div>`
                    : `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">${codes.map(item => {
                        const accBadges = item.accreditation.map(acc => {
                            const colorClass = acc === 'CNAS' ? 'bg-blue-100 text-blue-700 border-blue-200' :
                                              acc === 'DAKKS' ? 'bg-pink-100 text-pink-700 border-pink-200' :
                                              'bg-green-100 text-green-700 border-green-200';
                            return `<span class="${colorClass} text-[10px] px-2 py-0.5 rounded border font-medium">${acc}</span>`;
                        }).join('');
                        return `<div class="group flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg shadow-sm hover:border-blue-300 hover:shadow-md transition-all">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="font-mono font-bold text-slate-800 text-sm">${item.code}</span>
                                    <span class="text-slate-300">|</span>
                                    <span class="text-sm text-slate-700 font-medium truncate">${item.category}</span>
                                </div>
                                <div class="flex flex-wrap gap-1">${accBadges || '<span class="text-slate-400 text-xs">无认可机构</span>'}</div>
                            </div>
                            <button onclick="removeMainProfCode('${item.code}', '${cert.id}')" class="mt-0.5 w-7 h-7 flex items-center justify-center rounded-full hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100" title="删除">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>`;
                    }).join('')}</div>`;

                return `<div class="border border-slate-200 rounded-lg overflow-hidden">
                    <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <div class="flex flex-wrap items-center gap-2">
                                <div class="font-semibold text-slate-900">${cert.certNo}</div>
                                <span class="px-2 py-0.5 rounded-full text-xs border ${scopeChanged ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-slate-100 text-slate-600 border-slate-200'}">${scopeChanged ? '认证范围已变更' : '认证范围不变'}</span>
                            </div>
                            <div class="text-xs text-slate-500 mt-1">${cert.domain} · ${cert.standard}</div>
                        </div>
                        <button onclick="openProfCodeModal('${cert.id}')" class="px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium transition-colors inline-flex items-center gap-2">
                            <i class="fas fa-list-check"></i>
                            <span>选择专业代码</span>
                        </button>
                    </div>
                    <div class="p-4">
                        ${scopeHtml}
                        <div class="mt-4">${codeHtml}</div>
                    </div>
                </div>`;
            };

            const domainNames = [...new Set(reviewCertificates.map(cert => cert.domain))];
            container.innerHTML = domainNames.map(domain => {
                const certs = reviewCertificates.filter(cert => cert.domain === domain);
                return `<section class="border border-slate-200 rounded-xl overflow-hidden bg-white">
                    <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <div class="font-semibold text-slate-900">${domain}</div>
                            <div class="text-xs text-slate-500 mt-1">${certs.length} 本证书 · 按证书分别选择专业代码</div>
                        </div>
                        <span class="text-xs text-slate-500 bg-white border border-slate-200 rounded-full px-2.5 py-1">${certs.reduce((sum, cert) => sum + (certificateProfCodes[cert.id] || []).length, 0)} 个代码</span>
                    </div>
                    <div class="p-4 space-y-4">${certs.map(renderCertProfCard).join('')}</div>
                </section>`;
            }).join('');
        }

        function removeMainProfCode(code, certId) {
            const targetCertId = certId || activeProfCertId;
            certificateProfCodes[targetCertId] = (certificateProfCodes[targetCertId] || []).filter(item => item.code !== code);
            if (targetCertId === activeProfCertId) {
                selectedProfCodes = (certificateProfCodes[targetCertId] || []).map(item => ({...item}));
            }
            renderMainProfCodeDisplay();
            showToast('已删除');
        }

        function fillReviewerInfo() {
            const reviewerName = document.getElementById('reviewerName');
            const reviewDate = document.getElementById('reviewDate');
            const now = new Date();
            const localDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            if (reviewerName) reviewerName.value = currentLoginUser.name;
            if (reviewDate) reviewDate.value = localDate;
        }

        function selectConclusion(value) {
            selectedConclusion = value;
            document.querySelectorAll('input[name="reviewConclusion"]').forEach(radio => {
                radio.closest('.radio-card').classList.remove('selected');
                radio.checked = false;
            });
            const card = document.getElementById(value === 'approve' ? 'approveConclusionCard' : 'rejectConclusionCard');
            if (card) {
                card.classList.add('selected');
                card.querySelector('input').checked = true;
            }
        }

        function getAttachmentIcon(type) {
            if (type === 'pdf') return {icon: 'fa-file-pdf', className: 'pdf'};
            if (type === 'img') return {icon: 'fa-image', className: 'img'};
            return {icon: 'fa-file-lines', className: 'word'};
        }

        function renderAttachmentGrid() {
            const grid = document.getElementById('attachmentGrid');
            if (!grid) return;
            grid.innerHTML = attachmentCategories.map(item => {
                filePreviewData[item.id] = {
                    title: item.fileName,
                    type: item.type,
                    size: item.size,
                    summary: item.title
                };
                const icon = getAttachmentIcon(item.type);
                return `
                    <div class="attachment-preview-card cursor-default" onclick="previewFile('${item.id}')">
                        <div class="file-icon-lg ${icon.className}">
                            <i class="fas ${icon.icon}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold text-slate-900 leading-snug mb-2">${item.title}</div>
                            <div class="text-xs text-slate-500 mb-2">1 个文件</div>
                            <div class="flex items-center gap-3 text-xs">
                                <span class="text-slate-400 truncate">${item.fileName}</span>
                                <span class="text-slate-300">|</span>
                                <span class="text-slate-400">${item.size}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" title="预览" onclick="event.stopPropagation(); previewFile('${item.id}')" class="w-9 h-9 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button type="button" title="下载" onclick="event.stopPropagation(); downloadFile('${item.id}')" class="w-9 h-9 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 transition-colors">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 附件预览功能
        function previewFile(fileId) {
            const file = filePreviewData[fileId];
            if (!file) {
                showToast('未找到可预览文件', 'error');
                return;
            }
            const modal = document.getElementById('filePreviewModal');
            const title = document.getElementById('filePreviewTitle');
            const meta = document.getElementById('filePreviewMeta');
            const body = document.getElementById('filePreviewBody');
            const iconWrap = document.getElementById('filePreviewIcon');
            const downloadBtn = document.getElementById('filePreviewDownloadBtn');
            const icon = getAttachmentIcon(file.type);
            title.textContent = file.title;
            meta.textContent = `${file.size} · 预览件`;
            iconWrap.className = `w-10 h-10 rounded-lg flex items-center justify-center file-icon-lg ${icon.className}`;
            iconWrap.innerHTML = `<i class="fas ${icon.icon}"></i>`;
            downloadBtn.setAttribute('onclick', `downloadFile('${fileId}')`);
            body.innerHTML = `
                <div class="mx-auto max-w-3xl border border-slate-200 rounded-lg bg-slate-50 p-6">
                    <div class="bg-white rounded-lg border border-slate-200 p-8 min-h-[420px] shadow-sm">
                        <div class="flex items-center justify-between border-b border-slate-200 pb-4 mb-6">
                            <div>
                                <div class="text-lg font-bold text-slate-900">${file.title}</div>
                                <div class="text-xs text-slate-500 mt-1">${file.summary}</div>
                            </div>
                            <span class="px-2 py-1 rounded text-xs bg-green-100 text-green-700 border border-green-200">已上传</span>
                        </div>
                        <div class="space-y-4 text-sm text-slate-700">
                            <div class="h-3 bg-slate-200 rounded w-3/4"></div>
                            <div class="h-3 bg-slate-200 rounded w-full"></div>
                            <div class="h-3 bg-slate-200 rounded w-11/12"></div>
                            <div class="h-28 bg-blue-50 border border-blue-100 rounded-lg flex items-center justify-center text-blue-500">
                                <i class="fas ${icon.icon} mr-2"></i>文件内容预览
                            </div>
                            <div class="h-3 bg-slate-200 rounded w-full"></div>
                            <div class="h-3 bg-slate-200 rounded w-2/3"></div>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        }

        function previewImage(fileId) {
            const modal = document.getElementById('imagePreviewModal');
            const img = document.getElementById('previewImage');
            img.src = 'https://picsum.photos/800/600?random=' + Math.random();
            modal.classList.add('active');
        }

        function closeImagePreview() {
            document.getElementById('imagePreviewModal').classList.remove('active');
        }

        function closeFilePreview() {
            document.getElementById('filePreviewModal').classList.remove('active');
        }

        function downloadFile(fileId) {
            const file = filePreviewData[fileId];
            if (!file) {
                showToast('未找到可下载文件', 'error');
                return;
            }
            const blob = new Blob([`${file.title}\n${file.summary}\n此文件为页面原型中的下载示例。`], {type: 'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = file.title.replace(/\.(pdf|docx|xlsx|jpg|png)$/i, '.txt');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`已开始下载：${file.title}`);
        }

        // 通用功能
        function saveReview() {
            showToast('评审信息已暂存');
        }

        function submitReview() {
            // 验证必填项
            if (!selectedAuditMode) {
                showToast('请选择审核方式', 'error');
                document.getElementById('section-audit').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            if (selectedAuditMode === 'separate' && !selectedSiteType) {
                showToast('请选择现场审核类型', 'error');
                document.getElementById('section-audit').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            if (selectedAuditMode === 'separate' && selectedSiteType === 'hasSite' && !selectedAuditStage) {
                showToast('请选择审核阶段', 'error');
                document.getElementById('section-audit').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            const missingProfCert = reviewCertificates.find(cert => (certificateProfCodes[cert.id] || []).length === 0);
            if (missingProfCert) {
                showToast(`请为证书 ${missingProfCert.certNo} 选择专业代码`, 'error');
                document.getElementById('section-profcode').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            showToast(selectedConclusion === 'approve' ? '变更评审已提交：通过' : '变更评审已提交：驳回');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            msg.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-400';
            } else {
                icon.className = 'fas fa-check-circle text-green-400';
            }
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
                toast.classList.remove('opacity-100');
            }, 3000);
        }

        // 点击模态框外部关闭
        document.getElementById('profCodeModal').addEventListener('click', function(e) {
            if (e.target === this) closeProfCodeModal();
        });
    </script>
</body>
</html>
